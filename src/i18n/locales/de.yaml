# [en] social_callout_x_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects every Android device worldwide. Learn more: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_1: "Ab September 2026 blockiert Google alle Android-Apps, deren Entwickler sich nicht registriert und eine staatliche ID vorgelegt haben. Dies betrifft alle Android-Geräte weltweit. Mehr dazu: {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_2: "Google announced that all Android app developers must register centrally, pay a fee, and submit government ID, or their apps will be blocked on every device. over 67 organizations oppose this. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_2: "Google hat angekündigt, dass sich alle Android-App-Entwickler zentral registrieren, eine Gebühr entrichten und einen amtlichen Ausweis vorlegen müssen, andernfalls werden ihre Apps auf allen Geräten blockiert. Über 67 Organisationen lehnen dies ab. {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_3: "Android's openness distinguished it from iPhone for 17 years. Google is now requiring mandatory developer registration for all apps, including those distributed outside the Play Store. {url} #KeepAndroidOpen"
social_callout_x_3: "Androids Offenheit unterschied es 17 Jahre lang vom iPhone. Google verlangt nun die obligatorische Entwicklerregistrierung für alle Apps, auch für solche, die außerhalb des Play Stores vertrieben werden. {url} #KeepAndroidOpen"
# [en] social_callout_x_4: "F-Droid, the open-source Android app store, calls Google's developer verification an \"existential threat\" to alternative app distribution. The EFF warns it creates a pathway to censorship. {url} #KeepAndroidOpen"
social_callout_x_4: "F-Droid, der Open-Source-App-Store für Android, bezeichnet Googles Entwicklerverifizierung als \"existenzielle Bedrohung\" für alternative App-Vertriebswege. Die EFF warnt, dass dadurch Zensur ermöglicht wird. {url} #KeepAndroidOpen"
# [en] social_callout_x_5: "Google's proposed workaround for installing unverified apps requires 9 steps, a 24-hour wait, and runs through Play Services, which Google can modify at any time. It hasn't shipped in any beta. {url} #KeepAndroidOpen"
social_callout_x_5: "Googles vorgeschlagene Lösung zur Installation nicht verifizierter Apps erfordert neun Schritte, eine Wartezeit von 24 Stunden und läuft über die Play-Dienste, die Google jederzeit ändern kann. Sie ist noch in keiner Betaversion verfügbar. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification before their software can be installed on any device. This applies to all apps, not just those on the Play Store. over 67 organizations have signed an open letter opposing the policy. {url} #KeepAndroidOpen"
social_callout_linkedin_1: "Ab September 2026 müssen sich alle Android-App-Entwickler bei Google zentral registrieren und einen amtlichen Ausweis vorlegen, bevor ihre Software auf Geräten installiert werden darf. Dies gilt für alle Apps, nicht nur für die im Play Store. Über 67 Organisationen haben einen offenen Brief gegen diese Regelung unterzeichnet. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_2: "Android's openness has been its distinguishing feature for nearly two decades. Google is now mandating developer registration for all Android apps, including those distributed through alternative stores like F-Droid. The EFF, FSF, Tor Project, and dozens of other organizations are raising serious concerns. {url} #KeepAndroidOpen"
social_callout_linkedin_2: "Androids Offenheit ist seit fast zwei Jahrzehnten sein Markenzeichen. Google schreibt nun die Registrierung aller Entwickler für alle Android-Apps vor, auch für solche, die über alternative App-Stores wie F-Droid vertrieben werden. Die EFF, FSF, das Tor-Projekt und Dutzende anderer Organisationen äußern ernsthafte Bedenken. #KeepAndroidOpen"
# [en] social_callout_linkedin_3: "Google's developer verification program would give a single company the technical ability to block any app, from any developer, on any certified Android device worldwide. This affects independent developers, open-source projects, and the principle that you control the software on hardware you own. {url} #KeepAndroidOpen"
social_callout_linkedin_3: "Googles Entwicklerverifizierungsprogramm würde einem einzelnen Unternehmen die technische Möglichkeit geben, jede App von jedem Entwickler auf jedem zertifizierten Android-Gerät weltweit zu blockieren. Dies betrifft unabhängige Entwickler, Open-Source-Projekte und das Prinzip, dass man die Software auf eigener Hardware selbst kontrolliert. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_4: "F-Droid estimates 85% of its open-source apps could face distribution issues under Google's new developer verification rules. The requirement for government ID and signing keys creates barriers for anonymous contributors, developers in sanctioned countries, and volunteer-maintained projects. {url} #KeepAndroidOpen"
social_callout_linkedin_4: "F-Droid schätzt, dass 85 % seiner Open-Source-Apps aufgrund der neuen Entwicklerverifizierungsregeln von Google mit Vertriebsproblemen konfrontiert sein könnten. Die Anforderung eines amtlichen Ausweises und von Signaturschlüsseln stellt eine Hürde für anonyme Mitwirkende, Entwickler in sanktionierten Ländern und ehrenamtlich betreute Projekte dar. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_5: "Google's proposed \"advanced flow\" for sideloading unverified apps requires 9 steps, a mandatory 24-hour waiting period, and runs entirely through Google Play Services. The community has been asked to accept a blog post as a functional safeguard. It has not appeared in any beta release. {url} #KeepAndroidOpen"
social_callout_linkedin_5: "Googles vorgeschlagener \"erweiterter Ablauf\" zum Installieren nicht verifizierter Apps erfordert neun Schritte, eine obligatorische Wartezeit von 24 Stunden und läuft vollständig über Google Play-Dienste. Die Community wurde gebeten, einen Blogbeitrag als Sicherheitsmaßnahme zu akzeptieren. Dieser ist in keiner Beta-Version enthalten. {url} #KeepAndroidOpen"
# [en] social_callout_bluesky_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects all apps, not just Play Store apps. F-Droid calls it an \"existential threat.\" @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_1: "Ab September 2026 wird Google alle Android-Apps blockieren, deren Entwickler sich nicht registriert und einen amtlichen Ausweis vorgelegt haben. Dies betrifft alle Apps, nicht nur die aus dem Play Store. F-Droid bezeichnet dies als \"existenzielle Bedrohung\". @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
# [en] social_callout_bluesky_2: "Google is requiring all Android developers to register centrally, pay a fee, and submit government ID. Apps from unregistered developers will be silently blocked. over 67 organizations oppose this. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_2: "Google verlangt von allen Android-Entwicklern eine zentrale Registrierung, die Zahlung einer Gebühr und die Vorlage eines amtlichen Ausweises. Apps von nicht registrierten Entwicklern werden stillschweigend blockiert. Über 67 Organisationen lehnen dies ab. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_3: "After 17 years of marketing Android as an open platform, Google is mandating developer registration for all apps. Independent developers, open-source contributors, and alternative stores like F-Droid face an uncertain future. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_3: "Nachdem Google Android 17 Jahre lang als offene Plattform vermarktet hat, wird nun die Registrierung aller Apps für Entwickler verpflichtend. Unabhängige Entwickler, Open-Source-Mitwirkende und alternative App-Stores wie F-Droid stehen vor einer ungewissen Zukunft. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_4: "Google's proposed workaround for installing unverified apps: 9 steps, a 24-hour wait, delivered through Play Services (which Google can change at any time without consent). It exists only as a blog post. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_4: "Googles vorgeschlagene Lösung für die Installation nicht verifizierter Apps: 9 Schritte, 24 Stunden Wartezeit, bereitgestellt über Play-Dienste (die Google jederzeit ohne Zustimmung ändern kann). Bisher nur als Blogbeitrag verfügbar. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
# [en] social_callout_bluesky_5: "The EFF warns that Google's developer verification creates \"a pathway to censorship.\" Developers in restrictive countries, anonymous open-source contributors, and privacy tool maintainers are among those most affected. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_5: "Die EFF warnt, dass Googles Entwicklerverifizierung \"einen Weg zur Zensur ebnet\". Entwickler in restriktiven Ländern, anonyme Open-Source-Mitwirkende und Betreuer von Datenschutztools gehören zu den am stärksten Betroffenen. @keepandroidopen.bsky.social {url}"
# [en] social_callout_mastodon_1: "Starting September 2026, Google will require every Android app developer to register centrally, provide government ID, and submit signing keys. Apps from unregistered developers will be blocked on all certified devices worldwide. This threatens F-Droid, open-source distribution, and user autonomy. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_1: "Ab September 2026 müssen sich alle Android-App-Entwickler bei Google zentral registrieren, einen amtlichen Ausweis vorlegen und Signaturschlüssel einreichen. Apps nicht registrierter Entwickler werden auf allen zertifizierten Geräten weltweit blockiert. Dies gefährdet F-Droid, die Open-Source-Distribution und die Autonomie der Nutzer. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_2: "Google's Android Developer Verification program requires government ID, signing keys, and a fee for any developer who wants their software installable on Android. The EFF calls app gatekeeping \"a pathway to censorship.\" over 67 organizations have signed an open letter opposing it. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_2: "Googles Android-Entwicklerverifizierungsprogramm verlangt von Entwicklern, die ihre Software auf Android installieren möchten, einen amtlichen Ausweis, Signaturschlüssel und eine Gebühr. Die EFF bezeichnet die App-Zugriffskontrolle als \"Einfallstor zur Zensur\". Über 67 Organisationen haben einen offenen Brief dagegen unterzeichnet. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_3: "F-Droid, home to thousands of free and open-source Android apps, calls Google's developer verification an \"existential threat.\" An estimated 85% of F-Droid apps could face distribution issues because their developers signed through F-Droid, not through Google. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_3: "F-Droid, die Plattform für Tausende kostenloser und quelloffener Android-Apps, bezeichnet Googles Entwicklerverifizierung als \"existenzielle Bedrohung\". Schätzungsweise 85% der F-Droid-Apps könnten Probleme bei der Verteilung bekommen, da sich ihre Entwickler über F-Droid und nicht über Google registriert haben. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_4: "Google's proposed workaround for sideloading unverified apps requires 9 steps, a mandatory 24-hour waiting period, and is delivered through Google Play Services, not the Android OS. Google can modify or remove it at any time without user consent. It hasn't shipped in any beta. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_4: "Googles vorgeschlagene Umgehungslösung zum manuellen Installieren nicht verifizierter Apps erfordert neun Schritte, eine obligatorische Wartezeit von 24 Stunden und wird über Google Play-Dienste, nicht über das Android-Betriebssystem, bereitgestellt. Google kann sie jederzeit ohne Zustimmung der Nutzer ändern oder entfernen. Sie ist in keiner Betaversion verfügbar. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_5: "The mandatory developer registration Google is imposing on Android raises concerns for developers in sanctioned countries, anonymous open-source contributors, and anyone building privacy or security tools. Google has a documented history of complying with government demands to remove apps. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_5: "Die von Google für Android eingeführte obligatorische Entwicklerregistrierung gibt Anlass zur Sorge bei Entwicklern in sanktionierten Ländern, anonymen Open-Source-Mitwirkenden und allen, die Tools für Datenschutz und Sicherheit entwickeln. Google ist dafür bekannt, staatlichen Forderungen nachzukommen und Apps zu entfernen. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_facebook_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification. Apps from unregistered developers will be blocked on all certified Android devices worldwide. This applies to all apps, not just those on the Play Store. Learn more: {url}"
social_callout_facebook_1: "Ab September 2026 müssen sich alle Android-App-Entwickler bei Google zentral registrieren und einen amtlichen Ausweis vorlegen. Apps nicht registrierter Entwickler werden auf allen zertifizierten Android-Geräten weltweit gesperrt. Dies gilt für alle Apps, nicht nur für die im Play Store. Mehr erfahren: {url}"
# [en] social_callout_facebook_2: "F-Droid, the open-source Android app store used by millions, calls Google's developer verification an \"existential threat\" to its continued operation. over 67 organizations including the EFF, FSF, and Tor Project have signed an open letter opposing the policy. Learn why this matters: {url}"
social_callout_facebook_2: "F-Droid, der von Millionen Nutzern verwendete Open-Source-App-Store für Android, bezeichnet Googles Entwicklerverifizierung als \"existenzielle Bedrohung\" für seinen Fortbestand. Über 67 Organisationen, darunter die EFF, die FSF und das Tor-Projekt, haben einen offenen Brief gegen diese Richtlinie unterzeichnet. Erfahren Sie mehr darüber: {url}"
# [en] social_callout_facebook_3: "Google's proposed workaround for installing unverified apps after their lockdown takes effect requires 9 steps, a mandatory 24-hour waiting period, and runs through Google Play Services (which Google can modify at any time). The community is being asked to accept a blog post as a safeguard. {url}"
