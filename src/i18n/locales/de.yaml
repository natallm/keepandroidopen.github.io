# social_callout_linkedin_6: "Digital sovereignty is at stake. Google's plan to mandate developer registration for all Android apps—even those distributed outside the Play Store—creates a central point of control and potential censorship for 3 billion devices. {url} #KeepAndroidOpen"
social_callout_linkedin_6: "Die digitale Souveränität steht auf dem Spiel. Googles Plan, eine Entwicklerregistrierung für alle Android-Apps vorzuschreiben – selbst für solche, die außerhalb des Play Stores vertrieben werden –, schafft einen zentralen Kontrollpunkt und eröffnet Möglichkeiten zur Zensur von 3 Milliarden Geräten. {url} #KeepAndroidOpen"
# social_callout_linkedin_7: "The 'Keep Android Open' campaign has gained support from over 67 global organizations. We are opposing Google's plan to block any application whose developer hasn't registered centrally and provided government ID. Read the open letter: {url} #KeepAndroidOpen"
social_callout_linkedin_7: "Die Kampagne 'Keep Android Open' hat die Unterstützung von über 67 Organisationen weltweit erhalten. Wir lehnen Googles Plan ab, alle Apps zu sperren, deren Entwickler sich nicht zentral registriert und dafür einen amtlichen Ausweis vorgelegt haben. Lesen Sie den offenen Brief: {url} #KeepAndroidOpen"
# social_callout_linkedin_8: "Retroactively changing the rules for hardware people already own is a dangerous precedent. Google's mandatory developer verification strips users of their agency and forces them into a managed ecosystem. {url} #KeepAndroidOpen"
social_callout_linkedin_8: "Die nachträgliche Änderung der Regeln für Hardware, die Nutzer bereits besitzen, ist ein gefährlicher Präzedenzfall. Googles obligatorische Entwicklerüberprüfung nimmt den Nutzern ihre Entscheidungsfreiheit und zwingt sie in ein kontrolliertes Ökosystem. {url} #KeepAndroidOpen"
# social_callout_linkedin_9: "F-Droid and the EFF have raised the alarm: Google's developer verification program is an 'existential threat' to alternative app distribution. We must protect the open-source ecosystem that built Android. {url} #KeepAndroidOpen"
social_callout_linkedin_9: "F-Droid und die EFF haben Alarm geschlagen: Googles Entwickler-Verifizierungsprogramm ist eine 'existenzielle Bedrohung' für den alternativen App-Vertrieb. Wir müssen das Open-Source-Ökosystem schützen, auf dem Android aufgebaut ist. {url} #KeepAndroidOpen"
# social_callout_linkedin_10: "As Google moves to further entrench its gatekeeping status, the community is pushing back. Your device should be your property, not a leased terminal subject to retroactive restrictions. Join the movement: {url} #KeepAndroidOpen"
social_callout_linkedin_10: "Während Google daran arbeitet, seine Rolle als Gatekeeper weiter zu festigen, wehrt sich die Community dagegen. Dein Gerät sollte dein Eigentum sein, kein gemietetes Endgerät, das rückwirkenden Einschränkungen unterliegt. Schließe dich der Bewegung an: {url} #KeepAndroidOpen"

