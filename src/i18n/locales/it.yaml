# [en] social_callout_x_6: "Android was sold to us as an open platform. Now Google wants every developer to register and submit ID just to let you install their apps. Don't let them rug-pull 3 billion users. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_6: "Android ci era stato presentato come una piattaforma aperta. Adesso Google vuole che ogni sviluppatore si registri e fornisca i propri dati identificativi solo per poter installare le proprie applicazioni. Non lasciamo che prendano in giro 3 miliardi di utenti. {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_7: "If you bought your phone, you should own it. Google's new 'developer verification' means they decide what software you're allowed to run on your own property. Join the 100k+ signers opposing this: {url} #KeepAndroidOpen"
social_callout_x_7: "Se hai comprato il tuo telefono, dovresti esserne il proprietario. La nuova \"verifica degli sviluppatori\" di Google significa che sono loro a decidere quale software puoi installare sul tuo dispositivo. Unisciti agli oltre 100.000 firmatari che si oppongono a questa misura: {url} #KeepAndroidOpen"
# [en] social_callout_x_8: "Google is turning Android into a walled garden. Mandatory ID, registration fees, and a 9-step 'advanced flow' for sideloading? That's not security, it's a monopoly move. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_8: "Google sta trasformando Android in una piattaforma chiusa. Il documento d'identità obbligatorio, la tassa di registrazione e una \"procedura avanzata\" in 9 passi per il sideloading? Questa non è sicurezza, è una mossa da monopolio. {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_9: "What happens to the student's first app, or the privacy tool built by a volunteer? Google's mandatory registration blocks them all by default unless they play by Google's rules. {url} #KeepAndroidOpen"
social_callout_x_9: "Cosa succede alla prima applicazione sviluppata dallo studente o allo strumento per la privacy creato da un volontario? La registrazione obbligatoria imposta da Google li blocca tutti di default, a meno che non rispettino le sue regole. {url} #KeepAndroidOpen"
# [en]social_callout_x_10: "17 years of Android openness are at risk. Google's plan to block unverified apps is a direct hit on F-Droid and independent software. Stop the lockdown: {url} @AlteredDeal #KeepAndroidOpen"
