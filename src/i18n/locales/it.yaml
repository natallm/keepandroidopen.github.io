social_callout_facebook_3: "La soluzione alternativa proposta da Google per installare applicazioni non verificate dopo l'entrata in vigore del blocco richiede 9 passi, un periodo di attesa obbligatorio di 24 ore e passa attraverso i Google Play Services (che Google può modificare in qualsiasi momento). Alla comunità viene chiesto di accettare un articolo sul blog come misura di sicurezza. {url}"
# [en] social_callout_facebook_4: "Android's openness has been its defining characteristic for 17 years. Millions chose it over iPhone for exactly that reason. Google is now mandating developer registration for all apps, including those distributed outside the Play Store. Independent developers and open-source projects face the most impact. {url}"
social_callout_facebook_4: "L'apertura di Android è stata la sua caratteristica distintiva per 17 anni. Milioni di persone l'hanno preferita all'iPhone proprio per questo motivo. Adesso Google sta rendendo obbligatoria la registrazione degli sviluppatori per tutte le applicazioni, comprese quelle distribuite al di fuori del Play Store. Gli sviluppatori indipendenti e i progetti open source sono quelli che ne risentiranno maggiormente. {url}"
# [en] social_callout_facebook_5: "The EFF calls app gatekeeping \"a pathway to censorship.\" Google's developer verification would give a single company the ability to block any app, from any developer, on any certified device worldwide. This sets a precedent that extends beyond Android to the future of personal computing. {url}"
social_callout_facebook_5: "L'EFF definisce il controllo delle applicazioni \"un percorso verso la censura\". La verifica degli sviluppatori da parte di Google darebbe a una singola azienda la possibilità di bloccare qualsiasi applicazione, di qualsiasi sviluppatore, su qualsiasi dispositivo certificato nel mondo. Ciò costituisce un precedente che va oltre Android e si estende al futuro dell'informatica personale. {url}"
# [en] social_callout_facebook_6: "Your phone, your choice? Not if Google has its way. Starting in 2026, they plan to block any app whose developer hasn't registered and provided government ID. This affects everyone. {url}"
social_callout_facebook_6: "Il tuo telefono, la tua scelta? Non se Google avrà la meglio. A partire dal 2026 hanno in programma di bloccare qualsiasi applicazione il cui sviluppatore non si sia registrato e non abbia fornito un documento d'identità. Questo riguarda tutti. {url}"
# [en] social_callout_facebook_7: "Google is retroactively locking down billions of devices that were sold as open platforms. This 'rug pull' threatens independent developers and alternative app stores like F-Droid. {url}"
social_callout_facebook_7: "Google sta bloccando retroattivamente miliardi di dispositivi che erano stati venduti come piattaforme aperte. Questa \"truffa\" minaccia gli sviluppatori indipendenti e gli app store alternativi come F-Droid. {url}"
# [en] social_callout_facebook_8: "Is your phone really yours? If Google can decide which apps you're allowed to install, the answer is no. Join the 100,000+ people fighting to keep Android open. {url}"
social_callout_facebook_8: "Il tuo telefono è davvero tuo? Se Google può decidere quali applicazioni puoi installare, la risposta è no. Unisciti alle oltre 100.000 persone che lottano per mantenere Android aperto. {url}"
# [en] social_callout_facebook_9: "Google's 9-step process for 'allowing' unverified apps is a trap. It's designed to be so difficult that nobody uses it, giving Google total control. {url}"
social_callout_facebook_9: "Il processo in 9 passi di Google per \"autorizzare\" le applicazioni non verificate è una trappola. È progettato per essere così difficile che nessuno lo userà, dando a Google il controllo totale. {url}"
# [en] social_callout_facebook_10: "From students building their first apps to volunteers creating privacy tools, Google's mandatory registration policy will freeze out innovation. Help us keep Android open! {url}"
social_callout_facebook_10: "Dagli studenti che sviluppano le loro prime applicazioni ai volontari che creano strumenti per la privacy, la politica di registrazione obbligatoria di Google bloccherà l'innovazione. Aiutaci a mantenere Android aperto! {url}"

