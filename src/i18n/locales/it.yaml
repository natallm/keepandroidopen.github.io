# Meta
# [en] title: "Keep Android Open"
title: "Keep Android Open"
# [en] description: "Your phone is about to stop being yours. In September 2026, Google will block every Android app whose developer hasn't registered with them."
description: "Il tuo telefono sta per smettere di essere tuo. A settembre 2026 Google bloccherà tutte le applicazioni Android i cui sviluppatori non si saranno registrati presso di loro."

# Hero
# [en] hero_lede: "Your phone is about to stop being yours."
hero_lede: "Il tuo telefono sta per smettere di essere tuo."
# [en] hero_countdown_label: "days until lockdown"
hero_countdown_label: "giorni al blocco"
# [en] hero_sub: "Starting September 2026, a silent update, nonconsensually pushed by Google, will **block every Android app** whose developer hasn't registered with Google, signed their contract, paid up, and handed over government ID."
hero_sub: "A partire da settembre 2026 un aggiornamento silenzioso, imposto da Google senza il consenso degli utenti, **bloccherà tutte le applicazioni Android** i cui sviluppatori non si siano registrati presso l'azienda, non abbiano firmato il contratto, non abbiano pagato e non abbiano fornito un documento d'identità."
# [en] hero_kicker: "Every app and every device, worldwide, with no opt-out."
hero_kicker: "Tutte le applicazioni e tutti i dispositivi, in tutto il mondo, senza possibilità di rinuncia."

# What Google is doing
# [en] what_heading: "What Google is doing"
what_heading: "Cosa sta facendo Google"
# [en] what_intro: "In August 2025, Google [announced](https://developer.android.com/developer-verification) a new requirement: starting September 2026, **every Android app developer must register centrally with Google** before their software can be installed on any device. Not just Play Store apps: all apps. This includes apps shared between friends, distributed through [F-Droid](https://f-droid.org), built by hobbyists for personal use. Independent developers, church and community groups, and hobbyists alike will all be frozen out of being able to develop and distribute their software."
what_intro: "Nell'agosto 2025 Google [ha annunciato](https://developer.android.com/developer-verification) un nuovo requisito: a partire da settembre 2026 **ogni sviluppatore di applicazioni Android dovrà registrarsi presso Google** prima che il proprio software possa essere installato su qualsiasi dispositivo. Non solo le applicazioni del Play Store: tutte le applicazioni. Questo include le applicazioni condivise tra amici, distribuite tramite F-Droid, realizzate da appassionati per uso personale. Sviluppatori indipendenti, gruppi religiosi e comunitari, nonché semplici appassionati, si vedranno tutti preclusa la possibilità di sviluppare e distribuire il proprio software."
# [en] what_registration: "Registration requires:"
what_registration: "Per registrarsi è necessario:"
# [en] what_req_fee: "Paying a fee to Google"
what_req_fee: "Pagare una tassa a Google"
# [en] what_req_terms: "Agreeing to Google's Terms and Conditions"
what_req_terms: "Accettare i termini e condizioni di Google"
# [en] what_req_id: "Surrendering your government-issued identification"
what_req_id: "Fornire un documento di identità rilasciato dalle autorità"
# [en] what_req_signing: "Providing evidence of your private signing key"
what_req_signing: "Fornire la prova della propria chiave di firma privata"
# [en] what_req_appids: "Listing all current and all future application identifiers"
what_req_appids: "Fornire un elenco di tutti gli identificatori delle applicazioni attuali e futuri"
# [en] what_pullquote: "If a developer does not comply, their apps get silently blocked on every Android device worldwide."
what_pullquote: "Se uno sviluppatore non rispetterà questi requisiti, le sue applicazioni verranno bloccate in modo silenzioso su tutti i dispositivi Android nel mondo."

# Who this hurts
# [en] impact_heading: "Who this hurts"
impact_heading: "Chi viene danneggiato"
# [en] impact_you_heading: "You"
impact_you_heading: "Tu"
# [en] impact_you_p1: "You bought an Android phone because Google told you it was open. You could install what you wanted, and that was the deal."
impact_you_p1: "Hai comprato un telefono Android perché Google ti aveva detto che era un sistema aperto. Potevi installare quello che volevi, questo era l'accordo."
# [en] impact_you_p2: "Google is now rewriting that deal, retroactively, on hardware you already own. After the update lands, you can only run software that Google has pre-approved. On your phone: *your* property, that *you* paid for."
impact_you_p2: "Adesso Google sta riscrivendo tale accordo, con effetto retroattivo, sull'hardware che già possiedi. Una volta installato l'aggiornamento, potrai utilizzare solo software preventivamente approvato da Google. Sul tuo telefono: un dispositivo di *tua* proprietà, che hai pagato di tasca *tua*."
# [en] impact_dev_heading: "Independent developers"
impact_dev_heading: "Sviluppatori indipendenti"
# [en] impact_dev_p1: "A teenager's first app, a volunteer's privacy tool, or a company's confidential internal beta. It doesn't matter. After September 2026, none of these can be installed without Google's blessing."
impact_dev_p1: "La prima applicazione di un adolescente, uno strumento per la privacy di un volontario o la versione beta interna riservata di un'azienda. Non importa, dopo settembre 2026 nessuna di queste potrà essere installata senza l'approvazione di Google."
# [en] impact_dev_p2: "[F-Droid](https://f-droid.org), home to thousands of free and open-source Android apps, has called this an [\"existential\" threat](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow calls it [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
impact_dev_p2: "[F-Droid](https://f-droid.org), che ospita migliaia di applicazioni Android gratuite e open source, ha definito questa situazione una [\"minaccia esistenziale\"](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow la chiama [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
# [en] impact_gov_heading: "Governments & civil society"
impact_gov_heading: "Governi e società civile"
# [en] impact_gov_p1: "Google has a [documented track record](https://www.aclu.org/news/free-speech/app-store-oligopoly) of complying when authoritarian regimes demand app removals. With this program, the software that runs your country's institutions will exist at the pleasure of a single unaccountable foreign corporation."
impact_gov_p1: "Google ha una [storia documentata](https://www.aclu.org/news/free-speech/app-store-oligopoly) di ottemperanza alle richieste di rimozione delle applicazioni da parte dei regimi autoritari. Con questo programma il software che gestisce le istituzioni del tuo paese dipenderà dal capriccio di una singola società straniera che non deve rendere conto a nessuno."
# [en] impact_gov_p2: "The [EFF calls](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) app gatekeeping \"an ever-expanding pathway to internet censorship.\""
impact_gov_p2: "L'[EFF definisce](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship)il controllo delle applicazioni un \"percorso in continua espansione verso la censura di Internet.\""

# Advanced flow
# [en] flow_heading: "Google's \"escape hatch\" is a trap door"
flow_heading: "La \"via di fuga\" di Google è una trappola"
# [en] flow_intro: "Google says \"power users\" can [\"still install\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) unverified apps. Here's what that *actually* looks like:"
flow_intro: "Google afferma che gli \"utenti esperti\" possono [\"ancora installare\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) le applicazioni non verificate. Ecco come funziona in pratica:"
# [en] flow_step1: "Delve into System Settings, find Developer Options"
flow_step1: "Accedi alle impostazioni di sistema, trova le opzioni sviluppatore"
# [en] flow_step2: "Tap the build number **seven times** to enable Developer Mode"
flow_step2: "Tocca il numero di build **sette volte** per abilitare la modalità sviluppatore"
# [en] flow_step3: "Dismiss scare screens about coercion"
flow_step3: "Ignora le schermate di allarme relative alla coercizione"
# [en] flow_step4: "Enter your PIN"
flow_step4: "Inserisci il tuo PIN"
# [en] flow_step5: "Restart the device"
flow_step5: "Riavvia il dispositivo"
# [en] flow_step6: "**Wait 24 hours**"
flow_step6: "**Attendi 24 ore**"
# [en] flow_step7: "Come back, dismiss more scare screens"
flow_step7: "Torna indietro, ignora altre schermate di avviso"
# [en] flow_step8: "Pick \"allow temporarily\" (7 days) or \"allow indefinitely\""
flow_step8: "Scegli \"consenti temporaneamente\" (7 giorni) o \"consenti a tempo indeterminato\""
# [en] flow_step9: "Confirm, again, that you understand \"the risks\""
flow_step9: "Conferma, ancora una volta, di aver compreso \"i rischi\""
# [en] flow_summary: "Nine steps. A mandatory 24-hour cooling-off period. *For installing software on a device you own.*"
flow_summary: "Nove passi. Un periodo di riflessione obbligatorio di 24 ore. *Per l'installazione di software su un dispositivo di tua proprietà.*"
# [en] flow_detail: "Worse: this flow runs entirely through **Google Play Services**, not the Android OS. Google can change it, tighten it, or kill it at any time, with no OS update required and no consent needed. And as of today, it hasn't shipped in any beta, preview, or canary build. It exists only as a blog post and some mockups."
flow_detail: "Peggio ancora: questa procedura passa interamente tramite i **Google Play Services**, non il sistema operativo Android. Google può modificarlo, renderlo più rigido o eliminarlo in qualsiasi momento, senza che sia necessario alcun aggiornamento del sistema operativo e senza alcun consenso. Al momento non è stato ancora rilasciato in nessuna versione beta, anteprima o canary, esiste solo sotto forma di articolo sul blog e alcuni prototipi."

# Precedent
# [en] precedent_heading: "This is bigger than Android"
precedent_heading: "È una questione più grande di Android"
# [en] precedent_pullquote: "If Google can retroactively lock down billions of devices that were sold as open platforms, every hardware manufacturer on the planet is watching."
precedent_pullquote: "Se Google può bloccare retroattivamente miliardi di dispositivi venduti come piattaforme aperte, tutti i produttori di hardware del pianeta stanno a guardare."
# [en] precedent_p1: "The principle being established: **the company that made your device gets to decide, after you've bought it, what software you're allowed to run.** In software, this is called a \"rug pull\"; but at least you could always install competing software. In hardware, it is a *fait accompli* that strips you of your agency and renders you powerless to the whims of a single unaccountable gatekeeper and convicted monopolist."
precedent_p1: "Il principio che si sta affermando è il seguente: **l'azienda che ha prodotto il tuo dispositivo può decidere, dopo che l'hai acquistato, quale software ti è permesso utilizzare.** Nel mondo del software questo si chiama truffa, ma almeno è sempre possibile installare un software concorrente. Nel mondo dell'hardware, invece, è un fatto compiuto che ti priva di ogni autonomia e ti rende impotente di fronte ai capricci di un unico controllore che non deve rendere conto a nessuno e che è stato dichiarato monopolista."
# [en] precedent_p2: "Android's openness was never just a feature. It was the *promise* that distinguished it from iPhone. Millions chose Android for exactly that reason. Google is now revoking that promise unilaterally, on devices *already* in people's pockets, because they've decided they have enough market dominance and regulatory capture to get away with it."
precedent_p2: "L'apertura di Android non è mai stata solo una caratteristica, era la *promessa* che lo distingueva dall'iPhone e milioni di persone hanno scelto Android proprio per questo motivo. Adesso Google sta venendo meno a questa promessa in modo unilaterale, proprio sui dispositivi che la gente ha *già* in tasca, perché ha deciso di avere abbastanza potere di mercato e influenza sulle autorità di regolamentazione da poterlo fare impunemente."
# [en] precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"Google's Apple envy threatens to dismantle Android's open legacy.\"*"
precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"L'invidia di Google nei confronti di Apple rischia di smantellare le caratteristiche di apertura che contraddistinguono Android.\"*"

# Objections
# [en] objections_heading: "But wait, isn't this..."
objections_heading: "Un attimo, non si tratta forse..."
# [en] obj_security_q: "\"...just about security?\""
obj_security_q: "\"...solo di sicurezza?\""
# [en] obj_security_a: "The security rationale is a smokescreen. Google Play Protect already scans for malware independent of developer identity. Requiring a government ID doesn't make code safer. It makes *developers* identifiable and controllable. Malware authors can register. Indie developers and dissidents often can't. The [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) is blunt: identity-based gatekeeping is a censorship tool, not a security one."
obj_security_a: "La motivazione della sicurezza è solo una cortina fumogena. Google Play Protect esegue già la scansione alla ricerca di malware indipendentemente dall'identità dello sviluppatore. Richiedere un documento d'identità ufficiale non rende il codice più sicuro. Ciò rende gli sviluppatori identificabili e controllabili. Gli autori di malware possono registrarsi, mentre gli sviluppatori indipendenti e i dissidenti spesso non possono farlo. L'EFF è stata categorica: il controllo basato sull'identità è uno strumento di censura, non di sicurezza."
# [en] obj_sideloading_q: "\"...still sideloading if you use the advanced flow?\""
obj_sideloading_q: "\"...di sideloading se utilizzi la procedura avanzata?\""
# [en] obj_sideloading_a: "Nine steps, 24-hour wait, buried in Developer Options, delivered through a proprietary service that Google can revoke whenever they want. That's not sideloading. That's a **deterrence mechanism** built to ensure almost nobody completes it. And since it runs through Play Services rather than the OS, Google can tighten or kill it silently."
obj_sideloading_a: "Nove passi, 24 ore di attesa, nascosto nelle opzioni sviluppatore, fornito tramite un servizio proprietario che Google può revocare quando vuole. Questo non è sideloading, ma un **meccanismo di deterrenza** creato per garantire che quasi nessuno riesca a portarlo a termine. Inoltre, dato che funziona tramite i Play Services anziché tramite il sistema operativo, Google può inasprirne le condizioni o eliminarlo in modo silenzioso."
# [en] obj_hide_q: "\"...only a problem if you have something to hide?\""
obj_hide_q: "\"...di un problema solo se hai qualcosa da nascondere?\""
# [en] obj_hide_a: "Whistleblowers, journalists, and activists under authoritarian governments will be the first victims. People in domestic abuse situations are next. All these groups have legitimate reasons to distribute or use software without putting their legal identity in a Google database. Anonymous open-source contribution is a tradition older than Google itself. This policy ends it on Android."
obj_hide_a: "Gli informatori, i giornalisti e gli attivisti sotto governi autoritari saranno le prime vittime. Le persone in situazioni di violenza domestica saranno le prossime. Tutti questi gruppi hanno motivi legittimi per distribuire o utilizzare software senza che la loro identità legale finisca in un database di Google. Il contributo anonimo all'open source è una tradizione più antica della stessa Google. Questa politica pone fine a tutto ciò su Android."
# [en] obj_apple_q: "\"...the same thing Apple does?\""
obj_apple_q: "\"...della stessa cosa che fa Apple?\""
# [en] obj_apple_a: "Apple has been a walled garden from day one. People chose Android *because it was different*. \"Apple does it too\" is a race to the bottom and a weak *tu quoque* argument. And under regulatory pressure (the EU's Digital Markets Act), even Apple is being forced to open up. Google is moving in the opposite direction: attempting to further entrench its gatekeeping status."
obj_apple_a: "Apple è stata un giardino recintato fin dal primo giorno. Le persone hanno scelto Android *perché era diverso*. \"Anche Apple lo fa\" è una corsa al ribasso e un debole argomento *tu quoque*. Inoltre, sotto la pressione normativa (il Digital Markets Act dell'UE), anche Apple è stata costretta ad aprirsi. Google sta andando nella direzione opposta: sta cercando di consolidare ulteriormente il suo status di controllore."
# [en] obj_cost_q: "\"...just $25 and some paperwork?\""
obj_cost_q: "\"...di solo 25 dollari e un po' di scartoffie?\""
# [en] obj_cost_a: "Maybe, if you're a developer in the US with a credit card and a driver's license. Try being a student in sub-Saharan Africa, or a dissident in Myanmar, or a volunteer maintaining a community health app. The cost isn't only financial: you're surrendering government ID and evidence of your signing keys to a company that [routinely complies](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) with government demands to remove apps and expose developers."
obj_cost_a: "Forse, se sei uno sviluppatore negli Stati Uniti con una carta di credito e una patente di guida. Prova a metterti nei panni di uno studente dell'Africa subsahariana, di un dissidente in Myanmar o di un volontario che gestisce un'applicazione per la salute della comunità. Il costo non è solo economico: stai consegnando il tuo documento d'identità e le prove delle tue chiavi di firma a un'azienda che asseconda regolarmente le richieste del governo di rimuovere le applicazioni e smascherare gli sviluppatori."

