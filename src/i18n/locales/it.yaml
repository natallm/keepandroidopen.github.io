# [en] social_callout_linkedin_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification before their software can be installed on any device. This applies to all apps, not just those on the Play Store. over 67 organizations have signed an open letter opposing the policy. {url} #KeepAndroidOpen"
social_callout_linkedin_1: "A partire da settembre 2026 Google richiederà a tutti gli sviluppatori di applicazioni Android di registrarsi a livello centrale e di fornire un documento di identità rilasciato dalle autorità prima che il loro software possa essere installato su qualsiasi dispositivo. Ciò vale per tutte le applicazioni, non solo per quelle presenti sul Play Store. Oltre 67 organizzazioni hanno firmato una lettera aperta in cui si oppongono a questa politica. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_2: "Android's openness has been its distinguishing feature for nearly two decades. Google is now mandating developer registration for all Android apps, including those distributed through alternative stores like F-Droid. The EFF, FSF, Tor Project, and dozens of other organizations are raising serious concerns. {url} #KeepAndroidOpen"
social_callout_linkedin_2: "L'apertura di Android è stata la sua caratteristica distintiva per quasi due decenni. Adesso Google sta rendendo obbligatoria la registrazione degli sviluppatori per tutte le applicazioni Android, comprese quelle distribuite tramite store alternativi come F-Droid. L'EFF, la FSF, il Tor Project e decine di altre organizzazioni stanno esprimendo serie preoccupazioni. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_3: "Google's developer verification program would give a single company the technical ability to block any app, from any developer, on any certified Android device worldwide. This affects independent developers, open-source projects, and the principle that you control the software on hardware you own. {url} #KeepAndroidOpen"
social_callout_linkedin_3: "Il programma di verifica degli sviluppatori di Google consentirebbe a una singola azienda di avere la capacità tecnica di bloccare qualsiasi applicazione, di qualsiasi sviluppatore, su qualsiasi dispositivo Android certificato in tutto il mondo. Ciò ha ripercussioni sugli sviluppatori indipendenti, sui progetti open source e sul principio secondo cui l'utente ha il controllo del software installato sull'hardware di sua proprietà. #KeepAndroidOpen"
# [en] social_callout_linkedin_4: "F-Droid estimates 85% of its open-source apps could face distribution issues under Google's new developer verification rules. The requirement for government ID and signing keys creates barriers for anonymous contributors, developers in sanctioned countries, and volunteer-maintained projects. {url} #KeepAndroidOpen"
social_callout_linkedin_4: "F-Droid stima che l'85% delle sue applicazioni open source potrebbe incontrare difficoltà di distribuzione a causa delle nuove regole di verifica degli sviluppatori imposte da Google. L'obbligo di fornire un documento d'identità ufficiale e chiavi di firma crea ostacoli per i collaboratori anonimi, gli sviluppatori dei paesi soggetti a sanzioni e i progetti gestiti da volontari. #KeepAndroidOpen"
# [en] social_callout_linkedin_5: "Google's proposed \"advanced flow\" for sideloading unverified apps requires 9 steps, a mandatory 24-hour waiting period, and runs entirely through Google Play Services. The community has been asked to accept a blog post as a functional safeguard. It has not appeared in any beta release. {url} #KeepAndroidOpen"
social_callout_linkedin_5: "La \"procedura avanzata\" proposta da Google per il sideloading di applicazioni non verificate richiede 9 passi, un periodo di attesa obbligatorio di 24 ore e si svolge interamente tramite i Google Play Services. Alla comunità è stato chiesto di considerare un articolo sul blog come misura di sicurezza effettiva. Tale funzione non è ancora stata inclusa in nessuna versione beta. {url}"
# [en] social_callout_bluesky_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects all apps, not just Play Store apps. F-Droid calls it an \"existential threat.\" @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
# [en] social_callout_linkedin_6: "Digital sovereignty is at stake. Google's plan to mandate developer registration for all Android apps—even those distributed outside the Play Store—creates a central point of control and potential censorship for 3 billion devices. {url} #KeepAndroidOpen"
social_callout_linkedin_6: "È in gioco la sovranità digitale. Il piano di Google di rendere obbligatoria la registrazione degli sviluppatori per tutte le applicazioni Android, anche quelle distribuite al di fuori del Play Store, crea un punto di controllo centralizzato e un potenziale strumento di censura per 3 miliardi di dispositivi. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_7: "The 'Keep Android Open' campaign has gained support from over 67 global organizations. We are opposing Google's plan to block any application whose developer hasn't registered centrally and provided government ID. Read the open letter: {url} #KeepAndroidOpen"
social_callout_linkedin_7: "La campagna \"Keep Android Open\" ha ottenuto il sostegno di oltre 67 organizzazioni a livello mondiale. Ci opponiamo al piano di Google di bloccare qualsiasi applicazione il cui sviluppatore non si sia registrato centralmente e non abbia fornito un documento d'identità. Leggi la lettera aperta: {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_8: "Retroactively changing the rules for hardware people already own is a dangerous precedent. Google's mandatory developer verification strips users of their agency and forces them into a managed ecosystem. {url} #KeepAndroidOpen"
social_callout_linkedin_8: "Modificare retroattivamente le regole per l'hardware che le persone possiedono già è un precedente pericoloso. La verifica obbligatoria degli sviluppatori imposta da Google priva gli utenti della loro autonomia e li costringe a utilizzare un ecosistema controllato. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_9: "F-Droid and the EFF have raised the alarm: Google's developer verification program is an 'existential threat' to alternative app distribution. We must protect the open-source ecosystem that built Android. {url} #KeepAndroidOpen"
social_callout_linkedin_9: "F-Droid e l'EFF hanno lanciato l'allarme: il programma di verifica degli sviluppatori di Google rappresenta una \"minaccia esistenziale\" per la distribuzione alternativa delle app. Dobbiamo proteggere l'ecosistema open source che ha dato vita ad Android. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_10: "As Google moves to further entrench its gatekeeping status, the community is pushing back. Your device should be your property, not a leased terminal subject to retroactive restrictions. Join the movement: {url} #KeepAndroidOpen"
social_callout_linkedin_10: "Mentre Google si muove per consolidare ulteriormente il proprio ruolo di gatekeeper, la comunità sta reagendo. Il tuo dispositivo dovrebbe essere di tua proprietà, non un terminale a noleggio soggetto a restrizioni retroattive. Unisciti al movimento: {url} #KeepAndroidOpen"

