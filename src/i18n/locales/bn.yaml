# [en] act_google_text: "If you know something about the program's technical implementation or internal rationale, contact [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org) from a *non-work* machine and a *non-Gmail* account. Strict confidence guaranteed."
act_google_text: >-
    আপনি যদি এই প্রোগ্রামের কারিগরি বাস্তবায়ন বা অভ্যন্তরীণ উদ্দেশ্য সম্পর্কে কিছু জানেন, তবে একটি *অফিসিয়াল নয় এমন* কম্পিউটার এবং *নন-জিমেইল* অ্যাকাউন্ট থেকে [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org)-এ যোগাযোগ করুন। আপনার গোপনীয়তা রক্ষা করা হবে।
