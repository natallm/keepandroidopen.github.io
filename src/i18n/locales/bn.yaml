# [en] hero_lede: "Your phone is about to stop being yours."
hero_lede: "আপনার ফোন আর আপনার থাকছে না।"
# [en] hero_countdown_label: "days until lockdown"
hero_countdown_label: "দিন বাকি লকডাউন হতে"
# [en] hero_sub: "Starting September 2026, a silent update, nonconsensually pushed by Google, will **block every Android app** whose developer hasn't registered with Google, signed their contract, paid up, and handed over government ID."
hero_sub: "২০২৬ সালের সেপ্টেম্বর থেকে গুগল আপনার অনুমতি ছাড়াই একটি সাইলেন্ট আপডেট পুশ করবে, যা সেই **সব অ্যান্ড্রয়েড অ্যাপকে ব্লক করে দেবে** যাদের ডেভেলপার গুগলের কাছে রেজিস্টার করেনি, তাদের কন্ট্রাক্টে সাইন করেনি, টাকা দেয়নি এবং নিজের সরকারি আইডি জমা দেয়নি।"
# [en] hero_kicker: "Every app and every device, worldwide, with no opt-out."
hero_kicker: "বিশ্বের প্রতিটি অ্যাপ এবং ডিভাইসে এটি কার্যকর হবে, আর এর থেকে বের হওয়ার কোনো উপায় রাখা হয়নি।"
# [en] what_heading: "What Google is doing"
what_heading: "গুগল কী করছে?"
# [en] what_intro: "In August 2025, Google [announced](https://developer.android.com/developer-verification) a new requirement: starting September 2026, **every Android app developer must register centrally with Google** before their software can be installed on any device. Not just Play Store apps: all apps. This includes apps shared between friends, distributed through [F-Droid](https://f-droid.org), built by hobbyists for personal use. Independent developers, church and community groups, and hobbyists alike will all be frozen out of being able to develop and distribute their software."
what_intro: >-
    ২০২৫ সালের আগস্টে গুগল একটি নতুন নিয়ম [ঘোষণা করেছে ↗](https://developer.android.com/developer-verification): ২০২৬ সালের সেপ্টেম্বর থেকে, যেকোনো ডিভাইসে সফটওয়্যার ইন্সটল করার আগে **প্রতিটি অ্যান্ড্রয়েড অ্যাপ ডেভেলপারকে গুগলের কাছে কেন্দ্রীয়ভাবে রেজিস্টার করতে হবে**। শুধু প্লে-স্টোরের অ্যাপ নয়, সব অ্যাপের জন্য এটি প্রযোজ্য। এমনকি বন্ধুদের মধ্যে শেয়ার করা অ্যাপ, [F-Droid ↗](https://f-droid.org) এর মাধ্যমে ডিস্ট্রিবিউট করা অ্যাপ, বা শখের বসে নিজের ব্যবহারের জন্য বানানো অ্যাপও এর আওতাভুক্ত। ফলে শৌখিন ডেভেলপার, চার্চ বা কমিউনিটি গ্রুপ—সবাই তাদের সফটওয়্যার তৈরি ও ডিস্ট্রিবিউশন করার ক্ষমতা হারিয়ে ফেলবে।
# [en] what_registration: "Registration requires:"
what_registration: "রেজিস্ট্রেশনের জন্য যা যা লাগবে:"
# [en] what_req_fee: "Paying a fee to Google"
what_req_fee: "গুগলকে ফি প্রদান করা"
# [en] what_req_terms: "Agreeing to Google's Terms and Conditions"
what_req_terms: "গুগলের শর্তাবলীতে (Terms and Conditions) রাজি হওয়া"
# [en] what_req_id: "Surrendering your government-issued identification"
what_req_id: "আপনার সরকারি পরিচয়পত্র (ID) জমা দেওয়া"
# [en] what_req_signing: "Providing evidence of your private signing key"
what_req_signing: "আপনার ব্যক্তিগত সাইনিং কী (Private Signing Key)-এর প্রমাণ দেওয়া"
# [en] what_req_appids: "Listing all current and all future application identifiers"
what_req_appids: "বর্তমান এবং ভবিষ্যতের সব অ্যাপ আইডেন্টিফায়ারের তালিকা দেওয়া"
# [en] what_pullquote: "If a developer does not comply, their apps get silently blocked on every Android device worldwide."
what_pullquote: "যদি কোনো ডেভেলপার এই নিয়ম না মানে, তবে তাদের অ্যাপগুলো সারা বিশ্বের প্রতিটি অ্যান্ড্রয়েড ডিভাইসে সাইলেন্টলি ব্লক করে দেওয়া হবে।"
# [en] impact_heading: "Who this hurts"
impact_heading: "ক্ষতিগ্রস্ত হবে কারা?"
# [en] impact_you_heading: "You"
impact_you_heading: "আপনি নিজে"
# [en] impact_you_p1: "You bought an Android phone because Google told you it was open. You could install what you wanted, and that was the deal."
impact_you_p1: "আপনি অ্যান্ড্রয়েড ফোন কিনেছিলেন কারণ গুগল বলেছিল এটি একটি 'ওপেন' প্ল্যাটফর্ম। আপনি যা খুশি ইন্সটল করতে পারতেন, এটাই ছিল শর্ত।"
# [en] impact_you_p2: "Google is now rewriting that deal, retroactively, on hardware you already own. After the update lands, you can only run software that Google has pre-approved. On your phone: *your* property, that *you* paid for."
impact_you_p2: >-
    গুগল এখন সেই শর্ত পাল্টে দিচ্ছে আপনার কেনা হার্ডওয়্যারের ওপর। আপডেটটি আসার পর, আপনি কেবল গুগলের অনুমোদিত সফটওয়্যারই চালাতে পারবেন। আপনার ফোন: যেটা *আপনার* সম্পত্তি, যার জন্য টাকা *আপনি* দিয়েছেন।
# [en] impact_dev_heading: "Independent developers"
impact_dev_heading: "স্বতন্ত্র ডেভেলপাররা"
# [en] impact_dev_p1: "A teenager's first app, a volunteer's privacy tool, or a company's confidential internal beta. It doesn't matter. After September 2026, none of these can be installed without Google's blessing."
impact_dev_p1: "একজন কিশোরের বানানো প্রথম অ্যাপ হোক, কোনো ভলান্টিয়ারের বানানো প্রাইভেসী টুল হোক, কিংবা কোনো কোম্পানির গোপন ইন্টারনাল বেটা অ্যাপ—গুগলের অনুমতি ছাড়া ২০২৬ সালের সেপ্টেম্বরের পর এর কোনোটিই ইন্সটল করা যাবে না।"
# [en] impact_dev_p2: "[F-Droid](https://f-droid.org), home to thousands of free and open-source Android apps, has called this an [\"existential\" threat](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow calls it [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
impact_dev_p2: >-
    হাজার হাজার ফ্রি এবং ওপেন-সোর্স অ্যাপের ভাণ্ডার [F-Droid ↗](https://f-droid.org) একে একটি ["অস্তিত্বের হুমকি" ↗](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html) হিসেবে বর্ণনা করেছে। কোরি ডক্টরো একে বলছেন ["ডার্থ অ্যান্ড্রয়েড" ↗](https://pluralistic.net/2025/09/01/fulu/)।
# [en] impact_gov_heading: "Governments & civil society"
impact_gov_heading: "সরকার এবং সুশীল সমাজ"
# [en] impact_gov_p1: "Google has a [documented track record](https://www.aclu.org/news/free-speech/app-store-oligopoly) of complying when authoritarian regimes demand app removals. With this program, the software that runs your country's institutions will exist at the pleasure of a single unaccountable foreign corporation."
impact_gov_p1: >-
    স্বৈরাচারী শাসকরা অ্যাপ সরিয়ে ফেলার দাবি জানালে গুগলের তা মেনে নেওয়ার [প্রমাণিত রেকর্ড ↗](https://www.aclu.org/news/free-speech/app-store-oligopoly) আছে। এই প্রোগ্রামের ফলে একটি দেশের গুরুত্বপূর্ণ প্রতিষ্ঠানগুলোর সফটওয়্যার চলবে কি না, তা নির্ভর করবে একটি জবাবদিহিহীন বিদেশি কর্পোরেশনের মর্জির ওপর।
# [en] impact_gov_p2: "The [EFF calls](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) app gatekeeping \"an ever-expanding pathway to internet censorship.\""
impact_gov_p2: >-
    [EFF-এর মতে ↗](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) অ্যাপ গেটকিপিং হলো "ইন্টারনেট সেন্সরশিপের একটি ক্রমবর্ধমান পথ।"
# [en] flow_heading: "Google's \"escape hatch\" is a trap door"
flow_heading: "গুগলের তথাকথিত 'এস্কেপ হ্যাচ' আসলে একটি ফাঁদ"
# [en] flow_intro: "Google says \"power users\" can [\"still install\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) unverified apps. Here's what that *actually* looks like:"
flow_intro: >-
    গুগল বলছে যে "পাওয়ার ইউজাররা" চাইলে এখনো আনভেরিফাইড অ্যাপ ["ইন্সটল করতে পারবে"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html)। কিন্তু কাজটা আসলে কতটা কঠিন, দেখুন:
# [en] flow_step1: "Delve into System Settings, find Developer Options"
flow_step1: "সিস্টেম সেটিংসের গভীরে গিয়ে ডেভেলপার অপশন খুঁজুন"
# [en] flow_step2: "Tap the build number **seven times** to enable Developer Mode"
flow_step2: "ডেভেলপার মোড চালু করতে বিল্ড নাম্বারে **সাতবার** ট্যাপ করুন"
# [en] flow_step3: "Dismiss scare screens about coercion"
flow_step3: "ভয় দেখানো সব ওয়ার্নিং স্ক্রিন এড়িয়ে যান"
# [en] flow_step4: "Enter your PIN"
flow_step4: "আপনার পিন (PIN) দিন"
# [en] flow_step5: "Restart the device"
flow_step5: "ডিভাইস রিস্টার্ট দিন"
# [en] flow_step6: "**Wait 24 hours**"
flow_step6: "**২৪ ঘণ্টা অপেক্ষা করুন**"
# [en] flow_step7: "Come back, dismiss more scare screens"
flow_step7: "আবার ফিরে এসে আরও ভয়ংকর সব স্ক্রিন বাতিল করুন"
# [en] flow_step8: "Pick \"allow temporarily\" (7 days) or \"allow indefinitely\""
flow_step8: >-
    অস্থায়ীভাবে অনুমতি দিন" (৭ দিন) অথবা "স্থায়ীভাবে অনুমতি দিন" অপশনটি বেছে নিন
# [en] flow_step9: "Confirm, again, that you understand \"the risks\""
flow_step9: >-
    আপনি যে "ঝুঁকি" বুঝতে পারছেন তা আবারও নিশ্চিত করুন
# [en] flow_summary: "Nine steps. A mandatory 24-hour cooling-off period. *For installing software on a device you own.*"
flow_summary: "নয়টি ধাপ। বাধ্যতামূলক ২৪ ঘণ্টার ওয়েটিং পিরিয়ড। *শুধুমাত্র আপনার নিজের ডিভাইসে সফটওয়্যার ইন্সটল করার জন্য।*"
# [en] flow_detail: "Worse: this flow runs entirely through **Google Play Services**, not the Android OS. Google can change it, tighten it, or kill it at any time, with no OS update required and no consent needed. And as of today, it hasn't shipped in any beta, preview, or canary build. It exists only as a blog post and some mockups."
flow_detail: >-
    আরও খারাপ বিষয় হলো: এই পুরো প্রক্রিয়াটি চলে **গুগল প্লে সার্ভিস (Google Play Services)**-এর মাধ্যমে, অ্যান্ড্রয়েড ওএস (Android OS)-এর মাধ্যমে নয়। গুগল যেকোনো সময় ওএস (OS) আপডেট ছাড়াই আপনার অনুমতি ছাড়াই এটি পরিবর্তন করতে বা বন্ধ করে দিতে পারে। আজ পর্যন্ত এটি কোনো বেটা বা প্রিভিউ ভার্সনেও আসেনি; এটি কেবল একটি ব্লগ পোস্ট এবং কিছু নকশা হিসেবে টিকে আছে।
# [en] precedent_heading: "This is bigger than Android"
precedent_heading: "এটি কেবল অ্যান্ড্রয়েডের বিষয় নয়"
# [en] precedent_pullquote: "If Google can retroactively lock down billions of devices that were sold as open platforms, every hardware manufacturer on the planet is watching."
precedent_pullquote: "গুগল যদি বিলিয়ন বিলিয়ন ডিভাইসকে এভাবে লকডাউন করে দিতে পারে যা আগে ওপেন হিসেবে বিক্রি হয়েছিল, তবে বিশ্বের প্রতিটি হার্ডওয়্যার নির্মাতা কোম্পানি সেদিকেই নজর দেবে।"
# [en] precedent_p1: "The principle being established: **the company that made your device gets to decide, after you've bought it, what software you're allowed to run.** In software, this is called a \"rug pull\"; but at least you could always install competing software. In hardware, it is a *fait accompli* that strips you of your agency and renders you powerless to the whims of a single unaccountable gatekeeper and convicted monopolist."
precedent_p1: >-
    এখানে যে মূলনীতিটি তৈরি হচ্ছে তা হলো: **ডিভাইস নির্মাতা কোম্পানি আপনার কেনা জিনিসের ওপর সিদ্ধান্ত নেবে যে আপনি কোন সফটওয়্যার চালাতে পারবেন।** সফটওয়্যারের ভাষায় একে বলা হয় "রাগ পুল" (Rug pull); কিন্তু আগে অন্তত আপনি বিকল্প সফটওয়্যার ইন্সটল করতে পারতেন। হার্ডওয়্যারের ক্ষেত্রে এটি আপনাকে ক্ষমতাহীন করে তুলবে এবং আপনাকে একজন জবাবদিহিহীন গেটকিপার ও দণ্ডিত একচেটিয়া ব্যবসায়ীর মর্জির ওপর ছেড়ে দেবে।
# [en] precedent_p2: "Android's openness was never just a feature. It was the *promise* that distinguished it from iPhone. Millions chose Android for exactly that reason. Google is now revoking that promise unilaterally, on devices *already* in people's pockets, because they've decided they have enough market dominance and regulatory capture to get away with it."
precedent_p2: >-
    অ্যান্ড্রয়েডের উন্মুক্ততা কেবল একটি ফিচার ছিল না; এটি ছিল সেই *প্রতিশ্রুতি* যা একে আইফোন থেকে আলাদা করেছিল। লাখ লাখ মানুষ ঠিক এই কারণেই অ্যান্ড্রয়েড বেছে নিয়েছিলেন। গুগল এখন একতরফাভাবে সেই প্রতিশ্রুতি কেড়ে নিচ্ছে, কারণ তারা মনে করছে বাজারে তাদের একচেটিয়া আধিপত্য আছে এবং কেউ তাদের আটকাতে পারবে না।
# [en] precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"Google's Apple envy threatens to dismantle Android's open legacy.\"*"
precedent_arstechnica: >-
    [Ars Technica-এর মতে ↗](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *"গুগলের অ্যাপল হওয়ার আকাঙ্ক্ষা অ্যান্ড্রয়েডের উন্মুক্ত ঐতিহ্যকে ধ্বংস করার হুমকি দিচ্ছে।"*
# [en] objections_heading: "But wait, isn't this..."
objections_heading: "কিন্তু দাঁড়ান, এটি কি..."
# [en] obj_security_q: "\"...just about security?\""
obj_security_q: >-
    "...নিরাপত্তার জন্য নয়?"
# [en] obj_security_a: "The security rationale is a smokescreen. Google Play Protect already scans for malware independent of developer identity. Requiring a government ID doesn't make code safer. It makes *developers* identifiable and controllable. Malware authors can register. Indie developers and dissidents often can't. The [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) is blunt: identity-based gatekeeping is a censorship tool, not a security one."
obj_security_a: >-
    নিরাপত্তার দোহাই আসলে একটি ধোঁকাবাজি। গুগল প্লে প্রোটেক্ট (Google Play Protect) অলরেডি ম্যালওয়্যার স্ক্যান করতে পারে, তার জন্য ডেভেলপার রেজিস্ট্রেশনের প্রয়োজন নেই। সরকারি আইডি নিলেই কোড নিরাপদ হয় না; বরং এতে *ডেভেলপারদের* নিয়ন্ত্রণ করা সহজ হয়। ম্যালওয়্যার নির্মাতারাও রেজিস্টার করতে পারে, কিন্তু ছোট ডেভেলপার বা ভিন্নমতাবলম্বীরা প্রায়ই তা পারে না। [EFF ↗](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) পরিষ্কারভাবে বলেছে: আইডেন্টিটি-ভিত্তিক গেটকিপিং হলো সেন্সরশিপের হাতিয়ার, নিরাপত্তার নয়।
# [en] obj_sideloading_q: "\"...still sideloading if you use the advanced flow?\""
obj_sideloading_q: >-
    "...অ্যাডভান্সড ফ্লো ব্যবহার করলে কি সাইডলোডিং করা যাবে না?"
# [en] obj_sideloading_a: "Nine steps, 24-hour wait, buried in Developer Options, delivered through a proprietary service that Google can revoke whenever they want. That's not sideloading. That's a **deterrence mechanism** built to ensure almost nobody completes it. And since it runs through Play Services rather than the OS, Google can tighten or kill it silently."
obj_sideloading_a: >-
    নয়টি ধাপ, ২৪ ঘণ্টার অপেক্ষা, ডেভেলপার অপশনে লুকিয়ে রাখা এবং গুগলের ইচ্ছামতো বাতিলযোগ্য একটি সার্ভিস—একে সাইডলোডিং বলা যায় না। এটি একটি **প্রতিরোধমূলক ব্যবস্থা** যা তৈরি করা হয়েছে যাতে কেউ এই প্রক্রিয়া শেষ করতে না পারে। আর যেহেতু এটি প্লে সার্ভিসের মাধ্যমে চলে, গুগল যেকোনো সময় এটি আরও কঠিন বা বন্ধ করে দিতে পারে।
# [en] obj_hide_q: "\"...only a problem if you have something to hide?\""
obj_hide_q: >-
    "...লুকানোর কিছু না থাকলে কি সমস্যা আছে?"
# [en] obj_hide_a: "Whistleblowers, journalists, and activists under authoritarian governments will be the first victims. People in domestic abuse situations are next. All these groups have legitimate reasons to distribute or use software without putting their legal identity in a Google database. Anonymous open-source contribution is a tradition older than Google itself. This policy ends it on Android."
obj_hide_a: >-
    স্বৈরাচারী সরকারের অধীনে থাকা হুইসেলব্লোয়ার, সাংবাদিক এবং অ্যাক্টিভিস্টরাই হবেন এর প্রথম শিকার। এরপর ক্ষতিগ্রস্ত হবেন পারিবারিক সহিংসতার শিকার মানুষগুলো। এই সব গ্রুপের মানুষের গুগলের ডেটাবেজে নিজেদের আইনি পরিচয় না দিয়ে সফটওয়্যার ব্যবহার করার বৈধ কারণ আছে। বেনামে ওপেন-সোর্স অবদান রাখা গুগলের চেয়েও পুরনো একটি ঐতিহ্য। গুগলের এই নীতি অ্যান্ড্রয়েডে সেই ঐতিহ্যের ইতি টানবে।
# [en] obj_apple_q: "\"...the same thing Apple does?\""
obj_apple_q: >-
    "...অ্যাপল যা করে গুগলও কি তাই করছে না?"
# [en] obj_apple_a: "Apple has been a walled garden from day one. People chose Android *because it was different*. \"Apple does it too\" is a race to the bottom and a weak *tu quoque* argument. And under regulatory pressure (the EU's Digital Markets Act), even Apple is being forced to open up. Google is moving in the opposite direction: attempting to further entrench its gatekeeping status."
obj_apple_a: >-
    অ্যাপল শুরু থেকেই একটি ক্লোজড সিস্টেম বা 'ওয়াল্ড গার্ডেন' ছিল। মানুষ অ্যান্ড্রয়েড বেছে নিয়েছিল *কারণ এটি আলাদা ছিল*। "অ্যাপলও এটা করে"—এই যুক্তি দিয়ে নিজেদের ভুল ঢাকতে চাওয়াটা একটা রেস টু দ্য বটম। তাছাড়া রেগুলেটরি চাপের কারণে (ইইউ-এর ডিজিটাল মার্কেটস অ্যাক্ট) এখন অ্যাপলও সিস্টেম ওপেন করতে বাধ্য হচ্ছে। অথচ গুগল ঠিক উল্টো পথে হাঁটছে।
# [en] obj_cost_q: "\"...just $25 and some paperwork?\""
obj_cost_q: >-
    "...মাত্র ২৫ ডলার আর কিছু কাগজপত্রই তো?"
# [en] obj_cost_a: "Maybe, if you're a developer in the US with a credit card and a driver's license. Try being a student in sub-Saharan Africa, or a dissident in Myanmar, or a volunteer maintaining a community health app. The cost isn't only financial: you're surrendering government ID and evidence of your signing keys to a company that [routinely complies](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) with government demands to remove apps and expose developers."
obj_cost_a: >-
    হয়তো আপনার জন্য সহজ, যদি আপনি আমেরিকার ডেভেলপার হন যার ক্রেডিট কার্ড আর ড্রাইভিং লাইসেন্স আছে। কিন্তু সাব-সাহারান আফ্রিকার একজন ছাত্র, বা মিয়ানমারের একজন ভিন্নমতাবলম্বী, অথবা কমিউনিটি হেলথ অ্যাপ চালানো কোনো ভলান্টিয়ারের কথা ভাবুন। এর খরচ শুধু আর্থিক নয়: আপনি আপনার সরকারি আইডি এবং সাইনিং কী এমন একটি কোম্পানির হাতে তুলে দিচ্ছেন যারা [অহরহ ↗](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) সরকারের কথা শুনে অ্যাপ সরিয়ে ফেলে এবং ডেভেলপারদের তথ্য ফাঁস করে দেয়।
