act_letter: >-
  **[Baca dan sebarluaskan surat terbuka kami](/open-letter)**
# [en] act_survey: "**Tell Google what you think of this** through their own [developer verification survey](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) <small>(for all the good that will do)</small>."
act_survey: >-
  **Sampaikan pendapat Anda kepada Google** melalui [survei verifikasi pengembang](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) milik mereka sendiri <small>(terlepas dari seberapa besar dampaknya nanti)</small>.
# [en] act_dev_heading: "Developers"
act_dev_heading: "Pengembang"
# [en] act_dev_intro: "<strong style=\"text-transform: uppercase;\">Do not sign up.</strong> Don't join the program by signing up for the Android Developer Console and agreeing to their irrevocable Terms and Conditions. Don't verify your identity. *Don't play ball.*"
act_dev_intro: >-
  <strong style="text-transform: uppercase;">Jangan mendaftarkan diri.</strong> Jangan bergabung dalam program ini melalui Konsol Pengembang Android dan menyetujui Syarat dan Ketentuan mereka yang bersifat mengikat secara hukum. Jangan melakukan verifikasi identitas. Jangan berkompromi.
# [en] act_dev_resist: "Google's plan only works if developers comply. Don't."
act_dev_resist: "Rencana Google hanya akan berhasil jika pengembang patuh. Jangan."
# [en] act_dev_talk: "Talk other developers and organizations out of signing up."
act_dev_talk: "Ajak pengembang dan organisasi lain untuk tidak mendaftar."
# [en] act_dev_warn: "Add the [FreeDroidWarn library](https://github.com/woheller69/FreeDroidWarn) to your apps to warn users."
act_dev_warn: >-
  Tambahkan [pustaka FreeDroidWarn](https://github.com/woheller69/FreeDroidWarn) ke aplikasi Anda untuk memperingatkan pengguna.
# [en] act_dev_banner: "Run a website? [Add the countdown banner.](/banner)"
act_dev_banner: >-
  Mengelola situs web? [Tambahkan spanduk hitung mundur.](/banner)
# [en] act_google_heading: "Google employees"
act_google_heading: "Karyawan Google"
# [en] act_google_text: "If you know something about the program's technical implementation or internal rationale, contact [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org) from a *non-work* machine and a *non-Gmail* account. Strict confidence guaranteed."
act_google_text: >-
  Apabila Anda memiliki informasi terkait implementasi teknis program ini atau latar belakang internalnya, silakan hubungi [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org) menggunakan perangkat bukan milik kantor dan akun non-Gmail. Kami menjamin kerahasiaan identitas Anda sepenuhnya.
