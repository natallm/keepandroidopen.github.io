# [en] title: "Keep Android Open"
title: "Jaga Android Tetap Terbuka"
# [en] description: "Your phone is about to stop being yours. In September 2026, Google will block every Android app whose developer hasn't registered with them."
description: "Ponsel Anda akan segera berhenti menjadi milik Anda sepenuhnya. Pada September 2026, Google akan memblokir seluruh aplikasi Android yang pengembangnya belum terdaftar pada sistem mereka"
# [en] contact_header: "Contact"
contact_header: "Kontak"
# [en] contact_email: "Email"
contact_email: "Pos-el"
# [en] site_problems_header: "Problems"
site_problems_header: "Permasalahan"
# [en] site_report_issues: "Report Site Issues"
site_report_issues: "Laporkan masalah situs"
# [en] site_disclaimer: "**Disclaimer:** This website is a community-driven noncommercial undertaking. It is operated solely for informational and educational purposes."
site_disclaimer: >-
  **Perhatian:** Situs web ini merupakan inisiatif nonkomersial yang dikelola oleh komunitas. Situs ini dioperasikan semata-mata untuk tujuan informatif dan pendidikan.
# [en] site_privacy: "**Privacy:** This site uses no cookies and performs no user tracking or logging."
site_privacy: >-
  **Privasi:** Situs ini tidak menggunakan cookie dan tidak melakukan pelacakan atau pencatatan aktivitas pengguna.
# [en] site_copyright: "**Copyright:** None. This work is marked"
site_copyright: "**Hak Cipta:** Tidak ada. Karya ini ditandai"
# [en] open_letter_cta: "Read our open letter opposing the Android Developer Verification program"
open_letter_cta: "Baca surat terbuka kami yang menentang program verifikasi pengembang Android"
# [en] hero_lede: "Your phone is about to stop being yours."
hero_lede: "Ponsel Anda akan segera berhenti menjadi milik Anda sepenuhnya."
# [en] hero_countdown_label: "days until lockdown"
hero_countdown_label: "hari menjelang penguncian total"
# [en] hero_sub: "Starting September 2026, a silent update, nonconsensually pushed by Google, will **block every Android app** whose developer hasn't registered with Google, signed their contract, paid up, and handed over government ID."
hero_sub: >-
  Mulai September 2026, sebuah pembaruan senyap yang diterapkan oleh Google tanpa persetujuan pengguna akan memblokir setiap aplikasi Android yang pengembangnya belum terdaftar di Google, menandatangani kontrak, melakukan pembayaran, serta menyerahkan identitas resmi pemerintah.
# [en] hero_kicker: "Every app and every device, worldwide, with no opt-out."
hero_kicker: "Berlaku bagi setiap aplikasi dan setiap perangkat di seluruh dunia, tanpa opsi untuk menolak."
# [en] what_heading: "What Google is doing"
what_heading: "Apa yang dilakukan Google"
# [en] what_intro: "In August 2025, Google [announced](https://developer.android.com/developer-verification) a new requirement: starting September 2026, **every Android app developer must register centrally with Google** before their software can be installed on any device. Not just Play Store apps: all apps. This includes apps shared between friends, distributed through [F-Droid](https://f-droid.org), built by hobbyists for personal use. Independent developers, church and community groups, and hobbyists alike will all be frozen out of being able to develop and distribute their software."
what_intro: >-
  Pada Agustus 2025, Google [mengumumkan](https://developer.android.com/developer-verification) persyaratan baru: mulai September 2026, **setiap pengembang aplikasi Android harus mendaftar secara terpusat ke Google** sebelum perangkat lunak mereka dapat diinstal di perangkat apa pun. Bukan hanya aplikasi Play Store: semua aplikasi. Ini termasuk aplikasi yang dibagikan antar teman, didistribusikan melalui [F-Droid](https://f-droid.org), yang dibuat oleh para penggemar untuk penggunaan pribadi. Pengembang independen, kelompok keagamaan dan komunitas, serta para pehobi, semuanya akan terhalang untuk dapat mengembangkan dan mendistribusikan perangkat lunak mereka.
# [en] what_registration: "Registration requires:"
what_registration: "Pendaftaran memerlukan:"
# [en] what_req_fee: "Paying a fee to Google"
what_req_fee: "Membayar biaya ke Google"
# [en] what_req_terms: "Agreeing to Google's Terms and Conditions"
what_req_terms: "Menyetujui Syarat dan Ketentuan Google"
# [en] what_req_id: "Surrendering your government-issued identification"
what_req_id: "Menyerahkan identitas resmi Anda yang dikeluarkan pemerintah"
# [en] what_req_signing: "Providing evidence of your private signing key"
what_req_signing: "Memberikan bukti kunci penandatanganan (signing key) pribadi Anda"
# [en] what_req_appids: "Listing all current and all future application identifiers"
what_req_appids: "Mencantumkan semua identitas aplikasi saat ini dan masa depan"
# [en] what_pullquote: "If a developer does not comply, their apps get silently blocked on every Android device worldwide."
what_pullquote: "Jika pengembang tidak patuh, aplikasi mereka akan diblokir secara diam-diam di setiap perangkat Android di seluruh dunia."
# [en] impact_heading: "Who this hurts"
impact_heading: "Siapa yang dirugikan"
# [en] impact_you_heading: "You"
impact_you_heading: "Anda"
# [en] impact_you_p1: "You bought an Android phone because Google told you it was open. You could install what you wanted, and that was the deal."
impact_you_p1: "Anda membeli ponsel Android karena Google memberi tahu Anda bahwa platform ini terbuka. Anda bisa memasang apa pun yang Anda inginkan, dan itulah kesepakatannya."
# [en] impact_you_p2: "Google is now rewriting that deal, retroactively, on hardware you already own. After the update lands, you can only run software that Google has pre-approved. On your phone: *your* property, that *you* paid for."
impact_you_p2: >- 
  Google kini mengubah ketentuan tersebut secara retroaktif, berlaku untuk perangkat keras yang sudah Anda miliki. Setelah pembaruan diterapkan, Anda hanya dapat menjalankan perangkat lunak yang telah disetujui sebelumnya oleh Google. Di ponsel Anda: *milik Anda*, yang *Anda* bayar.
# [en] impact_dev_heading: "Independent developers"
impact_dev_heading: "Pengembang independen"
# [en] impact_dev_p1: "A teenager's first app, a volunteer's privacy tool, or a company's confidential internal beta. It doesn't matter. After September 2026, none of these can be installed without Google's blessing."
impact_dev_p1: "Aplikasi pertama seorang remaja, alat privasi seorang relawan, atau beta internal rahasia sebuah perusahaan. Tidak masalah. Setelah September 2026, tidak satu pun dari ini dapat dipasang tanpa restu Google."
# [en] impact_dev_p2: "[F-Droid](https://f-droid.org), home to thousands of free and open-source Android apps, has called this an [\"existential\" threat](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow calls it [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
impact_dev_p2: >-
  [F-Droid](https://f-droid.org), rumah bagi ribuan aplikasi Android gratis dan bersumber terbuka, menyebut hal ini sebagai [ancaman "eksistensial"](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow menyebutnya [“Darth Android”](https://pluralistic.net/2025/09/01/fulu/).
# [en] impact_gov_heading: "Governments & civil society"
impact_gov_heading: "Pemerintah & masyarakat sipil"
# [en] impact_gov_p1: "Google has a [documented track record](https://www.aclu.org/news/free-speech/app-store-oligopoly) of complying when authoritarian regimes demand app removals. With this program, the software that runs your country's institutions will exist at the pleasure of a single unaccountable foreign corporation."
impact_gov_p1: >-
  Google memiliki [rekam jejak yang tercatat](https://www.aclu.org/news/free-speech/app-store-oligopoly) dalam menuruti permintaan rezim otoriter untuk menghapus aplikasi. Dengan program ini, perangkat lunak yang menggerakkan lembaga-lembaga di negara Anda akan bergantung sepenuhnya pada kehendak sebuah perusahaan asing yang tidak bertanggung jawab.
# [en] impact_gov_p2: "The [EFF calls](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) app gatekeeping \"an ever-expanding pathway to internet censorship.\""
impact_gov_p2: >-
  [EFF melabeli](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) praktik pembatasan aplikasi sebagai 'jalur sensor internet yang terus berkembang'."
# [en] flow_heading: "Google's \"escape hatch\" is a trap door"
flow_heading: " \"Pintu keluar\" Google adalah sebuah jebakan."
# [en] flow_intro: "Google says \"power users\" can [\"still install\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) unverified apps. Here's what that *actually* looks like:"
flow_intro: >-
  Google mengatakan "pengguna tingkat lanjut" masih bisa ["memasang"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) aplikasi yang tidak terverifikasi. Inilah *sebenarnya* seperti apa prosesnya:"
# [en] flow_step1: "Delve into System Settings, find Developer Options"
flow_step1: "Masuk ke Setelan Sistem, cari Pilihan Pengembang"
# [en] flow_step2: "Tap the build number **seven times** to enable Developer Mode"
flow_step2: "Ketuk nomor build **tujuh kali** untuk mengaktifkan Mode Pengembang"
# [en] flow_step3: "Dismiss scare screens about coercion"
flow_step3: "Abaikan layar peringatan tentang paksaan"
# [en] flow_step4: "Enter your PIN"
flow_step4: "Masukkan PIN Anda"
# [en] flow_step5: "Restart the device"
flow_step5: "Mulai ulang perangkat"
# [en] flow_step6: "**Wait 24 hours**"
flow_step6: "**Tunggu 24 jam**"
# [en] flow_step7: "Come back, dismiss more scare screens"
flow_step7: "Kembali lagi, abaikan lebih banyak layar peringatan"
# [en] flow_step8: "Pick \"allow temporarily\" (7 days) or \"allow indefinitely\""
flow_step8: "Pilih \"izinkan sementara\" (7 hari) atau \"izinkan selamanya\""
# [en] flow_step9: "Confirm, again, that you understand \"the risks\""
flow_step9: "Konfirmasikan, sekali lagi, bahwa Anda memahami \"risikonya\""
# [en] flow_summary: "Nine steps. A mandatory 24-hour cooling-off period. *For installing software on a device you own.*"
flow_summary: "Sembilan langkah. Masa tunggu wajib 24 jam. *Untuk memasang perangkat lunak pada perangkat yang Anda miliki sendiri.*"
# [en] flow_detail: "Worse: this flow runs entirely through **Google Play Services**, not the Android OS. Google can change it, tighten it, or kill it at any time, with no OS update required and no consent needed. And as of today, it hasn't shipped in any beta, preview, or canary build. It exists only as a blog post and some mockups."
flow_detail: >-
  Lebih buruk lagi: alur ini berjalan sepenuhnya melalui **Layanan Google Play**, bukan OS Android. Google dapat mengubah, memperketat, atau mematikannya kapan saja, tanpa perlu pembaruan OS dan tanpa persetujuan. Dan hingga saat ini, fitur tersebut belum dirilis dalam versi beta, preview, atau canary build mana pun. Fitur tersebut hanya ada dalam bentuk postingan blog dan beberapa mockup.
# [en] precedent_heading: "This is bigger than Android"
precedent_heading: "Persoalan ini lebih besar daripada sekadar Android"
# [en] precedent_pullquote: "If Google can retroactively lock down billions of devices that were sold as open platforms, every hardware manufacturer on the planet is watching."
precedent_pullquote: "Apabila Google dapat secara retroaktif membatasi akses pada miliaran perangkat yang dipasarkan sebagai platform terbuka, maka setiap produsen perangkat keras di seluruh dunia kini tengah mengamati langkah tersebut."
# [en] precedent_p1: "The principle being established: **the company that made your device gets to decide, after you've bought it, what software you're allowed to run.** In software, this is called a \"rug pull\"; but at least you could always install competing software. In hardware, it is a *fait accompli* that strips you of your agency and renders you powerless to the whims of a single unaccountable gatekeeper and convicted monopolist."
precedent_p1: "Prinsip yang sedang ditegakkan adalah: **perusahaan manufaktur perangkat Anda berhak menentukan perangkat lunak apa yang diizinkan untuk dijalankan, bahkan setelah transaksi pembelian selesai dilakukan.** Dalam industri perangkat lunak, praktik ini dikenal sebagai \"rug pull\" (pencabutan dukungan secara mendadak); namun, dalam situasi tersebut setidaknya Anda masih memiliki kemungkinan untuk memasang perangkat lunak kompetitor. Dalam konteks perangkat keras, hal ini merupakan sebuah *fait accompli* yang merampas kedaulatan pengguna dan menjadikan Anda tidak berdaya di hadapan kehendak sepihak dari penjaga gerbang (gatekeeper) tunggal yang tidak akuntabel serta pelaku monopoli yang telah terbukti."
# [en] precedent_p2: "Android's openness was never just a feature. It was the *promise* that distinguished it from iPhone. Millions chose Android for exactly that reason. Google is now revoking that promise unilaterally, on devices *already* in people's pockets, because they've decided they have enough market dominance and regulatory capture to get away with it."
precedent_p2: "Keterbukaan Android tidak pernah sekadar berfungsi sebagai sebuah fitur semata. Hal tersebut merupakan sebuah *janji* yang membedakannya dari iPhone. Jutaan orang memilih Android tepat karena alasan tersebut. Kini, Google membatalkan janji itu secara sepihak pada perangkat yang sudah berada dalam genggaman masyarakat, karena mereka merasa telah memiliki dominasi pasar dan pengaruh terhadap regulasi (regulatory capture) yang cukup kuat untuk melakukannya tanpa konsekuensi berarti."
# [en] precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"Google's Apple envy threatens to dismantle Android's open legacy.\"*"
precedent_arstechnica: >-
  [Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *"Google's Apple envy threatens to dismantle Android's open legacy."*
# [en] objections_heading: "But wait, isn't this..."
objections_heading: "Namun, bukankah ini..."
# [en] obj_security_q: "\"...just about security?\""
obj_security_q: "\"...hanya demi keamanan?\""
# [en] obj_security_a: "The security rationale is a smokescreen. Google Play Protect already scans for malware independent of developer identity. Requiring a government ID doesn't make code safer. It makes *developers* identifiable and controllable. Malware authors can register. Indie developers and dissidents often can't. The [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) is blunt: identity-based gatekeeping is a censorship tool, not a security one."
obj_security_a: >-
  Dalih keamanan hanyalah sebuah tabir asap. Google Play Protect sudah melakukan pemindaian malware secara mandiri tanpa bergantung pada identitas pengembang. Mewajibkan identitas resmi pemerintah (ID) tidak membuat kode program menjadi lebih aman; hal tersebut hanya membuat pengembang dapat diidentifikasi dan dikendalikan. Pembuat malware tetap dapat mendaftarkan diri, sementara pengembang independen dan aktivis sering kali tidak mampu melakukannya. [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) menegaskan dengan lugas: kontrol akses (gatekeeping) berbasis identitas adalah alat sensor, bukan instrumen keamanan.
# [en] obj_sideloading_q: "\"...still sideloading if you use the advanced flow?\""
obj_sideloading_q: "\"...tetap dikategorikan sebagai sideloading jika menggunakan prosedur lanjutan?\""
# [en] obj_sideloading_a: "Nine steps, 24-hour wait, buried in Developer Options, delivered through a proprietary service that Google can revoke whenever they want. That's not sideloading. That's a **deterrence mechanism** built to ensure almost nobody completes it. And since it runs through Play Services rather than the OS, Google can tighten or kill it silently."
obj_sideloading_a: >-
  Sembilan tahapan prosedur, waktu tunggu 24 jam, opsi yang tersembunyi di dalam menu Opsi Pengembang, dan dijalankan melalui layanan berpemilik (proprietary) yang aksesnya dapat dicabut Google kapan saja. Itu bukanlah sideloading. Itu adalah sebuah **mekanisme penghambat** yang dirancang sedemikian rupa agar hampir tidak ada pengguna yang mampu menyelesaikannya. Dan karena prosedur ini berjalan melalui Layanan Google Play (Play Services) dan bukan melalui sistem operasi (OS), Google dapat memperketat atau menghentikan fungsi tersebut secara diam-diam.
# [en] obj_hide_q: "\"...only a problem if you have something to hide?\""
obj_hide_q: "\"...hanya menjadi masalah bagi mereka yang menyembunyikan sesuatu?\""
# [en] obj_hide_a: "Whistleblowers, journalists, and activists under authoritarian governments will be the first victims. People in domestic abuse situations are next. All these groups have legitimate reasons to distribute or use software without putting their legal identity in a Google database. Anonymous open-source contribution is a tradition older than Google itself. This policy ends it on Android."
obj_hide_a: >-
  Pelapor tindak pidana (whistleblowers), jurnalis, dan aktivis di bawah rezim otoriter akan menjadi korban pertama. Kelompok masyarakat dalam situasi kekerasan domestik adalah berikutnya. Semua kelompok ini memiliki alasan yang sah untuk mendistribusikan atau menggunakan perangkat lunak tanpa harus menyerahkan identitas legal mereka ke dalam basis data Google. Kontribusi sumber terbuka (open-source) secara anonim adalah tradisi yang lebih tua dari Google itu sendiri. Kebijakan ini mengakhiri tradisi tersebut di platform Android.
# [en] obj_apple_q: "\"...the same thing Apple does?\""
obj_apple_q: "\"...praktik yang sama dengan yang dilakukan Apple?\""
# [en] obj_apple_a: "Apple has been a walled garden from day one. People chose Android *because it was different*. \"Apple does it too\" is a race to the bottom and a weak *tu quoque* argument. And under regulatory pressure (the EU's Digital Markets Act), even Apple is being forced to open up. Google is moving in the opposite direction: attempting to further entrench its gatekeeping status."
obj_apple_a: >-
 Apple telah menjadi ekosistem tertutup sejak hari pertama. Masyarakat memilih Android karena *ia berbeda*. Argumen bahwa "Apple juga melakukannya" adalah sebuah perlombaan menuju standar terendah dan merupakan argumen *tu quoque* yang lemah. Bahkan di bawah tekanan regulasi (seperti Undang-Undang Pasar Digital/DMA di Uni Eropa), Apple kini mulai dipaksa untuk membuka diri. Sebaliknya, Google justru bergerak ke arah yang berlawanan: berupaya untuk semakin memperkuat statusnya sebagai penjaga gerbang (gatekeeper).
# [en] obj_cost_q: "\"...just $25 and some paperwork?\""
obj_cost_q: "\"...hanya persoalan biaya 25 dolar dan beberapa berkas administrasi?\""
# [en] obj_cost_a: "Maybe, if you're a developer in the US with a credit card and a driver's license. Try being a student in sub-Saharan Africa, or a dissident in Myanmar, or a volunteer maintaining a community health app. The cost isn't only financial: you're surrendering government ID and evidence of your signing keys to a company that [routinely complies](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) with government demands to remove apps and expose developers."
obj_cost_a: >-
  Mungkin demikian jika Anda adalah seorang pengembang di Amerika Serikat yang memiliki kartu kredit dan surat izin mengemudi. Namun, bayangkan jika Anda adalah seorang mahasiswa di Afrika bagian selatan, seorang aktivis di Myanmar, atau seorang sukarelawan yang mengelola aplikasi kesehatan masyarakat. Biaya yang harus dibayar bukan sekadar finansial: Anda menyerahkan identitas resmi pemerintah dan bukti kunci penandatanganan aplikasi (signing keys) kepada perusahaan yang [secara rutin mematuhi](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) tuntutan pemerintah untuk menghapus aplikasi dan mengungkap identitas pengembang.
# [en] act_heading: "Fight back"
act_heading: "Langkah Perlawanan"
