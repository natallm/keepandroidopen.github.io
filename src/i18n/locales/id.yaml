# [en] closing_line1: "You bought your phone."
closing_line1: "Anda membeli ponsel Anda."
# [en] closing_line2: "You should decide what runs on it."
closing_line2: "Anda berhak menentukan perangkat lunak apa yang dijalankan di dalamnya."
# [en] closing_detail: "That shouldn't require a 9-step process, a 24-hour wait, and Google's ongoing permission."
closing_detail: "Hal tersebut seharusnya tidak memerlukan prosedur sembilan langkah, waktu tunggu 24 jam, maupun izin berkelanjutan dari pihak Google."
# [en] closing_cta: "Share this page. Don't sign up. Don't let them close Android."
closing_cta: "Sebarluaskan laman ini. Jangan mendaftarkan diri. Jangan biarkan mereka menjadikan Android sebagai ekosistem tertutup."
# [en] closing_share_heading: "Spread the word"
closing_share_heading: "Sebarluaskan Informasi Ini"
# [en] social_callout_x_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects every Android device worldwide. Learn more: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_1: "Mulai September 2026, Google akan memblokir seluruh aplikasi Android yang pengembangnya tidak terdaftar dan tidak menyerahkan identitas resmi pemerintah. Kebijakan ini berdampak pada setiap perangkat Android di seluruh dunia. Pelajari lebih lanjut: {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_2: "Google announced that all Android app developers must register centrally, pay a fee, and submit government ID, or their apps will be blocked on every device. over 67 organizations oppose this. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_2: "Google mengumumkan bahwa seluruh pengembang aplikasi Android wajib mendaftar secara terpusat, membayar biaya, dan menyerahkan identitas resmi, atau aplikasi mereka akan diblokir di semua perangkat. Lebih dari 67 organisasi menentang kebijakan ini. {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_3: "Android's openness distinguished it from iPhone for 17 years. Google is now requiring mandatory developer registration for all apps, including those distributed outside the Play Store. {url} #KeepAndroidOpen"
social_callout_x_3: "Selama 17 tahun, keterbukaan Android telah membedakannya dari iPhone. Kini Google mewajibkan pendaftaran pengembang untuk seluruh aplikasi, termasuk yang didistribusikan di luar Play Store. {url} #KeepAndroidOpen"
# [en] social_callout_x_4: "F-Droid, the open-source Android app store, calls Google's developer verification an \"existential threat\" to alternative app distribution. The EFF warns it creates a pathway to censorship. {url} #KeepAndroidOpen"
social_callout_x_4: "F-Droid, toko aplikasi sumber terbuka Android, menyebut verifikasi pengembang Google sebagai \"ancaman eksistensial\" terhadap distribusi aplikasi alternatif. EFF memperingatkan bahwa hal ini membuka jalur menuju penyensoran. {url} #KeepAndroidOpen"
# [en] social_callout_x_5: "Google's proposed workaround for installing unverified apps requires 9 steps, a 24-hour wait, and runs through Play Services, which Google can modify at any time. It hasn't shipped in any beta. {url} #KeepAndroidOpen"
social_callout_x_5: "Solusi alternatif yang diajukan Google untuk memasang aplikasi tanpa verifikasi memerlukan 9 tahapan, waktu tunggu 24 jam, dan dijalankan melalui Play Services yang dapat diubah Google sewaktu-waktu. Prosedur ini bahkan belum tersedia di versi beta mana pun. {url} #KeepAndroidOpen"
# [en] social_callout_x_6: "Android was sold to us as an open platform. Now Google wants every developer to register and submit ID just to let you install their apps. Don't let them rug-pull 3 billion users. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_6: "Android dipasarkan kepada kita sebagai platform terbuka. Kini Google menuntut setiap pengembang untuk mendaftar dan menyerahkan identitas hanya agar Anda dapat memasang aplikasi mereka. Jangan biarkan mereka melakukan rug-pull terhadap 3 miliar pengguna. {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_7: "If you bought your phone, you should own it. Google's new 'developer verification' means they decide what software you're allowed to run on your own property. Join the 100k+ signers opposing this: {url} #KeepAndroidOpen"
social_callout_x_7: "Jika Anda membeli ponsel tersebut, Anda seharusnya memiliki kendali penuh atas perangkat Anda. 'Verifikasi pengembang' baru dari Google berarti mereka yang menentukan perangkat lunak apa yang boleh Anda jalankan pada milik pribadi Anda. Bergabunglah dengan 100 ribu lebih penandatangan yang menentang ini: {url} #KeepAndroidOpen"
# [en] social_callout_x_8: "Google is turning Android into a walled garden. Mandatory ID, registration fees, and a 9-step 'advanced flow' for sideloading? That's not security, it's a monopoly move. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_8: "Google mengubah Android menjadi ekosistem tertutup (walled garden). Kewajiban identitas resmi, biaya pendaftaran, dan 'prosedur lanjutan' 9 langkah untuk sideloading? Ini bukan soal keamanan, melainkan langkah monopoli. {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_9: "What happens to the student's first app, or the privacy tool built by a volunteer? Google's mandatory registration blocks them all by default unless they play by Google's rules. {url} #KeepAndroidOpen"
social_callout_x_9: "Bagaimana nasib aplikasi pertama seorang pelajar, atau alat privasi yang dibangun oleh sukarelawan? Kewajiban pendaftaran Google akan memblokir semuanya secara otomatis kecuali jika mereka mengikuti aturan main Google. {url} #KeepAndroidOpen"
# [en] social_callout_x_10: "17 years of Android openness are at risk. Google's plan to block unverified apps is a direct hit on F-Droid and independent software. Stop the lockdown: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_10: "Keterbukaan Android selama 17 tahun kini berada dalam risiko. Rencana Google untuk memblokir aplikasi tanpa verifikasi merupakan serangan langsung terhadap F-Droid dan perangkat lunak independen. Hentikan penutupan akses ini: {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_linkedin_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification before their software can be installed on any device. This applies to all apps, not just those on the Play Store. over 67 organizations have signed an open letter opposing the policy. {url} #KeepAndroidOpen"
social_callout_linkedin_1: "Mulai September 2026, Google akan mewajibkan setiap pengembang aplikasi Android untuk mendaftar secara terpusat dan menyerahkan identitas resmi yang dikeluarkan pemerintah agar perangkat lunak mereka dapat dipasang di perangkat mana pun. Kebijakan ini berlaku untuk seluruh aplikasi, tidak terbatas pada yang tersedia di Play Store. Lebih dari 67 organisasi telah menandatangani surat terbuka untuk menentang kebijakan ini. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_2: "Android's openness has been its distinguishing feature for nearly two decades. Google is now mandating developer registration for all Android apps, including those distributed through alternative stores like F-Droid. The EFF, FSF, Tor Project, and dozens of other organizations are raising serious concerns. {url} #KeepAndroidOpen"
social_callout_linkedin_2: "Keterbukaan Android telah menjadi fitur pembeda utamanya selama hampir dua dekade. Kini, Google mewajibkan pendaftaran pengembang bagi seluruh aplikasi Android, termasuk yang didistribusikan melalui toko alternatif seperti F-Droid. EFF, FSF, Tor Project, dan puluhan organisasi lainnya telah menyampaikan kekhawatiran serius terkait hal ini. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_3: "Google's developer verification program would give a single company the technical ability to block any app, from any developer, on any certified Android device worldwide. This affects independent developers, open-source projects, and the principle that you control the software on hardware you own. {url} #KeepAndroidOpen"
social_callout_linkedin_3: "Program verifikasi pengembang Google akan memberikan kemampuan teknis bagi satu perusahaan tunggal untuk memblokir aplikasi apa pun, dari pengembang mana pun, pada perangkat Android bersertifikat di seluruh dunia. Hal ini berdampak pada pengembang independen, proyek sumber terbuka, serta prinsip bahwa Anda memiliki kendali penuh atas perangkat lunak pada perangkat keras milik sendiri. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_4: "F-Droid estimates 85% of its open-source apps could face distribution issues under Google's new developer verification rules. The requirement for government ID and signing keys creates barriers for anonymous contributors, developers in sanctioned countries, and volunteer-maintained projects. {url} #KeepAndroidOpen"
social_callout_linkedin_4: "F-Droid mengestimasi bahwa 85% aplikasi sumber terbuka mereka dapat menghadapi kendala distribusi di bawah aturan verifikasi pengembang baru dari Google. Kewajiban penyerahan identitas pemerintah dan kunci penandatanganan (signing keys) menciptakan hambatan bagi kontributor anonim, pengembang di negara yang terkena sanksi, serta proyek yang dikelola oleh sukarelawan. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_5: "Google's proposed \"advanced flow\" for sideloading unverified apps requires 9 steps, a mandatory 24-hour waiting period, and runs entirely through Google Play Services. The community has been asked to accept a blog post as a functional safeguard. It has not appeared in any beta release. {url} #KeepAndroidOpen"
social_callout_linkedin_5: "Prosedur lanjutan (advanced flow) yang diajukan Google untuk melakukan sideloading aplikasi tanpa verifikasi memerlukan 9 tahapan, waktu tunggu wajib 24 jam, dan dijalankan sepenuhnya melalui Google Play Services. Komunitas diminta untuk menerima janji tersebut meskipun hingga saat ini prosedur tersebut belum muncul dalam rilis beta mana pun. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_6: "Digital sovereignty is at stake. Google's plan to mandate developer registration for all Android apps—even those distributed outside the Play Store—creates a central point of control and potential censorship for 3 billion devices. {url} #KeepAndroidOpen"
social_callout_linkedin_6: "Kedaulatan digital saat ini sedang dipertaruhkan. Rencana Google untuk mewajibkan pendaftaran pengembang bagi seluruh aplikasi Android—termasuk yang didistribusikan di luar Play Store—menciptakan satu titik kendali terpusat dan potensi penyensoran bagi 3 miliar perangkat. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_7: "The 'Keep Android Open' campaign has gained support from over 67 global organizations. We are opposing Google's plan to block any application whose developer hasn't registered centrally and provided government ID. Read the open letter: {url} #KeepAndroidOpen"
social_callout_linkedin_7: "Kampanye 'Keep Android Open' telah mendapat dukungan dari lebih dari 67 organisasi global. Kami menolak rencana Google untuk memblokir aplikasi apa pun yang pengembangnya tidak terdaftar secara terpusat dan tidak menyerahkan identitas resmi pemerintah. Baca surat terbuka selengkapnya: {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_8: "Retroactively changing the rules for hardware people already own is a dangerous precedent. Google's mandatory developer verification strips users of their agency and forces them into a managed ecosystem. {url} #KeepAndroidOpen"
social_callout_linkedin_8: "Mengubah aturan secara retroaktif atas perangkat keras yang telah dimiliki masyarakat adalah sebuah preseden yang berbahaya. Verifikasi pengembang wajib dari Google merampas kedaulatan pengguna dan memaksa mereka masuk ke dalam ekosistem yang sepenuhnya dikendalikan. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_9: "F-Droid and the EFF have raised the alarm: Google's developer verification program is an 'existential threat' to alternative app distribution. We must protect the open-source ecosystem that built Android. {url} #KeepAndroidOpen"
social_callout_linkedin_9: "F-Droid dan EFF telah menyuarakan peringatan: program verifikasi pengembang Google adalah 'ancaman eksistensial' bagi distribusi aplikasi alternatif. Kita harus melindungi ekosistem sumber terbuka yang telah membangun Android selama ini. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_10: "As Google moves to further entrench its gatekeeping status, the community is pushing back. Your device should be your property, not a leased terminal subject to retroactive restrictions. Join the movement: {url} #KeepAndroidOpen"
social_callout_linkedin_10: "Seiring langkah Google untuk semakin memperkuat statusnya sebagai penjaga gerbang (gatekeeper), komunitas pengembang mulai melakukan perlawanan. Perangkat Anda seharusnya menjadi properti milik Anda sepenuhnya, bukan sekadar terminal sewaan yang tunduk pada batasan retroaktif. Bergabunglah dalam gerakan ini: {url} #KeepAndroidOpen"
# [en] social_callout_bluesky_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects all apps, not just Play Store apps. F-Droid calls it an \"existential threat.\" @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_1: "Mulai September 2026, Google akan memblokir setiap aplikasi Android yang pengembangnya tidak terdaftar dan tidak menyerahkan identitas resmi pemerintah. Kebijakan ini berdampak pada seluruh aplikasi, bukan hanya di Play Store. F-Droid menyebutnya sebagai \"ancaman eksistensial\". @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
# [en] social_callout_bluesky_2: "Google is requiring all Android developers to register centrally, pay a fee, and submit government ID. Apps from unregistered developers will be silently blocked. over 67 organizations oppose this. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_2: "Google mewajibkan seluruh pengembang Android untuk mendaftar secara terpusat, membayar biaya, dan menyerahkan identitas resmi pemerintah. Aplikasi dari pengembang yang tidak terdaftar akan diblokir secara otomatis. Lebih dari 67 organisasi menentang kebijakan ini. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_3: "After 17 years of marketing Android as an open platform, Google is mandating developer registration for all apps. Independent developers, open-source contributors, and alternative stores like F-Droid face an uncertain future. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_3: "Setelah 17 tahun memasarkan Android sebagai platform terbuka, Google kini mewajibkan pendaftaran pengembang untuk seluruh aplikasi. Pengembang independen, kontributor sumber terbuka, dan toko aplikasi alternatif seperti F-Droid kini menghadapi masa depan yang tidak pasti. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_4: "Google's proposed workaround for installing unverified apps: 9 steps, a 24-hour wait, delivered through Play Services (which Google can change at any time without consent). It exists only as a blog post. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_4: "Solusi yang diajukan Google untuk memasang aplikasi tanpa verifikasi: 9 tahapan, waktu tunggu 24 jam, dan melalui Layanan Play (yang dapat diubah Google kapan saja tanpa persetujuan). Hingga saat ini, hal tersebut hanya sebatas pernyataan di blog. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
# [en] social_callout_bluesky_5: "The EFF warns that Google's developer verification creates \"a pathway to censorship.\" Developers in restrictive countries, anonymous open-source contributors, and privacy tool maintainers are among those most affected. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_5: "EFF memperingatkan bahwa verifikasi pengembang Google menciptakan \"jalur menuju penyensoran\". Pengembang di negara-negara restriktif, kontributor sumber terbuka anonim, dan pengelola alat privasi adalah pihak yang paling terdampak. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_6: "Google's plan to block unverified apps is a 'rug pull' on the 3 billion people who chose Android for its openness. Don't let them turn your phone into a walled garden. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_6: "Rencana Google untuk memblokir aplikasi tanpa verifikasi merupakan bentuk 'rug pull' terhadap 3 miliar orang yang memilih Android karena keterbukaannya. Jangan biarkan mereka mengubah ponsel Anda menjadi ekosistem tertutup. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
# [en] social_callout_bluesky_7: "Ownership means control. If Google can block any app on your phone, you don't really own it. Join the 100,000+ people fighting to keep Android open. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_7: "Kepemilikan berarti kendali. Jika Google dapat memblokir aplikasi apa pun di ponsel Anda, maka Anda tidak benar-benar memilikinya. Bergabunglah dengan lebih dari 100.000 orang yang berjuang untuk menjaga keterbukaan Android. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_8: "Mandatory ID registration for every app developer? This is a dream for censors and a nightmare for privacy. Protect the open web and open mobile. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_8: "Pendaftaran identitas wajib bagi setiap pengembang aplikasi? Ini adalah peluang bagi penyensor dan mimpi buruk bagi privasi. Lindungi web terbuka dan ekosistem seluler yang terbuka. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_9: "Sideloading shouldn't require a 24-hour waiting period and a 9-step gauntlet. Google's 'advanced flow' is designed to fail. Keep Android Open! @keepandroidopen.bsky.social {url}"
social_callout_bluesky_9: "Sideloading seharusnya tidak memerlukan waktu tunggu 24 jam dan prosedur rumit 9 langkah. 'Prosedur lanjutan' Google dirancang agar sulit dilakukan. Jaga Android tetap terbuka! @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_10: "From F-Droid to independent devs, the entire Android ecosystem is under threat from Google's new mandatory registration decree. See why 67+ orgs are saying no: {url}"
social_callout_bluesky_10: "Dari F-Droid hingga pengembang independen, seluruh ekosistem Android berada di bawah ancaman kebijakan pendaftaran wajib Google. Simak alasan mengapa lebih dari 67 organisasi menyatakan penolakan: {url}"
# [en] social_callout_mastodon_1: "Starting September 2026, Google will require every Android app developer to register centrally, provide government ID, and submit signing keys. Apps from unregistered developers will be blocked on all certified devices worldwide. This threatens F-Droid, open-source distribution, and user autonomy. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_1: "Mulai September 2026, Google akan mewajibkan setiap pengembang aplikasi Android untuk mendaftar secara terpusat, menyerahkan identitas resmi pemerintah, dan mengunggah kunci penandatanganan (signing keys). Aplikasi dari pengembang yang tidak terdaftar akan diblokir di seluruh perangkat bersertifikat di dunia. Hal ini mengancam F-Droid, distribusi sumber terbuka, dan otonomi pengguna. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_2: "Google's Android Developer Verification program requires government ID, signing keys, and a fee for any developer who wants their software installable on Android. The EFF calls app gatekeeping \"a pathway to censorship.\" over 67 organizations have signed an open letter opposing it. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_2: "Program Verifikasi Pengembang Android dari Google mewajibkan identitas resmi, kunci penandatanganan, dan biaya bagi pengembang mana pun agar perangkat lunak mereka dapat dipasang di Android. EFF menyebut kontrol akses aplikasi sebagai \"jalur menuju penyensoran\". Lebih dari 67 organisasi telah menandatangani surat terbuka untuk menentang hal ini. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_3: "F-Droid, home to thousands of free and open-source Android apps, calls Google's developer verification an \"existential threat.\" An estimated 85% of F-Droid apps could face distribution issues because their developers signed through F-Droid, not through Google. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_3: "F-Droid, wadah bagi ribuan aplikasi Android bebas dan sumber terbuka, menyebut verifikasi pengembang Google sebagai \"ancaman eksistensial\". Sekitar 85% aplikasi F-Droid terancam mengalami kendala distribusi karena pengembang mereka menandatangani aplikasi melalui F-Droid, bukan melalui Google. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_4: "Google's proposed workaround for sideloading unverified apps requires 9 steps, a mandatory 24-hour waiting period, and is delivered through Google Play Services, not the Android OS. Google can modify or remove it at any time without user consent. It hasn't shipped in any beta. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_4: "Prosedur alternatif yang diajukan Google untuk sideloading aplikasi tanpa verifikasi memerlukan 9 tahapan, waktu tunggu wajib 24 jam, dan dijalankan melalui Google Play Services, bukan melalui sistem operasi Android. Google dapat mengubah atau menghapusnya sewaktu-waktu tanpa persetujuan pengguna. Prosedur ini belum tersedia dalam rilis beta mana pun. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_5: "The mandatory developer registration Google is imposing on Android raises concerns for developers in sanctioned countries, anonymous open-source contributors, and anyone building privacy or security tools. Google has a documented history of complying with government demands to remove apps. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_5: "Pendaftaran pengembang wajib yang diberlakukan Google menimbulkan kekhawatiran bagi pengembang di negara-negara yang terkena sanksi, kontributor sumber terbuka anonim, serta siapa pun yang membangun alat privasi atau keamanan. Google memiliki rekam jejak dalam mematuhi tuntutan pemerintah untuk menghapus aplikasi. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_6: "Android's strength was its decentralized nature. Google's plan to mandate central registration for every single app developer destroys that. We must resist this centralization of power. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_6: "Kekuatan Android terletak pada sifatnya yang terdesentralisasi. Rencana Google untuk mewajibkan pendaftaran terpusat bagi setiap pengembang aplikasi akan menghancurkan hal tersebut. Kita harus menolak sentralisasi kekuasaan ini. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_7: "If you bought the hardware, you should have the final say on the software. Google's plan to block unverified apps is a direct attack on user sovereignty. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_7: "Apabila Anda telah membeli perangkat kerasnya, Anda seharusnya memiliki hak penuh untuk menentukan perangkat lunaknya. Rencana Google untuk memblokir aplikasi tanpa verifikasi merupakan serangan langsung terhadap kedaulatan pengguna. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
# [en] social_callout_mastodon_8: "Imagine a world where every small hobbyist or volunteer dev has to register with a global corporation just to share their work. That's the world Google is building for Android in 2026. {url} @keepandroidopen@techhub.social"
social_callout_mastodon_8: "Bayangkan sebuah dunia di mana setiap pehobi atau pengembang sukarela harus mendaftar ke korporasi global hanya untuk membagikan karya mereka. Itulah dunia yang sedang dibangun Google untuk Android pada tahun 2026. {url} @keepandroidopen@techhub.social"
# [en] social_callout_mastodon_9: "Google's 'advanced flow' for sideloading is a deterrence mechanism, not an escape hatch. 9 steps and a 24-hour wait for software you own? No thanks. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_9: "'Prosedur lanjutan' Google untuk sideloading adalah sebuah mekanisme penghambat, bukan solusi jalan keluar. Sembilan langkah dan waktu tunggu 24 jam untuk perangkat lunak milik Anda sendiri? Kami menolak hal tersebut. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_10: "Over 100,000 people and 67+ organizations are standing up to Google's attempt to lock down Android. Join the fight for a truly open mobile ecosystem. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_10: "Lebih dari 100.000 individu dan 67 organisasi menentang upaya Google untuk mengunci ekosistem Android. Bergabunglah dalam perjuangan demi ekosistem seluler yang benar-benar terbuka. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
# [en] social_callout_facebook_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification. Apps from unregistered developers will be blocked on all certified Android devices worldwide. This applies to all apps, not just those on the Play Store. Learn more: {url}"
social_callout_facebook_1: "Mulai September 2026, Google akan mewajibkan setiap pengembang aplikasi Android untuk mendaftar secara terpusat dan menyerahkan identitas resmi pemerintah. Aplikasi dari pengembang yang tidak terdaftar akan diblokir pada seluruh perangkat Android bersertifikat di seluruh dunia. Kebijakan ini berlaku untuk semua aplikasi, bukan hanya yang tersedia di Play Store. Pelajari lebih lanjut: {url}"
# [en] social_callout_facebook_2: "F-Droid, the open-source Android app store used by millions, calls Google's developer verification an \"existential threat\" to its continued operation. over 67 organizations including the EFF, FSF, and Tor Project have signed an open letter opposing the policy. Learn why this matters: {url}"
social_callout_facebook_2: "F-Droid, toko aplikasi Android sumber terbuka yang digunakan oleh jutaan orang, menyebut verifikasi pengembang Google sebagai \"ancaman eksistensial\" terhadap kelangsungan operasional mereka. Lebih dari 67 organisasi, termasuk EFF, FSF, dan Tor Project, telah menandatangani surat terbuka yang menentang kebijakan tersebut. Pelajari mengapa hal ini penting bagi Anda: {url}"
# [en] social_callout_facebook_3: "Google's proposed workaround for installing unverified apps after their lockdown takes effect requires 9 steps, a mandatory 24-hour waiting period, and runs through Google Play Services (which Google can modify at any time). The community is being asked to accept a blog post as a safeguard. {url}"
social_callout_facebook_3: "Solusi alternatif yang diajukan Google untuk memasang aplikasi tanpa verifikasi setelah kebijakan penguncian berlaku memerlukan 9 tahapan prosedur, waktu tunggu wajib 24 jam, dan dijalankan melalui Layanan Google Play (yang dapat diubah oleh Google sewaktu-waktu). Komunitas diminta untuk menerima janji dalam sebuah tulisan blog sebagai jaminan perlindungan. {url}"
# [en] social_callout_facebook_4: "Android's openness has been its defining characteristic for 17 years. Millions chose it over iPhone for exactly that reason. Google is now mandating developer registration for all apps, including those distributed outside the Play Store. Independent developers and open-source projects face the most impact. {url}"
social_callout_facebook_4: "Keterbukaan Android telah menjadi karakteristik utamanya selama 17 tahun. Jutaan orang memilihnya dibandingkan iPhone justru karena alasan tersebut. Kini, Google mewajibkan pendaftaran pengembang bagi seluruh aplikasi, termasuk yang didistribusikan di luar Play Store. Pengembang independen dan proyek sumber terbuka akan menghadapi dampak yang paling signifikan. {url}"
# [en] social_callout_facebook_5: "The EFF calls app gatekeeping \"a pathway to censorship.\" Google's developer verification would give a single company the ability to block any app, from any developer, on any certified device worldwide. This sets a precedent that extends beyond Android to the future of personal computing. {url}"
social_callout_facebook_5: "EFF menyebut kontrol akses aplikasi (gatekeeping) sebagai \"jalur menuju penyensoran.\" Verifikasi pengembang Google akan memberikan kemampuan bagi satu perusahaan tunggal untuk memblokir aplikasi apa pun, dari pengembang mana pun, pada perangkat bersertifikat mana pun di seluruh dunia. Hal ini menciptakan preseden yang melampaui platform Android dan memengaruhi masa depan komputasi pribadi. {url}"
# [en] social_callout_facebook_6: "Your phone, your choice? Not if Google has its way. Starting in 2026, they plan to block any app whose developer hasn't registered and provided government ID. This affects everyone. {url}"
social_callout_facebook_6: "Ponsel Anda, pilihan Anda? Tidak jika Google memaksakan kebijakannya. Mulai tahun 2026, mereka berencana untuk memblokir aplikasi apa pun yang pengembangnya tidak terdaftar dan tidak menyerahkan identitas resmi pemerintah. Kebijakan ini berdampak pada hak setiap pengguna perangkat. {url}"
# [en] social_callout_facebook_7: "Google is retroactively locking down billions of devices that were sold as open platforms. This 'rug pull' threatens independent developers and alternative app stores like F-Droid. {url}"
social_callout_facebook_7: "Google secara retroaktif mengunci miliaran perangkat yang sebelumnya dipasarkan sebagai platform terbuka. Praktik 'rug pull' ini mengancam eksistensi pengembang independen serta toko aplikasi alternatif seperti F-Droid. {url}"
# [en] social_callout_facebook_8: "Is your phone really yours? If Google can decide which apps you're allowed to install, the answer is no. Join the 100,000+ people fighting to keep Android open. {url}"
social_callout_facebook_8: "Apakah ponsel Anda benar-benar milik Anda? Jika Google memiliki otoritas untuk menentukan aplikasi apa yang diizinkan untuk Anda pasang, maka jawabannya adalah tidak. Bergabunglah dengan lebih dari 100.000 orang yang berjuang untuk menjaga keterbukaan Android. {url}"
# [en] social_callout_facebook_9: "Google's 9-step process for 'allowing' unverified apps is a trap. It's designed to be so difficult that nobody uses it, giving Google total control. {url}"
social_callout_facebook_9: "Prosedur 9 langkah dari Google untuk 'mengizinkan' aplikasi tanpa verifikasi adalah sebuah jebakan. Prosedur ini dirancang sedemikian rumit agar tidak ada pengguna yang menggunakannya, sehingga memberikan kendali penuh kepada Google atas ekosistem tersebut. {url}"
# [en] social_callout_facebook_10: "From students building their first apps to volunteers creating privacy tools, Google's mandatory registration policy will freeze out innovation. Help us keep Android open! {url}"
social_callout_facebook_10: "Mulai dari pelajar yang membangun aplikasi pertama mereka hingga sukarelawan yang menciptakan alat privasi, kebijakan pendaftaran wajib Google akan menghambat inovasi secara luas. Bantu kami menjaga keterbukaan Android! {url}"
