# Active translations for this locale:

# [en] title: "Keep Android Open"
title: "Android Açık Kalsın"
# [en] description: "Your phone is about to stop being yours. In September 2026, Google will block every Android app whose developer hasn't registered with them."
description: "Telefonun artık gerçekten senin olmaktan çıkmak üzere. Eylül 2026'dan itibaren Google, geliştiricisi kendilerine kayıt olmayan tüm Android uygulamalarını engelleyecek."

# Hero
# [en] hero_lede: "Your phone is about to stop being yours."
hero_lede: "Telefonun artık gerçekten senin olmaktan çıkmak üzere."
# [en] hero_countdown_label: "days until lockdown"
hero_countdown_label: "kilitlenmeye kalan gün"
# [en] hero_sub: "Starting September 2026, a silent update, nonconsensually pushed by Google, will **block every Android app** whose developer hasn't registered with Google, signed their contract, paid up, and handed over government ID."
hero_sub: >-
  Eylül 2026'dan itibaren Google'ın kullanıcıya sormadan göndereceği sessiz bir güncelleme, Google'a kayıt olmayan, sözleşmesini imzalamayan, ücreti ödemeyen ve resmi kimliğini vermeyen geliştiricilerin **tüm Android uygulamalarını engelleyecek**.
# [en] hero_kicker: "Every app and every device, worldwide, with no opt-out."
hero_kicker: "İstisnasız: dünyadaki her uygulama, her cihaz."

# What Google is doing
# [en] what_heading: "What Google is doing"
what_heading: "Google ne yapıyor"
# [en] what_intro: "In August 2025, Google [announced](https://developer.android.com/developer-verification) a new requirement: starting September 2026, **every Android app developer must register centrally with Google** before their software can be installed on any device. Not just Play Store apps: all apps. This includes apps shared between friends, distributed through [F-Droid](https://f-droid.org), built by hobbyists for personal use. Independent developers, church and community groups, and hobbyists alike will all be frozen out of being able to develop and distribute their software."
what_intro: >-
  Google, Ağustos 2025'te [duyurdu](https://developer.android.com/developer-verification): Eylül 2026'dan itibaren **her Android uygulama geliştiricisi, yazılımı herhangi bir cihaza kurulmadan önce merkezi olarak Google'a kayıt olmak zorunda**. Yalnızca Play Store uygulamaları değil, tüm uygulamalar. Buna arkadaşlar arasında paylaşılan uygulamalar, [F-Droid](https://f-droid.org) üzerinden dağıtılanlar ve hobi amaçlı kişisel projeler de dahil. Bağımsız geliştiriciler, kilise ve topluluk grupları, hobiciler... hepsi yazılım geliştirme ve dağıtım sürecinin dışına itilecek.
# [en] what_registration: "Registration requires:"
what_registration: "Kayıt için gerekenler:"
# [en] what_req_fee: "Paying a fee to Google"
what_req_fee: "Google'a ücret ödemek"
# [en] what_req_terms: "Agreeing to Google's Terms and Conditions"
what_req_terms: "Google'ın Şartlar ve Koşullarını kabul etmek"
# [en] what_req_id: "Surrendering your government-issued identification"
what_req_id: "Devlet tarafından verilmiş kimliğini teslim etmek"
# [en] what_req_signing: "Providing evidence of your private signing key"
what_req_signing: "Özel imzalama anahtarına sahip olduğunu kanıtlamak"
# [en] what_req_appids: "Listing all current and all future application identifiers"
what_req_appids: "Mevcut ve gelecekteki tüm uygulama kimliklerini listelemek"
# [en] what_pullquote: "If a developer does not comply, their apps get silently blocked on every Android device worldwide."
what_pullquote: "Bir geliştirici bunu yapmazsa, uygulamaları dünya genelindeki tüm Android cihazlarda sessizce engelleniyor."

# Who this hurts
# [en] impact_heading: "Who this hurts"
impact_heading: "Kimleri vuruyor"
# [en] impact_you_heading: "You"
impact_you_heading: "Sen"
# [en] impact_you_p1: "You bought an Android phone because Google told you it was open. You could install what you wanted, and that was the deal."
impact_you_p1: "Android telefonu, Google açık bir platform dediği için aldın. İstediğin uygulamayı kurabiliyordun; anlaşma buydu."
# [en] impact_you_p2: "Google is now rewriting that deal, retroactively, on hardware you already own. After the update lands, you can only run software that Google has pre-approved. On your phone: *your* property, that *you* paid for."
impact_you_p2: >-
  Google şimdi bu anlaşmayı, hem de geriye dönük şekilde ve zaten sana ait olan donanımda değiştiriyor. Güncelleme geldikten sonra yalnızca Google'ın önceden onayladığı yazılımları çalıştırabileceksin. Kendi telefonunda, *kendi* paranla aldığın cihazda.
# [en] impact_dev_heading: "Independent developers"
impact_dev_heading: "Bağımsız geliştiriciler"
# [en] impact_dev_p1: "A teenager's first app, a volunteer's privacy tool, or a company's confidential internal beta. It doesn't matter. After September 2026, none of these can be installed without Google's blessing."
impact_dev_p1: "Bir gencin ilk uygulaması, bir gönüllünün gizlilik aracı ya da bir şirketin gizli dahili beta sürümü... Fark etmiyor. Eylül 2026'dan sonra bunların hiçbiri Google onayı olmadan yüklenemeyecek."
# [en] impact_dev_p2: "[F-Droid](https://f-droid.org), home to thousands of free and open-source Android apps, has called this an [\"existential\" threat](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow calls it [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
impact_dev_p2: >-
  Binlerce özgür ve açık kaynak Android uygulamasına ev sahipliği yapan [F-Droid](https://f-droid.org), bunu ["varoluşsal" bir tehdit](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html) olarak tanımlıyor. Cory Doctorow ise buna ["Darth Android"](https://pluralistic.net/2025/09/01/fulu/) diyor.
# [en] impact_gov_heading: "Governments & civil society"
impact_gov_heading: "Devletler ve sivil toplum"
# [en] impact_gov_p1: "Google has a [documented track record](https://www.aclu.org/news/free-speech/app-store-oligopoly) of complying when authoritarian regimes demand app removals. With this program, the software that runs your country's institutions will exist at the pleasure of a single unaccountable foreign corporation."
impact_gov_p1: >-
  Otoriter rejimler uygulama kaldırılmasını istediğinde Google'ın buna uyduğuna dair [belgeli bir geçmiş](https://www.aclu.org/news/free-speech/app-store-oligopoly) var. Bu programla birlikte, ülkenin kurumlarında çalışan yazılımlar hesap vermeyen tek bir yabancı şirketin insafına kalacak.
# [en] impact_gov_p2: "The [EFF calls](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) app gatekeeping \"an ever-expanding pathway to internet censorship.\""
impact_gov_p2: >-
  [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship), uygulama kapıcılığını "internet sansürüne açılan giderek büyüyen bir yol" olarak tanımlıyor.

# Advanced flow
# [en] flow_heading: "Google's \"escape hatch\" is a trap door"
flow_heading: "Google'ın \"kaçış yolu\" aslında bir tuzak kapı"
# [en] flow_intro: "Google says \"power users\" can [\"still install\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) unverified apps. Here's what that *actually* looks like:"
flow_intro: >-
  Google, doğrulanmamış uygulamaları "ileri düzey kullanıcıların" hâlâ ["yükleyebileceğini"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) söylüyor. İşin gerçekte nasıl göründüğü şu:
# [en] flow_step1: "Delve into System Settings, find Developer Options"
flow_step1: "Sistem Ayarlarına girip Geliştirici Seçeneklerini bul"
# [en] flow_step2: "Tap the build number **seven times** to enable Developer Mode"
flow_step2: "Geliştirici Modunu açmak için derleme numarasına **yedi kez** dokun"
# [en] flow_step3: "Dismiss scare screens about coercion"
flow_step3: "Korkutucu uyarı ekranlarını geç"
# [en] flow_step4: "Enter your PIN"
flow_step4: "PIN kodunu gir"
# [en] flow_step5: "Restart the device"
flow_step5: "Cihazı yeniden başlat"
# [en] flow_step6: "**Wait 24 hours**"
flow_step6: "**24 saat bekle**"
# [en] flow_step7: "Come back, dismiss more scare screens"
flow_step7: "Geri dönüp daha fazla uyarı ekranını geç"
# [en] flow_step8: "Pick \"allow temporarily\" (7 days) or \"allow indefinitely\""
flow_step8: "\"geçici olarak izin ver\" (7 gün) ya da \"süresiz izin ver\" seç"
# [en] flow_step9: "Confirm, again, that you understand \"the risks\""
flow_step9: "\"riskleri\" anladığını bir kez daha onayla"
# [en] flow_summary: "Nine steps. A mandatory 24-hour cooling-off period. *For installing software on a device you own.*"
flow_summary: "Dokuz adım. Zorunlu 24 saat bekleme. *Hem de sahibi olduğun bir cihaza yazılım kurmak için.*"
# [en] flow_detail: "Worse: this flow runs entirely through **Google Play Services**, not the Android OS. Google can change it, tighten it, or kill it at any time, with no OS update required and no consent needed. And as of today, it hasn't shipped in any beta, preview, or canary build. It exists only as a blog post and some mockups."
flow_detail: >-
  Daha da kötüsü: bu akış Android işletim sisteminin değil, tamamen **Google Play Hizmetleri**nin içinden çalışıyor. Google bunu istediği an değiştirebilir, zorlaştırabilir ya da tamamen kaldırabilir; üstelik işletim sistemi güncellemesi ve kullanıcı onayı da gerekmez. Ve bugün itibarıyla bu özellik hiçbir beta, önizleme veya canary sürümünde yok. Ortada sadece bir blog yazısı ve bazı maketler var.

# Precedent
# [en] precedent_heading: "This is bigger than Android"
precedent_heading: "Bu, Android'den daha büyük bir mesele"
# [en] precedent_pullquote: "If Google can retroactively lock down billions of devices that were sold as open platforms, every hardware manufacturer on the planet is watching."
precedent_pullquote: "Google açık platform diye satılmış milyarlarca cihazı sonradan kilitleyebiliyorsa, dünyadaki tüm donanım üreticileri bunu izliyor demektir."
# [en] precedent_p1: "The principle being established: **the company that made your device gets to decide, after you've bought it, what software you're allowed to run.** In software, this is called a \"rug pull\"; but at least you could always install competing software. In hardware, it is a *fait accompli* that strips you of your agency and renders you powerless to the whims of a single unaccountable gatekeeper and convicted monopolist."
precedent_p1: >-
  Yerleşen ilke şu: **Cihazını üreten şirket, sen onu satın aldıktan sonra bile hangi yazılımı çalıştırabileceğine karar veriyor.** Yazılım dünyasında buna "rug pull" denir; en azından rakip bir yazılım kurma şansın olurdu. Donanımda ise bu, seni iradenden eden ve tek bir hesap vermeyen kapı bekçisi ile hüküm giymiş bir tekelin keyfine bırakan bir *fait accompli*.
# [en] precedent_p2: "Android's openness was never just a feature. It was the *promise* that distinguished it from iPhone. Millions chose Android for exactly that reason. Google is now revoking that promise unilaterally, on devices *already* in people's pockets, because they've decided they have enough market dominance and regulatory capture to get away with it."
precedent_p2: >-
  Android'in açıklığı hiçbir zaman sadece bir özellik değildi. Onu iPhone'dan ayıran asıl *söz* buydu. Milyonlarca insan Android'i tam da bu yüzden seçti. Google şimdi bu sözü tek taraflı olarak geri çekiyor; hem de insanların cebindeki *mevcut* cihazlarda, çünkü piyasa gücü ve düzenleyici etki açısından bunu yapabilecek kadar güçlü olduğunu düşünüyor.
# [en] precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"Google's Apple envy threatens to dismantle Android's open legacy.\"*"
precedent_arstechnica: >-
  [Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *"Google'ın Apple'a özenmesi, Android'in açık mirasını dağıtma tehdidi yaratıyor."*

# Objections
# [en] objections_heading: "But wait, isn't this..."
objections_heading: "Ama bir saniye, bu..."
# [en] obj_security_q: "\"...just about security?\""
obj_security_q: "\"...sadece güvenlik için değil mi?\""
# [en] obj_security_a: "The security rationale is a smokescreen. Google Play Protect already scans for malware independent of developer identity. Requiring a government ID doesn't make code safer. It makes *developers* identifiable and controllable. Malware authors can register. Indie developers and dissidents often can't. The [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) is blunt: identity-based gatekeeping is a censorship tool, not a security one."
obj_security_a: >-
  Güvenlik gerekçesi bir sis perdesi. Google Play Protect, geliştirici kimliğinden bağımsız olarak kötü amaçlı yazılımları zaten tarıyor. Devlet kimliği istemek kodu daha güvenli yapmaz. Sadece *geliştiricileri* tespit edilebilir ve kontrol edilebilir hale getirir. Zararlı yazılım geliştirenler de kayıt olabilir. Bağımsız geliştiriciler ve muhalifler çoğu zaman olamaz. [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) bunu açık söylüyor: kimlik temelli kapıcılık güvenlik aracı değil, sansür aracıdır.
# [en] obj_sideloading_q: "\"...still sideloading if you use the advanced flow?\""
obj_sideloading_q: "\"...ileri akışı kullanırsan yine de yandan yükleme var, değil mi?\""
# [en] obj_sideloading_a: "Nine steps, 24-hour wait, buried in Developer Options, delivered through a proprietary service that Google can revoke whenever they want. That's not sideloading. That's a **deterrence mechanism** built to ensure almost nobody completes it. And since it runs through Play Services rather than the OS, Google can tighten or kill it silently."
obj_sideloading_a: >-
  Dokuz adım, 24 saat bekleme, Geliştirici Seçeneklerinin içine gömülü bir yol ve Google'ın istediğinde iptal edebileceği kapalı bir servis... Bu yandan yükleme değil. Bu, neredeyse kimsenin tamamlayamaması için tasarlanmış bir **caydırma mekanizması**. Üstelik OS yerine Play Hizmetleri üzerinden çalıştığı için Google bunu sessizce daha da zorlaştırabilir ya da tamamen kapatabilir.
# [en] obj_hide_q: "\"...only a problem if you have something to hide?\""
obj_hide_q: "\"...sadece saklayacak bir şeyin varsa sorun olur, değil mi?\""
# [en] obj_hide_a: "Whistleblowers, journalists, and activists under authoritarian governments will be the first victims. People in domestic abuse situations are next. All these groups have legitimate reasons to distribute or use software without putting their legal identity in a Google database. Anonymous open-source contribution is a tradition older than Google itself. This policy ends it on Android."
obj_hide_a: >-
  Otoriter yönetimlerdeki ihbarcılar, gazeteciler ve aktivistler ilk kurbanlar olacak. Aile içi şiddet durumunda olan insanlar da hemen ardından gelir. Bu grupların hepsinin, yasal kimliklerini Google veritabanına koymadan yazılım dağıtmak veya kullanmak için meşru nedenleri var. Anonim açık kaynak katkısı, Google'dan çok daha eski bir gelenek. Bu politika Android'de bunu bitiriyor.
# [en] obj_apple_q: "\"...the same thing Apple does?\""
obj_apple_q: "\"...Apple'ın yaptığıyla aynı şey değil mi?\""
# [en] obj_apple_a: "Apple has been a walled garden from day one. People chose Android *because it was different*. \"Apple does it too\" is a race to the bottom and a weak *tu quoque* argument. And under regulatory pressure (the EU's Digital Markets Act), even Apple is being forced to open up. Google is moving in the opposite direction: attempting to further entrench its gatekeeping status."
obj_apple_a: >-
  Apple en başından beri duvarlı bir bahçeydi. İnsanlar Android'i *farklı olduğu için* seçti. "Apple da yapıyor" demek dibe doğru yarışmak ve zayıf bir *tu quoque* argümanı. Ayrıca düzenleyici baskı altında (AB Dijital Pazarlar Yasası gibi), Apple bile açılmaya zorlanıyor. Google ise ters yöne gidiyor: kapı bekçiliği konumunu daha da pekiştirmeye çalışıyor.
# [en] obj_cost_q: "\"...just $25 and some paperwork?\""
obj_cost_q: "\"...altı üstü 25 dolar ve biraz evrak, değil mi?\""
# [en] obj_cost_a: "Maybe, if you're a developer in the US with a credit card and a driver's license. Try being a student in sub-Saharan Africa, or a dissident in Myanmar, or a volunteer maintaining a community health app. The cost isn't only financial: you're surrendering government ID and evidence of your signing keys to a company that [routinely complies](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) with government demands to remove apps and expose developers."
obj_cost_a: >-
  Belki, ABD'de kredi kartı ve ehliyeti olan bir geliştiriciysen. Ama Sahra Altı Afrika'da bir öğrenci olmayı, Myanmar'da bir muhalif olmayı ya da topluluk sağlığı uygulaması sürdüren bir gönüllü olmayı düşün. Maliyet sadece para değil: devlet kimliğini ve imzalama anahtarlarına dair kanıtları, hükümetlerin uygulama kaldırma ve geliştirici ifşa taleplerine [rutin olarak uyan](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) bir şirkete teslim ediyorsun.

# Fight back
# [en] act_heading: "Fight back"
act_heading: "Harekete geç"
# [en] act_everyone_heading: "Everyone"
act_everyone_heading: "Herkes"
# [en] act_fdroid: "**[Install F-Droid](https://f-droid.org)** on every Android device you own. Alternative stores only survive if people actually use them."
act_fdroid: "**[F-Droid'u kur](https://f-droid.org)**. Sahip olduğun her Android cihaza kur. Alternatif mağazalar ancak insanlar gerçekten kullanırsa ayakta kalır."
# [en] act_regulators: "**[Contact your regulators.](/cta/#consumers)** Regulators worldwide are genuinely concerned about monopolies and the centralization of power in the tech sector, and want to hear directly from individuals who are affected and concerned."
act_regulators: "**[Düzenleyici kurumlarla iletişime geç.](/cta/#consumers)** Dünyanın dört bir yanındaki düzenleyiciler, tekelleşme ve teknoloji sektöründe gücün merkezileşmesi konusunda ciddi şekilde endişeli. Etkilenen insanlardan doğrudan geri bildirim duymak istiyorlar."
