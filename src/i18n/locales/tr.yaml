act_petition: "**[change.org dilekçesini imzala](https://www.change.org/p/stop-google-from-limiting-apk-file-usage/)** ve sesini duyuran 100.000'den fazla kişiye katıl."
# [en] act_letter: "**[Read and share our open letter](/open-letter)**"
act_letter: "**[Açık mektubumuzu oku ve paylaş](/open-letter)**"
# [en] act_survey: "**Tell Google what you think of this** through their own [developer verification survey](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) <small>(for all the good that will do)</small>."
act_survey: "**Google'a bu konuda ne düşündüğünü söyle**. Kendi [geliştirici doğrulama anketleri](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) üzerinden iletebilirsin (ne kadar işe yararsa artık)."
