# Social share messages (rotated randomly; {url} is replaced at build time)
# [en] social_callout_x_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects every Android device worldwide. Learn more: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_1: "Eylül 2026'dan itibaren Google, geliştiricisi kayıt olmayan ve resmi kimlik vermeyen Android uygulamalarını engelleyecek. Bu, dünya çapındaki tüm Android cihazları etkiliyor. Ayrıntılar: {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_2: "Google announced that all Android app developers must register centrally, pay a fee, and submit government ID, or their apps will be blocked on every device. over 67 organizations oppose this. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_2: "Google, tüm Android geliştiricilerinin merkezi olarak kayıt olmasını, ücret ödemesini ve resmi kimlik sunmasını şart koştu. Aksi halde uygulamalar her cihazda engellenecek. 67'den fazla kuruluş buna karşı çıkıyor. {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_3: "Android's openness distinguished it from iPhone for 17 years. Google is now requiring mandatory developer registration for all apps, including those distributed outside the Play Store. {url} #KeepAndroidOpen"
social_callout_x_3: "Android'i 17 yıl boyunca iPhone'dan ayıran şey açıklığıydı. Google şimdi Play Store dışı olanlar dahil tüm uygulamalar için zorunlu geliştirici kaydı istiyor. {url} #KeepAndroidOpen"
# [en] social_callout_x_4: "F-Droid, the open-source Android app store, calls Google's developer verification an \"existential threat\" to alternative app distribution. The EFF warns it creates a pathway to censorship. {url} #KeepAndroidOpen"
social_callout_x_4: "Açık kaynak Android mağazası F-Droid, Google'ın geliştirici doğrulamasını alternatif dağıtıma yönelik \"varoluşsal bir tehdit\" olarak görüyor. EFF de bunun sansüre yol açtığını söylüyor. {url} #KeepAndroidOpen"
# [en] social_callout_x_5: "Google's proposed workaround for installing unverified apps requires 9 steps, a 24-hour wait, and runs through Play Services, which Google can modify at any time. It hasn't shipped in any beta. {url} #KeepAndroidOpen"
social_callout_x_5: "Google'ın doğrulanmamış uygulamalar için önerdiği yol 9 adım, 24 saat bekleme ve Play Hizmetleri üzerinden çalışıyor; Google bunu istediği an değiştirebilir. Üstelik hiçbir beta sürümünde yok. {url} #KeepAndroidOpen"
# [en] social_callout_x_6: "Android was sold to us as an open platform. Now Google wants every developer to register and submit ID just to let you install their apps. Don't let them rug-pull 3 billion users. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_6: "Android bize açık platform diye satıldı. Şimdi Google, uygulama kurabilmen için her geliştiricinin kayıt olup kimlik vermesini istiyor. 3 milyar kullanıcıya bunu yapmalarına izin verme. {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_7: "If you bought your phone, you should own it. Google's new 'developer verification' means they decide what software you're allowed to run on your own property. Join the 100k+ signers opposing this: {url} #KeepAndroidOpen"
social_callout_x_7: "Telefonu satın aldıysan sahibi sensin. Google'ın yeni \"geliştirici doğrulaması\" kendi cihazında hangi yazılımı çalıştırabileceğine onların karar vermesi demek. Karşı çıkan 100k+ kişiye katıl: {url} #KeepAndroidOpen"
# [en] social_callout_x_8: "Google is turning Android into a walled garden. Mandatory ID, registration fees, and a 9-step 'advanced flow' for sideloading? That's not security, it's a monopoly move. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_8: "Google Android'i duvarlı bahçeye çeviriyor. Zorunlu kimlik, kayıt ücreti ve yandan yükleme için 9 adımlı \"ileri akış\"? Bu güvenlik değil, tekel hamlesi. {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_9: "What happens to the student's first app, or the privacy tool built by a volunteer? Google's mandatory registration blocks them all by default unless they play by Google's rules. {url} #KeepAndroidOpen"
social_callout_x_9: "Öğrencinin ilk uygulamasına ya da gönüllünün geliştirdiği gizlilik aracına ne olacak? Google'ın zorunlu kaydı, kurallarına uymazsan hepsini varsayılan olarak engelliyor. {url} #KeepAndroidOpen"
# [en] social_callout_x_10: "17 years of Android openness are at risk. Google's plan to block unverified apps is a direct hit on F-Droid and independent software. Stop the lockdown: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_10: "Android'in 17 yıllık açıklık mirası risk altında. Google'ın doğrulanmamış uygulamaları engelleme planı F-Droid'e ve bağımsız yazılıma doğrudan darbe. Kilitlenmeyi durdur: {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_linkedin_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification before their software can be installed on any device. This applies to all apps, not just those on the Play Store. over 67 organizations have signed an open letter opposing the policy. {url} #KeepAndroidOpen"
social_callout_linkedin_1: "Eylül 2026'dan itibaren Google, herhangi bir yazılımın cihaza kurulabilmesi için tüm Android geliştiricilerinin merkezi kayıt yapıp devlet tarafından verilmiş kimlik sunmasını zorunlu kılacak. Bu sadece Play Store için değil, tüm uygulamalar için geçerli. Politikaya karşı açık mektubu 67'den fazla kuruluş imzaladı. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_2: "Android's openness has been its distinguishing feature for nearly two decades. Google is now mandating developer registration for all Android apps, including those distributed through alternative stores like F-Droid. The EFF, FSF, Tor Project, and dozens of other organizations are raising serious concerns. {url} #KeepAndroidOpen"
social_callout_linkedin_2: "Android'in ayırt edici özelliği neredeyse 20 yıldır açıklığıydı. Google şimdi F-Droid gibi alternatif mağazalarda dağıtılanlar dahil tüm Android uygulamaları için geliştirici kaydını zorunlu hale getiriyor. EFF, FSF, Tor Project ve onlarca kuruluş ciddi endişe taşıyor. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_3: "Google's developer verification program would give a single company the technical ability to block any app, from any developer, on any certified Android device worldwide. This affects independent developers, open-source projects, and the principle that you control the software on hardware you own. {url} #KeepAndroidOpen"
social_callout_linkedin_3: "Google'ın geliştirici doğrulama programı, tek bir şirkete dünya çapındaki sertifikalı Android cihazlarda herhangi bir geliştiricinin herhangi bir uygulamasını engelleme teknik gücü veriyor. Bu, bağımsız geliştiricileri, açık kaynak projeleri ve sahip olduğun donanımda yazılım kontrolü ilkesini etkiliyor. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_4: "F-Droid estimates 85% of its open-source apps could face distribution issues under Google's new developer verification rules. The requirement for government ID and signing keys creates barriers for anonymous contributors, developers in sanctioned countries, and volunteer-maintained projects. {url} #KeepAndroidOpen"
social_callout_linkedin_4: "F-Droid, açık kaynak uygulamalarının %85'inin Google'ın yeni geliştirici doğrulama kuralları altında dağıtım sorunu yaşayabileceğini tahmin ediyor. Devlet kimliği ve imzalama anahtarı şartı, anonim katkıcılar, yaptırım altındaki ülkelerdeki geliştiriciler ve gönüllü projeler için ciddi bir engel oluşturuyor. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_5: "Google's proposed \"advanced flow\" for sideloading unverified apps requires 9 steps, a mandatory 24-hour waiting period, and runs entirely through Google Play Services. The community has been asked to accept a blog post as a functional safeguard. It has not appeared in any beta release. {url} #KeepAndroidOpen"
social_callout_linkedin_5: "Google'ın doğrulanmamış uygulamalar için önerdiği \"ileri akış\" 9 adım, zorunlu 24 saat bekleme ve tamamen Google Play Hizmetleri üzerinden çalışmayı içeriyor. Topluluktan, işlevsel güvence olarak bir blog yazısına güvenmesi isteniyor. Bu özellik hiçbir beta sürümünde yer almadı. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_6: "Digital sovereignty is at stake. Google's plan to mandate developer registration for all Android apps—even those distributed outside the Play Store—creates a central point of control and potential censorship for 3 billion devices. {url} #KeepAndroidOpen"
social_callout_linkedin_6: "Dijital egemenlik tehlikede. Google'ın, Play Store dışında dağıtılanlar dahil tüm Android uygulamaları için geliştirici kaydını zorunlu kılma planı, 3 milyar cihaz için tek merkezli bir kontrol ve potansiyel sansür noktası oluşturuyor. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_7: "The 'Keep Android Open' campaign has gained support from over 67 global organizations. We are opposing Google's plan to block any application whose developer hasn't registered centrally and provided government ID. Read the open letter: {url} #KeepAndroidOpen"
social_callout_linkedin_7: "'Keep Android Open' kampanyası dünya genelinde 67'den fazla kuruluşun desteğini aldı. Geliştiricisi merkezi kayıt ve devlet kimliği sunmayan her uygulamayı engellemeyi hedefleyen Google planına karşı çıkıyoruz. Açık mektubu oku: {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_8: "Retroactively changing the rules for hardware people already own is a dangerous precedent. Google's mandatory developer verification strips users of their agency and forces them into a managed ecosystem. {url} #KeepAndroidOpen"
social_callout_linkedin_8: "İnsanların zaten sahip olduğu donanımın kurallarını sonradan değiştirmek tehlikeli bir emsal yaratır. Google'ın zorunlu geliştirici doğrulaması kullanıcıların iradesini azaltıp herkesi yönetilen bir ekosisteme itiyor. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_9: "F-Droid and the EFF have raised the alarm: Google's developer verification program is an 'existential threat' to alternative app distribution. We must protect the open-source ecosystem that built Android. {url} #KeepAndroidOpen"
social_callout_linkedin_9: "F-Droid ve EFF alarm veriyor: Google'ın geliştirici doğrulama programı alternatif uygulama dağıtımı için \"varoluşsal bir tehdit\". Android'i inşa eden açık kaynak ekosistemini korumalıyız. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_10: "As Google moves to further entrench its gatekeeping status, the community is pushing back. Your device should be your property, not a leased terminal subject to retroactive restrictions. Join the movement: {url} #KeepAndroidOpen"
social_callout_linkedin_10: "Google kapı bekçiliği konumunu daha da sağlamlaştırmaya çalışırken topluluk karşı çıkıyor. Cihazın, geriye dönük kısıtlamalara tabi kiralık bir terminal değil, gerçekten senin mülkün olmalı. Harekete katıl: {url} #KeepAndroidOpen"
# [en] social_callout_bluesky_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects all apps, not just Play Store apps. F-Droid calls it an \"existential threat.\" @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_1: "Eylül 2026'dan itibaren Google, geliştiricisi kayıt olmayan ve resmi kimlik vermeyen Android uygulamalarını engelleyecek. Bu sadece Play Store'u değil, tüm uygulamaları etkiliyor. F-Droid buna \"varoluşsal tehdit\" diyor. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
# [en] social_callout_bluesky_2: "Google is requiring all Android developers to register centrally, pay a fee, and submit government ID. Apps from unregistered developers will be silently blocked. over 67 organizations oppose this. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_2: "Google tüm Android geliştiricileri için merkezi kayıt, ücret ve resmi kimlik şartı getiriyor. Kayıt olmayan geliştiricilerin uygulamaları sessizce engellenecek. 67'den fazla kuruluş buna karşı. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_3: "After 17 years of marketing Android as an open platform, Google is mandating developer registration for all apps. Independent developers, open-source contributors, and alternative stores like F-Droid face an uncertain future. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_3: "Google, Android'i 17 yıl açık platform diye anlattıktan sonra artık tüm uygulamalar için geliştirici kaydını zorunlu kılıyor. Bağımsız geliştiriciler, açık kaynak katkıcıları ve F-Droid gibi alternatif mağazalar belirsiz bir gelecekle karşı karşıya. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_4: "Google's proposed workaround for installing unverified apps: 9 steps, a 24-hour wait, delivered through Play Services (which Google can change at any time without consent). It exists only as a blog post. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_4: "Google'ın doğrulanmamış uygulamalar için önerdiği yol: 9 adım, 24 saat bekleme ve Play Hizmetleri üzerinden teslim (Google bunu izinsiz istediği an değiştirebilir). Şu an sadece bir blog yazısında var. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
# [en] social_callout_bluesky_5: "The EFF warns that Google's developer verification creates \"a pathway to censorship.\" Developers in restrictive countries, anonymous open-source contributors, and privacy tool maintainers are among those most affected. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_5: "EFF, Google'ın geliştirici doğrulamasının \"sansüre giden bir yol\" oluşturduğunu söylüyor. Kısıtlayıcı ülkelerdeki geliştiriciler, anonim açık kaynak katkıcıları ve gizlilik aracı geliştirenler en çok etkilenecek gruplar arasında. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_6: "Google's plan to block unverified apps is a 'rug pull' on the 3 billion people who chose Android for its openness. Don't let them turn your phone into a walled garden. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_6: "Google'ın doğrulanmamış uygulamaları engelleme planı, Android'i açıklığı için seçen 3 milyar kişiye yapılmış bir 'rug pull'. Telefonunu duvarlı bahçeye çevirmelerine izin verme. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
# [en] social_callout_bluesky_7: "Ownership means control. If Google can block any app on your phone, you don't really own it. Join the 100,000+ people fighting to keep Android open. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_7: "Sahiplik kontrol demektir. Google telefonundaki herhangi bir uygulamayı engelleyebiliyorsa, o telefon gerçekten senin değil. Android'i açık tutmak için mücadele eden 100.000+ kişiye katıl. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_8: "Mandatory ID registration for every app developer? This is a dream for censors and a nightmare for privacy. Protect the open web and open mobile. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_8: "Her uygulama geliştiricisi için zorunlu kimlik kaydı mı? Sansürcüler için rüya, mahremiyet için kabus. Açık web'i ve açık mobil ekosistemi koruyalım. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_9: "Sideloading shouldn't require a 24-hour waiting period and a 9-step gauntlet. Google's 'advanced flow' is designed to fail. Keep Android Open! @keepandroidopen.bsky.social {url}"
social_callout_bluesky_9: "Yandan yükleme, 24 saat bekleme ve 9 adımlık engel parkuru gerektirmemeli. Google'ın 'ileri akışı' başarısız olsun diye tasarlanmış. Android Açık Kalsın! @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_10: "From F-Droid to independent devs, the entire Android ecosystem is under threat from Google's new mandatory registration decree. See why 67+ orgs are saying no: {url}"
social_callout_bluesky_10: "F-Droid'den bağımsız geliştiricilere kadar tüm Android ekosistemi, Google'ın yeni zorunlu kayıt dayatması yüzünden tehdit altında. 67+'den fazla kuruluşun neden hayır dediğini gör: {url}"
# [en] social_callout_mastodon_1: "Starting September 2026, Google will require every Android app developer to register centrally, provide government ID, and submit signing keys. Apps from unregistered developers will be blocked on all certified devices worldwide. This threatens F-Droid, open-source distribution, and user autonomy. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_1: "Eylül 2026'dan itibaren Google, tüm Android geliştiricilerinin merkezi kayıt yapmasını, devlet kimliği ve imzalama anahtarı kanıtı sunmasını isteyecek. Kayıt olmayan geliştiricilerin uygulamaları dünya genelindeki tüm sertifikalı cihazlarda engellenecek. Bu, F-Droid'i, açık kaynak dağıtımını ve kullanıcı özerkliğini tehdit ediyor. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_2: "Google's Android Developer Verification program requires government ID, signing keys, and a fee for any developer who wants their software installable on Android. The EFF calls app gatekeeping \"a pathway to censorship.\" over 67 organizations have signed an open letter opposing it. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_2: "Google'ın Android Geliştirici Doğrulama programı, Android'de yazılımı kurulabilir kılmak isteyen her geliştiriciden devlet kimliği, imzalama anahtarı kanıtı ve ücret talep ediyor. EFF, uygulama kapıcılığını \"sansüre giden bir yol\" diye tanımlıyor. 67'den fazla kuruluş buna karşı açık mektubu imzaladı. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_3: "F-Droid, home to thousands of free and open-source Android apps, calls Google's developer verification an \"existential threat.\" An estimated 85% of F-Droid apps could face distribution issues because their developers signed through F-Droid, not through Google. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_3: "Binlerce özgür ve açık kaynak Android uygulamasının yuvası olan F-Droid, Google'ın geliştirici doğrulamasını \"varoluşsal bir tehdit\" olarak görüyor. F-Droid uygulamalarının tahmini %85'i dağıtım sorunu yaşayabilir; çünkü geliştiriciler Google üzerinden değil F-Droid üzerinden imza attı. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_4: "Google's proposed workaround for sideloading unverified apps requires 9 steps, a mandatory 24-hour waiting period, and is delivered through Google Play Services, not the Android OS. Google can modify or remove it at any time without user consent. It hasn't shipped in any beta. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_4: "Google'ın doğrulanmamış uygulamalar için önerdiği yol 9 adım ve zorunlu 24 saat bekleme içeriyor; ayrıca Android OS yerine Google Play Hizmetleri üzerinden çalışıyor. Google bunu istediği an, kullanıcı onayı olmadan değiştirebilir veya kaldırabilir. Henüz hiçbir beta sürümünde yok. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_5: "The mandatory developer registration Google is imposing on Android raises concerns for developers in sanctioned countries, anonymous open-source contributors, and anyone building privacy or security tools. Google has a documented history of complying with government demands to remove apps. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_5: "Google'ın Android'e dayattığı zorunlu geliştirici kaydı; yaptırım altındaki ülkelerdeki geliştiriciler, anonim açık kaynak katkıcıları ve gizlilik/güvenlik araçları geliştirenler için ciddi riskler yaratıyor. Google'ın, hükümetlerin uygulama kaldırma taleplerine uyduğuna dair belgeli bir geçmişi var. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_6: "Android's strength was its decentralized nature. Google's plan to mandate central registration for every single app developer destroys that. We must resist this centralization of power. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_6: "Android'in gücü merkezi olmayan yapısıydı. Google'ın her geliştirici için merkezi kayıt dayatması bunu yok ediyor. Bu güç merkezileşmesine karşı koymalıyız. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_7: "If you bought the hardware, you should have the final say on the software. Google's plan to block unverified apps is a direct attack on user sovereignty. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_7: "Donanımı satın aldıysan, yazılım konusunda son söz senin olmalı. Google'ın doğrulanmamış uygulamaları engelleme planı kullanıcı egemenliğine doğrudan saldırı. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
# [en] social_callout_mastodon_8: "Imagine a world where every small hobbyist or volunteer dev has to register with a global corporation just to share their work. That's the world Google is building for Android in 2026. {url} @keepandroidopen@techhub.social"
social_callout_mastodon_8: "Düşünsene: Küçük bir hobi geliştiricisi ya da gönüllü biri, yaptığı işi paylaşmak için önce küresel bir şirkete kayıt olmak zorunda. Google 2026'da Android için tam olarak böyle bir dünya kuruyor. {url} @keepandroidopen@techhub.social"
# [en] social_callout_mastodon_9: "Google's 'advanced flow' for sideloading is a deterrence mechanism, not an escape hatch. 9 steps and a 24-hour wait for software you own? No thanks. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_9: "Google'ın yandan yükleme için önerdiği 'ileri akış' bir kaçış yolu değil, caydırma mekanizması. Sahip olduğun yazılım için 9 adım ve 24 saat bekleme mi? Hayır, teşekkürler. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_10: "Over 100,000 people and 67+ organizations are standing up to Google's attempt to lock down Android. Join the fight for a truly open mobile ecosystem. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_10: "100.000'den fazla kişi ve 67+'den fazla kuruluş, Google'ın Android'i kilitleme girişimine karşı ayakta. Gerçekten açık bir mobil ekosistem için mücadeleye katıl. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
# [en] social_callout_facebook_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification. Apps from unregistered developers will be blocked on all certified Android devices worldwide. This applies to all apps, not just those on the Play Store. Learn more: {url}"
social_callout_facebook_1: "Eylül 2026'dan itibaren Google, tüm Android geliştiricilerinden merkezi kayıt ve devlet tarafından verilmiş kimlik isteyecek. Kayıt olmayan geliştiricilerin uygulamaları dünya genelindeki tüm sertifikalı Android cihazlarda engellenecek. Bu sadece Play Store uygulamaları için değil, tüm uygulamalar için geçerli. Ayrıntılar: {url}"
# [en] social_callout_facebook_2: "F-Droid, the open-source Android app store used by millions, calls Google's developer verification an \"existential threat\" to its continued operation. over 67 organizations including the EFF, FSF, and Tor Project have signed an open letter opposing the policy. Learn why this matters: {url}"
social_callout_facebook_2: "Milyonlarca kişinin kullandığı açık kaynak Android mağazası F-Droid, Google'ın geliştirici doğrulamasını faaliyetinin devamı için \"varoluşsal bir tehdit\" olarak tanımlıyor. EFF, FSF ve Tor Project dahil 67'den fazla kuruluş bu politikaya karşı açık mektubu imzaladı. Neden önemli olduğunu öğren: {url}"
# [en] social_callout_facebook_3: "Google's proposed workaround for installing unverified apps after their lockdown takes effect requires 9 steps, a mandatory 24-hour waiting period, and runs through Google Play Services (which Google can modify at any time). The community is being asked to accept a blog post as a safeguard. {url}"
social_callout_facebook_3: "Google'ın kilitleme sonrası doğrulanmamış uygulama kurulumuna sunduğu çözüm 9 adım, zorunlu 24 saat bekleme ve Google Play Hizmetleri üzerinden çalışma şartı içeriyor (Google bunu istediği an değiştirebilir). Topluluktan, güvence olarak bir blog yazısına güvenmesi bekleniyor. {url}"
# [en] social_callout_facebook_4: "Android's openness has been its defining characteristic for 17 years. Millions chose it over iPhone for exactly that reason. Google is now mandating developer registration for all apps, including those distributed outside the Play Store. Independent developers and open-source projects face the most impact. {url}"
social_callout_facebook_4: "Android'in 17 yıldır tanımlayıcı özelliği açıklığıydı. Milyonlarca kişi bu yüzden iPhone yerine Android'i seçti. Google şimdi Play Store dışı dağıtılanlar dahil tüm uygulamalar için geliştirici kaydını zorunlu kılıyor. En ağır etkiyi bağımsız geliştiriciler ve açık kaynak projeler yaşayacak. {url}"
# [en] social_callout_facebook_5: "The EFF calls app gatekeeping \"a pathway to censorship.\" Google's developer verification would give a single company the ability to block any app, from any developer, on any certified device worldwide. This sets a precedent that extends beyond Android to the future of personal computing. {url}"
social_callout_facebook_5: "EFF, uygulama kapıcılığını \"sansüre giden bir yol\" diye tanımlıyor. Google'ın geliştirici doğrulaması, tek bir şirkete dünya çapındaki sertifikalı cihazlarda herhangi bir geliştiricinin herhangi bir uygulamasını engelleme gücü veriyor. Bu, Android'in ötesinde kişisel bilişimin geleceği için tehlikeli bir emsal. {url}"
# [en] social_callout_facebook_6: "Your phone, your choice? Not if Google has its way. Starting in 2026, they plan to block any app whose developer hasn't registered and provided government ID. This affects everyone. {url}"
social_callout_facebook_6: "Telefonun, seçimin? Google'ın planı gerçekleşirse pek değil. 2026'dan itibaren geliştiricisi kayıt olmayan ve kimlik vermeyen tüm uygulamaları engellemeyi planlıyorlar. Bu herkesi etkiliyor. {url}"
# [en] social_callout_facebook_7: "Google is retroactively locking down billions of devices that were sold as open platforms. This 'rug pull' threatens independent developers and alternative app stores like F-Droid. {url}"
social_callout_facebook_7: "Google, açık platform diye satılmış milyarlarca cihazı sonradan kilitliyor. Bu 'rug pull', bağımsız geliştiricileri ve F-Droid gibi alternatif mağazaları tehdit ediyor. {url}"
# [en] social_callout_facebook_8: "Is your phone really yours? If Google can decide which apps you're allowed to install, the answer is no. Join the 100,000+ people fighting to keep Android open. {url}"
social_callout_facebook_8: "Telefonun gerçekten senin mi? Google hangi uygulamayı kurabileceğine karar veriyorsa cevap hayır. Android'i açık tutmak için mücadele eden 100.000+'den fazla kişiye katıl. {url}"
# [en] social_callout_facebook_9: "Google's 9-step process for 'allowing' unverified apps is a trap. It's designed to be so difficult that nobody uses it, giving Google total control. {url}"
social_callout_facebook_9: "Google'ın doğrulanmamış uygulamalar için sunduğu 9 adımlık süreç bir tuzak. Öyle zor tasarlandı ki kimse kullanmasın; böylece tam kontrol Google'da kalsın. {url}"
# [en] social_callout_facebook_10: "From students building their first apps to volunteers creating privacy tools, Google's mandatory registration policy will freeze out innovation. Help us keep Android open! {url}"
social_callout_facebook_10: "İlk uygulamasını yapan öğrencilerden gizlilik araçları geliştiren gönüllülere kadar herkes, Google'ın zorunlu kayıt politikası yüzünden yenilikten dışlanacak. Android'i açık tutmamıza destek ol! {url}"

