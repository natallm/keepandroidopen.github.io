# What Google is doing
# [en] what_heading: "What Google is doing"
what_heading: "ما الذي تفعله جوجل؟"
# [en] what_intro: "In August 2025, Google [announced](https://developer.android.com/developer-verification) a new requirement: starting September 2026, **every Android app developer must register centrally with Google** before their software can be installed on any device. Not just Play Store apps: all apps. This includes apps shared between friends, distributed through [F-Droid](https://f-droid.org), built by hobbyists for personal use. Independent developers, church and community groups, and hobbyists alike will all be frozen out of being able to develop and distribute their software."
what_intro: "في أغسطس 2025، أعلنت جوجل [عن](https://developer.android.com/developer-verification) متطلب جديد: بدءًا من سبتمبر 2026، **يجب على كل مطور تطبيقات أندرويد التسجيل مركزيًا مع جوجل** قبل أن يمكن تثبيت برمجياتهم على أي جهاز. ليس فقط تطبيقات متجر بلاي: جميع التطبيقات. يشمل هذا التطبيقات المشتركة بين الأصدقاء، والموزعة عبر [F-Droid](https://f-droid.org)، والمبنية بواسطة الهواة للاستخدام الشخصي. المطورون المستقلون، و الجمعيات الاهلية و المبادرات المجتمعية، والهواة على حد سواء سيتم منعهم من القدرة على تطوير وتوزيع برمجياتهم."
# [en] what_registration: "Registration requires:"
what_registration: "التسجيل يتطلب:"
# [en] what_req_fee: "Paying a fee to Google"
what_req_fee: "دفع رسوم لجوجل"
# [en] what_req_terms: "Agreeing to Google's Terms and Conditions"
what_req_terms: "الموافقة على شروط وأحكام جوجل"
# [en] what_req_id: "Surrendering your government-issued identification"
what_req_id: "تسليم هويتك الصادرة عن الحكومة"
# [en] what_req_signing: "Providing evidence of your private signing key"
what_req_signing: "تقديم إثبات لمفتاح توقيعك الخاص"
# [en] what_req_appids: "Listing all current and all future application identifiers"
what_req_appids: "عرض جميع معرفات التطبيقات الحالية والمستقبلية"
# [en] what_pullquote: "If a developer does not comply, their apps get silently blocked on every Android device worldwide."
what_pullquote: "إذا لم يمتثل المطور، سيتم حظر تطبيقاته بصمت على كل جهاز أندرويد حول العالم."

# Who this hurts
# [en] impact_heading: "Who this hurts"
impact_heading: "هذا سيؤذي من؟"
# [en] impact_you_heading: "You"
impact_you_heading: "أنت"
# [en] impact_you_p1: "You bought an Android phone because Google told you it was open. You could install what you wanted, and that was the deal."
impact_you_p1: "لقد اشتريت هاتف أندرويد لأن جوجل أخبرتك أنه مفتوح. كان بإمكانك تثبيت ما تريد، وكان هذا هو الاتفاق."
# [en] impact_you_p2: "Google is now rewriting that deal, retroactively, on hardware you already own. After the update lands, you can only run software that Google has pre-approved. On your phone: *your* property, that *you* paid for."
impact_you_p2: "جوجل تقوم الآن بإعادة كتابة تلك الصفقة بأثر رجعي على الأجهزة التي تمتلكها بالفعل. بعد وصول التحديث، يمكنك فقط تشغيل البرامج التي وافقت جوجل عليها مسبقًا. على هاتفك: *ملكك*، الذي *دفعت ثمنه*"
# [en] impact_dev_heading: "Independent developers"
impact_dev_heading: "المطورون المستقلون"
# [en] impact_dev_p1: "A teenager's first app, a volunteer's privacy tool, or a company's confidential internal beta. It doesn't matter. After September 2026, none of these can be installed without Google's blessing."
impact_dev_p1: "أول تطبيق لشاب، أداة خصوصية لمتطوع، أو نسخة تجريبية داخلية سرية لشركة. لا يهم. بعد سبتمبر 2026، لا يمكن تثبيت أي من هذه دون موافقة جوجل."
# [en] impact_dev_p2: "[F-Droid](https://f-droid.org), home to thousands of free and open-source Android apps, has called this an [\"existential\" threat](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow calls it [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
impact_dev_p2: "[F-Droid](https://f-droid.org)، الموطن لآلاف تطبيقات أندرويد المجانية والمفتوحة المصدر، وصف هذا بأنه [\"تهديد وجودي\"](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). يسميه كوري دكتوروف [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
# [en] impact_gov_heading: "Governments & civil society"
impact_gov_heading: "الحكومات والمجتمع المدني"
# [en] impact_gov_p1: "Google has a [documented track record](https://www.aclu.org/news/free-speech/app-store-oligopoly) of complying when authoritarian regimes demand app removals. With this program, the software that runs your country's institutions will exist at the pleasure of a single unaccountable foreign corporation."
impact_gov_p1: "لدى جوجل [سجل موثق](https://www.aclu.org/news/free-speech/app-store-oligopoly) في الامتثال عندما تطلب الأنظمة الاستبدادية إزالة التطبيقات. مع هذا البرنامج، ستظل البرمجيات التي تُشغل مؤسسات بلدك قائمة وفقًا لإرادة شركة أجنبية واحدة غير خاضعة للمساءلة."
# [en] impact_gov_p2: "The [EFF calls](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) app gatekeeping \"an ever-expanding pathway to internet censorship.\""
impact_gov_p2: "تصف [منظمة EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) عملية التحكم في التطبيقات بأنها \"مسار متسع باستمرار للرقابة على الإنترنت\"."

# Advanced flow
# [en] flow_heading: "Google's \"escape hatch\" is a trap door"
flow_heading: "\"منفذ الهروب\" الخاصة بجوجل هو فخ"
# [en] flow_intro: "Google says \"power users\" can [\"still install\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) unverified apps. Here's what that *actually* looks like:"
flow_intro: "تقول جوجل إن \"المستخدمين المتمرسين\" [يمكنهم تثبيت](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) التطبيقات غير الموثقة. إليكم كيف يبدو ذلك *فعليًا*:"
# [en] flow_step1: "Delve into System Settings, find Developer Options"
flow_step1: "تعمق في إعدادات النظام، وابحث عن خيارات المطور"
# [en] flow_step2: "Tap the build number **seven times** to enable Developer Mode"
flow_step2: "اضغط على رقم الإصدار **سبع مرات** لتمكين وضع المطور"
# [en] flow_step3: "Dismiss scare screens about coercion"
flow_step3: "تجاهل شاشات التحذير المخيفة بشأن التعرض للضغط أو الإجبار"
# [en] flow_step4: "Enter your PIN"
flow_step4: "أدخل رمز PIN"
# [en] flow_step5: "Restart the device"
flow_step5: "أعد تشغيل الجهاز"
# [en] flow_step6: "**Wait 24 hours**"
flow_step6: "**انتظر 24 ساعة**"
# [en] flow_step7: "Come back, dismiss more scare screens"
flow_step7: "عُدْ، وأغلق المزيد من شاشات التحذير المخيفة"
# [en] flow_step8: "Pick \"allow temporarily\" (7 days) or \"allow indefinitely\""
flow_step8: "اختر \"السماح مؤقتاً\" (7 أيام) أو \"السماح بشكل دائم\""
# [en] flow_step9: "Confirm, again, that you understand \"the risks\""
flow_step9: "أكّد مرة أخرى أنك تفهم \"المخاطر\""
# [en] flow_summary: "Nine steps. A mandatory 24-hour cooling-off period. *For installing software on a device you own.*"
flow_summary: "تسع خطوات. فترة انتظار إلزامية لمدة 24 ساعة. *لتثبيت برامج على جهاز تملكه.*"
# [en] flow_detail: "Worse: this flow runs entirely through **Google Play Services**, not the Android OS. Google can change it, tighten it, or kill it at any time, with no OS update required and no consent needed. And as of today, it hasn't shipped in any beta, preview, or canary build. It exists only as a blog post and some mockups."
flow_detail: "والأسوأ: هذه العملية تعمل بالكامل من خلال **خدمات Google Play**، وليس نظام أندرويد. يمكن لجوجل تغييرها أو تشديدها أو إنهاؤها في أي وقت، دون الحاجة إلى تحديث النظام ودون الحاجة إلى موافقة. وحتى اليوم، لم يتم إصدارها في أي نسخة تجريبية أو معاينة أو إصدار Canary. إنها موجودة فقط كمقالة مدونة وبعض النماذج الأولية."

# Precedent
# [en] precedent_heading: "This is bigger than Android"
precedent_heading: "هذا أكبر من أندرويد"
# [en] precedent_pullquote: "If Google can retroactively lock down billions of devices that were sold as open platforms, every hardware manufacturer on the planet is watching."
precedent_pullquote: "إذا كان بإمكان جوجل أن تغلق بأثر رجعي مليارات الأجهزة التي تم بيعها كمنصات مفتوحة، فإن كل مصنع للأجهزة على الكوكب يراقب."
# [en] precedent_p1: "The principle being established: **the company that made your device gets to decide, after you've bought it, what software you're allowed to run.** In software, this is called a \"rug pull\"; but at least you could always install competing software. In hardware, it is a *fait accompli* that strips you of your agency and renders you powerless to the whims of a single unaccountable gatekeeper and convicted monopolist."
precedent_p1: "المبدأ الذي يتم إرساؤه: **الشركة التي صنعت جهازك هي التي تقرر، بعد أن تشتريه، أي البرامج مسموح لك بتشغيلها.** في عالم البرمجيات، يُسمى هذا \"سحب البساط\"؛ لكن على الأقل كان بإمكانك دائمًا تثبيت برامج منافسة. أما في عالم الأجهزة، فهو *أمر واقع* يجردك من قدرتك ويجعلك تنخضع لأهواء وصيّ واحد غير مسؤول واحتكاري مُدان."
# [en] precedent_p2: "Android's openness was never just a feature. It was the *promise* that distinguished it from iPhone. Millions chose Android for exactly that reason. Google is now revoking that promise unilaterally, on devices *already* in people's pockets, because they've decided they have enough market dominance and regulatory capture to get away with it."
precedent_p2: "انفتاح أندرويد لم يكن يومًا مجرد ميزة. لقد كان *الوعد* الذي ميّزه عن الآيفون. اختار الملايين أندرويد لهذا السبب بالذات. جوجل الآن تلغي هذا الوعد من جانب واحد، على الأجهزة *التي هي بالفعل* في جيوب الناس، لأنهم قرروا أن لديهم سيطرة كافية على السوق وتأثيرًا تنظيميًا يسمح لهم بالقيام بذلك."
# [en] precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"Google's Apple envy threatens to dismantle Android's open legacy.\"*"
precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"غيرة جوجل من آبل تهدد بتفكيك الإرث المفتوح لنظام أندرويد.\"*"

# Objections
# [en] objections_heading: "But wait, isn't this..."
objections_heading: "لكن انتظر، أليس هذا..."
# [en] obj_security_q: "\"...just about security?\""
obj_security_q: "\"...فقط من أجل الأمان؟\""
# [en] obj_security_a: "The security rationale is a smokescreen. Google Play Protect already scans for malware independent of developer identity. Requiring a government ID doesn't make code safer. It makes *developers* identifiable and controllable. Malware authors can register. Indie developers and dissidents often can't. The [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) is blunt: identity-based gatekeeping is a censorship tool, not a security one."
obj_security_a: "مبرر الأمن ليس إلا ذريعة. يقوم Google Play Protect بالفعل بفحص البرمجيات الضارة بصرف النظر عن هوية المطور. طلب بطاقة هوية حكومية لا يجعل الكود أكثر أمانًا، بل يجعل *المطورين* قابلين للتحديد والتحكم. يمكن لصانعي البرمجيات الضارة التسجيل بسهولة، بينما غالبًا ما يعجز عن ذلك المطورون المستقلون والمعارضون. [منظمة EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) صريحة: التحكم في الوصول بناءً على الهوية هو أداة رقابة، لا أداة أمان."
# [en] obj_sideloading_q: "\"...still sideloading if you use the advanced flow?\""
obj_sideloading_q: "\"...لا يزال بإمكاني التثبيت الجانبي إذا استخدمت المسار المتقدم؟\""
# [en] obj_sideloading_a: "Nine steps, 24-hour wait, buried in Developer Options, delivered through a proprietary service that Google can revoke whenever they want. That's not sideloading. That's a **deterrence mechanism** built to ensure almost nobody completes it. And since it runs through Play Services rather than the OS, Google can tighten or kill it silently."
obj_sideloading_a: "تسع خطوات، انتظار 24 ساعة، مدفون في خيارات المطور، يعمل عبر خدمة مملوكة يمكن لجوجل إلغاؤها متى شاءت. هذا ليس تثبيتًا جانبيًا. هذه **آلية ردع** صُممت لضمان أن لا يكملها أحد تقريبًا. ولأنها تعمل عبر خدمات Play بدلاً من نظام التشغيل، يمكن لجوجل تشديدها أو إيقافها بصمت."
# [en] obj_hide_q: "\"...only a problem if you have something to hide?\""
obj_hide_q: "\"...مشكلة فقط إذا كان لديك ما تخفيه؟\""
# [en] obj_hide_a: "Whistleblowers, journalists, and activists under authoritarian governments will be the first victims. People in domestic abuse situations are next. All these groups have legitimate reasons to distribute or use software without putting their legal identity in a Google database. Anonymous open-source contribution is a tradition older than Google itself. This policy ends it on Android."
obj_hide_a: "المُبلِّغون عن المخالفات، والصحفيون، والناشطون تحت الأنظمة الاستبدادية سيكونون أول الضحايا. ضحايا العنف الأسري يأتون بعدهم مباشرة. لدى جميع هؤلاء أسباب مشروعة لتوزيع البرامج أو استخدامها دون وضع هويتهم القانونية في قاعدة بيانات جوجل. المساهمة في البرمجيات مفتوحة المصدر باسم مستعار تقليد أقدم من جوجل نفسها. هذه السياسة تضع حدًا لها على أندرويد."
# [en] obj_apple_q: "\"...the same thing Apple does?\""
obj_apple_q: "\"...نفس ما تفعله آبل؟\""
# [en] obj_apple_a: "Apple has been a walled garden from day one. People chose Android *because it was different*. "Apple does it too" is a race to the bottom and a weak *tu quoque* argument. And under regulatory pressure (the EU's Digital Markets Act), even Apple is being forced to open up. Google is moving in the opposite direction: attempting to further entrench its gatekeeping status."
obj_apple_a: "آبل كانت حديقة مسوّرة منذ اليوم الأول. اختار الناس أندرويد *لأنه كان مختلفًا*. \"آبل تفعل ذلك أيضًا\" هو تسابق نحو القاع وحجة ضعيفة من نوع *أنت أيضًا*. وتحت الضغط التنظيمي (قانون الأسواق الرقمية الأوروبي)، حتى آبل تُجبر على الانفتاح. أما جوجل فتسير في الاتجاه المعاكس: تحاول ترسيخ دورها كحارس بوابة أكثر فأكثر."
# [en] obj_cost_q: "\"...just $25 and some paperwork?\""
obj_cost_q: "\"...مجرد 25 دولارًا وبعض الأوراق؟\""
# [en] obj_cost_a: "Maybe, if you're a developer in the US with a credit card and a driver's license. Try being a student in sub-Saharan Africa, or a dissident in Myanmar, or a volunteer maintaining a community health app. The cost isn't only financial: you're surrendering government ID and evidence of your signing keys to a company that [routinely complies](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) with government demands to remove apps and expose developers."
obj_cost_a: "ربما، إن كنت مطورًا في الولايات المتحدة تملك بطاقة ائتمان ورخصة قيادة. لكن جرّب أن تكون طالبًا في أفريقيا جنوب الصحراء، أو معارضًا في ميانمار، أو متطوعًا يشرف على تطبيق صحة مجتمعية. التكلفة ليست مالية فحسب: أنت تسلّم هويتك الحكومية وإثبات مفاتيح توقيعك لشركة [تمتثل بشكل اعتيادي](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) لمطالب الحكومات بإزالة التطبيقات وكشف هوية المطورين."

# Fight back
# act_heading: "Fight back"
act_heading: "قاوم"
# act_everyone_heading: "Everyone"
act_everyone_heading: "للجميع"
# act_fdroid: "**[Install F-Droid](https://f-droid.org)** on every Android device you own. Alternative stores only survive if people actually use them."
act_fdroid: "**[ثبّت F-Droid](https://f-droid.org)** على كل جهاز أندرويد تملكه. المتاجر البديلة لا تبقى إلا إذا استخدمها الناس فعلًا."
# act_regulators: "**[Contact your regulators.](/cta/#consumers)** Regulators worldwide are genuinely concerned about monopolies and the centralization of power in the tech sector, and want to hear directly from individuals who are affected and concerned."
act_regulators: "**[تواصل مع الجهات التنظيمية في بلدك.](/cta/#consumers)** الجهات التنظيمية حول العالم قلقة فعلًا من الاحتكار وتمركز السلطة في قطاع التكنولوجيا، وتريد سماع الأفراد المتضررين والمهتمين مباشرة."
# act_share: "**Share this page.** Link to [keepandroidopen.org](https://keepandroidopen.org) everywhere."
act_share: "**شارك هذه الصفحة.** ضع رابط [keepandroidopen.org](https://keepandroidopen.org) في كل مكان."
# act_astroturf: "**Push back on astroturfers.** The \"well, actually...\" crowd is out in force. Don't let them set the narrative."
act_astroturf: "**صحّح المضلِّلين.** فئة \"في الحقيقة...\" منتشرة بقوة. لا تدع رواية الحدث تكون بيدهم."
# act_petition: "**[Sign the change.org petition](https://www.change.org/p/stop-google-from-limiting-apk-file-usage/)** and join the over 100,000 signatories who have made their voices heard."
act_petition: "**[وقّع على عريضة change.org](https://www.change.org/p/stop-google-from-limiting-apk-file-usage/)** وانضم إلى أكثر من 100,000 شخص رفعوا أصواتهم."
# act_letter: "**[Read and share our open letter](/open-letter)**"
act_letter: "**[اقرأ رسالتنا المفتوحة وشاركها](/open-letter)**"
# act_survey: "**Tell Google what you think of this** through their own [developer verification survey](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) <small>(for all the good that will do)</small>."
act_survey: "**أخبر جوجل برأيك** عبر [استبيان التحقق من المطورين](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) الخاص بهم <small>(هذا إن كان لرأيك أي قيمة لديهم أصلاً)</small>."
# act_dev_heading: "Developers"
act_dev_heading: "للمطورين"
# act_dev_intro: "<strong style=\"text-transform: uppercase;\">Do not sign up.</strong> Don't join the program by signing up for the Android Developer Console and agreeing to their irrevocable Terms and Conditions. Don't verify your identity. *Don't play ball.*"
act_dev_intro: "<strong style=\"text-transform: uppercase;\">لا تسجّل.</strong> لا تنضم إلى البرنامج بالتسجيل في Android Developer Console والموافقة على شروطهم وأحكامهم غير القابلة للإلغاء. لا تُثبت هويتك. *لا تنصاع لهم.*"
# act_dev_resist: "Google's plan only works if developers comply. Don't."
act_dev_resist: "خطة جوجل لا تنجح إلا إذا امتثل المطورون. لا تفعل."
# act_dev_talk: "Talk other developers and organizations out of signing up."
act_dev_talk: "اثنِ المطورين و المؤسسات الأخرى عن التسجيل."
# act_dev_warn: "Add the [FreeDroidWarn library](https://github.com/woheller69/FreeDroidWarn) to your apps to warn users."
act_dev_warn: "أضف [مكتبة FreeDroidWarn](https://github.com/woheller69/FreeDroidWarn) إلى تطبيقاتك لتنبيه المستخدمين."
# act_dev_banner: "Run a website? [Add the countdown banner.](/banner)"
act_dev_banner: "هل تدير موقعًا إلكترونيًا؟ [أضف لافتة العد التنازلي.](/banner)"
# act_google_heading: "Google employees"
act_google_heading: "لموظفي جوجل"
# act_google_text: "If you know something about the program's technical implementation or internal rationale, contact [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org) from a *non-work* machine and a *non-Gmail* account. Strict confidence guaranteed."
act_google_text: "إذا كنت تعلم شيئًا عن التنفيذ التقني للبرنامج أو المبرر الداخلي له، تواصل مع [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org) من جهاز *غير عملك* وحساب *غير Gmail*. سرية تامة مضمونة."

