# Social share messages (rotated randomly; {url} is replaced at build time)
social_callout_x_1: "ابتداءً من سبتمبر 2026، ستحجب جوجل أي تطبيق أندرويد لم يسجّل مطوره ويقدّم هويته الحكومية. يؤثر هذا على كل جهاز أندرويد في العالم. اعرف المزيد: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_2: "أعلنت جوجل أن على جميع مطوري تطبيقات أندرويد التسجيل مركزيًا ودفع رسوم وتقديم هويتهم الحكومية، وإلا حُجبت تطبيقاتهم على كل الأجهزة. أكثر من 67 منظمة تعارض هذا. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_3: "ميّز انفتاح أندرويد عن الآيفون لمدة 17 عامًا. جوجل تفرض الآن تسجيلًا إلزاميًا للمطورين لجميع التطبيقات، بما فيها تلك الموزّعة خارج متجر Play. {url} #KeepAndroidOpen"
social_callout_x_4: "F-Droid، متجر تطبيقات أندرويد مفتوح المصدر، تصف برنامج التحقق من مطوري جوجل بأنه \"تهديد وجودي\" للتوزيع البديل للتطبيقات. منظمة EFF تحذر من أنه يفتح بابًا للرقابة. {url} #KeepAndroidOpen"
social_callout_x_5: "الحل البديل الذي تقترحه جوجل لتثبيت التطبيقات غير الموثّقة يتطلب 9 خطوات، وانتظار 24 ساعة، ويعمل عبر خدمات Play التي يمكن لجوجل تعديلها في أي وقت. لم يُطلَق حتى في أي نسخة تجريبية. {url} #KeepAndroidOpen"
social_callout_x_6: "بِيع لنا أندرويد كمنصة مفتوحة. الآن تريد جوجل من كل مطور التسجيل وتقديم هويته فقط لتتمكن من تثبيت تطبيقاته. لا تدعهم يسرقون حق 3 مليار مستخدم. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_7: "إذا كنت اشتريت هاتفك، يجب أن تمتلكه. \"التحقق من المطور\" الجديد من جوجل يعني أنهم يقررون أي برامج يُسمح لك بتشغيلها على ممتلكاتك. انضم لأكثر من 100 ألف معارض: {url} #KeepAndroidOpen"
social_callout_x_8: "جوجل تحوّل أندرويد إلى حديقة مسوّرة. هوية إلزامية، ورسوم تسجيل، و 9 خطوات \"للتثبيت الجانبي\"؟ هذا ليس أمانًا، هذا احتكار. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_9: "ماذا يحدث لأول تطبيق يصنعه طالب، أو لأداة خصوصية بناها متطوع؟ التسجيل الإلزامي من جوجل يحجبهم جميعًا افتراضيًا ما لم يلتزموا بقواعد جوجل. {url} #KeepAndroidOpen"
social_callout_x_10: "17 عامًا من انفتاح أندرويد في خطر. خطة جوجل لحجب التطبيقات غير الموثّقة ضربة مباشرة لـ F-Droid والبرمجيات المستقلة. أوقفوا الإغلاق: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_linkedin_1: "ابتداءً من سبتمبر 2026، ستلزم جوجل كل مطور تطبيقات أندرويد بالتسجيل مركزيًا وتقديم هوية حكومية قبل أن يمكن تثبيت برنامجه على أي جهاز. يسري هذا على جميع التطبيقات، لا تلك الموجودة في متجر Play فحسب. أكثر من 67 منظمة وقّعت رسالة مفتوحة ترفض هذه السياسة. {url} #KeepAndroidOpen"
social_callout_linkedin_2: "انفتاح أندرويد كان ميزته التمييزية لما يقرب من عقدين. جوجل تفرض الآن تسجيلًا إلزاميًا للمطورين لجميع تطبيقات أندرويد، بما فيها تلك الموزّعة عبر متاجر بديلة كـ F-Droid. منظمة EFF ومنظمة FSF ومشروع Tor وعشرات المنظمات الأخرى تُبدي قلقًا بالغًا. {url} #KeepAndroidOpen"
social_callout_linkedin_3: "سيمنح برنامج التحقق من المطورين من جوجل شركةً واحدة القدرة التقنية على حجب أي تطبيق، من أي مطور، على أي جهاز أندرويد معتمد في العالم. يؤثر هذا على المطورين المستقلين والمشاريع مفتوحة المصدر ومبدأ أنك تتحكم في البرامج التي تعمل على الأجهزة التي تملكها. {url} #KeepAndroidOpen"
social_callout_linkedin_4: "تقدّر F-Droid أن 85% من تطبيقاتها مفتوحة المصدر قد تواجه مشكلات في التوزيع بموجب قواعد التحقق من المطورين الجديدة من جوجل. اشتراط الهوية الحكومية ومفاتيح التوقيع يُشكّل حواجز أمام المساهمين المجهولين والمطورين في الدول الخاضعة للعقوبات والمشاريع التطوعية. {url} #KeepAndroidOpen"
social_callout_linkedin_5: "\"المسار المتقدم\" المقترح من جوجل لتثبيت التطبيقات غير الموثّقة يتطلب 9 خطوات وانتظارًا إلزاميًا لمدة 24 ساعة، ويعمل بالكامل عبر خدمات Google Play. طُلب من المجتمع قبول مقالة مدونة باعتبارها ضمانة فعلية. لم تظهر هذه الميزة في أي إصدار تجريبي. {url} #KeepAndroidOpen"
social_callout_linkedin_6: "السيادة الرقمية على المحك. خطة جوجل لفرض تسجيل إلزامي على مطوري جميع تطبيقات أندرويد —حتى تلك الموزّعة خارج متجر Play— تُنشئ نقطة تحكم مركزية وبابًا محتملًا للرقابة على 3 مليار جهاز. {url} #KeepAndroidOpen"
social_callout_linkedin_7: "حملة \"أبقِ أندرويد مفتوحًا\" حظيت بدعم أكثر من 67 منظمة عالمية. نعارض خطة جوجل لحجب أي تطبيق لم يسجّل مطوره مركزيًا ويقدّم هويته الحكومية. اقرأ الرسالة المفتوحة: {url} #KeepAndroidOpen"
social_callout_linkedin_8: "تغيير القواعد بأثر رجعي على أجهزة يملكها الناس بالفعل سابقة خطيرة. التحقق الإلزامي من المطورين الذي تفرضه جوجل يسلب المستخدمين قدرتهم على اتخاذ القرار ويجبرهم على نظام بيئي خاضع للإدارة. {url} #KeepAndroidOpen"
social_callout_linkedin_9: "F-Droid ومنظمة EFF يُطلقان التحذير: برنامج التحقق من المطورين من جوجل \"تهديد وجودي\" لتوزيع التطبيقات البديلة. يجب أن نحمي المنظومة مفتوحة المصدر التي بنت أندرويد. {url} #KeepAndroidOpen"
social_callout_linkedin_10: "بينما تمضي جوجل قدمًا في ترسيخ دورها كحارسة بوابة، يرد المجتمع بالرفض. جهازك يجب أن يكون ملكك، لا طرفيًا مؤجَّرًا خاضعًا لقيود مفروضة بأثر رجعي. انضم إلى الحركة: {url} #KeepAndroidOpen"
social_callout_bluesky_1: "ابتداءً من سبتمبر 2026، ستحجب جوجل أي تطبيق أندرويد لم يسجّل مطوره ويقدّم هويته الحكومية. يؤثر هذا على جميع التطبيقات لا تلك الموجودة في متجر Play فحسب. F-Droid تصفه بـ\"التهديد الوجودي\". @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_2: "تطلب جوجل من جميع مطوري أندرويد التسجيل مركزيًا ودفع رسوم وتقديم هوية حكومية. ستُحجب تطبيقات المطورين غير المسجّلين بصمت. أكثر من 67 منظمة ترفض هذا. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_3: "بعد 17 عامًا من تسويق أندرويد كمنصة مفتوحة، تفرض جوجل تسجيلًا إلزاميًا للمطورين لجميع التطبيقات. المطورون المستقلون والمساهمون في المصادر المفتوحة والمتاجر البديلة كـ F-Droid يواجهون مستقبلًا مجهولًا. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_4: "الحل البديل المقترح من جوجل لتثبيت التطبيقات غير الموثّقة: 9 خطوات، وانتظار 24 ساعة، يُسلَّم عبر خدمات Play (التي يمكن لجوجل تغييرها في أي وقت دون إذن). لا يوجد سوى مقالة مدونة تُثبت وجوده. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_5: "تحذّر EFF من أن التحقق من مطوري جوجل يُنشئ \"مسارًا للرقابة\". المطورون في الدول ذات القيود والمساهمون المجهولون في المصادر المفتوحة والقائمون على أدوات الخصوصية من بين الأكثر تضررًا. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_6: "خطة جوجل لحجب التطبيقات غير الموثّقة هي \"سحب للبساط\" من تحت 3 مليار شخص اختاروا أندرويد لانفتاحه. لا تدعهم يحوّلون هاتفك إلى حديقة مسوّرة. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_7: "التملّك يعني التحكم. إذا كانت جوجل تستطيع حجب أي تطبيق على هاتفك، فأنت لا تملكه فعلًا. انضم إلى 100,000+ شخص يناضلون للإبقاء على أندرويد مفتوحًا. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_8: "تسجيل هوية إلزامي لكل مطور تطبيقات؟ هذا حلم الرقباء وكابوس الخصوصية. احمِ الويب المفتوح والهواتف المفتوحة. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_9: "التثبيت الجانبي لا ينبغي أن يستلزم انتظار 24 ساعة وعقبة من 9 خطوات. \"المسار المتقدم\" من جوجل مُصمَّم للفشل. أبقِ أندرويد مفتوحًا! @keepandroidopen.bsky.social {url}"
social_callout_bluesky_10: "من F-Droid إلى المطورين المستقلين، المنظومة الكاملة لأندرويد مهددة بمرسوم التسجيل الإلزامي الجديد من جوجل. اعرف لماذا تقول 67+ منظمة لا: {url}"
social_callout_mastodon_1: "ابتداءً من سبتمبر 2026، ستلزم جوجل كل مطور تطبيقات أندرويد بالتسجيل مركزيًا وتقديم هوية حكومية وتسليم مفاتيح التوقيع. ستُحجب تطبيقات المطورين غير المسجّلين على جميع الأجهزة المعتمدة في العالم. يهدد هذا F-Droid وتوزيع المصادر المفتوحة واستقلالية المستخدم. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_2: "يشترط برنامج التحقق من مطوري أندرويد من جوجل تقديم هوية حكومية ومفاتيح توقيع ورسومًا من كل مطور يريد أن يكون برنامجه قابلًا للتثبيت على أندرويد. EFF تصف التحكم في التطبيقات بأنه \"مسار للرقابة\". أكثر من 67 منظمة وقّعت رسالة مفتوحة ترفضه. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_3: "F-Droid، الموطن لآلاف تطبيقات أندرويد المجانية ومفتوحة المصدر، تصف التحقق من مطوري جوجل بأنه \"تهديد وجودي\" لاستمرارها. يُقدَّر أن 85% من تطبيقات F-Droid قد تواجه مشكلات في التوزيع لأن مطوريها وقّعوا عبر F-Droid لا عبر جوجل. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_4: "الحل البديل المقترح من جوجل للتثبيت الجانبي للتطبيقات غير الموثّقة يتطلب 9 خطوات وانتظارًا إلزاميًا لمدة 24 ساعة، ويُسلَّم عبر خدمات Google Play لا نظام أندرويد. يمكن لجوجل تعديله أو إزالته في أي وقت دون موافقة المستخدم. لم يُطلَق في أي نسخة تجريبية. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_5: "التسجيل الإلزامي للمطورين الذي تفرضه جوجل على أندرويد يثير قلقًا بالغًا لمطوري الدول الخاضعة للعقوبات والمساهمين المجهولين في المصادر المفتوحة وكل من يبني أدوات للخصوصية أو الأمان. لدى جوجل تاريخ موثّق في الامتثال لمطالب الحكومات بإزالة التطبيقات وكشف هوية المطورين. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_6: "قوة أندرويد كانت في طبيعته اللامركزية. خطة جوجل لفرض تسجيل مركزي على كل مطور تطبيق فردي تدمّر هذه الطبيعة. يجب أن نقاوم هذا التمركز للسلطة. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_7: "إذا اشتريت الجهاز، فينبغي أن تملك القرار الأخير في شأن البرامج. خطة جوجل لحجب التطبيقات غير الموثّقة هجوم مباشر على سيادة المستخدم. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_8: "تخيّل عالمًا يضطر فيه كل هاوٍ صغير أو مطور متطوع إلى التسجيل لدى شركة عملاقة مجرد لمشاركة عمله. هذا هو العالم الذي تبنيه جوجل لأندرويد عام 2026. {url} @keepandroidopen@techhub.social"
social_callout_mastodon_9: "\"المسار المتقدم\" من جوجل للتثبيت الجانبي هو آلية ردع لا مخرج حقيقي. 9 خطوات وانتظار 24 ساعة لتشغيل برامج تملكها؟ لا شكرًا. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_10: "أكثر من 100,000 شخص و67+ منظمة يتصدّون لمحاولة جوجل إغلاق أندرويد. انضم إلى النضال من أجل منظومة هواتف مفتوحة حقًا. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_facebook_1: "ابتداءً من سبتمبر 2026، ستلزم جوجل كل مطور تطبيقات أندرويد بالتسجيل مركزيًا وتقديم هوية حكومية. ستُحجب تطبيقات المطورين غير المسجّلين على جميع أجهزة أندرويد المعتمدة في العالم. يسري هذا على جميع التطبيقات لا تلك الموجودة في متجر Play فحسب. اعرف المزيد: {url}"
social_callout_facebook_2: "F-Droid، متجر تطبيقات أندرويد مفتوح المصدر الذي يستخدمه الملايين، تصف التحقق من مطوري جوجل بأنه \"تهديد وجودي\" لاستمرارها. أكثر من 67 منظمة من بينها EFF وFSF ومشروع Tor وقّعت رسالة مفتوحة ترفض السياسة. اعرف سبب الأهمية: {url}"
social_callout_facebook_3: "الحل البديل المقترح من جوجل لتثبيت التطبيقات غير الموثّقة بعد بدء الإغلاق يتطلب 9 خطوات وانتظارًا إلزاميًا لمدة 24 ساعة، ويعمل عبر خدمات Google Play (التي يمكن لجوجل تعديلها في أي وقت). يُطلب من المجتمع قبول مقالة مدونة باعتبارها ضمانة. {url}"
social_callout_facebook_4: "انفتاح أندرويد كان طابعه المميز لمدة 17 عامًا. اختاره الملايين على الآيفون لهذا السبب تحديدًا. جوجل تفرض الآن تسجيلًا إلزاميًا للمطورين لجميع التطبيقات، بما فيها تلك الموزّعة خارج متجر Play. المطورون المستقلون ومشاريع المصادر المفتوحة الأشد تضررًا. {url}"
social_callout_facebook_5: "تصف EFF التحكم في التطبيقات بأنه \"مسار متسع باستمرار لرقابة الإنترنت\". سيمنح التحقق من مطوري جوجل شركةً واحدة القدرة على حجب أي تطبيق، من أي مطور، على أي جهاز معتمد في العالم. يُرسي هذا سابقة تتخطى أندرويد إلى مستقبل الحوسبة الشخصية. {url}"
social_callout_facebook_6: "هاتفك، خيارك؟ ليس إذا كان الأمر لجوجل. ابتداءً من 2026، تعتزم حجب أي تطبيق لم يسجّل مطوره ويقدّم هويته الحكومية. يؤثر هذا على الجميع. {url}"
social_callout_facebook_7: "جوجل تغلق بأثر رجعي مليارات الأجهزة التي بِيعت كمنصات مفتوحة. هذا \"سحب للبساط\" يهدد المطورين المستقلين والمتاجر البديلة كـ F-Droid. {url}"
social_callout_facebook_8: "هل هاتفك فعلًا ملكك؟ إذا كانت جوجل تقرر أي التطبيقات يُسمح لك بتثبيتها، فالجواب لا. انضم إلى 100,000+ شخص يناضلون للإبقاء على أندرويد مفتوحًا. {url}"
social_callout_facebook_9: "مسار جوجل المؤلف من 9 خطوات \"للسماح\" بالتطبيقات غير الموثّقة هو فخ. صُمِّم ليكون صعبًا جدًا لدرجة أن لا أحد يستخدمه، مما يمنح جوجل السيطرة الكاملة. {url}"
social_callout_facebook_10: "من الطلاب الذين يبنون أول تطبيقاتهم إلى المتطوعين الذين يصنعون أدوات الخصوصية، سياسة التسجيل الإلزامي من جوجل ستجمّد الابتكار. ساعدنا في إبقاء أندرويد مفتوحًا! {url}"

