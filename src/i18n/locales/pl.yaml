# Social share messages (rotated randomly; {url} is replaced at build time)
# [en] social_callout_x_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects every Android device worldwide. Learn more: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_1: >-
  Od września 2026 r. Google będzie blokować wszystkie aplikacje na Androida, których twórcy nie zarejestrowali się i nie podali numeru dokumentu tożsamości. Dotyczy to wszystkich urządzeń z systemem Android na całym świecie. Dowiedz się więcej: {url} @AlteredDeal #KeepAndroidOpen
# [en] social_callout_x_2: "Google announced that all Android app developers must register centrally, pay a fee, and submit government ID, or their apps will be blocked on every device. over 67 organizations oppose this. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_2: >-
  Google ogłosiło, że wszyscy twórcy aplikacji na Androida muszą zarejestrować się w scentralizowanym systemie, uiścić opłatę i przedłożyć dokument tożsamości, w przeciwnym razie ich aplikacje zostaną zablokowane na wszystkich urządzeniach. Ponad 67 organizacji sprzeciwia się tej decyzji. {url} @AlteredDeal #KeepAndroidOpen
# [en] social_callout_x_3: "Android's openness distinguished it from iPhone for 17 years. Google is now requiring mandatory developer registration for all apps, including those distributed outside the Play Store. {url} #KeepAndroidOpen"
social_callout_x_3: >-
  Przez 17 lat to właśnie otwartość systemu Android odróżniała go od iPhone'a. Obecnie Google wprowadza obowiązkową rejestrację deweloperów dla wszystkich aplikacji, w tym tych dystrybuowanych poza Sklepem Play. {url} #KeepAndroidOpen
# [en] social_callout_x_4: "F-Droid, the open-source Android app store, calls Google's developer verification an \"existential threat\" to alternative app distribution. The EFF warns it creates a pathway to censorship. {url} #KeepAndroidOpen"
social_callout_x_4: >-
  F-Droid, sklep z otwartoźródłowymi aplikacjami na Androida, określa proces weryfikacji deweloperów wprowadzony przez Google jako 'egzystencjalne zagrożenie' dla alternatywnych kanałów dystrybucji aplikacji. Organizacja EFF ostrzega, że otwiera to drogę do cenzury. {url} #KeepAndroidOpen
# [en] social_callout_x_5: "Google's proposed workaround for installing unverified apps requires 9 steps, a 24-hour wait, and runs through Play Services, which Google can modify at any time. It hasn't shipped in any beta. {url} #KeepAndroidOpen"
social_callout_x_5: >-
  Proponowane przez Google obejście umożliwiające instalowanie niezweryfikowanych aplikacji wymaga wykonania 9 kroków, 24-godzinnego oczekiwania i działa w oparciu o Usługi Google Play, które Google może w dowolnym momencie zmodyfikować. Nie pojawiło się ono w żadnej wersji beta. {url} #KeepAndroidOpen
# [en] social_callout_x_6: "Android was sold to us as an open platform. Now Google wants every developer to register and submit ID just to let you install their apps. Don't let them rug-pull 3 billion users. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_6: >-
  Android był nam przedstawiany jako otwarta platforma. Teraz Google chce, żeby każdy programista się rejestrował i podawał swoje dane, tylko po to, żeby można było zainstalować jego aplikacje. Nie pozwólmy im oszukać 3 miliardów użytkowników. {url} @AlteredDeal #KeepAndroidOpen
# [en] social_callout_x_7: "If you bought your phone, you should own it. Google's new 'developer verification' means they decide what software you're allowed to run on your own property. Join the 100k+ signers opposing this: {url} #KeepAndroidOpen"
social_callout_x_7: >-
  Jeśli kupiłeś swój telefon, to powinien on należeć do Ciebie. Nowa 'weryfikacja programistów' Google'a oznacza, że to oni decydują, jakie oprogramowanie możesz uruchamiać na swojej własności. Dołącz do ponad 100 tysięcy osób, które sprzeciwiają się temu: {url} #KeepAndroidOpen
# [en] social_callout_x_8: "Google is turning Android into a walled garden. Mandatory ID, registration fees, and a 9-step 'advanced flow' for sideloading? That's not security, it's a monopoly move. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_8: >-
  Google zamienia Androida w zamknięty ekosystem. Obowiązkowa identyfikacja, opłaty rejestracyjne i dziewięciostopniowa 'zaawansowana procedura' przy instalacji aplikacji z innych źródeł? To nie jest kwestia bezpieczeństwa, to posunięcie monopolisty. {url} @AlteredDeal #KeepAndroidOpen
# [en] social_callout_x_9: "What happens to the student's first app, or the privacy tool built by a volunteer? Google's mandatory registration blocks them all by default unless they play by Google's rules. {url} #KeepAndroidOpen"
social_callout_x_9: >-
  Co stanie się z pierwszą aplikacją ucznia lub narzędziem do ochrony prywatności stworzonym przez wolontariusza? Obowiązkowa rejestracja Google'a domyślnie blokuje je wszystkie, chyba że będą działać zgodnie z zasadami Google. {url} #KeepAndroidOpen
# [en] social_callout_x_10: "17 years of Android openness are at risk. Google's plan to block unverified apps is a direct hit on F-Droid and independent software. Stop the lockdown: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_10: >-
  17 lat otwartości Androida jest w niebezpieczeństwie. Plan Google'a dotyczący blokowania niezweryfikowanych aplikacji stanowi bezpośredni cios dla F-Droida i niezależnego oprogramowania. Powstrzymajcie tę blokadę: {url} @AlteredDeal #KeepAndroidOpen
# [en] social_callout_linkedin_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification before their software can be installed on any device. This applies to all apps, not just those on the Play Store. over 67 organizations have signed an open letter opposing the policy. {url} #KeepAndroidOpen"
social_callout_linkedin_1: >-
  Od września 2026 r. firma Google będzie wymagać od wszystkich twórców aplikacji na Androida, aby zarejestrowali się w centralnym systemie i przedstawili dokument tożsamości wydany przez organ państwowy, zanim ich oprogramowanie będzie można zainstalować na jakimkolwiek urządzeniu. Dotyczy to wszystkich aplikacji, nie tylko tych dostępnych w Sklepie Play. Ponad 67 organizacji podpisało list otwarty, w którym sprzeciwiają się tej polityce. {url} #KeepAndroidOpen
# [en] social_callout_linkedin_2: "Android's openness has been its distinguishing feature for nearly two decades. Google is now mandating developer registration for all Android apps, including those distributed through alternative stores like F-Droid. The EFF, FSF, Tor Project, and dozens of other organizations are raising serious concerns. {url} #KeepAndroidOpen"
social_callout_linkedin_2: >-
  Otwartość systemu Android od prawie dwóch dekad stanowi jego cechę charakterystyczną. Google narzuca teraz obowiązek rejestracji przez programistów wszystkich aplikacji na Androida, w tym tych dystrybuowanych za pośrednictwem alternatywnych sklepów, takich jak F-Droid. Organizacje EFF, FSF, Tor Project i dziesiątki innych wyrażają poważne obawy. {url} #KeepAndroidOpen
# [en] social_callout_linkedin_3: "Google's developer verification program would give a single company the technical ability to block any app, from any developer, on any certified Android device worldwide. This affects independent developers, open-source projects, and the principle that you control the software on hardware you own. {url} #KeepAndroidOpen"
social_callout_linkedin_3: >-
  Program weryfikacji programistów od Google'a dałby jednej firmie techniczną możliwość blokowania dowolnej aplikacji, od dowolnego programisty, na każdym certyfikowanym urządzeniu z systemem Android na całym świecie. Ma to wpływ na niezależnych programistów, projekty open source oraz zasadę, zgodnie z którą użytkownik ma kontrolę nad oprogramowaniem na sprzęcie, który posiada. {url} #KeepAndroidOpen
# [en] social_callout_linkedin_4: "F-Droid estimates 85% of its open-source apps could face distribution issues under Google's new developer verification rules. The requirement for government ID and signing keys creates barriers for anonymous contributors, developers in sanctioned countries, and volunteer-maintained projects. {url} #KeepAndroidOpen"
social_callout_linkedin_4: >-
  F-Droid szacuje, że 85% aplikacji o otwartym kodzie źródłowym z ich sklepu może napotkać problemy z dystrybucją w związku z nowymi zasadami weryfikacji deweloperów wprowadzonymi przez Google. Wymóg przedstawienia dokumentu tożsamości wydanego przez państwo oraz kluczy podpisujących stanowi przeszkodę dla anonimowych współtwórców, deweloperów z krajów objętych sankcjami oraz projektów utrzymywanych przez wolontariuszy. {url} #KeepAndroidOpen
# [en] social_callout_linkedin_5: "Google's proposed \"advanced flow\" for sideloading unverified apps requires 9 steps, a mandatory 24-hour waiting period, and runs entirely through Google Play Services. The community has been asked to accept a blog post as a functional safeguard. It has not appeared in any beta release. {url} #KeepAndroidOpen"
social_callout_linkedin_5: >-
  Propozycja Google'a dotycząca „zaawansowanej procedury” instalowania niezweryfikowanych aplikacji z innych źródeł wymaga wykonania 9 kroków, obejmuje obowiązkowy 24-godzinny okres oczekiwania i odbywa się w całości za pośrednictwem Usług Google Play. Społeczność została wezwana do zaakceptowania wpisu na blogu jako skutecznego zabezpieczenia. Nie pojawiło się to w żadnej wersji beta. {url} #KeepAndroidOpen
# [en] social_callout_linkedin_6: "Digital sovereignty is at stake. Google's plan to mandate developer registration for all Android apps—even those distributed outside the Play Store—creates a central point of control and potential censorship for 3 billion devices. {url} #KeepAndroidOpen"
social_callout_linkedin_6: >-
  Cyfrowa niezależność stoi pod znakiem zapytania. Google planuje wprowadzić obowiązkową rejestrację twórców wszystkich aplikacji na Androida – nawet tych dystrybuowanych poza Sklepem Play – co stworzy centralny punkt kontroli i potencjalnej cenzury dla 3 miliardów urządzeń. {url} #KeepAndroidOpen
# [en] social_callout_linkedin_7: "The 'Keep Android Open' campaign has gained support from over 67 global organizations. We are opposing Google's plan to block any application whose developer hasn't registered centrally and provided government ID. Read the open letter: {url} #KeepAndroidOpen"
social_callout_linkedin_7: >-
  Kampania „Keep Android Open” zyskała poparcie ponad 67 organizacji z całego świata. Sprzeciwiamy się planowi firmy Google, który zakłada blokowanie wszelkich aplikacji, których twórcy nie zarejestrowali się w centralnym systemie i nie przedstawili dokumentu tożsamości. Przeczytaj list otwarty: {url} #KeepAndroidOpen
# [en] social_callout_linkedin_8: "Retroactively changing the rules for hardware people already own is a dangerous precedent. Google's mandatory developer verification strips users of their agency and forces them into a managed ecosystem. {url} #KeepAndroidOpen"
social_callout_linkedin_8: >-
  Zmiana zasad z mocą wsteczną w odniesieniu do sprzętu, który użytkownicy już posiadają, stanowi niebezpieczny precedens. Wymagana przez firmę Google weryfikacja deweloperów pozbawia użytkowników możliwości samodzielnego decydowania i zmusza ich do funkcjonowania w kontrolowanym ekosystemie. {url} #KeepAndroidOpen
# [en] social_callout_linkedin_9: "F-Droid and the EFF have raised the alarm: Google's developer verification program is an 'existential threat' to alternative app distribution. We must protect the open-source ecosystem that built Android. {url} #KeepAndroidOpen"
social_callout_linkedin_9: >-
  F-Droid i EFF podniosły alarm: program weryfikacji programistów od Google'a stanowi 'egzystencjalne zagrożenie' dla alternatywnych kanałów dystrybucji aplikacji. Musimy chronić ekosystem oprogramowania open source, na którym opiera się system Android. {url} #KeepAndroidOpen
# [en] social_callout_linkedin_10: "As Google moves to further entrench its gatekeeping status, the community is pushing back. Your device should be your property, not a leased terminal subject to retroactive restrictions. Join the movement: {url} #KeepAndroidOpen"
social_callout_linkedin_10: >-
  W trakcie gdy Google stara się jeszcze bardziej umocnić swoją pozycję kontrolną, społeczność podejmuje działania w odpowiedzi. Twoje urządzenie powinno być Twoją własnością, a nie wynajmowanym terminalem podlegającym ograniczeniom wprowadzanym z mocą wsteczną. Dołącz do ruchu: {url} #KeepAndroidOpen
# [en] social_callout_bluesky_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects all apps, not just Play Store apps. F-Droid calls it an \"existential threat.\" @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
