  Własność oznacza kontrolę. Jeśli Google może zablokować dowolną aplikację w Twoim telefonie, to tak naprawdę nie jest ona Twoją własnością. Dołącz do ponad 100 000 osób walczących o to, by system Android pozostał otwarty. @keepandroidopen.bsky.social {url}
# [en] social_callout_bluesky_8: "Mandatory ID registration for every app developer? This is a dream for censors and a nightmare for privacy. Protect the open web and open mobile. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_8: >-
  Obowiązkowa weryfikacja dowodów tożsamości dla każdego twórcy aplikacji? To marzenie cenzorów i koszmar dla prywatności. Chrońmy otwartą sieć i otwarte urządzenia mobilne. @keepandroidopen.bsky.social {url}
# [en] social_callout_bluesky_9: "Sideloading shouldn't require a 24-hour waiting period and a 9-step gauntlet. Google's 'advanced flow' is designed to fail. Keep Android Open! @keepandroidopen.bsky.social {url}"
social_callout_bluesky_9: >-
  Instalowanie aplikacji z zewnętrznych źródeł nie powinno wiązać się z 24-godzinnym okresem oczekiwania i dziewięciostopniową procedurą. 'Zaawansowana procedura' Google’a jest skazana na porażkę. Niech Android pozostanie otwarty! @keepandroidopen.bsky.social {url}
# [en] social_callout_bluesky_10: "From F-Droid to independent devs, the entire Android ecosystem is under threat from Google's new mandatory registration decree. See why 67+ orgs are saying no: {url}"
social_callout_bluesky_10: >-
  Od F-Droida po niezależnych programistów – cały ekosystem Androida jest zagrożony przez nowe rozporządzenie Google'a dotyczące obowiązkowej rejestracji. Dowiedz się, dlaczego ponad 67 organizacji sprzeciwia się temu: {url}
# [en] social_callout_mastodon_1: "Starting September 2026, Google will require every Android app developer to register centrally, provide government ID, and submit signing keys. Apps from unregistered developers will be blocked on all certified devices worldwide. This threatens F-Droid, open-source distribution, and user autonomy. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_1: >-
  Począwszy od września 2026 r. Google będzie wymagać od wszystkich twórców aplikacji na Androida rejestracji w centralnym systemie, przedstawienia dokumentu tożsamości oraz przekazania kluczy podpisujących. Aplikacje od niezarejestrowanych twórców będą blokowane na wszystkich certyfikowanych urządzeniach na całym świecie. Stanowi to zagrożenie dla F-Droida, dystrybucji otwartego oprogramowania oraz autonomii użytkowników. @keepandroidopen@techhub.social #KeepAndroidOpen {url}
# [en] social_callout_mastodon_2: "Google's Android Developer Verification program requires government ID, signing keys, and a fee for any developer who wants their software installable on Android. The EFF calls app gatekeeping \"a pathway to censorship.\" over 67 organizations have signed an open letter opposing it. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_2: >-
  Program weryfikacji programistów aplikacji na Androida od Google'a wymaga od każdego programisty, który chce, aby jego oprogramowanie można było zainstalować na urządzeniach z systemem Android, przedstawienia rządowego dokumentu tożsamości, kluczy podpisujących oraz uiszczenia opłaty. Organizacja EFF nazywa takie ograniczenia dostępu do aplikacji 'drogą do cenzury'. Ponad 67 organizacji podpisało list otwarty wyrażający sprzeciw wobec tych praktyk. @keepandroidopen@techhub.social #KeepAndroidOpen {url}
# [en] social_callout_mastodon_3: "F-Droid, home to thousands of free and open-source Android apps, calls Google's developer verification an \"existential threat.\" An estimated 85% of F-Droid apps could face distribution issues because their developers signed through F-Droid, not through Google. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_3: >-
  F-Droid, platforma oferująca tysiące bezpłatnych aplikacji na Androida opartych na otwartym oprogramowaniu, określa proces weryfikacji deweloperów wprowadzony przez Google jako 'zagrożenie egzystencjalne'. Szacuje się, że 85% aplikacji dostępnych w F-Droidzie może napotkać problemy z dystrybucją, ponieważ ich twórcy zarejestrowali się za pośrednictwem F-Droida, a nie Google. @keepandroidopen@techhub.social #KeepAndroidOpen {url}
# [en] social_callout_mastodon_4: "Google's proposed workaround for sideloading unverified apps requires 9 steps, a mandatory 24-hour waiting period, and is delivered through Google Play Services, not the Android OS. Google can modify or remove it at any time without user consent. It hasn't shipped in any beta. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_4: >-
  Proponowane przez Google obejście umożliwiające instalowanie niezweryfikowanych aplikacji wymaga wykonania 9 kroków oraz obowiązkowego 24-godzinnego okresu oczekiwania, ponadto jest dostarczane poprzez Usługi Google Play, a nie przez system operacyjny Android. Google może je w dowolnym momencie zmodyfikować lub usunąć bez zgody użytkownika. Nie pojawiło się ono w żadnej wersji beta. @keepandroidopen@techhub.social #KeepAndroidOpen {url}
# [en] social_callout_mastodon_5: "The mandatory developer registration Google is imposing on Android raises concerns for developers in sanctioned countries, anonymous open-source contributors, and anyone building privacy or security tools. Google has a documented history of complying with government demands to remove apps. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_5: >-
  Obowiązkowa rejestracja deweloperów, którą Google wprowadza w systemie Android, budzi obawy wśród twórców z krajów objętych sankcjami, anonimowych autorów otwartoźródłowego oprogramowania oraz wszystkich osób tworzących narzędzia związane z prywatnością lub bezpieczeństwem. Google ma udokumentowaną historię stosowania się do żądań rządów dotyczących usuwania aplikacji. @keepandroidopen@techhub.social #KeepAndroidOpen {url}
# [en] social_callout_mastodon_6: "Android's strength was its decentralized nature. Google's plan to mandate central registration for every single app developer destroys that. We must resist this centralization of power. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_6: >-
  Siłą Androida była jego zdecentralizowana natura. Plan Google'a, aby wprowadzić obowiązkową centralną rejestrację dla każdego twórcy aplikacji, niszczy tę zasadę. Musimy przeciwstawić się tej centralizacji władzy. @keepandroidopen@techhub.social #KeepAndroidOpen {url}
# [en] social_callout_mastodon_7: "If you bought the hardware, you should have the final say on the software. Google's plan to block unverified apps is a direct attack on user sovereignty. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_7: >-
  Jeśli kupiłeś sprzęt, to ty powinieneś mieć decydujący głos w sprawie oprogramowania. Plan Google'a dotyczący blokowania niezweryfikowanych aplikacji stanowi bezpośredni atak na suwerenność użytkowników. {url} @keepandroidopen@techhub.social #KeepAndroidOpen
# [en] social_callout_mastodon_8: "Imagine a world where every small hobbyist or volunteer dev has to register with a global corporation just to share their work. That's the world Google is building for Android in 2026. {url} @keepandroidopen@techhub.social"
social_callout_mastodon_8: >-
  Wyobraź sobie świat, w którym każdy hobbysta czy programista-wolontariusz musi zarejestrować się w międzynarodowej korporacji, by móc udostępniać swoje prace. Właśnie taki świat tworzy Google dla systemu Android w 2026 roku. {url} @keepandroidopen@techhub.social
# [en] social_callout_mastodon_9: "Google's 'advanced flow' for sideloading is a deterrence mechanism, not an escape hatch. 9 steps and a 24-hour wait for software you own? No thanks. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_9: >-
  'Zaawansowana procedura' Google'a dotycząca instalacji z innych źródeł to mechanizm odstraszający, a nie furtka. 9 kroków i 24 godziny oczekiwania na oprogramowanie, które już posiadasz? Nie, dziękuję. @keepandroidopen@techhub.social #KeepAndroidOpen {url}
# [en] social_callout_mastodon_10: "Over 100,000 people and 67+ organizations are standing up to Google's attempt to lock down Android. Join the fight for a truly open mobile ecosystem. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_10: >-
  Ponad 100 tysięcy osób i ponad 67 organizacji sprzeciwia się próbom Google'a, by ograniczyć dostęp do systemu Android. Dołącz do walki o prawdziwie otwarty ekosystem mobilny. {url} @keepandroidopen@techhub.social #KeepAndroidOpen
# [en] social_callout_facebook_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification. Apps from unregistered developers will be blocked on all certified Android devices worldwide. This applies to all apps, not just those on the Play Store. Learn more: {url}"
social_callout_facebook_1: >-
  Począwszy od września 2026 r. firma Google będzie wymagać od wszystkich twórców aplikacji na Androida centralnej rejestracji oraz przedstawienia rządowego dokumentu tożsamości. Aplikacje od niezarejestrowanych twórców będą blokowane na wszystkich certyfikowanych urządzeniach z systemem Android na całym świecie. Dotyczy to wszystkich aplikacji, nie tylko tych dostępnych w Sklepie Play. Dowiedz się więcej: {url}
# [en] social_callout_facebook_2: "F-Droid, the open-source Android app store used by millions, calls Google's developer verification an \"existential threat\" to its continued operation. over 67 organizations including the EFF, FSF, and Tor Project have signed an open letter opposing the policy. Learn why this matters: {url}"
social_callout_facebook_2: >-
  F-Droid, otwarty sklep z aplikacjami na Androida, z którego korzystają miliony użytkowników, określa proces weryfikacji deweloperów wprowadzony przez Google jako »zagrożenie egzystencjalne« dla dalszego funkcjonowania sklepu. Ponad 67 organizacji, w tym EFF, FSF i Tor Project, podpisało list otwarty wyrażający sprzeciw wobec tej polityki. Dowiedz się, dlaczego ma to znaczenie: {url}
# [en] social_callout_facebook_3: "Google's proposed workaround for installing unverified apps after their lockdown takes effect requires 9 steps, a mandatory 24-hour waiting period, and runs through Google Play Services (which Google can modify at any time). The community is being asked to accept a blog post as a safeguard. {url}"
social_callout_facebook_3: >-
  Proponowane przez Google obejście umożliwiające instalowanie niezweryfikowanych aplikacji po wejściu w życie ograniczeń wymaga wykonania 9 kroków, obowiązkowego 24-godzinnego okresu oczekiwania i odbywa się za pośrednictwem Usług Google Play (które Google może w dowolnym momencie zmodyfikować). Społeczność jest wzywana do zaakceptowania wpisu na blogu jako środków zabezpieczających. {url}
# [en] social_callout_facebook_4: "Android's openness has been its defining characteristic for 17 years. Millions chose it over iPhone for exactly that reason. Google is now mandating developer registration for all apps, including those distributed outside the Play Store. Independent developers and open-source projects face the most impact. {url}"
social_callout_facebook_4: >-
  Otwartość systemu Android jest jego cechą charakterystyczną od 17 lat. Właśnie z tego powodu miliony użytkowników wybrały go zamiast iPhone'a. Obecnie Google wprowadza obowiązkową rejestrację deweloperów dla wszystkich aplikacji, w tym tych dystrybuowanych poza Sklepem Play. Największy wpływ ta zmiana ma na niezależnych deweloperów i projekty open source. {url}
# [en] social_callout_facebook_5: "The EFF calls app gatekeeping \"a pathway to censorship.\" Google's developer verification would give a single company the ability to block any app, from any developer, on any certified device worldwide. This sets a precedent that extends beyond Android to the future of personal computing. {url}"
social_callout_facebook_5: >-
  Organizacja EFF określa kontrolę dostępu do aplikacji mianem 'drogi do cenzury'. System weryfikacji deweloperów wprowadzony przez Google dałby jednej firmie możliwość blokowania dowolnej aplikacji, stworzonej przez dowolnego dewelopera, na każdym certyfikowanym urządzeniu na całym świecie. Stwarza to precedens, który wykracza poza system Android i ma wpływ na przyszłość komputerów osobistych. {url}
# [en] social_callout_facebook_6: "Your phone, your choice? Not if Google has its way. Starting in 2026, they plan to block any app whose developer hasn't registered and provided government ID. This affects everyone. {url}"
social_callout_facebook_6: >-
  Twój telefon, twój wybór? Nie, jeśli Google postawi na swoim. Od 2026 roku planują blokować każdą aplikację, której twórca nie zarejestrował się i nie przedstawił dokumentu tożsamości. Dotyczy to wszystkich. {url}
# [en] social_callout_facebook_7: "Google is retroactively locking down billions of devices that were sold as open platforms. This 'rug pull' threatens independent developers and alternative app stores like F-Droid. {url}"
social_callout_facebook_7: >-
  Google z mocą wsteczną blokuje dostęp do miliardów urządzeń, które zostały sprzedane jako otwarte platformy. Ten 'rug pull' stanowi zagrożenie dla niezależnych programistów i alternatywnych sklepów z aplikacjami, takich jak F-Droid. {url}
# [en] social_callout_facebook_8: "Is your phone really yours? If Google can decide which apps you're allowed to install, the answer is no. Join the 100,000+ people fighting to keep Android open. {url}"
social_callout_facebook_8: >-
  Czy Twój telefon naprawdę należy do Ciebie? Jeśli to Google decyduje, jakie aplikacje możesz instalować, odpowiedź brzmi: nie. Dołącz do ponad 100 000 osób walczących o to, by system Android pozostał otwarty. {url}
# [en] social_callout_facebook_9: "Google's 9-step process for 'allowing' unverified apps is a trap. It's designed to be so difficult that nobody uses it, giving Google total control. {url}"
social_callout_facebook_9: >-
  9-etapowy proces Google'a dotyczący 'zezwalania' na niezweryfikowane aplikacje to pułapka. Jest on tak skomplikowany, że nikt z niego nie korzysta, co daje Google'owi całkowitą kontrolę. {url}
# [en] social_callout_facebook_10: "From students building their first apps to volunteers creating privacy tools, Google's mandatory registration policy will freeze out innovation. Help us keep Android open! {url}"
social_callout_facebook_10: >-
  Od studentów tworzących swoje pierwsze aplikacje po wolontariuszy opracowujących narzędzia do ochrony prywatności – polityka obowiązkowej rejestracji firmy Google zahamuje innowacje. Pomóż nam zachować otwartość systemu Android! {url}

