# What Google is doing
# [en] what_heading: "What Google is doing"
what_heading: "Co Google planuje"
# [en] what_intro: "In August 2025, Google [announced](https://developer.android.com/developer-verification) a new requirement: starting September 2026, **every Android app developer must register centrally with Google** before their software can be installed on any device. Not just Play Store apps: all apps. This includes apps shared between friends, distributed through [F-Droid](https://f-droid.org), built by hobbyists for personal use. Independent developers, church and community groups, and hobbyists alike will all be frozen out of being able to develop and distribute their software."
what_intro: >-
  W sierpniu 2025 roku, Google [ogłosiło](https://developer.android.com/developer-verification) nowy wymóg: wraz z początkiem września 2026 roku **każdy programista aplikacji na Androida musi się zarejestrować w centralnym systemie Google** zanim ich aplikacja będzie mogła być zainstalowana na jakimkolwiek urządzeniu. Dotyczy to *wszystkich* aplikacji, nie tylko tych ze Sklepu Play. Aplikacje udostępniane miedzy przyjaciółmi, dystrybuowane przez F-Droida, stworzone przez hobbystów na użytek prywatny. Niezależni programiści, kościoły i grupy społecznościowe, a także hobbyści - wszyscy zostaną pozbawieni możliwości tworzenia i dystrybucji swojego oprogramowania.
# [en] what_registration: "Registration requires:"
what_registration: "Rejestracja wymaga:"
# [en] what_req_fee: "Paying a fee to Google"
what_req_fee: "Uiszczenie opłaty do Google"
# [en] what_req_terms: "Agreeing to Google's Terms and Conditions"
what_req_terms: "Zgody na warunki korzystania z usług Google"
# [en] what_req_id: "Surrendering your government-issued identification"
what_req_id: "Przekazania dokumentu tożsamości wydanego przez państwo"
# [en] what_req_signing: "Providing evidence of your private signing key"
what_req_signing: "Przedłożenie dowodu posiadania prywatnego klucza do podpisywania"
# [en] what_req_appids: "Listing all current and all future application identifiers"
what_req_appids: "Wymienienia wszystkich obecnych i przyszłych identyfikatorów aplikacji"
# [en] what_pullquote: "If a developer does not comply, their apps get silently blocked on every Android device worldwide."
what_pullquote: >-
  Jeśli programista się nie zgodzi, ich aplikacja zostanie po cichu zablokowana na każdym urządzeniu z systemem Android na świecie.

# Who this hurts
# [en] impact_heading: "Who this hurts"
impact_heading: "Komu to zaszkodzi"
# [en] impact_you_heading: "You"
impact_you_heading: "Tobie"
# [en] impact_you_p1: "You bought an Android phone because Google told you it was open. You could install what you wanted, and that was the deal."
impact_you_p1: >-
  Twój telefon został zakupiony przez Ciebie, ponieważ Google powiedziało Ci, że jest otwarty. Można było zainstalować cokolwiek się zapragnęło i taka była umowa.
# [en] impact_you_p2: "Google is now rewriting that deal, retroactively, on hardware you already own. After the update lands, you can only run software that Google has pre-approved. On your phone: *your* property, that *you* paid for."
impact_you_p2: >-
  Google teraz przepisuje tę umowę z mocą wsteczną (retroaktywnie) na każdym urządzeniu, które już posiadasz. Po zainstalowaniu aktualizacji, będzie można uruchomić tylko te aplikacje, które Google uwcześnie zatwierdziło. Na Twoim telefonie: *Twojej* własności, zakupionej przez Ciebie.
# [en] impact_dev_heading: "Independent developers"
impact_dev_heading: "Niezależnym programistom"
# [en] impact_dev_p1: "A teenager's first app, a volunteer's privacy tool, or a company's confidential internal beta. It doesn't matter. After September 2026, none of these can be installed without Google's blessing."
impact_dev_p1: >-
  Pierwsza aplikacja nastolatka, narzędzie do ochrony prywatności stworzone przez wolontariusza, poufna wewnętrzna beta danej firmy - nie ma to żadnego znaczenia. Wraz z początkiem września 2026 roku, żadna z nich nie będzie mogła być zainstalowana bez błogosławieństwa firmy Google.
# [en] impact_dev_p2: "[F-Droid](https://f-droid.org), home to thousands of free and open-source Android apps, has called this an [\"existential\" threat](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow calls it [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
impact_dev_p2: >-
  [F-Droid](https://f-droid.org), dom dla tysiąca darmowych i otwartoźródłowych aplikacji, nazwał to ["egzystencjonalnym" zagrożeniem](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow nazywa to ["Darth Androidem"](https://pluralistic.net/2025/09/01/fulu/).
# [en] impact_gov_heading: "Governments & civil society"
impact_gov_heading: "Rządy i organizacje społeczne"
# [en] impact_gov_p1: "Google has a [documented track record](https://www.aclu.org/news/free-speech/app-store-oligopoly) of complying when authoritarian regimes demand app removals. With this program, the software that runs your country's institutions will exist at the pleasure of a single unaccountable foreign corporation."
impact_gov_p1: >-
  Firma Google ma [za sobą historię przypadków](https://www.aclu.org/news/free-speech/app-store-oligopoly), w których podporządkowywała się żądaniom autorytarnych reżimów dotyczącym usunięcia aplikacji. Wraz z wprowadzeniem powyższego programu oprogramowanie, z którego korzystają instytucje w Twoim kraju, będzie istniało tylko i wyłącznie dzięki woli jednej, niepodlegającej żadnej kontroli zagranicznej korporacji.
# [en] impact_gov_p2: "The [EFF calls](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) app gatekeeping \"an ever-expanding pathway to internet censorship.\""
impact_gov_p2: >-
  [Oragnizacja EFF nazywa](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) kontrolę dostępu do aplikacji jako "coraz szerszą drogę do cenzury w Internecie".

# Advanced flow
# [en] flow_heading: "Google's \"escape hatch\" is a trap door"
flow_heading: "\"Furtka\" od Google w rzeczywistości jest pułapką"
# [en] flow_intro: "Google says \"power users\" can [\"still install\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) unverified apps. Here's what that *actually* looks like:"
flow_intro: >-
  Google twierdzi, że "zaawansowani użytkownicy" ["wciąż mogą zainstalować"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) niezweryfikowane aplikacje. Oto jak to *naprawdę* wygląda:
# [en] flow_step1: "Delve into System Settings, find Developer Options"
flow_step1: "Przejdź do ustawień systemu i znajdź Opcje Programisty"
# [en] flow_step2: "Tap the build number **seven times** to enable Developer Mode"
flow_step2: "Kliknij numer wersji **siedem razy** by włączyć Tryb Programisty"
# [en] flow_step3: "Dismiss scare screens about coercion"
flow_step3: "Zignoruj straszne komunikaty o tym, że ktoś cię zmusza do tego"
# [en] flow_step4: "Enter your PIN"
flow_step4: "Wprowadź kod PIN"
# [en] flow_step5: "Restart the device"
flow_step5: "Uruchom ponownie urządzenie"
# [en] flow_step6: "**Wait 24 hours**"
flow_step6: "**Poczekaj 24 godziny**"
# [en] flow_step7: "Come back, dismiss more scare screens"
flow_step7: "Wróć i zignoruj kolejne straszne okienka ostrzegawcze"
# [en] flow_step8: "Pick \"allow temporarily\" (7 days) or \"allow indefinitely\""
flow_step8: "Wybierz \"zezwól tymczasowo\" (7 dni) albo \"zezwól na czas nieokreślony\""
# [en] flow_step9: "Confirm, again, that you understand \"the risks\""
flow_step9: "Potwierdź, znowu, że rozumiesz \"zagrożenia\""
# [en] flow_summary: "Nine steps. A mandatory 24-hour cooling-off period. *For installing software on a device you own.*"
flow_summary: "Dziewięć kroków. Obowiązkowy 24-godzinny okres oczekiwania. *Żeby móc zainstalować oprogramowanie na urządzeniu, które posiadasz.*"
# [en] flow_detail: "Worse: this flow runs entirely through **Google Play Services**, not the Android OS. Google can change it, tighten it, or kill it at any time, with no OS update required and no consent needed. And as of today, it hasn't shipped in any beta, preview, or canary build. It exists only as a blog post and some mockups."
flow_detail: >-
  Co gorsza: cały ten proces odbywa się poprzez **Usługi Google Play**, a nie przez system Android. Google może to zmienić, zaostrzyć lub wyłączyć w każdym momencie, bez jakiejkolwiek zgody czy konieczności aktualizacji systemu operacyjnego. Na dzień dzisiejszy, program nie pojawił się jeszcze w żadnej wersji beta, podglądowej ani eksperymentalnej. Istnieje jedynie jako wpis na blogu i kilka makiet.

# Precedent
# [en] precedent_heading: "This is bigger than Android"
precedent_heading: "To jest coś większego niż tylko Android"
# [en] precedent_pullquote: "If Google can retroactively lock down billions of devices that were sold as open platforms, every hardware manufacturer on the planet is watching."
precedent_pullquote: >-
  Jeśli Google może z mocą wsteczną zablokować miliardy urządzeń, które zostały sprzedane jako otwarte platformy, wszyscy producenci na świecie bacznie to obserwują
# [en] precedent_p1: "The principle being established: **the company that made your device gets to decide, after you've bought it, what software you're allowed to run.** In software, this is called a \"rug pull\"; but at least you could always install competing software. In hardware, it is a *fait accompli* that strips you of your agency and renders you powerless to the whims of a single unaccountable gatekeeper and convicted monopolist."
precedent_p1: >-
  Przyjęta została zasada: **to producent decyduje po zakupie, jakie oprogramowanie możesz uruchomić na urządzeniu.** W świecie oprogramowania, nazywane jest to "rug pull" (dosłownie: wyciąganie spod kogoś dywanu), ale zawsze można było zainstalować konkurencyjne oprogramowanie. W przypadku sprzętu jest to *fakt dokonany*, który pozbawia Cię możliwości wyboru i sprawia, że nie masz wpływu na kaprysy pojedynczego, nieodpowiadającego przed nikim strażnika dostępu i skazanego monopolisty. 
# [en] precedent_p2: "Android's openness was never just a feature. It was the *promise* that distinguished it from iPhone. Millions chose Android for exactly that reason. Google is now revoking that promise unilaterally, on devices *already* in people's pockets, because they've decided they have enough market dominance and regulatory capture to get away with it."
precedent_p2: >-
  Otwartość Androida nigdy nie była tylko cechą. Była *obietnicą*, która odróżniała go od iPhone'a. Miliony wybrały Androida specyficznie z tego powodu. Google teraz jednostronnie wycofuje się z tej obietnicy w odniesieniu do urządzeń, które *już są* w kieszeniach użytkowników, ponieważ uznali, że mają wystarczającą dominację rynkową i wpływ na organy regulacyjne, aby uszło to im na sucho.
# [en] precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"Google's Apple envy threatens to dismantle Android's open legacy.\"*"
precedent_arstechnica: >-
  [Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *"Zazdrość Google'a wobec Apple'a grozi zniszczeniem tradycji otwartości Androida."*

# Objections
# [en] objections_heading: "But wait, isn't this..."
objections_heading: "Ale chwila, czy nie..."
# [en] obj_security_q: "\"...just about security?\""
obj_security_q: "\"...chodzi po prostu o bezpieczeństwo?\""
# [en] obj_security_a: "The security rationale is a smokescreen. Google Play Protect already scans for malware independent of developer identity. Requiring a government ID doesn't make code safer. It makes *developers* identifiable and controllable. Malware authors can register. Indie developers and dissidents often can't. The [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) is blunt: identity-based gatekeeping is a censorship tool, not a security one."
obj_security_a: >-
  Argumenty dotyczące bezpieczeństwa to tylko przykrywka. Usługa Google Play Protect już teraz skanuje aplikacje w poszukiwaniu złośliwego oprogramowania, niezależnie od tożsamości twórcy. Wymóg posiadania dokumentu tożsamości wydanego przez państwo nie zwiększa bezpieczeństwa kodu. Sprawia, że *programistów* można zidentyfikować i kontrolować. Twórcy złośliwego oprogramowania mogą się zarejestrować. Niezależni programiści i dysydenci często nie mogą. [Oragnizacja EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) mówi wprost: kontrola dostępu oparta na tożsamości jest narzędziem cenzury, a nie zabezpieczeniem.
# [en] obj_sideloading_q: "\"...still sideloading if you use the advanced flow?\""
obj_sideloading_q: "\"...jest to wciąż instalacja z innego źródła?\""
# [en] obj_sideloading_a: "Nine steps, 24-hour wait, buried in Developer Options, delivered through a proprietary service that Google can revoke whenever they want. That's not sideloading. That's a **deterrence mechanism** built to ensure almost nobody completes it. And since it runs through Play Services rather than the OS, Google can tighten or kill it silently."
obj_sideloading_a: >-
  Dziewięć kroków, 24-godzinny okres oczekiwania, ukryte w Opcjach Programisty, dostarczone przez własnościową usługę, przez którą Google może wycofać dostęp kiedykolwiek będzie chciało. To nie jest instalacja z innego źródła. To jest **mechanizm odstraszający** stworzony, aby się upewnić, że prawie nikt go nie ukończy. Dzięki temu, że działa on poprzez Usługi Google Play a nie system operacyjny, Google może zaostrzyć go albo po cichu wyłączyć.
# [en] obj_hide_q: "\"...only a problem if you have something to hide?\""
obj_hide_q: "\"...jest to tylko problemem jeśli masz coś do ukrycia?\""
# [en] obj_hide_a: "Whistleblowers, journalists, and activists under authoritarian governments will be the first victims. People in domestic abuse situations are next. All these groups have legitimate reasons to distribute or use software without putting their legal identity in a Google database. Anonymous open-source contribution is a tradition older than Google itself. This policy ends it on Android."
obj_hide_a: >-
  Pierwszymi ofiarami będą sygnaliści, dziennikarze i aktywiści działający w krajach rządzących przez reżimy autorytarne. Kolejną grupą będą osoby doświadczające przemocy domowej. Wszystkie te grupy mają uzasadnione powody, aby rozpowszechniać lub korzystać z oprogramowania bez przekazywania swojej tożsamości do baz danych Google'a. Anonimowy wkład w rozwój oprogramowania otwartoźródłowego jest tradycją starszą niż sama firma Google. Niniejsza polityka położy kres jej kres na Androidzie. 
# [en] obj_apple_q: "\"...the same thing Apple does?\""
obj_apple_q: "\"...jest to przypadkiem to samo co robi Apple?\""
# [en] obj_apple_a: "Apple has been a walled garden from day one. People chose Android *because it was different*. \"Apple does it too\" is a race to the bottom and a weak *tu quoque* argument. And under regulatory pressure (the EU's Digital Markets Act), even Apple is being forced to open up. Google is moving in the opposite direction: attempting to further entrench its gatekeeping status."
obj_apple_a: >-
  Apple od samego początku funkcjonowało jako zamknięty ekosystem. Ludzie wybierali Androida *właśnie dlatego, że był inny*. Apple od samego początku funkcjonowało jako zamknięty ekosystem. Ludzie wybierali Androida *właśnie dlatego, że był inny*. Twierdzenie \„Apple też tak robi\” to wyścig ku upadkowi i słaby argument typu *tu quoque* (tj. "oni też"). A pod wpływem presji regulatorów (Akt o rynkach cyfrowych) nawet Apple zostało zmuszone do otwarcia się. Natomiast Google podąża w przeciwnym kierunku: próbuje jeszcze bardziej umocnić swoją pozycję kontrolną.
# [en] obj_cost_q: "\"...just $25 and some paperwork?\""
obj_cost_q: "\"...jest to po prostu 25 dolarów amerykańskich i jakaś papierologia?\""
# [en] obj_cost_a: "Maybe, if you're a developer in the US with a credit card and a driver's license. Try being a student in sub-Saharan Africa, or a dissident in Myanmar, or a volunteer maintaining a community health app. The cost isn't only financial: you're surrendering government ID and evidence of your signing keys to a company that [routinely complies](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) with government demands to remove apps and expose developers."
obj_cost_a: >-
  Może jeśli jesteś programistą w Stanach Zjednoczonych z kartą kredytową i prawem jazdy. Spróbuj jednak postawić się w sytuacji studenta z Afryki Subsaharyjskiej , dysydenta z Birmy lub wolontariusza utrzymującego aplikację służącą lokalnej społeczności. Koszt nie jest tylko finansowy: oddajesz rządowy dowód tożsamości i dowody posiadania kluczy podpisujących firmie, która [rutynowo stosuje się](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) do żądań od rządów dotyczących usuwania aplikacji i ujawniania tożsamości programistów.

# Fight back
# [en] act_heading: "Fight back"
act_heading: "Walcz"
# [en] act_everyone_heading: "Everyone"
act_everyone_heading: "Wszyscy"
# [en] act_fdroid: "**[Install F-Droid](https://f-droid.org)** on every Android device you own. Alternative stores only survive if people actually use them."
act_fdroid: >-
  **[Zainstaluj F-Droida](https://f-droid.org)** na każdym urządzeniu jakie posiadasz z systemem Android. Alternatywne sklepy mogą przetrwać tylko, jeśli ludzie będą z nich korzystali.
# [en] act_regulators: "**[Contact your regulators.](/cta/#consumers)** Regulators worldwide are genuinely concerned about monopolies and the centralization of power in the tech sector, and want to hear directly from individuals who are affected and concerned."
act_regulators: >-
  "**[Skontaktuj się z organami regulacyjnymi.](/cta/#consumers)** Organy regulacyjne na całym świecie są naprawdę zaniepokojone monopolem i centralizacją władzy w sektorze technologicznym i chcą poznać opinie bezpośrednio od osób, których ta sytuacja dotyczy i które są nią zaniepokojone.
# [en] act_share: "**Share this page.** Link to [keepandroidopen.org](https://keepandroidopen.org) everywhere."
act_share: >-
  **Udostępnij tą stronę.** Wstaw wszędzie, gdzie możesz link do [keepandroidopen.org](https://keepandroidopen.org).
# [en] act_astroturf: "**Push back on astroturfers.** The \"well, actually...\" crowd is out in force. Don't let them set the narrative."
act_astroturf: >-
  **Nie daj się zmanipulować fałszywym aktywistom.** Grupy typu "tak właściwie to..." są teraz bardzo aktywne. Nie pozwól im dyktować tonu dyskusji.
# [en] act_petition: "**[Sign the change.org petition](https://www.change.org/p/stop-google-from-limiting-apk-file-usage/)** and join the over 100,000 signatories who have made their voices heard."
act_petition: >-
  **[Podpisz petycję w serwisie change.org](https://www.change.org/p/stop-google-from-limiting-apk-file-usage/)** i dołącz do ponad 100 tysięcy osób, które wyraziły swoje zdanie.
# [en] act_letter: "**[Read and share our open letter](/open-letter)**"
act_letter: "**[Przeczytaj i udostępnij nasz list otwarty](/open-letter)**"
# [en] act_survey: "**Tell Google what you think of this** through their own [developer verification survey](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) <small>(for all the good that will do)</small>."
act_survey: >-
  **Powiedz Google'owi, co o tym myślisz** przez ich własną [ankietę o weryfikacji programistów](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) <small>(choć nie wiadomo czy to cokolwiek da)</small>."
# [en] act_dev_heading: "Developers"
act_dev_heading: "Programiści"
# [en] act_dev_intro: "<strong style=\"text-transform: uppercase;\">Do not sign up.</strong> Don't join the program by signing up for the Android Developer Console and agreeing to their irrevocable Terms and Conditions. Don't verify your identity. *Don't play ball.*"
act_dev_intro: >-
  <strong style="text-transform: uppercase;">Nie podpisuj.</strong> Nie dołączaj do programu, rejestrując się w Android Developer Console i akceptując ich nieodwołalne Warunki korzystania z usługi. Nie potwierdzaj swojej tożsamości. Nie wchodź w to.
# [en] act_dev_resist: "Google's plan only works if developers comply. Don't."
act_dev_resist: "Plan Google'a zadziała tylko jeśli programiści się do niego zastosują. Nie rób tego."
# [en] act_dev_talk: "Talk other developers and organizations out of signing up."
act_dev_talk: "Zniechęcaj innych programistów i organizacje do rejestracji."
# [en] act_dev_warn: "Add the [FreeDroidWarn library](https://github.com/woheller69/FreeDroidWarn) to your apps to warn users."
act_dev_warn: "Dodaj [bibliotekę FreeDroidWarn](https://github.com/woheller69/FreeDroidWarn) do swoich aplikacji, by ostrzec innych użytkowników."
# [en] act_dev_banner: "Run a website? [Add the countdown banner.](/banner)"
act_dev_banner: "Masz własną stronę internetową? [Dodaj poniższy baner z odliczaniem w dół.](/banner)"
# [en] act_google_heading: "Google employees"
act_google_heading: "Pracownicy firmy Google"
# [en] act_google_text: "If you know something about the program's technical implementation or internal rationale, contact [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org) from a *non-work* machine and a *non-Gmail* account. Strict confidence guaranteed."
act_google_text: >-
  Jeśli wiesz coś na temat wdrożenia technicznego programu lub jego wewnętrznych założeń, skontaktuj się z nami pod adresem [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org) z komputera *niebędącego komputerem służbowym* i z konta *innego niż Gmail*. Gwarantujemy całkowitą poufność.

