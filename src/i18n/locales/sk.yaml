# What Google is doing
what_heading: "Čo Google pripravuje"
what_intro: "V auguste 2025 Google [oznámil](https://developer.android.com/developer-verification) novú požiadavku: od septembra 2026 bude musieť byť **každý vývojár Android aplikácií centrálne registrovaný u Googlu**, aby bolo možné jeho softvér nainštalovať na zariadenie. Netýka sa to len aplikácií v Play Store, ale všetkých aplikácií. Vrátane aplikácií zdieľaných medzi známymi, distribuovaných cez [F-Droid](https://f-droid.org) alebo vytvorených pre vlastné použitie. Nezávislí vývojári, komunitné projekty aj hobby tvorcovia tak môžu stratiť možnosť svoje aplikácie šíriť."
what_registration: "Registrácia zahŕňa:"
what_req_fee: "Zaplatenie poplatku Googlu"
what_req_terms: "Súhlas s podmienkami Googlu"
what_req_id: "Poskytnutie identifikačného dokladu vydaného štátom"
what_req_signing: "Preukázanie vlastníctva podpisového kľúča"
what_req_appids: "Uvedenie všetkých existujúcich aj budúcich identifikátorov aplikácií"
what_pullquote: "Ak vývojár tieto požiadavky nesplní, jeho aplikácie budú automaticky blokované na všetkých Android zariadeniach."

# Who this hurts
impact_heading: "Koho sa to dotkne"
impact_you_heading: "Teba"
impact_you_p1: "Android si si kúpil aj preto, že bol otvorený. Mohol si si inštalovať aplikácie podľa vlastného výberu."
impact_you_p2: "Google teraz tieto podmienky spätne mení, aj pre zariadenia, ktoré už vlastníš. Po zavedení zmien bude možné spúšťať len softvér, ktorý Google schváli — na zariadení, ktoré je tvojím majetkom."
impact_dev_heading: "Nezávislí vývojári"
impact_dev_p1: "Prvá aplikácia študenta, komunitný nástroj na ochranu súkromia alebo interná firemná aplikácia. Po septembri 2026 nebude možné tieto aplikácie nainštalovať bez schválenia Googlu."
impact_dev_p2: "[F-Droid](https://f-droid.org), ktorý združuje tisíce open-source aplikácií, označil tento krok za [\"existenciálnu hrozbu\"](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow ho nazýva [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
impact_gov_heading: "Štáty a občianska spoločnosť"
impact_gov_p1: "Google má [zdokumentovanú históriu](https://www.aclu.org/news/free-speech/app-store-oligopoly) vyhovovania požiadavkám vlád na odstránenie aplikácií. Tento model znamená, že softvér používaný aj vo verejnom sektore môže byť závislý od rozhodnutí jednej súkromnej spoločnosti."
impact_gov_p2: "[EFF upozorňuje](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship), že kontrola aplikácií predstavuje \"rozširujúcu sa cestu k internetovej cenzúre.\""

# Advanced flow
flow_heading: "\"Alternatívny postup\" podľa Google je výrazným obmedzením"
flow_intro: "Google uvádza, že \"pokročilí používatelia\" si budú môcť [\"naďalej inštalovať\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) neoverené aplikácie. V praxi to znamená:"
flow_step1: "Otvoriť systémové nastavenia a nájsť možnosti pre vývojárov"
flow_step2: "Klepnutím na číslo zostavy **sedemkrát** aktivovať režim vývojára"
flow_step3: "Potvrdiť varovania"
flow_step4: "Zadať PIN"
flow_step5: "Reštartovať zariadenie"
flow_step6: "**Počkať 24 hodín**"
flow_step7: "Znovu potvrdiť varovania"
flow_step8: "Vybrať možnosť \"povoliť dočasne\" (7 dní) alebo \"povoliť trvalo\""
flow_step9: "Znovu potvrdiť porozumenie \"rizikám\""
flow_summary: "Deväť krokov a povinné 24-hodinové čakanie — pre inštaláciu aplikácie na zariadení, ktoré vlastníš."
flow_detail: "A čo je horšie, celý proces prebieha cez **Google Play Services**, nie priamo cez Android. Google ho môže kedykoľvek zmeniť alebo zrušiť bez aktualizácie systému a bez súhlasu používateľa. Zatiaľ nebol implementovaný v žiadnej testovacej verzii systému."

# Precedent
precedent_heading: "Dopady presahujú Android"
precedent_pullquote: "Ak Google môže spätne obmedziť miliardy zariadení predávaných ako otvorené, vytvára to precedens pre celý trh."
precedent_p1: "Vzniká princíp: **výrobca zariadenia rozhoduje aj po jeho kúpe, aký softvér môžeš používať.** Pri softvéri sa tento jav označuje ako \"rug pull\" — náhla zmena pravidiel v neprospech používateľa; stále však môžeš použiť alternatívny softvér. V prípade hardvéru ide o hotovú vec (*fait accompli*), ktorá používateľovi berie kontrolu a ponecháva ju v rukách spoločnosti bez efektívnej kontroly s monopolným postavením. "
precedent_p2: "Otvorenosť Androidu bola kľúčovým dôvodom jeho výberu. Bol to práve tento *prísľub*, ktorý Android odlišoval od iPhonu. Milióny ľudí si ho vybrali práve z tohto dôvodu. Google teraz tento prísľub jednostranne ruší, a to aj na zariadeniach, ktoré *už majú* používatelia vo svojich rukách, pretože vychádza z toho, že jeho trhové postavenie a vplyv na reguláciu mu to umožnia bez zásadných dôsledkov."
precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"Snaha Googlu priblížiť sa Apple môže oslabiť otvorený charakter Androidu.\"*"

# Objections
objections_heading: "Časté otázky"
obj_security_q: "\"...ide len o bezpečnosť?\""
obj_security_a: "Argument bezpečnosti je sporný. Google Play Protect už dnes kontroluje aplikácie nezávisle od identity vývojára. Požiadavka na predloženie dokladu totožnosti nevytvára bezpečnejší kód. Umožňuje však *identifikovať a kontrolovať vývojárov*. Autori škodlivého softvéru sa zaregistrovať môžu, nezávislí vývojári či disidenti často nie. Organizácia [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) to pomenúva priamo: kontrola prístupu založená na identite je nástroj cenzúry, nie bezpečnosti."
obj_sideloading_q: "\"...nemôžeš použiť sideloading (inštalácia aplikácií mimo Google Play)?\""
obj_sideloading_a: "Deväť krokov, 24-hodinové čakanie, všetko skryté v možnostiach pre vývojárov a realizované cez uzavretú službu, ktorú môže Google kedykoľvek zmeniť alebo zrušiť. To nie je sideloading. Je to **mechanizmus odrádzania**, navrhnutý tak, aby ho dokončil len málokto. A keďže funguje cez Play Services, nie priamo cez operačný systém, Google ho môže nenápadne sprísniť alebo úplne zrušiť."
obj_hide_q: "\"...je to problém len ak máš čo skrývať?\""
obj_hide_a: "Oznamovatelia nekalých praktík, novinári a aktivisti v autoritárskych režimoch budú medzi prvými obeťami. Nasledujú ľudia ohrození domácim násilím. Všetky tieto skupiny majú legitímne dôvody distribuovať alebo používať softvér bez toho, aby museli svoju právnu identitu ukladať do databázy Googlu. Anonymné prispievanie do open-source projektov je tradícia staršia než samotný Google. Táto politika ju na Androide ukončuje."
obj_apple_q: "\"...robí to aj Apple?\""
obj_apple_a: "Apple bol vždy uzavretý ekosystém. Android si používatelia vyberali *pretože bol iný*. \"Apple to robí tiež\" je súťaž o prerazenie dna a slabý argument typu *tu quoque* (a ty tiež). A pod regulačným tlakom (napríklad v dôsledku Digital Markets Act v EÚ) je aj Apple nútený viac sa otvárať. Google sa uberá opačným smerom: snaží sa ešte viac upevniť svoje postavenie \"ochrancu\"."
obj_cost_q: "\"...ide len o malý 25$ poplatok?\""
obj_cost_a: "Možno, ak si americký developer s kreditkou a vodičákom. Skús byť africkým študentom, disidentom v Mjanmarsku, alebo dobrovoľníkom spravujúcim komunitnú appku. Poplatok je len časť problému. Vývojári musia poskytnúť identifikačné údaje a ďalšie citlivé informácie firme, ktorá [bežne plní](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) požiadavky štátov na odstránenie aplikácií a odovzdáva im údaje vývojárov."

# Fight back
act_heading: "Čo môžeš urobiť?"
act_everyone_heading: "Používatelia"
act_fdroid: "**[Nainštaluj si F-Droid](https://f-droid.org)** na svoje zariadenia. Alternatívne obchody prežijú len keď ich ľudia budú používať."
act_regulators: "**[Kontaktuj regulátorov.](/cta/#consumers)** Regulátori na celom svete sa prirodzene zaujímajú o monopoly a centralizáciu moci v technologickom sektore a potrebujú to počuť od tých, ktorí sú týmito praktikami dotknutí."
act_share: "**Zdieľaj túto stránku.** Pošli linku na [keepandroidopen.org](https://keepandroidopen.org) všade." 
act_astroturf: "**Reaguj na zavádzajúce informácie.** Skupina \"No ale...\" je v plnej sile. Nedovoľte im udávať tón diskusie."
act_petition: "**[Podpíš petíciu.](https://www.change.org/p/stop-google-from-limiting-apk-file-usage/)**"
act_letter: "**[Prečítaj si a zdieľaj otvorený list.](/open-letter)**"
act_survey: "**Vyjadri svoj názor Googlu** cez ich vlastný [formulár](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) <small>(hoci to nič nezmení)</small>."

act_dev_heading: "Vývojári"
act_dev_intro: "<strong style=\"text-transform: uppercase;\">Nezapájaj sa do programu.</strong> Neregistruj sa do Android Developer Console. Neodovzdávaj im svoje dáta. *Nehraj túto hru.*  "
act_dev_resist: "Program funguje len ak sa vývojári zapoja. Ty sa nezapájaj."
act_dev_talk: "Odhovor ostatných vývojárov od registrácie."
act_dev_warn: "Pridaj [upozornenie](https://github.com/woheller69/FreeDroidWarn) pre užívateľov do aplikácií."
act_dev_banner: "Máš vlastnú stránku? [Pridaj si tam banner](/banner)."

act_google_heading: "Zamestnanci Googlu"
act_google_text: "Ak máš informácie o technickej implementácii alebo pozadí tejto zmeny, kontaktuj nás cez [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org) bezpečne z *iného ako pracovného zariadenia* cez iný *nie-Gmail* účet. Garantujeme anonymitu."

