# Hero
hero_lede: "Tvoj telefón sa čoskoro prestane správať ako tvoj."
hero_countdown_label: "dní do obmedzenia"
hero_sub: "Od septembra 2026 začne Google prostredníctvom tichej aktualizácie, bez súhlasu používateľa, **blokovať všetky Android aplikácie**, ktorých vývojár nie je registrovaný, neodsúhlasil podmienky, nezaplatil poplatok a neidentifikoval sa oficiálnymi dokladmi."
