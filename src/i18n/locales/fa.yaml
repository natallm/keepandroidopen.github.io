act_dev_intro: >-
  <strong style="text-transform: uppercase;">نام‌نویسی نکنید.</strong> با نام‌نویسی در Android Developer Console و پذیرش شرایط و قوانین غیرقابل بازگشت آن‌ها، به این برنامه نپیوندید. هویت خود را تأیید نکنید. *همکاری نکنید.*
# [en] act_dev_resist: "Google's plan only works if developers comply. Don't."
act_dev_resist: "این طرح فقط در صورتی کار می‌کند که توسعه‌دهندگان همکاری کنند. همکاری نکنید."
# [en] act_dev_talk: "Talk other developers and organizations out of signing up."
act_dev_talk: "سایر توسعه‌دهندگان و شرکت‌ها را از نام‌نویسی منصرف کنید."
# [en] act_dev_warn: "Add the [FreeDroidWarn library](https://github.com/woheller69/FreeDroidWarn) to your apps to warn users."
act_dev_warn: >-
  کتابخانه [FreeDroidWarn](https://github.com/woheller69/FreeDroidWarn) را به برنامه‌های خود اضافه کنید تا به کاربران هشدار دهید.
# [en] act_dev_banner: "Run a website? [Add the countdown banner.](/banner)"
act_dev_banner: >-
  وب‌سایت دارید؟ [بنر شمارش معکوس را اضافه کنید.](/banner)
# [en] act_google_heading: "Google employees"
act_google_heading: "کارمندان گوگل"
# [en] act_google_text: "If you know something about the program's technical implementation or internal rationale, contact [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org) from a *non-work* machine and a *non-Gmail* account. Strict confidence guaranteed."
act_google_text: >-
  اگر درباره نحوه پیاده‌سازی فنی این برنامه یا دلایل داخلی آن اطلاعاتی دارید، از طریق یک دستگاه *غیرکاری* و یک حساب‌کاربری *غیر Gmail* با [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org) تماس بگیرید. محرمانگی کامل تضمین می‌شود.

