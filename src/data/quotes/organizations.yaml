- quote: "When you set up a gate, you invite authorities to use it to block things they don't like. And when you build a database, you invite governments to try to get access."
  source: "Electronic Frontier Foundation"
  url: "https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship"
- quote: "Your Smartphone, Their Rules: How App Stores Enable Corporate-Government Censorship."
  source: "ACLU"
  url: "https://www.aclu.org/news/free-speech/app-store-oligopoly"
- quote: "Google's abusive approach to the Android operating system has only gotten worse in recent years. Software freedom is sorely lacking in the 'computers in our pockets' we call cell phones."
  source: "Free Software Foundation"
  url: "https://www.fsf.org/blogs/community/app-verification-isnt-googles-only-evil"
- quote: "This invasion of privacy of developers is not just an overreach of Google's authority over Android, but also jeopardizes developer safety."
  source: "Software Freedom Conservancy"
  url: "https://sfconservancy.org/news/2026/feb/24/keep-android-open/"
- quote: "If it were to be put into effect, the developer registration decree will end the F-Droid project and other free/open source app distribution sources as we know them today."
  source: "F-Droid"
  url: "https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html"
- quote: "We unequivocally advise against signing up for this program, now or ever."
  source: "F-Droid Open Letter"
  url: "https://f-droid.org/en/2026/02/24/open-letter-opposing-developer-verification.html"
- quote: "Google Play itself has repeatedly hosted malware, proving that corporate gatekeeping doesn't guarantee user protection."
  source: "F-Droid"
  url: "https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html"
- quote: "Forcing software creators into a centralized registration scheme is as egregious as forcing writers and artists to register with a central authority."
  source: "F-Droid"
  url: "https://f-droid.org/en/2025/10/28/sideloading.html"
- quote: "This extends Google's gatekeeping authority beyond its own marketplace into distribution channels where it has no legitimate operational role."
  source: "Open letter, over 67 signatory organizations"
  url: "https://www.theregister.com/2026/02/24/google_android_developer_verification_plan/"
- quote: "Developers who choose not to use Google's services should not be forced to register with, and submit to the judgement of, Google."
  source: "Open letter, over 67 signatory organizations"
  url: "https://reclaimthenet.org/open-letter-google-android-developer-verification-policy-criticism-2026"
- quote: "Centralised, intransparent security architectures certainly help secure monetization and the market by locking out competitors."
  source: "Nextcloud"
  url: "https://nextcloud.com/blog/open-letter-android-developer-verification-program/"
- quote: "Google is turning Android into a walled garden monopoly. We must prevent it."
  source: "Osservatorio Nessuno"
  url: "https://osservatorionessuno.org/blog/2026/02/google-is-turning-android-into-a-walled-garden-monopoly.-we-must-prevent-it/"
- quote: "Nearly 50 organizations published an open letter opposing what they characterize as a 'kill switch for the open ecosystem.'"
  source: "Tech-ish Kenya"
  url: "https://tech-ish.com/2026/03/02/google-is-closing-android-but-50-organizations-are-fighting-back/"
- quote: "Changes would impose barriers to entry for individual developers, small teams and volunteer projects by imposing fees, identity checks and terms that may not align with the principles of an open ecosystem."
  source: "Infosecurity Magazine"
  url: "https://www.infosecurity-magazine.com/news/google-android-dev-verification/"
- quote: "Google's developer verification policy creates a centralized database, controlled by a single corporation, containing the real-world identity of every person who writes software for Android."
  source: "Brave"
  url: "https://brave.com/blog/keep-android-open/"
- quote: "Developers who build privacy-first browsers, encrypted messaging apps, VPNs, Tor-based software or tools for journalists and activists would be required to upload government ID to Google. These developers are unlikely to trust Google and might stop developing for Android."
  source: "Brave"
  url: "https://brave.com/blog/keep-android-open/"
- quote: "A policy that forces every Android developer to hand their identity to Google, regardless of whether they use Google's services, makes Android a less-open and less-private platform."
  source: "Brave"
  url: "https://brave.com/blog/keep-android-open/"
- quote: "This is a profound change, one that shatters the entire premise of the Android ecosystem, long regarded as the antithesis of the closed Apple ecosystem."
  source: "AdGuard"
  url: "https://adguard.com/en/blog/google-android-app-verification-requirement-petition.html"
- quote: "For developers building tools specifically designed to protect user privacy, being forced to surrender their own personal data as a precondition for distribution is deeply contradictory."
  source: "AdGuard"
  url: "https://adguard.com/en/blog/google-android-app-verification-requirement-petition.html"
- quote: "Verification just confirms who's behind the app, it doesn't guarantee clean code or rule out malicious behavior."
  source: "AdGuard"
  url: "https://adguard.com/en/blog/google-android-app-verification-requirement-petition.html"
- quote: "Ultimately, Google's plan will stop you from owning your Android phone."
  source: "Tuta"
  url: "https://tuta.com/blog/google-wants-to-kill-android-freedom"
- quote: "While Android used to be praised for its freedom and independence, it will become a closed shop just like Apple."
  source: "Tuta"
  url: "https://tuta.com/blog/google-wants-to-kill-android-freedom"
- quote: "Google will cut off independent developers to Android if they do not register with Google first. This will kill independent platforms like F-Droid and severely impede FLOSS devs from creating apps for Android."
  source: "KDE"
  url: "https://discuss.kde.org/t/kde-supports-the-keep-android-open-campaign/44777"
- quote: "Unilaterally consolidating power to approve software into the hands of a single unaccountable corporation is a threat to digital sovereignty everywhere."
  source: "Nextcloud"
  url: "https://nextcloud.com/blog/open-letter-android-developer-verification-program/"
- quote: "A centralized global registration system for Android will inevitably chill this work. Those communities are likely to drop out of developing for Android altogether."
  source: "Electronic Frontier Foundation"
  url: "https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship"
- quote: "We are running out of time until Google becomes the gate-keeper of all users devices."
  source: "F-Droid"
  url: "https://f-droid.org/en/2026/02/24/open-letter-opposing-developer-verification.html"
