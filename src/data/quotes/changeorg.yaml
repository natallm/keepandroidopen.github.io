    I hæv been a lifeloŋ Android user because it offers ðe ability to customize it ænd sideload æpps on it wiþ ease, ænd I'm not lettiŋ google take ðæt right away! Down wiþ Big Broðer! Down wiþ mæss censoršip! Down wiþ age verificašon! Down wiþ mæss surveillance! Down wiþ ðis Digital ID tyrrany!
  author: "∞ANTHONY∞"
  lang: "en"
- content: |
    I ought to have the right to install any program I'd like on my computer without google acting as gatekeeper.
    
    F-droid's Foss nature makes it more trustworthy than the play store has ever been.
  author: "Cris"
  lang: "en"
- content: |
    O Google não tem esse direito
  author: "MIGUEL"
  lang: "pt"
- content: |
    If I wanted to use a locked garden ecosystem, I'd just buy an iPhone. Keep Android open, Google. It is also for your best commercial interest.
  author: "Oscar"
  lang: "en"
- content: |
    I've been an Android user for ever since i was 12, im about to be 30 now and i have never looked back, this is do to one main reason, freedom of choice. I always liked that i can install games and apps directly from developers most of the times. Is one of those things that set Android apart from iOS.
    
    Im not as tech savvy as some of my peers, but i do often show off the things i can do on my Android device that family and friends cant do on their iOS, so far i have been able to convince people to switch to Android and they have been enjoying the switch.
    
    I feel like iOS is finally catching up to Android in terms of customization features that Android has had for years now, but this decision to limit where i can get apps from would make the system just like iOS. I already quit from newer Samsung Galaxy devices since they got rid of features i still utilize to this day like the Headphone jack and Expandable storage. Today i use a Sony Xperia 1 V, which features both.
    
    I even did this personal experiment last year where i got an iPhone for 3 months to truly experience "the other side" and apart from getting use to the new User Interface (UI) the thought i kept having for those 3 months was "i cant get that one app im used to" or "i wish i could get this specific app, but is not on the App Store". When i finally got back to an Android phone the difference felt big, not only was i back to an UI i was so used to, i also didn't feel restricted from my choices in what apps i wanted to install.
    
    All and all, this decision to restrict Android users from where we can get our apps, is just another thing that i think will not longer set them apart from an iOS device, and there will be less reasons to choose an phone over the other, making them unexciting and eventually just all blend together.
  author: "Anthony"
  lang: "en"
- content: |
    At one point in time, IOS allowed side loading, which is how I was able to play emulators on my iPod back then. Now, much of what I remember being allowed to do is either behind a paywall, or outright prevented.
    
    I (we)moved on to Android to escape those restrictions. Don't let Android turn into IOS, and keep your identity from being stolen!
  author: "Alexander"
  lang: "en"
- content: |
    Sempre usei IPhones, mas recentemente comprei um Android (S24 Ultra) e percebi que se têm uma liberdade muito maior do que os celulares da Apple. Por conta disso sinto que irão privar o que os usuários possam fazer em relação aos apps instalados. E também parece que vão estar tentando controlar os usuários que utilizam o Android. Isso vai contra o que sempre pregaram, porque diziam ser a favor da liberdade, mas agora querem retirar essa liberdade que vocês mesmos deram aos seus usuários. Então eu e todos os outros não pedimos nada mais que reconsiderem essa decisão, porque isso é uma coisa que não irá mudar nada para vocês, mas para nós, muda muito.
  author: "Edson"
  lang: "pt"
- content: |
    As an iPhone user, Android's ability to sideload apps was the single reason I purchased an Android tablet instead of an iPad. Now that this is going away, Google can go away because they're no different than an Apple phone now.
  author: "Robert"
  lang: "en"
- content: |
    A gente precisa parar A limitação dos celulares porque isso afeta muito e antes afetava porque não dá para baixar jogos com a versão anterior e agora isso ah não a gente precisa tirar essa limitação dos apk que a Google quer fazer
  author: "Davi"
  lang: "pt"
- content: |
    After dithering for ages, I finally did what I've always wanted to do, I installed a de-googled android it's, E/Os. Its great! If google persist in this, I'm sure more non technical users will too! I also wrote to my mp & to the UK monopoly commission. Search E/Os murena see if you can too!
  author: "ed"
  lang: "en"
- content: |
    Fuck you Google
  flag: "contains profanity"
  author: "Joseph"
  lang: "en"
- content: |
    Privacy is a human right (just like the man who developed Telegram). It's a necessity too. Android is the ultimate choice because if I recall, 85% of all mobile phone sales worldwide are Android. The ability to customize at will much like a person buying a Nissan Skyline GT-R 34 has as much right as they want to modify their vehicle to their specific needs like more HP! 2000 HP sounds sexy! The same can be said about people with Android phones. Sure, not all people are into customizing but if you buy, it's yours. No excuses from greedy corporate stooges. I love the beauty of side loading 3rd party apps because of the Freedom that it comes with. Android is the choice for hackers too! Linux based kernel under the hood. If Google released the Android platform, imagine how better it would be. It's like George Hotz (who hacked the 1st iPhone) once said "Open source is the best source! Everyone profits from it". " The people should not be afraid of their government, the government should be afraid of their own people " - V from V for Vendetta. I don't remember who said "Give me liberty or give me death!". Developers should band together and be steadfast for there is strength in numbers. Even those who aren't developers!
  author: "Juan"
  lang: "en"
- content: |
    I hate corporate greed
  author: "Zach"
  lang: "it"
- content: |
    We need to keep Android open!
  author: "Caleb"
  lang: "en"
- content: |
    I am sad to see this is the way the world is going. We are slowly giving away our rights and freedom and nearly no one is noticing. Liberty dies when no one is looking
  author: "Jacob"
  lang: "en"
- content: |
    I want to own my android and not be censored.
  author: "Analisse"
  lang: "en"
- content: |
    🇧🇷:Essa desculpa de que é para proteger os usuários é meio inútil. Se eu quiser baixar ou pegar vírus, eu pego. Isso não é da conta do Google. À primeira vista, parece que perdemos o livre arbítrio com o passar dos anos, mas isso não pode avançar nem mais um pouco.
    
    🇺🇸:The excuse that this is to protect users is kind of useless. If I want to download or get viruses, I get them. This is none of Google's business. At first, it seems that we lose free will over the years, but this can't advance a little longer.
