    Sou um usuário do android entusiasta de apks e aplicativos diversos. Para mim atualmente, meu entretenimento são os diversos aplicativos que tenho a possibilidade de instalar graças a liberdade que o sistema entrega. Antigamente, costumava instalar mais aplicativos pela Google Play store,porém hoje em dia a uso tão pouco que desativo após atualizar apps necessários. O que é de fato estressante são as inúmeras tentativas da Google de bloquear a liberdade do android: tornar a pasta data somente leitura, remoção da compatibilidade com apps 32 bits, bloqueio de aplicativos com sdk mais antigo em dispositivos android mais recentes. Instalação automática e invasiva de atualizações e apps da Google mesmo com a função de atualizações automáticas desativadas, sistema Google Play que se autoatualiza durante reinício. Na minha visão, isso não é nada mais nada menos do que controle. E eu aprecio muito o controle do meu próprio dispositivo. Por isto, venho por aqui expressar minha opinião, Google LLC. Suas tentativas de impedir os usuários a cada atualização de desfrutar de seu próprio aparelho são completamente evidentes e algo que me faz suspirar, pois tudo isto é para o fim de obtenção de lucros e outros quesitos em favor de si. Os usuários não precisam de nada disso.
