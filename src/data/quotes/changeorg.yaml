  author: "Michael"
  lang: "en"
- content: |
    As a long-time Android user and small-scale app developer, I'm deeply concerned about the recent moves to restrict app sideloading. Choice has always been the core strength of Android—it's what set it apart as an open operating system. Forcing users to become "approved developers" just to build and install personal apps is impractical and unnecessary; I simply don't have the time or interest in jumping through those hoops.
    
    This shift feels like the start of broader censorship and monopolization, transforming Android into little more than a reskinned version of iOS. We chose Android for its freedom, not for anti-consumer restrictions that claim to "protect" us but really just limit our options. Existing tools like Knox and Play Integrity are already intrusive enough—now even downloading from trusted alternatives like F-Droid or other third-party stores might face scrutiny? This erodes the open spirit that defined Android from the beginning.
    
    Users deserve the right to create, modify, and install apps without sacrificing anonymity or control. It's our responsibility to educate ourselves on risks, not for big tech like Google (or GAFAM) to dictate terms. Android's appeal has always been its flexibility: I've sideloaded niche apps from lone developers for unique tasks, like custom music players and compass tools from F-Droid. I've even installed modded versions of stock apps, such as a camera tweak that added Google Pixel's Photosphere to my device—something impossible without sideloading.
    
    There's no need for Android to head in this restrictive direction; it risks becoming a "mock iOS," stripping away the very reasons people like me chose it. Let's restore customization, user freedom, and innovation to the heart of Android. Please, reconsider this path—it's not protection; it's control.
