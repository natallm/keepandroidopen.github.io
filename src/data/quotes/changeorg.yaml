- content: |
    Hi,
    
    I've been using an android phone for over a decade and, like the computers I grew up with, I've been able to choose which operating system to install and where I get my apps/programs from too. There are currently a number of app stores, beyond those provided by Apple and Google.
    
    Sadly, Google has decided (https://developer.android.com/developer-verification) to use their near-monopoly position in the android market to engage in blatantly anti-competitive behaviour by requiring app developers to register with Google. Google is trying to sell this as a "security" but this "security" marketing ploy not convincing nor does it tell the whole story.
    
    Further, having put an arbitrary barrier to competition, Google has decided to charge app developers for the "privilege" of having the app on android - where previously there was no such fee (https://keepandroidopen.org/).
    
    Google has stated they will begin this from September 2026, so action is needed promptly.
    
    As an Australian, I recall the time in 2021 when Google threatened to remove it's search engine from Australians (https://www.bbc.com/news/world-australia-55760673 and https://www.afr.com/companies/media-and-marketing/inside-google-s-mothballed-plans-to-quit-search-in-australia-20231108-p5eil7) and when Google threatened to sue the Australian government in 2025 (https://www.sbs.com.au/news/article/google-threatens-to-sue-if-youtube-is-included-in-australias-kids-social-media-ban/axud666av). Happily, we have not responded to their threats. This is another time to stand up, exercise our national sovereignty and make companies that operate in Australia, abide by applicable Australian legislation. Multi-nationals, like Google, are no exception.
