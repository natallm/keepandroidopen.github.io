  lang: "pt"
- content: |
    Prohibir el acceso libre a aplicaciones fuera de la play store es una actitud incorrecta y reprensible dado a que la reputación y publicidad del sistema operativo se sustentaba en la libertad que le daba al usuario de hacer lo que quisiera e instalar lo que quisiera, si le quitan eso al usuario android no sería más que un ios 2.0, eso sin tomar en cuenta el fraude público que acaban de cometer al decir que iban a dar marcha atrás con esa moción, y podría contar como publicidad engañosa y crimen de monopolio al forzar al usuario únicamente a usar aplicaciones aceptadas por la play store podrian ser demandados en la corte de los estados unidos y todos los paises del mundo, que digan que esto es por seguridad es una vil mentira que todos pueden ver, incluso las aplicaciones de la play store tienen virus por lo que es risible que intenten limitar nuestras opciones para evitar que los usuarios tengan algún virus cuando son varias las apps en la play store que actúan como un virus tipo adware, eso sin tomar en cuenta que hay muchos casos de aplicaciones que no se pueden instalar dentro de la play store por algun supuesto motivo de compatibilidad que en cuanto se instala en apk parece no existir, esto es una insensatez, nadie lo quiere y por eso todos estamos haciendo un llamado a esta injusticia y en caso de no ser escuchados lo másprobablees que todos cambien de version de android o los usuarios migren a otra plataforma en donde sean escuchados, como linux por ejemplo.
