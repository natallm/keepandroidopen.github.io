- content: |
    not cool google
  author: "Colin"
  lang: "en"
- content: |
    Why was Brazil the first country mentioned regarding developer verification for apps???
    
    They want control, for pleasure!???
  author: "Bruno Eduardo"
  lang: "en"
- content: |
    Google already limited us with Android apps that are from the Play Store, now they want to censor even more??
    
    What's the goal behind all this?! Control??
    
    And I'm from Brazil, why Brazil was in first place regarding this???
    
    Is the law more important than the customers?
    
    So why are they adopting ideas that Restrict consumer Freedom???
    
    Don't you think about the Well-Being of People, of the Consumer!???
    
    All of this is a Game to me, and you're Using the Controller for Pleasure, NOT for the Good of Society in General!
    
    That's why I'm Really Against this law!!
  author: "Bruno Eduardo"
  lang: "en"
- content: |
    Google and all of the human tech industry companies are trying to squeeze the freedom and very life from all of the people globally. Enough is enough.
  author: "Justin"
  lang: "en"
- content: |
    This would severely limit any reason I have to use a google certified android phone. Without the ability to easily support open source developers and tinker with my own projects -- the android phone would cease to be my "daily driver". These are our computers, and we should be able to install what we want on them. It's disrespectful to take that right away. Please reconsider removing your hardware's greatest and most consumer friendly strength in the mobile market.
  author: "Kedryn"
  lang: "en"
- content: |
    This angers me a lot. The things that I would say would only be suppressed, and I do not mean profanity.
  author: "John"
  lang: "en"
- content: |
    Android nos da libertad al usuario, hay que evitar que se convierta en iOS
  author: "Javier"
  lang: "pt"
- content: |
    No es justo que se implementen estás politicas para negar el acceso y distribución de aplicaciones hechas por desarrolladores, estoy totalmente en contra de esta petición hecha por Google. Todos y cada uno de los desarrolladores son vitales y gracias a ellos es que los mercados se mantienen de pie, sin ellos incluso Google se caería a pedazos, por eso es que alzo la voz para que no se permita negar de nuestros derechos y sea un mundo libre sin restricciones absurdas.
  author: "Sr."
  lang: "es"
- content: |
    Its is unfair and against the law of freedom and privacy.
  author: "Muhammad Asif"
  lang: "en"
- content: |
    I feel that Android needs to remain open, as it is the only other OS apart from desktop based OSes which allow for sideloading. It is up to the user to decide what they choose to install, not by Google to verify the developer of the said app the user wants to install.
  author: "Zain"
  lang: "en"
- content: |
    Once the promise of running open software on Android is broken I ll simply toss the device into the bin and never look back.
  author: "David"
  lang: "en"
- content: |
    my devices are mine and mine only. any argument otherwise is tyrannical
  author: "Dee"
  lang: "en"
- content: |
    Our phones, our choice!!!
  author: "Robert"
  lang: "en"
- content: |
    I despise ALPHABET's manipulative and self-serving gestures, toward gate-keeping OUR FREEDOMS and coyly investing themselves in THEIR PROMOTION, of our best intetests!
    
    601=VC1
  author: "Ian"
  lang: "en"
- content: |
    If you buy a computer, you rightly expect to be able any software, developed by anyone, one that device. Why should phones be any different? This is a shameless power grab by google, and a huge step backwards for user's rights
  author: "Christopher"
  lang: "en"
- content: |
    As a normal user, I prefer the ability to sideload my own ADB devices, and to use F-Droid, and to keep my rights, and my freedom to the device. This centralization is a gross attempt to restrict rights and make the system as bad as iOS. This is an attempt to control, resist it people.
  author: "Owen"
  lang: "en"
- content: |
    [ES] Es un retroceso tan importante como innecesario por parte de Google, que empuja a sus usuarios a buscar otras alternativas más seguras y privadas.
    
    [EN] It is a unnecessary and yet significant setback on Google's part, which pushes its users to look for other more secure and private alternatives.
  author: "Luis"
  lang: "es"
- content: |
    We have arrived at the point of no return surrounding our digital freedom in the face of tech's constant struggle for authoritarian control. We will simply not accept this from companies that have abused their power and control over us for decades while they claim it's to protect us, for our own good. You will NEVER regain what's been taken from you, the only option is to stop them before they succeed!
  author: "Brandon"
  lang: "en"
- content: |
    The APK file structure is just a file that installs a package, like an EXE on Windows or a variety of extensions for Linux executable files. Our phones are ours, and they are computers; we should be allowed to treat them as ours and not be beholden to big tech deciding how to use our devices for us, we want to own our hardware and use it as we see fit. Give us our devices back and keep Android open! That was the entire appeal for Android dominating the market to begin with! If Android stops being open then there would be no difference between buying an Android and buying an iPhone anymore.
  author: "Nicholas"
  lang: "en"
- content: |
    Android giving users choice has been the staple point of android OS. Removing choices like sideloading apps is not the move. I develop apps for myself, I do not want to be "an approved developer" I don't have time nor care for that. This action also is the beginning of censorship, and monopolization of android OS. Android started as an open operating system, you have simply turned it into a reskinned Apple OS. Your choice to go anti-consumer is going to hurt. You are not "protecting" anyone
  flag: "spam (duplicate content)"
  author: "Mehmet"
  lang: "en"
- content: |
    Hola buenas, Android ya no es lo que era en su momento, ahora con todo esto que esta implementando Google es una medida depredadora por acaparara todo lo que nos "pertenecía" hasta ahora, que era nuestros dispositivos y nuestros sistemas operativos, ahora ni siquiera podremos usar nuestros dispositivos como si fueran nuestros después de haberlos comprado pues tendremos que rendir cuentas con Google por algo que nos pertenece, lo que es mas que nada absurdo, el querer acaparar la mayor cantidad de personas esta acabando con la diversidad, centralizando todo en una sola empresa, que gestione lo que compramos y todo pase a través de ellos, hay que recapacitar y reconsiderar hacia donde queremos ir, ¿un mundo donde una empresa haga lo que quiera con nosotros?, ¿o un mundo donde nosotros hagamos a las empresas en base lo que necesitamos para nuestras vidas?, recordemos poner los servicios al servicio de la vida y no la vida al servicio de los servicios, Gracias, lindo día.
  author: "Cristyan"
  lang: "es"
- content: |
    We choose Android because it's open and free.
  author: "Flora"
  lang: "en"
- content: |
    Google,please don't do that. Because if you do that, millions and millions of Android users will switch to iOS, because that's the point of Android even exists! *I* switched to Android because I did not like iOS
    
    So please... Give us the freedom we want!
  author: "Eduardo"
  lang: "en"
- content: |
    DO NOT TEACH CN PHONE BRANDS LIMIT US!
  author: "浩楠"
  lang: "pt"
- content: |
    Google is literally taking away our right. Yes we CAN bypass this with there feature allowing us to install unverified apps but making us wait 24 hours BUT they are going to give our devices a "unsafe" mark stopping banking and many other apps from working the same way they did to ROOTED phones.
  author: "yousef"
  lang: "en"
- content: |
    Hopefully this movement is successful for the custom developmental purposes and devotion from the developers themselves.
  author: "Jerrod"
  lang: "en"
- content: |
    The end for digital freedom is already nearing, with all the new social media and age verification laws. The whole point of a computer is to store and process data, allowing you to do various tasks. You should be able to use a device without having to verify 50 million things and give up your identity, it's all just an excuse for the government to track you, create more censorship, and for the companies to sell more of your data. Android is an open mobile operating system, and it should stay that way. One of the main reasons I strongly prefer Android over iOS is how open Android is. This action Google is doing will not protect anything or anyone, it will just cause more drama.
  author: "Angus"
  lang: "en"
- content: |
    我喜欢Android，喜欢是因为它自由开放。但现在Google把它变成一个封闭操作系统，这是我最不喜欢的。
  author: "yiming"
  lang: "ja"
- content: |
    What Google wants to do is simply inhumane, simply unacceptable for those who use our beloved Android.
  author: "Althe"
  lang: "en"
- content: |
    Removing the feature that set android apart, the very feature that drove countless users to choose Android, is not something we will sit idly by and accept. These are our devices. We own them. Not the corporations. They do not get to tell us how we can and can't use our devices. You are not protecting us. You are attempting to control us, to build a monopoly and line your pockets more than you already have.
  author: "Jorja"
  lang: "en"
- content: |
    This is like Linux changing into Windows
  author: "A."
  lang: "en"
- content: |
    En defensa de la libertad: El corazón de Android es su comunidad. Hoy queremos alzar la voz por quienes son el verdadero motor de la innovación tecnológica: los desarrolladores de código abierto.​ Android no nació en un despacho cerrado; nació del sueño de una plataforma abierta, flexible y democrática. Durante años, miles de mentes brillantes han dedicado sus horas a crear herramientas, apps y soluciones que no buscan el beneficio corporativo, sino el bien común y la soberanía del usuario sobre su propio dispositivo. Es alarmante ver cómo, bajo la bandera de la "seguridad" o la "optimización", se plantean cambios para agosto de 2026 que amenazan con excluir a estos creadores independientes. Convertir un ecosistema que empezó siendo un campo abierto en un jardín vallado no es progreso; es una traición a los principios que hicieron de Android el sistema operativo más usado del planeta.​ Desarrolladores no estáis solos. Vuestro trabajo es la resistencia contra el monopolio de la experiencia digital. Gracias por mantener viva la chispa de la libertad en nuestros bolsillos.​
    
    "La tecnología es más potente cuando es de todos, no cuando le pertenece a unos pocos."
  author: "Txus"
  lang: "es"
- content: |
    En defensa de la libertad: El corazón de Android es su comunidad
    
    ​Hoy queremos alzar la voz por quienes son el verdadero motor de la innovación tecnológica: los desarrolladores de código abierto.
    
    ​Android no nació en un despacho cerrado; nació del sueño de una plataforma abierta, flexible y democrática. Durante años, miles de mentes brillantes han dedicado sus horas a crear herramientas, apps y soluciones que no buscan el beneficio corporativo, sino el bien común y la soberanía del usuario sobre su propio dispositivo.
    
    Es alarmante ver cómo, bajo la bandera de la "seguridad" o la "optimización", se plantean cambios para agosto de 2026 que amenazan con excluir a estos creadores independientes. Convertir un ecosistema que empezó siendo un campo abierto en un jardín vallado no es progreso; es una traición a los principios que hicieron de Android el sistema operativo más usado del planeta.
    
    ​Desarrolladores no estáis solos. Vuestro trabajo es la resistencia contra el monopolio de la experiencia digital. Gracias por mantener viva la chispa de la libertad en nuestros bolsillos.
    
    ​"La tecnología es más potente cuando es de todos, no cuando le pertenece a unos pocos."
  author: "Txus"
  lang: "es"
- content: |
    I have always used android for this exact reason. For the freedom to do whatever I want on my device that I paid for.
  author: "Juan"
  lang: "en"
- content: |
    This it’s important to all and Google shouldn’t be doing this our company overlords can’t take more from us we need to stand up
  author: "James"
  lang: "en"
- content: |
    As someone who writes and uses my own APKs to make my device even more useful to me, this lockdown would be a deal breaker for my use of the Google Android platform
  author: "Luke"
  lang: "en"
- content: |
    Se os governantes do meu país não fossem tão corruptos, veriam que está seria a hora exata de se desvencilhar do Google por completo e assim gerar várias receitas há quem desenvolve apps, há quem desenvolve aparelhos, há quem desenvolve infraestruturas de telecomunicação. Já existe um OS em funcionamento em alguns smartphones há um tempo, livre de qualquer app do Google, mas ainda bastante sufocado pela falta de conhecimento dos usuários, apostem nele, criem uma Big Tech voltada somente para este sistema operacional e de código aberto, espalhem-se, criem uma única loja onde os desenvolvedores sejam obrigados a se registrarem com apenas um dos seus documentos (CPF ou ID) e endereço residencial, somente para a big tech fundada, gratuitamente e em sigilo absoluto. Assim esse Monopólio chamado Google começaria a ruir rapidamente e eles sabem disso! A única coisa é que eles esquecem é que o Android tem como Kernel o Linux.
  author: "Emerson"
  lang: "pt"
- content: |
    Não podem mudar o modelo do android
  author: "Mateus"
  lang: "pt"
- content: |
    If Google "Walled gardens" Android, I will never buy a phone with their OS ever again. That's literally the only reason people buy Android, is because it is open not locked down like Apple. F.A.F.O. how much money you'll really lose Google.
  author: "Brandon"
  lang: "en"
- content: |
    In the eyes of serious digital Android users & developers this is an another blatant attempt by Google to monopolize & obtain total centralized control over our application space. Shockingly this mirrors a similar path seen within despotic nations, nations who are our adversaries. History has already proven this is a slippery slope. These actions will take away many jobs from from the countless Android developers & truly harm the intended purpose of Android in America.
    
    We must pick, freedom for the common people or tyranny to help a mega corporation in this new digital age.
  author: "Phillip"
  lang: "en"
- content: |
    Esta mudança causará o término do desenvolvimento de diversos projetos criados de forma independente. Novos criadores serão desmotivados a publicar seus projetos, reduzindo significativamente a aparição de soluções específicas, que podem existir por conta de um sistema que permite a publicação e utilização simples dos APKs. Os requerimentos para os desenvolvedores e o rigoroso processo direcionado ao usuário, tornarão menos acessível um dos principais pontos que torna o Android a escolha de milhões de usuários e que colabora para criar a imagem de um sistema com mais liberdade. O problema de segurança dos usuários em relação aos APKs maliciosos pode ser resolvido sem aplicar um bloqueio que afetará toda a comunidade dos aplicativos independentes.
  author: "Kauan Lucas"
  lang: "pt"
- content: |
    They never let us have nice things, i hope we win.
  author: "Victor"
  lang: "en"
- content: |
    Just because old fogeys keep sending their life's savings to "princes" in Africa or "tech support assistants" in southeast Asia, does not mean that Google deny us all the right to use our devices however we want. It's the governments' responsibility to spread awareness against scams and to shut down the scammers for good. This implementation is just yet another way for a megacorp to harvest user data, because apparently there's never enough data.
  author: "Aabhas"
  lang: "en"
- content: |
    Google, what the fuck
  flag: "contains profanity"
  author: "Rishit"
  lang: "en"
- content: |
    Los desarrolladores de los sistemas operativos han de respetar la libertad de que nos instalemos los programas desde donde queramos, sin firmar o con firmas de otros.
  author: "Gonzalo"
  lang: "es"
- content: |
    Android giving users choice has been the staple point of android OS. Removing choices like sideloading apps is not the move. I develop apps for myself, I do not want to be "an approved developer" I don't have time nor care for that. This action also is the beginning of censorship, and monopolization of android OS. Android started as an open operating system, you have simply turned it into a reskinned Apple OS. Your choice to go anti-consumer is going to hurt. You are not "protecting" anyone
  flag: "spam (duplicate content)"
  author: "Kayra"
  lang: "en"
- content: |
    Android is an open-source system; this restriction will make Android a closed system. I will switch to iPhone if this update is implemented.
  author: "Miguel"
  lang: "en"
- content: |
    Android is one of two operating systems used by almost every smartphone and tablet in the US. While the iphone operating system has been a locked down platform for many years, if it indeed was ever open, android has been marketed as the consumer friendly alternative. However, with android moving to lock unregistered users out of it's ecosystem, that promise may soon disappear. When a consumer purchases an electronic device, it ought to be his or hers to do with as the owner pleases. This includes installing apps from places other than google's native play store. A lockdown like this is a blatant violation of consumer rights. In the absence of widely available third party operating systems for mobile devices, this move by google bottlenecks the availability of applications and locks out independent developers, and those who will not play google's games. I should not have to elaborate on the potential for monopolization, nor the myriad ways this arrangement could be leveraged for censorship. I call on google to reverse this decision immediately, and end this threat to consumer rights and digital liberty.
  author: "Auston"
  lang: "en"
- content: |
    Android Freeeeee!!
  author: "Tymmi"
  lang: "en"
- content: |
    As an average user, this policy just feels awfully abusive. I have always had the mindset that if a device is yours, it should be you who gets to decide what's put in it, and to see Google make such a constraining change and directly cause so much harm to all Android users' freedom and specially small creators capacity to be a part of the community and to CREATE just deeply revolts me. The freedom and the customization of Android is what has always made me use it in the first place, if we can't even have THAT then what even is the point anyways?!
  author: "Kris"
  lang: "en"
- content: |
    Android needs to remain about choice not a locked down OS like Apple, that's the reason I and so many others choose android
  author: "Sean"
  lang: "en"
- content: |
    Because Google shouldn't force control on its users
  author: "Jaden"
  lang: "en"
- content: |
    Espero que essa petição vai pra frente. Já basta a lei felca, e ainda mais com isso do Google? Níquem merece esses absurdos
  author: "Pedro Henrique"
  lang: "pt"
- content: |
    Al impedir la instalación libre de APKs va encotra de la libertad de la cual es reconocida el sistema operativo android por la cual decidí comprar un teléfono android en vez de un IOS ;si deciden impedir la instalación libre de APKs entonces serían igual a iOS y ya no convendría comprar un teléfono con sistema operativo android de las siguientes marcas
    
    Samsung
    
    Motorola
    
    Xiaomi (incluye Redmi y POCO)
    
    Google Pixel
    
    OnePlus
    
    OPPO
    
    Realme
    
    Vivo
    
    Honor
    
    Al impedir la instalación libre de APKs ocasiona lo siguiente:
    
    Destruye la libertad del usuario y la esencia abierta de Android.
    
    Acaba con proyectos de software libre y tiendas alternativas como F-Droid.
    
    La seguridad no justifica eliminar la libertad (pretexto insuficiente)
    
    Obliga a los desarrolladores a entregar datos personales y pierde anonimato
  author: "Luis"
  lang: "es"
- content: |
    Mantengamos Android lo más libre posible
  author: "Aldo"
  lang: "es"
- content: |
    I'll be concise. This is not the right direction to go. This really is a monopoly and openness is the right choice. You're causing more harm than good and people's freedom of choice needs to be addressed.
    
    Thank you.
  author: "Aaron"
  lang: "en"
- content: |
    I use android phones and coordinate my digital life using the Google ecosystem. I chose Android/Google because although I loved the iPhone and iOS, I didn't want to use a closed digital environment. I don't "sideload" apps on my phone, just like I don't "sideload" programs on my laptop. I install apps myself, outside of the Google Play Store. I've rooted many of my phones too, for many different reasons. There's nothing illegal going on, I simply want things on my phone to look and function a certain way. When Google takes away my ability to install apps myself in September, it will eliminate it's primary advantage over Apple. When my current phone contract ends I'll buy an iPhone instead of a Samsung or other Android OS phone. There are millions of other people, like myself, that will do the exact same thing.
  author: "John"
  lang: "en"
- content: |
    Eu nao concordo com o google limitando a quantidade de APKS ou alterar o processo atual. Eles chamam de "sideloading" algo que naverdade significa INSTALAR. Google play store é so mais uma maneira de instalar. É a maneira do google de instalar, eles querem limitar para dificultar a concorrencia. Colocando termos pejorativos como "SIDELOADING" como se fosse algo paralelo ou marginal para dificultar a concorrencia.
  author: "Pedro"
  lang: "pt"
- content: |
    I value the open source initiative deeply. I believe that Google putting up barricades to make this harder to access and use for developers and consumers alike is an act against the freedom of the open source initiative.
  author: "Samuel"
  lang: "en"
- content: |
    Android sempre foi um sistema que gosto por causa da liberdade de expandir e estudar sobre ele e fazer o que quiser
  author: "Gleison"
  lang: "pt"
- content: |
    I AGREE BECAUSE I JUST DOOOO!!
  author: "Anthony"
  lang: "it"
- content: |
    Situação muito chata, espero q dê tudo certo no final
  author: "Jair"
  lang: "pt"
- content: |
    Parem de querer limitar o android
  author: "Edson"
  lang: "pt"
- content: |
    Temos que lutar pela liberdade se não o android vai perdeu sentido e essencia
  author: "ANTHONY"
  lang: "pt"
- content: |
    在安卓上限制应用安装是一个愚蠢的决定...我不知道谷歌内部是何意味要这么干...如果这样的话我还不如投奔iOS
  author: "靳"
  lang: "ja"
- content: |
    Keep android free.
  author: "Jansen"
  lang: "en"
- content: |
    Being able to get softwares and actually having device freedom is why I have always chosen android over apple. No freedom means that I can't do things I want to on my phone or any android device, which is the point of me buying android
  author: "Zaiden"
  lang: "en"
- content: |
    Eu como CEO da mann.co eu APOIO os computadores (mesmo de 1968) usa Android estão EU APOIO também os mercenários apóia
  author: "Saxton"
  lang: "pt"
- content: |
    Bom, eu como CEO da mann.co que usa Android nos computadores principais (mesmo de 1968) eu apoio também os mercenários APÓIO
  author: "Saxton"
  lang: "pt"
- content: |
    Sou contra essas políticas do Google de transformar o sistema Android em um sistema fechado, pois acaba com a essência de liberdade que o Android construiu ao logo dos anos. Muito decepcionante da parte do Google.
  author: "Gustavo Costa Atzori"
  lang: "pt"
- content: |
    A flexibilidade do Android sempre foi seu maior trilo. Tirar opções como instalar apps de fora da loja oficial é um erro. Desenvolvo meus próprios apps e não quero me submeter a um processo de aprovação - não tenho tempo para isso. Isso é censura e começa a monopolizar o sistema. O Android era aberto, agora parece um iOS disfarçado. Essa escolha vai prejudicar vocês, não é proteção, é controle.
  author: "Elbson Dos Santos"
  lang: "pt"
- content: |
    The spirit of open source is one of the basis of the Internet.Please do not reverse the course of history.
  author: "Roberto"
  lang: "en"
- content: |
    Companies have been continually chipping away at our rights as owners to use our property as we see fit. From TVs to cars our ability to freely maintain, use, and expand the features of devices we paid for have been pulled slowly out from under us. This is another slowly driven nail in the coffin of our digital freedom! We need to push back and make it known that we will not continue to tolerate this.
  author: "Donovan"
  lang: "en"
- content: |
    Não há sentido, o Google começar a limitar o Android.
  author: "Daniel"
  lang: "pt"
- content: |
    Protesto contra o Google para ele n cometer essa loucura de fecha o Android
  author: "Vinicius"
  lang: "pt"
- content: |
    O Android n e para fechar ele e aberto para o mundo inteiro Google
  author: "Vinicius"
  lang: "pt"
- content: |
    Queremos o Android livre como sempre foi e tem que continuar sendo
  author: "Marcelo"
  lang: "pt"
- content: |
    Como usuário do Android eu me importo com essa causa pôr tenho o direito de baixar apps fora da Google play store e não quero migrar prá outro sistema operacional
  author: "Wagner"
  lang: "pt"
- content: |
    Sideloading is what keeps Android as a different thing compared to iOS. Taking that away is like making it the same. Worst, decision, ever.
  author: "Marcos Eloy"
  lang: "en"
- content: |
    NÓS queremos que o Android seja todo tempo aberto, sem precisar dessas regras que só atrapalha o Android
  author: "Liedson"
  lang: "pt"
- content: |
    A Google&nbsp; está matando aos poucos o Android, o que fez o ser popular: liberdade.
    
    Quanto mais tentam fechar o sistema, dificultar ROMs customizadas, bloquear lojas alternativas e controlar o que o usuário pode instalar, mais o Android vira só uma cópia do modelo fechado da Apple.
    
    Se continuar assim, deixam de ter um sistema aberto e passam a ter apenas mais um jardim cercado, onde quem manda no seu aparelho não é você — é a empresa.
  author: "Alfinho"
  lang: "pt"
- content: |
    I've been using Android for 10+ years instead of iOS sorely because of how open it is. I can customize a lot of my phone for convenience, looks, accessibility; I can download programs from F-Droid or games from Itch.io.
    
    Removing that or making it significantly harder is a deal breaker for me.
  author: "Lucas A"
  lang: "en"
- content: |
    One of the biggest things, if not the biggest thing, Android has had over Apple for the longest time is the freedom of the user to make the phone theirs through downloading third party apps, through developers making their own applications without being required to release it through an app store that requires a fee to put it on. My own personal experience has been that I could play one of my favorite games that's no longer on the app store. With these new restrictions and requirements Google is proposing in September, we would lose that freedom, and would become no better than Apple
  author: "Morgan"
  lang: "en"
- content: |
    I choose to use Android as it gives me the ability to freely use my mobile phone the way I intend to. I would like to continue developing apps as a hobby without needing to be an "approved developer" and sharing my government issued identity with Google.
  author: "Christian"
  lang: "en"
- content: |
    HOW NEXT GENS GONNA INSTALL MINECRAFT?!
  author: "Kyouko"
  lang: "en"
- content: |
    As a consumer, i have The right to install applications freely without pressure or retaliation,since ona has The right to choose the applications one needs or uses. Furthermore,Android was designed for free use without restriction and with open source code for allá programmer,developers,and users of The device.This restriction would be illogical and would destroy The esence of Android.I oppose the removal of F-Droid and other third party applications. CONSUMERS SHOULD NOT BE FORCED INTO CHANGES THEY NEITHER WANT NOT SUPOORT;BESIDES BEING PROHIBITED,IT IS ILLEGAL TO DECIDE FOR THE USER.ANDROID IS FANTASTIC BECAUSE EVERY USER CAN PERONALIZE THEIR DEVICE.SOMEONE MIGHT HAVE A SPECIFIC BRAND IN MIND,BUT THEIR DEVICE WILL REFLECT THAT PERSONALIZATION,UNLIKE ¡OS, NO TO BLOCKING THIRD PARTY APPS
  author: "Juan Manuel"
  lang: "en"
- content: |
    Don't be Apple!
  author: "Wenshan"
  lang: "en"
- content: |
    Despicable corporate over reach on full display here. Stop the change, let users choose and decided how they wish to use their devices!
  author: "Markus"
  lang: "en"
- content: |
    Apple, Google, Meta, MicoSoft, Samsung, usw. machen die analoge ZwischenMenschlichkeit kaputt. Diese schleichende #DigitalDiktatur führt zu mehr Unzufriedenheit und deutliche Verärgerungen gegenüber den (A-)Sozialen Netzwerken und BetriebSystemHerstellenden.
    
    Es gibt durch die MarkM8Missbrauchende-Stellung keine echte Konkurrenz, weil in diesem SchneeBall-Imperialistischen-Konzernen alles darauf ausgelegt ist, dafür zu sorgen, dass sich auch Staaten dem #DigitalZwang erlegen sind und alles raffgierig ansich reißen, ausplündern und auch Menschen die ein SM-Art-Phone kauften, ebenfalls zu dessen Marionetten. Wer den Google-Bestimmungen und/oder Samsung-Bestimmungen nicht zustimmt - Hat schon heute keine Möglichkeit das bereits gekaufte Gerät zu nutzen. Das verärgert mich unter Anderem so sehr, dass ich Google und Co. regelrecht hasse! - - Ich kaufe ein Gerät und soll erst mal PlayStore, SamsungStore und Co. installieren - HandyNummer & E-Mail-Pflicht . . Ich habe keine legale Mögluchkeit ein anderes Betriebsystem zu benutzen - ohne Apps . . .
    
    Auch kann ich nicht ans sog. WurzelVerzeichnis, um endluch bestimmte Apps wirklich vom Gerät zu entfernen.
    
    Auch kann ich Einstellungen nicht mehr vornehmen, die ich im uralten Android noch machen konnte. Mich stören diese #Fremdbestimmungen und #Fremdsteuerung seitens Google & Co. imens. Wenn ich von anderen Plattformen Apps herunter lade und installieren will, blockiert Google dies schon jetzt, - Teilweise abstrus, denn ich muss die eine oder andere App nochmal von GooglePlayStore installieren, um Diese nutzen zukönnen. Oder, Google hat Zugriffe von installierte Apps verweigert, angeblich zu meinem Schutz, dabei will ich ja genau auf das Verzeichnis zugreifen. . . was blockiert wird.
    
    Wenn ich das SM-Art-Phone ausschalte,
    
    dann hat es ausgeschaltet zusein und nich wieder angehen, nur um mittzuteilen, dass der Akku geladen werden muss.
    
    Ich will meine Display-Anzeige etc. selbst so einatellen, wie ich es will. Auch Ordner anlegen wie ich es will und auch die AnzeigenArt ändern, bsp. als Ordnerliste . . .
    
    Es ist mein Gerät!
    
    Ich will auch echte HandBücher in meiner
    
    Sprache DEU_Deutschland haben -
    
    mit A L L E N Funktionen und EinstellungsMöglichkeiten, die es tatsächlich gibt. Google-Play funktioniert auch bicht, obwohl diese GuthabenKarte bereits bezahlt wurde. Auch stört es mich, dass Giigle, plötzlich Apps nicht mehr zulässt, obwohl ich eine LifeTime-Lizenz habe.
    
    Vorher entgeltfreie Appa sind mittlerweile nur noch gegen Enrgelt beim Google-Play-Store kaufbar.
    
    Ich hasse diese App-Store-Pflicht.
    
    Seriöse Unternehmen bieten Downloads von dessen Homepage und IN-App-Updates an.
    
    Was nützt es mir in der EU ein Recht auf Reparatur zuhaben, wenn das Gerät keine BetriebsystemUpdates mehr bekommt?
    
    Ansich braucht es wieder eine Trennu g von Betriebsystem und GeräteTreiber.
    
    Es braucht dringend eine Multiple-Software, die dazu fähig ist, bestehende Datei-Endungen von Installations-Dateien quasi rippen, wievom WMA zu MP3 nur eben für BetriebsystemeGeräteTreiber. . . .
    
    Deutschland, 2026-03-24
  author: "Marius-Felix-Aladini"
  lang: "de"
- content: |
    Don't be like Apple
  author: "Tom"
  lang: "en"
- content: |
    As a regular user and consumer, I am frightened by this direction. Android has historically differentiated itself by being an open platform that users can customize to their liking - this is THE main reason I continue to purchase Android phones. I am a developer as a hobby, and will occasionally create my own apps to support my unique projects and requirements. I have no interest in becoming an authorized developer - that wouldn't make sense for me. In addition, I benefit STRONGLY from the community of existing open-source apps. I am an avid F-Droid user, and find the apps there to be of equal or better quality than those in the Play Store.
    
    If Android is to become as locked-down as iOS, then my next phone purchase will be from Apple to benefit from their increased privacy protections. The main differentiator drawing me.to Android will be gone.
  author: "Patrick"
  lang: "en"
- content: |
    Android has always been the more free-range mobile OS. Had this not been the case, I would have switched to Apple long ago. Open-source, third-party software has driven the Android ecosystem and app development. It's no coincidence this is coming at a time when surveillance and squashing opposition is rising parallel with fascism.
  author: "Kahina"
  lang: "en"
- content: |
    These proposed restrictions by Google are a threat to personal digital autonomy and to app development.
  author: "Daniel"
  lang: "en"
- content: |
    If a company wants to be THE company in everyone's life, they better offer something that everyone wants.
    
    ...otherwise, give use the freedom to choose something that is.
  author: "Achi"
  lang: "en"
- content: |
    Built off the back of free software and then removing the free...
  author: "Paul"
  lang: "en"
- content: |
    The one thing I like about android is I can download any app I want but if they go through with this s*it they can go f*ck themselves to hell for all I care
  flag: "contains profanity"
  author: "Kayleigh"
  lang: "en"
- content: |
    The change to requiring app verification through a wireless, centralized service, instead of a feature of the OS, is a change that is inconvenient at best, and threatens the portable device market as it currently stands at worst. By making this change, Google is further revoking the customization and autonomy (or what is left of it on most carrier phones) that not only drives many users to get Android in the first place, but is a reminder of what makes computers so wonderful, in my opinion; the ability for every one to customize, and hack their own device to be perfectly their own. This wonderful thing is a basic function of any "free" computing platform that should not be revoked, but increasingly, it has. Please, Google, do not take this direction, and shut off the venue of customization that allows people to use their devices the way they want to, and has lit the torch for many future software developers and computer scientists.
  author: "Zacario"
  lang: "en"
- content: |
    I am developer and i need work that, dont block my work
  author: "Celso"
  lang: "en"
- content: |
    Google nos tiene con reglas ridículas para manipularnos,controlarnos y espiarnos pero no dejaré que se salgan con la suya
  author: "Nicolás"
  lang: "es"
- content: |
    Please, google, no change you words, no comeback with them, we of android ecosystem need a system open.
  author: "Matheus"
  lang: "en"
- content: |
    Considero que siempre android ha Estado un paso adelante sobre cualquier otro sistema operativo. Se debe a la gran versatilidad que este tiene, no existe ningún otro sistema operativo el cual te permita personalizar tan libremente, sin embargo, esa extraña obsesión que tiene google con querer copiarle a Apple es irreal y totalmente inecesario. Desde siempre se ha podido instalar APKs externos desde sitios web u otros lugares en Internet, esto, bajo nuestro propio concentimiento claro está, por lo tanto, no entiendo porque quieren eliminarlo si es que esto no les afecta en nada. Me parece excesivo y ambicioso querer eliminar de toda existencia los APK y cosas que no estén registradas por google, esto limitará más la experiencia de los usuarios, dando experiencias negativas. No entiendo porque este cambio se está dando sobre todo porque está claro que la mayoría de usuarios de Android no están de acuerdo con el, me parece que mínimo, google debió realizar una encuesta global sobre los cambios que planean realizar y escuchar opiniones de los usuarios. Actualmente, me encuentro esperando a que este cambio no se realice, marcará un antes y un después en el uso de los dispositivos Android. Últimamente muchas empresas quieren implementar más "seguridad" a sus usuarios, como Roblox implementando sus reglas y restricciones raras y innecesarias, o Discord que quiere hacer lo mismo, obviamente esto resulta positivo para aumentar la seguridad, no mucho, pero si, aún así, arruina la experiencia de muchos usuarios y hace mucho menos divertido permanecer en el ocio. Espero que les guste mi opinión y estén de acuerdo con ella.
  author: "Leandro"
  lang: "es"
- content: |
    Android's strength has always been its openness. Closing or limiting this system violates users' trust in the principles that led them (or rather, us) to choose Android as their (our) OS.
    
    That's why we urge you to keep Android open and not implement any developer or app registration system.
    
    Build bridges and educate your users to venture beyond them, rather than erect walls trying to isolate them.
  author: "Edoardo"
  lang: "en"
- content: |
    ANDROID LIBERTY! FOREVER!!!
    
    La idea de Google de prohibir a los usuarios instalar apps no verificadas, es sencillamente, tonta (sin decir algo mas grosero). Lo de mantener la seguridad es falso, a ellos siempre se les termina colando un virus a la Play Store, siendo que supuestamente lo "verifican". Esto no es mas que una estrategia para sumar mas usuarios a la fuerza a la Play Store, con el único objetivo de contentar a accionistas que no saben nada de seguridad. Es un simple intento de tumbar al grandioso F-Droid. Y yo NO LO PERMITIRÉ.
  author: "Santiago"
  lang: "es"
- content: |
    Android giving users choice has been the staple point of android OS. Removing choices like sideloading apps is not the move. I develop apps for myself, I do not want to be "an approved developer" I don't have time nor care for that. This action also is the beginning of censorship, and monopolization of android OS. Android started as an open operating system, you have simply turned it into a reskinned Apple OS. Your choice to go anti-consumer is going to hurt. You are not "protecting" anyone. ~Seth
  author: "Nathan"
  lang: "en"
- content: |
    Being open sourced and allowing users to have control over their own devices is what makes android beautiful. If you continue with this then you'll be no better than Apple. Allow devs, techies, power users and curious kids and adults to write their own programs and use them. Our phones! Our choice! You're going to damage yourself because it'll just let operating systems like Graphene explode and become more than what they are now
  author: "Sean"
  lang: "en"
- content: |
    This one feature is the one thing that has kept me from using iphone, if google proceeds, there will be many people like me that will make the jump because android will have nothing else to offer in comparison, this is bad for everyone not just the ones that use apps outside play store, they really want to kill android brands just like this. I hope they don't commit to this horrible anti consumer change
  author: "Miguel"
  lang: "en"
- content: |
    Android siempre me ha parecido un sistema flexible que permite a las empresas y sobre todo a los usuarios adaptarlos a sus necesidades, agregando y quitando funciones que en otros sistemas son imposibles. Creer que quitando la instalación de apps a través de fuente externa dará más seguridad es de una ingenuidad bastante infantil y de una falta de previsibilidad por parte de los directivos de Google porque los usuarios buscaron formas de seguir instalando apps de fuentes externas y esto hará que se busque acciones más invasivas y que comprometan aún más la seguridad de los dispositivos. Pareciera que los directivos de Google no conocen a sus usuarios y que la han elegido por su flexibilidad y libertad.
  author: "Emiliano"
  lang: "es"
- content: |
    Digital freedom matters!
  author: "Koda"
  lang: "en"
- content: |
    I use android to *avoid* closed environments and allow for more freedom in what I can do. Don't remove freedom of choice, you damn cowards!
  author: "Douglas"
  lang: "en"
- content: |
    This new directive from GOOGLE is clearly an anti-consumer practice so the users would have even less control of their devices, so they can prevent people from installing better and free alternatives, all being done under the false intention of "making android more secure", as if the play store isn't riddled with malware or scams
  author: "Olivia"
  lang: "en"
- content: |
    I think the freedom to have a choice on this matter is important, not just because there is a case to make regarding unsupported products let alone possible monopoly concerns, but also because there is a major issue regarding the freedom of choice on this matter that I think should not be taken away as an option for consumers.
  author: "Ronald"
  lang: "en"
- content: |
    Why are these changes a necessity? What scary changes are happening in the technological realm that's causing Google to take these ecosystem changing moves? It appears as if you're ignoring a large section of your fan base. I hope freedom wins, but I think with the ever quickening development of A. I. that this measure may be the new necessity with mobile technology try to keep had actors at bay.
  author: "Gene"
  lang: "en"
- content: |
    Uno adquiere el equipo android teniendo la confianza de poder tener algo de libertad al descargar aplicaciones según nuestras necesidades
  author: "Miguel"
  lang: "es"
- content: |
    Why do company's always get more predatory and throw away reasons that adopters use them for? We need to be less loyal to services in general because they are not loyal to us. If there is no alternatives then remove a subscription (e.g. for storage), remove/replace a feature (e.g. Google Maps to a 3rd Party, or Chrome with Brave), add friction (e.g. use a VPN, randomize your identifiable info, switch OS's). React immediately although inconvenient, because they derive much of their value from how we behave as consumers, and we cannot be complacent. We can bite back, if for anything, if they get their way we will be only one step away from out the door (adoption of something and everything outside of the Google and Apple ecosystem including the physical phone itself). Example: Fairtrade running Graphene or Calpyx or e/ OS with a Brave default browser and search.
  author: "Robel"
  lang: "en"
- content: |
    Let open software environments stay open! Android has something unique that iOS does not, and it would be a shame to pursue the same locked-down “streamlined” experience. Personally, this change will stop me from purchasing an Android or Google device in the future, which is a shame because the open-environment nature of Android was the main appeal for me, and I know for many others. I believe this decision will alienate a large population of current, and potential future Android users.
  author: "Ryan"
  lang: "en"
- content: |
    Boydan girmek lazım
  author: "Said"
  lang: "en"
- content: |
    > Google: Run by camel-rider.
    
    >Everyone: Shocked Pikachu face that he's doing this.
    
    Really, guys? You're THIS naïve?
  flag: "contains racist or discriminatory remarks"
  author: "Nathan"
  lang: "en"
- content: |
    Queremos liberdade no Android agente baixa oque agente quiser
  author: "José"
  lang: "pt"
- content: |
    I don't think that we should be filtered into buying something we do not want. Something as simply as a weather app should be free, news should be free, but the services that's being offered in app stores as free is usually filled with ads that leak personal information.
  author: "Andre"
  lang: "en"
- content: |
    I like to have a choice to choose and I understand the risks, that is why I check, Google should not have monopoly over it.
  author: "Rosalie"
  lang: "en"
- content: |
    虽然我在中国大陆，但是谷歌此举会导致个人的软件无法正常安装。比如大量来自国内应用市场的软件
  author: "霖皓"
  lang: "ja"
- content: |
    Google, não dêem um passo para trás implantando isto, querem descer ao mesmo nível de Apple?
  author: "Marvin"
  lang: "pt"
- content: |
    The entire selling point of Android was the open ecosystem. Locking down on APKs will alienate millions of users.
  author: "G"
  lang: "en"
- content: |
    Don't do this, I will never spend more than 100$ on an android or any phone ever again. Google, get smart.
  author: "Jamell"
  lang: "en"
- content: |
    We own the phones so we should be able to do whatever we want with them. Waiting a short period is not the way to do it. This feels like control and blocks. We are not kids. Please let us actually have control of our phones.
  author: "nicholas"
  lang: "en"
- content: |
    El hecho de que Android ofrezca opciones a los usuarios ha sido el punto central del sistema operativo Android. Eliminar opciones como cargar aplicaciones lateralmente no es la decisión correcta DE NINGUNA MANERA Y EN NINGÚN CONTEXTO. Estoy aprendiendo recién en mis 30s el desarrollo de apps para android, no para crear juegos full de ads y tirarlos en Google play, pero para diseñar apps que veo necesarias para mí, para mí vida y entretenimiento. Con este tipo de cambio RIDÍCULO me quitarán cualquier deseo de desarrollar y aprender los sistemas necesarios.
  author: "Jonatan"
  lang: "es"
- content: |
    I grew up on Android devices, and I find it saddening that Google is making this decision. It’s clearly not for the security reasons they claim; it's about control.
  author: "Gabriel"
  lang: "en"
- content: |
    Google is an evil entity. I'm not surprised they're doing something evil.
  author: "Justin"
  lang: "en"
- content: |
    as a Android phone user
    
    I think a Android devices can not install custom apk is just like a brick
  author: "kawing"
  lang: "pt"
- content: |
    Mandating government identification and a registration fee to share software is a direct violation of the open-source principles and digital privacy that defined the platform. This change creates an unnecessary financial barrier for independent developers and students, effectively stifling global innovation and the creation of niche, non-commercial tools. By positioning itself as the sole gatekeeper of all app installations, Google is stripping away user autonomy and transforming a once-free ecosystem into a restrictive "walled garden."
  author: "Ibrahim"
  lang: "en"
- content: |
    free is the most important part of Android,no freedom no Android.
  author: "jason"
  lang: "en"
- content: |
    I switched for freedom - not this.
  author: "Harrison"
  lang: "en"
- content: |
    The restrictive policies blocks me to publish My apps cuz I don't have many testers as they force me to have as an individual developer, now they want to cut off the only way that I have to share My creations
  author: "David"
  lang: "en"
- content: |
    Esto puede ser un ataque a la linea de flotación de Android, al igual que en su momento pasó con Windows de Microsoft.
  author: "Francisco"
  lang: "es"
- content: |
    不支持谷歌不开放侧载第三方应用程序，这样和苹果有什么区别，安卓的成功和应用程序的生态开放性息息相关，没有侧载第三方应用程序，那安卓的可玩性将极大的下降，也会导致一部分优秀app开发者的流失
  author: "purabook"
  lang: "ja"
- content: |
    Freedom of expression and choice, without filtering.
  author: "Ralph"
  lang: "en"
- content: |
    I chose to use Android devices specifically due to the control that I, as an end user, have over my files and the programs I chose to install on them. Even if a program comes from an independent programmer, even from other countries stores (like RuStore), even if it an open source app (like the ones from F-Droid), or just choosing to use Telegram from the first and most reliable source ever- the developer's website itself. I once had an iOS device and I totally detested how locked up it was, it was almost as if I were digitally "high jacked", depending on authorisation to do anything! Please don't remove us our freedom of doing to our devices our own experiments, finding and developing emulators for our old games and apps that suit our needs even if they're not economically viable. Plus: Don't take away the one tool many persecuted Christians around the world have to download Bibles to their phones. That's cruel and inhumane.
  author: "Barbara"
  lang: "en"
- content: |
    This is clearly a descision taken by Sundar Pichai for the financial profit of Google, it has literally nothing to do with security or safety of the users like Google claims, if it were so, there were many other ways to do this.
    
    I think people like me will just switch to iPhone at this point, as Google has decided to just kill Android's only major advantage. Such a shame. Android used to be a symbol of freedom and openness.
  author: "Aurelian"
  lang: "en"
- content: |
    O Android devia ser o Linux dos celulares, mas a Google quer fechar só para ganhar mais dinheiro, mesmo o mundo sendo capitalista não deviam tirar nossa liberdade de baixar qualquer coisa que queremos
  author: "Kauã"
  lang: "pt"
- content: |
    I've received pornographic viruses from puzzle games from the Google Play store.
    
    Google should remember why people go Android; Apple has locked down their systems to make them unbearable. Android gave freedom.
    
    If they lock it down, we'll use something else. I'm looking forward to a dumb phone and a physical camera...no annoying social media there. Or Google holding your money for you.
    
    Google offers nothing I need to use except an email, and last I checked, anyone offers those. The programs I love can be accessed on both Android AND PC...guess which I'll be shifting to!
  author: "Kay"
  lang: "en"
- content: |
    I've received pornographic viruses from puzzle games from the Google Play store.
    
    Google should remember why people go Android; Apple has locked down their systems to make them unbearable. Android gave freedom.
    
    If they lock it down, we'll use something else. I'm looking forward to a dumb phone and a physical camera...no annoying social media there. Or Google holding your money for you.
    
    Google offers nothing I need to use except an email, and last I checked, anyone offers those. The programs I love can be accessed on both Android AND PC...guess which I'll be shifting to!
  flag: "spam (duplicate content)"
  author: "Kay"
  lang: "en"
- content: |
    This is very anti trust and google is doubling down in the form of 'safety and security'. Do not let this happen!
  author: "JASON"
  lang: "en"
- content: |
    Restricting the usage of Android honestly completely removes any point in even getting an Android. Google is doing something very stupid right now.
  author: "Emery"
  lang: "en"
- content: |
    Como usuario de Android desde hace años, me siento estafado. El valor principal de este sistema operativo siempre fue su ecosistema abierto y la posibilidad de instalar herramientas de desarrolladores independientes. Querer cerrar el sistema bajo el pretexto de 'seguridad' es solo una máscara para imponer un monopolio de aplicaciones y publicidad. Si Android deja de permitir el 'sideloading' libre, rompe el contrato implícito con sus usuarios. No aceptamos un Android cerrado.
  author: "David"
  lang: "es"
- content: |
    Motivations drive actions.
    
    Any sincere reason to change other than power or greed? The app system works extremely well 'as is' so why should any group want this to change?
    
    Can only see harder times ahead for all - your kids for certain - if Google is allowed to do 'ruin, injury, pain, or harm': the definition of evil.
    
    Right now, the environment is lush for all - particularly Google - if all remains open. There is no good reason change.
    
    Motivations drive actions.
  author: "D."
  lang: "en"
- content: |
    Libre de elegir
  author: "Cesar"
  lang: "es"
- content: |
    You have to ask yourself. What is google's motivation and it's simple power ingredient
  author: "D."
  lang: "en"
- content: |
    There are games, apps, that are FREE, because the authors want it that way, no charge. WHY SHOULD GOOGLE WIN MONEY WITH THEM???
  author: "Ana"
  lang: "en"
- content: |
    Promote Foss and let's talk about the next phone OS
  author: "james"
  lang: "en"
- content: |
    The main reason I always chose to buy Android devices for myself (and my wife and son as well) instead of iOS devices was that Android wasn't a "walled garden." Now that Google is making Android the same as iOS, I'll be looking for alternatives...
  author: "Silas"
  lang: "en"
- content: |
    If you are or were a student in information engineering, many of you likely took a class on developing applications for Android devices. However, this specification change is something that will shake the foundations of such courses. Things that could previously be done by simply installing apps onto a physical device will now require cumbersome application procedures, an act that significantly lowers student motivation.
  author: "中院"
  lang: "en"
- content: |
    The people will ask if they feel they need to be represented.
  author: "Catherine"
  lang: "en"
- content: |
    I used APK's to play tons of games I loved, like angry birds star wars and I don't wanna see it taken from me. It has always been easier then apple (I know because I sideload all the time) and doesn't help anyone. You're moving customers away. Do better.
  author: "Jane"
  lang: "en"
- content: |
    Android started as the Anti-Apple and the ubiquity of manufacturers, form functions, ROMs, and open source app development has made it what it is today: the worlds most used operating system powering nearly 70% of phones and 1/3 of all devices, even surpassing Windows. App verification and sideloading through ADB only will hamper development and greater adoption moving forward. If forced into a walled garden, why not just use iOS?
  author: "Nicholas"
  lang: "en"
- content: |
    This is about Freedom!
    
    I want to be in control of what apps I install on my phone! And How I install them!
    
    I choose freedom!
    
    Do Not block or limit my freedom under the the guise of helping me according to your beliefs!
  author: "Henry"
  lang: "en"
- content: |
    I find it frankly baffling how Google is trying to erase one of the selling points of their products because of their need to control Android even further.
  author: "Theo"
  lang: "en"
- content: |
    If I choose to install a piece of software written by someone who "isn't verified" on my device that is my business, not Google's. To Google : Right now, one of the few remaining reasons I would choose an Android device over an iOS device is due to the presence of alternate app stores, like F-Droid that allow me to install open source apps. If I lose that ability, why would I continue to use Android over the competition? Don't be evil.
  author: "Cameron"
  lang: "en"
- content: |
    Anyone who wants to write an Android app should be fully allowed, and should never be forced to pay for your own program through fees.
  author: "Keiran"
