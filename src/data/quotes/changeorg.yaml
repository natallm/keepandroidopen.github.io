  author: "Gabriel"
  lang: "en"
- content: |
    Hello,
    
    I have been using Android my whole life, and I have always disliked iOS because of how locked down its operating system is. Recently, I have heard that Google may want to lock down Android and restrict third-party creators, and that is very concerning.
    
    Android’s openness is one of its biggest strengths. Not everyone can afford the cost and requirements to publish apps on the Google Play Store, and many independent developers rely on the ability to distribute apps outside of it. Android is also the largest operating system worldwide, and many devices such as the Meta Quest depend on Android and their own app stores. Locking down Android could create major problems for these platforms and users.
    
    As someone who plans to create and upload Android applications in the near future, this kind of change would be very limiting and would hurt creativity and development.
    
    Please keep Android open, and do not turn it into a system like iOS.
    
    Thank you for your time.
