    laverdad las cosas estan bien como estan no veo por que tratan de limitar a android con esta san cion que nos quieren inponer quiero defender el voto a que se nos repeten nuestros derechos como usuarios
  author: "jose"
  lang: "es"
- content: |
    limitar la libertad en android es innecesario, android libre
  author: "Ricardo"
  lang: "es"
- content: |
    I have been using Android since the HTC G1, and I've never been so disappointed with the whole thing as I am now. I recognise that Google is doing it's best to keep malware and malicious software out of its app store, but for people who are capable of installing F-Droid, NeoStore or one of the other alternative stores, this is a disaster. Many applications I use are only available here, and with this plan from Google, I'll be unable to access tools, applications and services I use on a daily basis.
  author: "Jon"
  lang: "en"
- content: |
    Open source is not a trivial matter for the regular user of technology nowadays. However, its importance should be taken seriously if we want a future where we will (still?) have access and some level of control over the technology we are too deeply dependent on for our daily activities. It is not necessary that everybody learn how to program smartphone or computer applications! But it is necessary that everybody know that it is important that big tech companies like Microsoft, Apple, Meta, and (in this specific case) Google don't close these doors. Be it for their customers or others trying to figure out what they're doing with our personal information.
  author: "Ricardo"
  lang: "en"
- content: |
    Por qué quieren limitar el uso libre de los apk son buenos
  author: "Javier"
  lang: "es"
- content: |
    The tight to sideload software is a central feature that sets Android apart from iphone.
    
    Without it you can expect Android marketers to drop as users like me shift to Linux phones and Android alternatives.
  author: "Richard"
  lang: "en"
- content: |
    No manches como que quitar la posibilidad de adquirir apks eso ya está en criterio de cada quien no de una sola persona
  author: "Jorge Alex"
  lang: "es"
- content: |
    Bro, Google is screwing up with this. Developers and emulators are going to be screwed. They're going to end up ruining the freedom we had and turning it into iOS 2. They're doing everything wrong.
  author: "Facundo"
  lang: "en"
- content: |
    Please reconsider this decision. Android has always been about freedom and open source. Being able to support small developers and having choices to sideload apps is integral to Android's success.
  author: "Jay"
  lang: "en"
- content: |
    This is a violation of free speech and freedom of choice. We are not apple!
  author: "Gearrard"
  lang: "en"
- content: |
    Si Android sierra su sistema entonces sería el fin para android ya q muchos lo usamos porque instalamos los que nos gusta si limitan eso para eso compramos un huawey con sistema kyriun o otro sistema y dejaremos de usar Android
  author: "Erebo"
  lang: "es"
- content: |
    It's serious that Android is doing this to those who make independent games, or stealing our data under the guise of security. I want to speak out because this is unfair.
  author: "Cesar"
  lang: "en"
- content: |
    Es por lo que he sido Android siempre, por la libertad que te daba y cada vez es menos, para eso mejor me compro un dispositivo de apple
  author: "Raúl"
  lang: "es"
- content: |
    I've always been an avid android user because of its open nature, but since the pandemic google has been clamping down on the freedom provided by the platform. First they added extra steps to install appstores other than the play store. Then they took away the ability to install older applications. Then they blocked you from being able to access the filesystem of your own device. Now they want to close the ecosystem, and make it easy for them to oppress the people who made this OS worthwhile in the first place. Google is heartless, and it's only a matter of time until they closed-source the android project. I will not stand for a corporation that willingly hands over the innocent to this authoritarian regime. Leave android alone!
  author: "Issac"
  lang: "en"
- content: |
    This is going to kill Android
  author: "Hazel"
  lang: "en"
- content: |
    Android's open nature is extremely important to the mobile space and limiting it would be actively detrimental. Educate users instead of taking away options.
  author: "Bradley"
  lang: "en"
- content: |
    Apks podem ser muito importante as vezes
  author: "Diego"
  lang: "pt"
- content: |
    Google is shifting from openness and freedom toward a closed feudal system. This represents more than just a setback for software platforms; it is a step backward for human civilization.
  author: "John"
  lang: "en"
- content: |
    As a consumer, I bought and use Android platform devices because I care about my privacy and I care about accessing third-party applications that are not strictly on Google's Play Store. I utilize F-Droid and various other third-party app stores, and this would be a major impediment to me. I did not agree to Google pulling the rug from beneath me well after I bought several thousand dollar Android phones and devices.
  author: "Stephen"
  lang: "en"
- content: |
    eu quero usar mods, porra!!
  flag: "contains profanity or vulgar language"
  author: "Rafael"
  lang: "en"
- content: |
    Personnellement j'utilise beaucoup les fichiers .apk et je compte même créer quelques jeux mobiles mais cette loie me décourage déjà alors que je viens de commencer a développer en temps qu'étudiant.
  author: "Éléctrolight"
  lang: "pt"
- content: |
    Android users should be able develop and install whatever software they want on their devices without approval from Google.
    
    The promise of Android — and a marketing advantage it has used to distinguish itself against the iPhone — has always been that it is “open”. But Google clearly feels that they have enough of a lock on the Android ecosystem, along with sufficient regulatory capture, that they can now jettison this principle with prejudice and impunity.
  author: "Ray"
  lang: "en"
- content: |
    The core idea of Android and OSS is threatened. Android will no longer hold the offer of a unique opportunity of freedom for those feeling locked out of their own lives. It will join the likes of other mediocre technologies being force-fed to an unwilling population. This is not the way.
  author: "Joy"
  lang: "en"
- content: |
    Android gives us a choice. That is so so important to us in this day and age. Please let us continue to do so.
  author: "Jenna"
  lang: "en"
- content: |
    Do not fix something that is not broken.
  author: "Pavel"
  lang: "en"
- content: |
    The main reason I've always preferred android over apple is the freedom of app development and usage. What's the point of using an android phone when I have to rely on an app store that limits what's available? This decision is gonna affect an already undesirable Google
  author: "Mychal"
  lang: "en"
- content: |
    After big tech doubled down on supporting Trump in all things disinformation and grift, I'm saying - NOT ON YOUR GODDAMNED LIFE!! YOU HAVE TO OBEY ALL THE LAWS OF EVERY COUNTRY YOU WORK IN!! AND IF YOU BRICK ANY OFFICIAL FROM ANY COUNTRY FROM DOING THEIR WORK, THEN YOU HAVE BROKEN THE UNIVERSAL DECLARATION OF HUMAN RIGHTS ARTICLE 23! YOU CAN BE CHARGED WITH A GODDAMNED WAR CRIME YOU MORON!! WHO IS THE FIRED CEO THAT JUST BROKE HIS GODDAMNED EMPLOYMENT CONTRACT WITH GOOGLE AND HIS STOCKHOLDERS??!!! YOU ARE FIRED YOU ASSHOLE!!!
  flag: "contains profanity or vulgar language"
  author: "Vance"
  lang: "en"
- content: |
    I don't know what words will reach the ones that need to hear them. I'll just say I'm willing to switch, drop, or do what I think works for me.
  author: "Daniel"
  lang: "en"
- content: |
    Android is open source, period.
    
    On top of that, I'm buying the device. I own my phone, and that means I should be allowed to do whatever the hell they want with it! If I want to click on links from sketchy sites and download things that are not directly from the Google Play Store, I should be able to. Google claims this is to protect their users, but it's nothing more than censorship and crushing competition from a private, anonymous, and often better competitors making free and open source apps on platforms like F-Droid or Obtanium.
    
    It's like saying that you aren't allowed to hang a picture you bought from your friend in your own house that your bought, unless your friend pays Google $25 and gives them their ID, but you can hang as many pictures in your house as you like if you buy them directly from Google. Doesn't that sound absurd?
  author: "Thomas"
  lang: "en"
- content: |
    Tenemos que lograrlo
  author: "Roberto Saúl"
  lang: "pt"
- content: |
    After this decision I will just go with iPhone, this was the only reason I was using Android, just making it worse for the consumer, this is not about security but locking down people's choice of store, which in my opinion should be illegal give that we bought our phones and we should be able to do with them as we please
  author: "Colin"
  lang: "en"
- content: |
    It's just because I like piracy and I was born into piracy.
  author: "Simp"
  lang: "en"
- content: |
    Chega do Google decidindo quais aplicativos a gente pode ou não pode usar! Eles querem que a gente fique preso naquele monte de apps cheios de anúncios e a maioria custa caro para utilizar, se for assinar versões Premium de todos apps que a gente precisa, o cara termina gastando malas e mais malas de dinheiro, eles acham que as pessoas são bobas! O Google quer fazer as pessoas de servos de feudalismo! Espero que o F-Droid vença nesta disputa como o site Aptoide conseguiu! Já substituí a metade dos apps da Google Play por apps do F-Droid que são excelentes, a maioria freeware! Espero que esta loja cresça muito e se torne uma store de peso!
  author: "Ahbaruz"
  lang: "pt"
- content: |
    La decisión de Google de restringir el sideloading en Android contradice el principio de apertura que históricamente ha distinguido al sistema. Aunque se argumente por seguridad, limitar la instalación de apps externas reduce la autonomía de usuarios y desarrolladores. Priorizar el control sobre la libertad podría afectar la competencia y la innovación.
  author: "Juan"
  lang: "es"
- content: |
    La apertura de Android nunca fue un regalo de Google, fue una necesidad del mercado para competir con Apple. Ahora que se logra el dominio, que la apertura se está desmantelando sistemáticamente. Cada característica de "seguridad" que no puede ser permanentemente discapacitada, cada advertencia que no puede ser descartada, cada escáner que no puede ser optado por un traspaso de poder de usuario a corporación. La verdadera capacidad de seguridad permite la elección informada. Lo que Google implementa es el control disfrazado como protección. Los usuarios merecen la libertad de instalar lo que desean, de fuentes en las que confían, en dispositivos que poseen, sin interferencias corporativas persistentes. Android debe pertenecer a sus usuarios, no a Google. Esta declaración refleja la oposición a las restricciones de plataforma y los defensores de los derechos digitales y la autonomía de los usuarios
  author: "angel ivan"
  lang: "es"
- content: |
    I really like the ability to "sideload" apps on android. Android's customization capabilities is one of it's most likable features. APK files are cool. They are the reason why my phone looks so pretty.
    
    Please continue to allow this option as I think it will be beneficial to Google, instead of forcing 3rd party developers from abandoning the platform to monotonous hegemony like that of the Apple iPhone OS store. Google building upon the open source code designed by Linus is cool and allows for input from various individuals which help inevitably make the google play store more beautiful and lively. Customization is cool. Please continue to allow APK file usage.
  author: "Paul"
  lang: "en"
- content: |
    Stop Google from limiting APK file usage!
  author: "Daniel"
  lang: "en"
- content: |
    Cómo usuario regular de android, está decisión de Google atenta con la innovación y la comunidad de android, dónde desarrolladores de todo el mundo aportan para hacer el sistema más globalizado. Atenta con la elección quel código abierto
  author: "Alfonso"
  lang: "es"
- content: |
    Need to stop Google from controlling us!
  author: "Carmen"
  lang: "en"
- content: |
    We need to stop Google controlling us.
  author: "Carmen"
  lang: "en"
- content: |
    I used to be a child with no other ways to have fun but to use apks. with their removal, removes the joy of children.
  author: "Samuel"
  lang: "en"
- content: |
    I do not support Google moving android in a totalitarian direction where freedom is removed and central authority is enforced. Keep Android Free!
  author: "Phillip"
  lang: "en"
- content: |
    It's simple. No one else should have the right or the power to control any aspect of your life, not even when it comes to software and information sharing. Of course, security is important, but so are privacy and freedom. What they're trying to do is nothing more than a political ploy, a quest for surveillance and control.
  author: "Gonzalo"
  lang: "en"
- content: |
    Fuck google, fuck android and FUCK the power hungry rich people controlling what we do
  flag: "contains profanity"
  author: "Aline"
  lang: "en"
- content: |
    As a former iOS dev, this move by Google sickens me. Android is the last major mobile OS that allows for open source development. Paying to become a "verified developer" is anti-consumer and anti-competitive. Google should be ashamed! This will allow them to introduce the same planned obsolescence the Apple uses to keep their users buying new phones when the latest OS isn't compatible with their phone. Users installing apps via 3rd party fully understand the risks. Corporate overreach won't "protect" anyone. We are not stupid Google! Stop treating us like sheep who don't know any better!
  author: "Danielle"
  lang: "en"
- content: |
    Android is Linux. Linux is free!
  author: "Arthur"
  lang: "en"
- content: |
    One of the big reasons I've always loved Android over iOS is that I was given more freedom to do stuff like this with my own device. Taking this away from the Android community leaves not much reason to even stick around on Android IMHO. Just another tech corporation taking away more features "for your benefit".
  author: "Sawyer"
  lang: "en"
- content: |
    Big tech is trying to collectively normalize mass surveillance requiring government ID's for everything and saying "it's for our safety". It is NOT about anyone's safety.
  author: "Amélie"
  lang: "en"
- content: |
    I dropped iOS and moved to Android when I learned the importance of freedom. If Google makes this movement I don't see what sense makes that change anymore.
  author: "Josh"
  lang: "en"
- content: |
    Android has always been about freedom and customization. Let's keep it that way
  author: "Jacob"
  lang: "en"
- content: |
    This is an outrageous monopolizing effort that not only chokes out competition and a healthy ecosystem for application development, it also is hugely concerning from a security perspective. One entire company should NOT have control over everything. Google has grown far too large, and history has taught us that large corporations are obscenely corrupt and controlling of people's safety, freedom, and wellbeing. This cannot go unchecked.
  author: "Sarah"
  lang: "en"
- content: |
    Fuck google! Ill install whatever the fuck i want on my devices & you cant stop me
  flag: "contains profanity"
  author: "Cameron"
  lang: "en"
- content: |
    I thik that Android should keep free, 'cause I've been using a Smartphone, specially Huawei, and I just could play videogames download the APK file
    
    If I'll use again Huawei I neee that
  author: "PABLO"
