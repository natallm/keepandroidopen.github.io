  author: "Jonathan"
  lang: "es"
- content: |
    User Freedom is the Android standard, what the user chooses to do with his Android device is done under his own accountability. This is an attempt to monopolize and monetize the users "choice" by removing all avenues aside from google's approved path. Sideloading is not a risk that google is trying to protect their users from, it is a risk to their revenue that would come from selling you a tool made of easily copyable code, since all purchases made from apps installed through "normal means" give 30% of that revenue to google.
    
    What google wants is money, and they get money by placing their own guiding rails on your attention. they give you a free app that sustains itself with either some "full version purchase/subscription" or google's own ad platform. Their ads are another form of revenue to google, as well as app developers, though they have the downside of attempting to guide your attention away from what you're doing at the time and stimulate you into spending on whatever is being sponsored to be shown to you.
    
    There are thousands of apps on the play store, there are thousands more on other sources, and the very ones on the play store are subject to a policy of "update your app within x years or it will be removed from the play store;" this is a death sentence to any developer that simply wants to create a tool to help others by having to constantly update, then having to have some way to make it sustainable by some form of monetization since it's going to have an upkeep. It's either this, or being "doomed to obscurity outside the play store."
    
    In every step of the ladder of usage, google wants to have more money, search for an app, sponsored results first, then actual search query response, start downloading an app, the layout changes to show multiple carousels of sponsored apps "tailored to you," open an app, ads, wherever they can be, chosen by years of usage tracking and market control research, making money to google because companies will pay to have their names spread to gather attention, pay for services, subscriptions, and tools, giving 30% of it to google.
    
    A company like google measures its success by how much money they make, while the creators of tools, services, and games read through their mail, appreciating good reviews and crying about bad ones because passion is what led them to create. Take GitHub for example, a site comprised entirely to sharing code, entire project libraries free and open-source for anyone to use. Take StackExchange, multiple forums where questions and answers between experts of hundreds of subjects ranging from pure mathematics to writing to Dungeons & Dragons. Take Anna's Archive, a long-standing attempt to preserve literature media and providing methods to acces, preserve, and add to over 63 million books and 95 million papers, all for free.
    
    The average person is not me, but the average person includes large numbers of people younger than me that will accept whatever comes to their hands at the end of the day, it includes large numbers of people older than me that will be glad of an oversimplified process that won't take from their time. We need to be lucid enough to not waste time, the old will have too little time to care how they're being led, and the young will be raised into being led and believe it's natural. We need to show that our time is a value to each of us, and be strong enough to not sell our time to the well-oiled machine made to line a distant someone's pockets.
