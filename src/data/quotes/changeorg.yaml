  lang: "en"
- content: |
    Devemos lutar contra esse absurdo que é limitar criadores e usuários a apenas a loja oficial
  author: "Júlio Cesar"
  lang: "pt"
- content: |
    Keep Android an open platform, avoid a massive class action lawsuit. I along many others bought an android phone precisely because of the open ecosystem, you change that, you get sued and lose customers
  author: "Joseph"
  lang: "en"
- content: |
    Impeça o Google de limitar o uso de arquivos APK.
  author: "LUIS"
  lang: "pt"
- content: |
    Android has always stood for freedom, openness, and user choice. Blocking APKs goes against the very spirit of what makes Android great. Users should have the right to install the apps they want, from the sources they trust, not just from one store. Limiting APKs doesn’t make Android safer; it only takes control away from users and developers alike. Keep Android open. Keep Android free.Android has always stood for freedom, openness, and user choice. Blocking APKs goes against the very spirit of what makes Android great. Users should have the right to install the apps they want, from the sources they trust, not just from one store. Limiting APKs doesn’t make Android safer; it only takes control away from users and developers alike. Keep Android open. Keep Android free.
  author: "Pedro"
  lang: "en"
- content: |
    I paid for the computer, its mine, I should be able to put whatever I want on it. I hate google, I will be removing every google associated anything from my life because of their continued abuse.
  author: "Brenden"
  lang: "en"
- content: |
    The freedom Android offers for young inquisitive minds is the entery way to Dev-Land. Certainly they are aware of how many of their employees started from this basic idea and how many they may loose by taking it away. Not only that do they really believe we won't migrate to something better? But as a consumer we need to try and understand what the future will look like, why this is the decision not just for Android but for Windows and more.
  author: "Joseph"
  lang: "en"
- content: |
    I use multiple open-source side loaded apps. 60% or more of my time on my phone is using these side-loaded apps. I rather get rid of google than get rid of these apps.
  author: "Yuntin"
  lang: "en"
- content: |
    A capacidade do Android de dar opções aos usuários sempre foi um ponto fundamental do sistema operacional. Remover opções como a instalação de aplicativos por fora da loja oficial não é a solução. Eu desenvolvo aplicativos para uso próprio e não quero ser um "desenvolvedor aprovado". Não tenho tempo nem interesse nisso. Essa ação também marca o início da censura e da monopolização do Android. O Android começou como um sistema operacional aberto; vocês simplesmente o transformaram em uma versão repaginada do macOS. Essa decisão de agir contra o consumidor terá consequências negativas. Vocês não estão "protegendo" ninguém.
  author: "André Victor Fernandes Pereira"
  lang: "pt"
- content: |
    Google cannot restrict APKs.
  author: "Ruan"
  lang: "en"
- content: |
    google take the L
  author: "Miguel"
  lang: "en"
- content: |
    Make the open source free for a sideloading app for downloading APKs. I need to download the APK for ReVanced patches and F-Droid.
  author: "David"
  lang: "en"
- content: |
    I use a de-googled phone and F-Droid is my store. This will destroy F-Droid. If I pay for a device I should be able to load what every I like on that device. Google is using it's monopoly powers to force us into a box. I'm a great believer in privacy and freedom and I see it day by day gradually eroded.
  author: "Peter"
  lang: "en"
- content: |
    Péssima decisão tirar a liberdade dos desenvolvedores e dos usuários com a desculpa de segurança.
  author: "Rian"
  lang: "pt"
- content: |
    Android has always been the mobile enthusiast's dream. Please don't take that dream away.
  author: "Logan"
  lang: "en"
- content: |
    Google’s move to restrict APK file usage is a direct attack on user freedom and device choice. Installing apps outside the Play Store has always been a vital part of Android’s openness, it empowers users, developers, and innovation itself. This change tightens Google’s grip on the Android ecosystem and undermines the freedom that has defined the platform from the start.
    
    We, strongly oppose this limitation. Android was built on openness and user control not corporate gatekeeping. We call on Google to preserve the right to install and manage APK files freely.
  author: "Howard"
  lang: "en"
- content: |
    i dont want google to take such a little freedom of installing apps that i think are handy
  author: "gosha"
  lang: "en"
- content: |
    The decision to limit APKs is simply stupid.
  author: "Lyan Augusto"
  lang: "en"
- content: |
    i dont want google to become a monopoly
  author: "gosha"
  lang: "it"
- content: |
    I've been using APKs ever since I got my first phone, and now, it's an indispensable part of my life. Things I downloaded, games that I played that would be lost to time because the very people who made them forgot about them, things I watched, all those experiences... How can one take it away from us? We want our freedom. So what if we may be downloading viruses and having our data stolen? It's our choice, and it's nothing to be worried about by other people. And in my experience, there aren't as many viruses in the internet as people think. I know that I never got one.
    
    If APKs are gone, my main sources of entertainment — the things that kept me alive all this time by brightening up my days — they will be gone too. So, this cannot happen. This can't go on. I need my APKs. And I will not stop fighting for their existence, because they are a valuable part of my existence.
    
    - The Meteor
  author: "João Pedro"
  lang: "en"
- content: |
    There is no valid reason to do this except greed and control. If someone installs malicious software on their own device thats their issue.
  author: "Jonathan"
  lang: "en"
- content: |
    o Android deve seguir o seu conceito original de código aberto, para facilitar o controle do usuário e dos desenvolvedores, evitando assim a censura e taxas abusivas aplicada pelo google
  author: "Elias"
  lang: "pt"
- content: |
    Stop this bullshit of trying to control our lives, deciding what I can and can't do. Enough with planned obsolescence, enough with authoritarianism. I, and only I, decide what's best for me, what I can and can't download on MY PHONE.
  author: "Leonardo"
  lang: "en"
- content: |
    We should be allowed to do what we want with the tools that we buy.
  author: "kevin"
  lang: "en"
- content: |
    I like freedom :)
  author: "XNotToails143X"
  lang: "it"
- content: |
    We need android to stay open
  author: "Mark"
  lang: "en"
- content: |
    I've used both an apple and an android, the differences between them are like night and day, one has made it almost impossible to have free applications unless your willing to deal with a bombardment of ads, it also made it near impossible to have true safety, privacy, and freedom .
    
    Safety) there are applications that are aiding in the fight against tyrannical countries by making you decide what apps should be acceptable in which country you are harming people.
    
    Privacy) There wont be any anonymity with Developers, who now have to pay to make something for others, this doesn't encourage charity and generosity, it only fuels greed
    
    Freedom) There wont be a single application no matter how 'offline' the features are that wont be paid or ad-bloated, I don't get to choose any app and deal with the consequences, of those choices.
    
    in the words of Ben Franklin "Those who would give up essential liberty to purchase a little temporary safety, deserve neither liberty nor safety"
  author: "jack"
  lang: "en"
- content: |
    My Grandfather never used a phone. After I lost my grandmother we bought him a smartphone. He couldn't use it so I wrote an app for him which made it simpler for him. With these changes, my grandfather won't be able to use my app unless I give Google my data and Google approves me. Who is Google that it should have the right to position itself between me and my grandfather? And no using adb isn't even an option my computer which I use to code and the phone of my grandfather are separate as they don't belong into the same place. As an user I'm also using open source apps on my device which I paid for. Google has no right to decide what I install on my device which I paid for and what I don't install on my device which I paid for. My device does not belong Google. I don't belong Google. I am not the slave of Google. I bought an Android device because it doesn't treat me like a slave. The developers of these apps don't want to give Google their data and I approve that. I don't need approval from Google. I can decide on my own what I install on my pocket computer. Google can make suggestions, but Google doesn't have the right to decide for me. I'm a free person.
  author: "Yunus"
  lang: "en"
- content: |
    If wee do not stop this then our computers are next. We will end up the same as other countries who put out the same message to their people to condition them. Our freedom of speech and the right to privacy under the privacy act will be taken away. You do not want this!!!
  author: "Keith"
  lang: "en"
- content: |
    Não acho justo oq está empresa do Google quer fazer já que vários criadores fizeram e se esforçaram para divulgar jogos próprios deles e mesmo assim a empresa vai lá e tira os jogos e aplicativos antigos que todo mundo abaixa em sua conta e risco mesmo sendo algo que a comunidade ama e usa sempre pra poder fazer oq querem de uma maneira não tão industrial e robotizada isso é errado já que o Android é um jeito menos robotizado ao contrário de um i phone se querem fazer isso com o Android pq eles não fazem um i phone
  author: "Kaik"
  lang: "pt"
- content: |
    Sideloading? I call it installing! We own these phones, not you! The reason we buy Android is not simply the 'AI Features', but because it isn't as dystopian as iOS. Android has been about giving the user the choice on what apps they personally want, and to customize what they prefer. Google has been slowly taking it away from us, and they can't do this anymore! This is the final straw!
  author: "William"
  lang: "en"
- content: |
    Protect Android FREEDOM...
    
    I’ve used Android for years because it stood for freedom and choice. But lately Google has been making it harder to install APK files apps that come from outside the Play Store. That freedom to choose what I put on my own phone is what made Android different, and it’s slowly disappearing.
    
    I’m not a developer or hacker just someone who believes that the device I bought should truly belong to me. I should be able to install safe apps from any source without being blocked or discouraged.
    
    This isn’t about breaking rules it’s about keeping control over our own technology. If Google keeps tightening these restrictions Android will lose the openness that made it great. I care because user freedom matters and I don’t want to see it taken away bit by bit.
  author: "Boris"
  lang: "en"
- content: |
    Android for me has always been the freedom to choose. The right to find alternatives that won't actively gather my information. I want to keep my freedom. I trust my open source small developers more than I trust corporations who put profit over my rights.
  author: "Yeshua"
  lang: "en"
- content: |
    Android meant freedom; it meant the opportunity to make the device your own even when everyone was using the same model. Android allowed the freedom of APKs, the freedom to port video games to the phone without differentiating or hiding anything from users; it allowed them to be free from blame or credits.
  author: "José Roberto"
  lang: "en"
- content: |
    Freedom requires the ability for us to harm ourselves if we so choose. We own the devices we buy and should not be required to only go through people Google allows. This is an unacceptable policy when it's my device.
  author: "Matthew"
  lang: "en"
- content: |
    Google should stop killing Android
  author: "Rafael"
  lang: "en"
- content: |
    Eu acho que já tá virando baderna, uma coisa é você banir a pirataria outra é você salvar aplicativos que as pessoas perdem o acesso e graças ao Google eles ficam salvos, então se não puder mais baixar apks é a mesma coisa que excluir toda uma história, e isso é inaceitável
  author: "João vittor"
  lang: "pt"
- content: |
    O Google está dificultando ainda mais o sideloading de APKs a partir de 2026, exigindo verificação de identidade de desenvolvedores. Embora o Google justifique como medida de segurança (citando 50x mais malware em fontes externas), isso efetivamente cria barreiras para desenvolvedores independentes e limita a liberdade de escolha que sempre diferenciou Android do iOS.
  author: "Francisco"
  lang: "pt"
- content: |
    Um dos únicos motivos de continuar usando Google/Android é poder baixar APK.
  author: "Matador"
  lang: "pt"
- content: |
    O Android nasceu livre e tem que continuar livre!
    
    Quem é a Google para determinar o que eu posso ou não posso com o aparelho que comprei com o meu dinheiro?
  author: "leandro"
  lang: "pt"
- content: |
    vc deve escolher onde e como apoiar o dev do aplicativo não ser forçado a usar uma plataforma, só de algo que se diz 'livre'
    
    quer combater a pirataria faça um serviço 10 vezes melhor simples
  author: "Diego"
  lang: "pt"
- content: |
    My device is mine, not a pu lic service I access.
  author: "Carter"
  lang: "it"
- content: |
    Google is about to further close down Android, which isn't good at all. If anything, it's going to hurt everyone, and furthermore, what if others start to copy them and lock down their ecosystems in a similar manner?
    
    For example, what if Microsoft starts locking down Windows app dev like Google is locking down Android app dev, and starts restricting sideloading exes?
  author: "Joshua"
  lang: "en"
- content: |
    I currently own an iPhone, but I've always wanted to switch to and Android because I knew that I wouldn't be limited by what their app store says I can have on my phone. With this change, it sets a precedent that I don't have the right to run what programs I want to run on my technology, and I don't want to live like that. There are so many cool projects that aren't on the Play Store for various reasons, and we can't afford to lose those simply because Google wants control.
  author: "O"
  lang: "en"
- content: |
    Mobile devices have become such integral, personalized focal points in our lives over the last few decades, but not everyone uses their devices the same way. Having the choice of what software we choose to use and where to install from has been a key part of Android since its beginning and has been an important keystone of consumer choice. Removing those choices and putting up barriers to entry for development would be a huge blow to consumer rights.
  author: "Scott"
  lang: "en"
- content: |
    Stop your control of people devices.
  author: "Sally"
  lang: "en"
- content: |
    Android tem seu maior Diferencial e Objetivo para Pessoas que gostam de Jogos e que no IOS isso não tornam possíveis , A Liberdade é o que motiva a Vários Usuários a comprarem um Celular com ANDROID sem isso vocês praticamente viram Filhinhos da IOS onde tudo que a APPLE faz querer copiar em cima e para os Desenvolvedores que nunca fizeram mal a Ninguém como Emuladores , Remaster ou Remake de Jogos Existentes onde os alguns Desenvolvedores oficiais deixam modificar o Jogo via Android/Data ou OBB. Onde hoje em dia só sabem botar cheios de anúncios e na tela em Apps Famosos que vocês ACREDITAM SER SEGUROS e cheio de Monetização e a única coisa que vcs querem pensar é Limitar APK ??? A Pessoa querendo ou não tem direito de Escolher suas Decisões de Modificar algo até pra Melhorar ou Otimizar seus Celulares quando vcs só deixam as Atuais Atualizações com Má Otimização e Descarregamento Rápido 🔋 conseguimos Resolver Problemas de Milhares de Pessoas que tenha Necessidade de algo melhor que o Oficial então é melhor pararem com isso que isso só atrapalha o ANDROID e diminui vendas futuras em sua Comunidade.
  author: "Guilherme"
  lang: "pt"
- content: |
    O Google não pode transformar o Android no Ios! Ninguém precisa de mais um sistema operacional fechado!
  author: "Samuel Filipe"
  lang: "pt"
- content: |
    The main reason I bought a Pixel was for the freedom of installing whatever I want, but If this is taken away, they would be taking the only reason many people buy their devices.
  author: "Jjr"
  lang: "en"
- content: |
    Just another step big tech is taking to take away our rights and freedoms.
  author: "Martin"
  lang: "en"
- content: |
    I believe increasingly closed ecosystems lend not only to the monopolization of tech but are a threat to the digital sovereignty of individuals worldwide making them susceptible to government and corporate surveillance.
  author: "Adrian"
  lang: "en"
- content: |
    The advantage of Android is precisely its freedom to choose what to do with your system and applications, just as developers have the freedom to choose where to distribute. Please do not limit the installation of APKs. There is already a warning and optional block for “unknown” apps where we currently have choices. Do not trade freedom for a false sense of security!
  author: "Matheus"
  lang: "en"
- content: |
    I should be able to share my android apps with my family and friends. It's easy to do on Windows and Linux. Why do I have to pay for sharing what is mine with friends and family around the world; yes, my actual family and friends are literally everywhere. Google often distributes malware. They allow Verizon to install unwanted apps that were often just malware. Google and Samsung force install apps we never asked for mostly so they can spy for advertising and traing their AIs. Heck, Google even watches what you put on gdrive and will remove things they don't like due to personal issues. How dystopian!
  author: "Matthew"
  lang: "en"
- content: |
    As a long-time Android enthusiast, I strongly oppose your push to force developer ID verification for APK sideloading. This policy erodes the open ecosystem that drew millions to Android, blocking access to legacy apps, region-locked content, and custom tools from sources like F-Droid. Under the guise of security, it stifles innovation and user freedom. Please reverse this immediately and honor Android's roots in choice and accessibility.
  author: "Lucas"
  lang: "en"
- content: |
    Keep android open source, resist surveillance and ID verification. Consider switching to Grapheneos
  author: "Andrew"
  lang: "en"
- content: |
    Monopolies are bad for freedom, business, and innovation. Keep Android the phone os where you have the choice to protect your data.
  author: "Thomas"
  lang: "en"
- content: |
    O Android sempre foi sinônimo de liberdade. Sempre adorei instalar aplicativos de terceiros, criados por desenvolvedores independentes, para realizar tarefas ou usar recursos específicos. Meu reprodutor de música e o aplicativo de bússola foram instalados via sideload do F-Droid, e acho incrível poder instalar versões personalizadas de aplicativos nativos do telefone. Instalei uma versão modificada do meu aplicativo de câmera que trouxe o recurso "Photosphere" do Google Pixel para o meu celular. Como eu conseguiria fazer isso sem sideload? Não há motivo para o Android seguir essa direção; se todos os motivos pelos quais escolhi o Android forem removidos, ele poderia muito bem se chamar "iOS falso". Que a personalização, a liberdade de uso do meu telefone e a inovação voltem a reinar no coração do Android do Google! POR FAVOR 🙏
  author: "Fabio"
  lang: "pt"
- content: |
    It started with apple restricting our freedoms to software due to their desire to control their users. Now that same desire to control us has reached android a platform built on freedom. This is the final stance we can take against a future where you own nothing in the name of safety.
  author: "Barrett"
  lang: "en"
- content: |
    I make little tools for myself and little games for my son, I don't usually distribute apps and when I do it is for free with no ads. Adding a license, divulging personal info and a cost to Android development will make me leave the platform. Allow people to use their computing devices the way they want, don't be evil.
  author: "Paul"
  lang: "en"
- content: |
    I don’t want a walled garden on android like iOS it sucks
  author: "Caleb"
  lang: "en"
- content: |
    I've been a long Android user, and I learned so much due to being able to sideload programs; even being able to manually install google play services on some devices where it doesn't come by default. I believe that Google should not lock this change so we can have our own choices to do what we want with out programs and apps; unlike Apple who locks down their ecosystem, and (more so unrelated) Amazon picking out and stopping jailbreaks, which is the reason I have an android phone. For that freedom promised. Google, make the right decision.
  author: "Brandon"
  lang: "en"
- content: |
    Esse monopólio é injusto!
  author: "Gabriel"
  lang: "en"
- content: |
    Keep android open, important for the people…
  author: "Sanjay"
  lang: "en"
- content: |
