  author: "Javier"
  lang: "en"
- content: |
    As a user and advocate of free and open-source software, I express my deep concern regarding Google's recent decisions that progressively erode the open nature of Android. The reduction of AOSP releases from four to two times per year [[13]], the development of the system behind closed doors [[21]], and the new developer verification program that threatens independent repositories like F-Droid [[17]], represent a shift toward a more controlled and restrictive model. Android was born as a promise of freedom for manufacturers, developers, and users; turning it into a closed ecosystem not only betrays its foundational principles, but also limits innovation, competition, and users' right to control their own devices. I demand transparency and a genuine commitment to open source.
  author: "Dalien"
  lang: "en"
- content: |
    Android earned its place in the market because it was open. The ability to sideload applications isn't a loophole — it's a feature, and a promise. It's what set Android apart, attracted developers, and gave users real ownership over their devices. That openness, rooted in the same Linux principles Android was built on, is the reason Google is where it is today.
    
    Restricting sideloading would be a profound betrayal of that foundation. It trades user freedom for platform control, and developer trust for gatekeeper revenue. It is, in short, pulling up the ladder after climbing it.
    
    I believe many in this community — developers, enthusiasts, and everyday users alike — feel the same way. We chose Android because it respected our autonomy. If that changes, so will our choices.
    
    I urge Google to listen to this community and protect what made Android worth building for in the first place.
