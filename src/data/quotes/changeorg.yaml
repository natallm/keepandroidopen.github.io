  author: "Leonardo Enrique"
  lang: "es"
- content: |
    Let me preface this. Sideloading is *installing a program on a personal computer,* for all that it's phone shaped. You might be used to this behavior from iOS, but even Mac PCs will let you install applications that are unsigned and made by other people, and on the closed-source Windows environment it's still *the main way to get applications,* despite there now being two different official app stores on that platform. Nothing needs to be said about the various Linux/Unix environments.
    
    The centralized registration of both apps and developers is not the right approach. It creates a monopoly over who can be an Android developer and will greatly limit the desire to develop apps if it is no longer something that can be done as a hobby but a slow, complicated expense with the requirement to identify oneself. I've done some hobbyist development, but I would not have learned coding if these were the standards I had to meet, and I'd only be losing money. It encourages turning a problem-solving hobby project others might benefit from into a cash grab, or just discourages it entirely.
    
    It will in one blow destroy all apps which are no longer maintained, or those who are developed by people who can't or won't escrow their identities with Google, including myself. It also integrates Google's control over the phone even more deeply into how even the phone's software runs, locking these allegedly open devices even more under Google's remote control, and which is already a challenge for makers of de-Googled devices. I strongly suspect it will also become used to apply arbitrary limitations to developers (read the XScreenSaver privacy policy if you'd like to know more) and block many of the tools we currently take for granted, such as those used to root phones. After all, rooting a phone would likely permit installing arbitrary apps, and Google's security model already "distrusts" those devices to the point that they break e.g. banking apps or DRM, so why would they allow something if it conflicts with their security model and they can now control any code that runs on your device?
    
    In the end, this WILL be used by Google to permanently remove many people's ability to develop apps on Android at all, likely because those people made tools that provided capabilities Google is not willing to offer or let exist on the free market anymore. The ID requirement will prevent them from creating new accounts and the devices will retroactively block even their installed apps from working while preventing those developers, those _people,_ from making more even on other stores (if other stores even continue existing, given that they would effectively become arms of Google just to have the apps work).
