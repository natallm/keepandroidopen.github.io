  author: "Kyler"
  lang: "en"
- content: |
    Having less autonomy over how we use our devices doesn't make us safer, it just makes us more subject to corporate control. I'm not here for that.
  author: "Eleanor"
  lang: "en"
- content: |
    As an Android user in Australia, I'm deeply concerned about what this policy means for consumers worldwide. When I purchased my Android device, I chose it because of its openness and freedom. Google is now unilaterally revoking that promise with a forced update — without consent, without recourse, and without accountability.
    
    This isn't just a developer issue. It affects every person who believes they should have the right to control their own device. I've already contacted the ACCC and my local MP, and I urge others to do the same. We cannot let a single corporation decide what software we are permitted to trust.
  author: "Kaito"
  lang: "en"
- content: |
    I never liked Apple's highly restrictive service for their app and mobile OS. I chose Android because of the freedom of customizability and choice, and ease of access. Do not make Android a wasteland, Google. People who use andriod value privacy and security, while also easily being able to make it better without worrying about who has what information about them. Please, think about the consequences for once.
