    Dear Google,
    
    As a life-long Android user, the perspective of this program ever coming into place is simply devastating.
    
    The Android Project was built with the promise of open-source software, community-driven development and digital freedom at its core. This promise has been a vital part of its success, from its humble beginnings to the widely popular and prolific ecosystem we have today.
    
    Any measure that does not fully respect these core values is a direct threat to the Android Project as a whole and a betrayal of its community. I believe the "Android developer verification requirements" program as it stands is such a measure.
    
    Therefore, I urge everybody involved at Google to seriously reconsider this program to the benefit of the Android Project and its community.
    
    Sincerely-
