    To block sideload in all newer Android devices, not only for Pixel phones that Google own, is not going to enhance user's safety. It makes life more difficult for developers and you are taking away one of the only things that made Android better than Apple. If Google really wanted to enhance users' safety, they would verify better apps on their Play Store or implement a better antivirus that could scan apks and check for malware.
    
    I bought my phone and my tablet with my hardwork and money, I am not a child to not know what I should or shouldn't install inside my phone. Imagine if I couldn't install a necessary software in my computer or test my code just because Microsoft didn't approve of it? That would be absurd. It is my responsibility to know what I can or cannot install in my device, that is not up to a multi-billion company to decide.
    
