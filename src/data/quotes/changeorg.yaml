  author: "José Eduardo"
  lang: "es"
- content: |
    I signed this petition because Android’s strength has always been openness and user choice. Increasingly strict developer verification requirements risk pushing out independent and open-source developers who don’t operate as traditional businesses.
    
    Projects distributed through alternative app marketplaces like F-Droid are often volunteer-run, privacy-respecting, and community-driven. Burdensome verification rules disproportionately affect these small developers while large corporations can easily absorb the compliance costs.
    
    Security matters — but it shouldn’t come at the expense of innovation, competition, and open ecosystems. Android users deserve real choice, and independent developers deserve fair, proportionate requirements.
    
    I’m signing to support an open Android ecosystem for everyone.
