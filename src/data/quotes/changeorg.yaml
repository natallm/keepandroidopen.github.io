- content: |
    I am one of many developers who rely on Android devices as a primary development environment. Using tools such as AndroidIDE and CodeOnTheGo, I build, test, and experiment with Android applications directly on mobile hardware. However, these workflows are already heavily restricted — particularly due to changes introduced after SDK API 28, where dynamic loading of certain native libraries became limited. As a result, many development-oriented applications are now restricted to sideloading only.
    
    In addition, the current Google Play requirement of targeting a minimum SDK level of 31 further limits independent and experimental development workflows. While I understand the importance of platform security and modernization, these changes unintentionally create barriers for developers who build, test, and innovate directly on-device.
    
    I also use Termux extensively to set up full Linux-based environments on Android — including complete distributions with XFCE4 and tools such as code-server or code-oss. This allows me to work with compilers, package managers, scripting languages, and development stacks without requiring a separate desktop Linux machine. For many developers, this mobile-first workflow is not a novelty; it is a practical and accessible development setup.
    
    Recent platform restrictions risk limiting not only convenience, but also the broader ecosystem of open-source innovation on Android. Numerous open-source contributors have invested significant time and effort into building portable Linux environments, developer tooling, and educational setups that run entirely on mobile devices. These projects lower the barrier to entry for students, independent programmers, and developers who may not have access to traditional computing hardware.
    
    If such updates continue to narrow these possibilities, they could effectively undermine years of community-driven work that has enabled Android devices to function as capable, flexible development platforms. Maintaining a balance between security requirements and developer freedom is crucial. Android’s openness has historically been one of its greatest strengths, and preserving that spirit is important for fostering innovation and supporting the global developer community.
