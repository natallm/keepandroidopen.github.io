  author: "Lori"
  lang: "fr"
- content: |
    The entire reason I have stuck with Android phones until now was my ability to INSTALL apps outside of the play store—key word install, not sideload. Even using that term is brainwashed lingo. A phone is just as much of a computer as a PC is, and I should be allowed to download whatever I want on a device a pay for. Especially when, in some cases, a laptop can be cheaper than a phone these days. This has always been a meaningful feature to me.
    
    Then there is the fact of censorship & creating a hostile environment for smaller dev teams. Having to pay a fee to Google, having to disclose IDs (this is also counterproductive to privacy focused apps). Any application that Google deems unfit, they can rip from the store. The 3rd party stores that Google will "let us" download from are no different from the Play Store. All those developers will still be subject to what Google is doing.
    
    If Android is going to become reskinned IOS, I would rather move to Apple. It's better optimized with many apps that absolutely DO NOT function near as well on Android or get updates way later than Apple. It's a smoother, cleaner product. Though, truly, I want to go to Motorola as they are planning to work with GrapheneOS which is privacy & security focused (which Google isn't! And this move is not making Android more secure!)
    
    These practices are anti-consumer AND anti-competition. Monopolistic, dirty practices. It's shameful that Google is still trying to act like they are an "open" system in the slightest while they actively shut out our ability to—again, INSTALL applications on our phone, which is essentially just a computer in our hands. Imagine if Windows did this, or even a Macbook. The free world is about having free choice, and this isn't that. I will absolutely be moving away from Android if this changes take effect. In the meantime, I'll take my in-app purchases to the actual websites behind them, use F-Droid & various places to download APKs to update in place of the Play Store.
    
    This is abhorent.
    
    TL;DR: Google is awful, hates consumer and developer freedoms, & yearns for censorship and growing it's monopolistic empire. I will be moving to any other phone if this happens.
