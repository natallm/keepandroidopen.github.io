  author: "Mohammed"
  lang: "en"
- content: |
    As a developer, a main appeal of Android has been that I can write my own software for it. I've shared some of my more polished and completed apps with others, although my primary motivation has been to "scratch an itch".
    
    Although F-Droid doesn't track download or usage stats, I can tell from comments in my github issues that the majority of the users of my apps have found and installed it from F-Droid. Likewise, most of the software I've installed on my own device comes from F-droid. I like the focus F-Droid apps have on privacy and find the quality to be much higher on average than on the Google play store.
    
    I strongly recommend that F-droid, other 3rd party stores, and the ability to install an .apk file from any other source is retained. Users deserve the freedom to use their device as they see fit, and should be respected enough to decide that for themselves.
    
    Google has already shown itself to be a poor gatekeeper when it comes to deciding what is allowed in the Play Store. High quality and immensely useful apps have been removed for being incompatible with increasingly restrictive policies (such as Termux), while low quality clones of existing apps, ad spam, scams, and outright malware, continues to be allowed.
    
    I will not use, recommend, nor develop for an ecosystem where Google has the only say in what I'm allowed to do with it.
