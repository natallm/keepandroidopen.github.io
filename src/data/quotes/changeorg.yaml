    Estimado equipo de Google,
    
    Me dirijo a ustedes con respeto para expresar mi preocupación sobre las posibles nuevas políticas que podrían limitar la instalación de aplicaciones fuera de la tienda oficial.
    
    Una de las características que históricamente ha diferenciado a Android de otros sistemas operativos es su apertura y flexibilidad. La posibilidad de instalar aplicaciones desde fuentes externas (como repositorios independientes o plataformas de desarrollo) ha permitido el crecimiento de comunidades, desarrolladores independientes y proyectos innovadores que muchas veces no tienen cabida en la tienda oficial.
    
    Limitar esta función afectaría directamente a:
    
    Desarrolladores pequeños que distribuyen sus aplicaciones de forma independiente.
    
    Usuarios avanzados que desean probar software en desarrollo o de código abierto.
    
    Comunidades que dependen de herramientas especializadas que no siempre cumplen con todos los requisitos comerciales de la tienda.
    
    Entendemos y valoramos la importancia de la seguridad. Sin embargo, Android ya cuenta con mecanismos como advertencias de seguridad, permisos granulares y Google Play Protect, que permiten informar y proteger al usuario sin eliminar su libertad de elección.
