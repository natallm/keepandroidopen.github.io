- content: |
    Android has always been about freedom on mobile, unlike iOS, and must remain so permanently.
    
    Developer identity verification on Android will not stop fraud and other malicious activities by fraudsters and scammers. They can use the browser, calls, or SMS to continue their malicious activities with impunity. This intrusive developer verification method will push both users and developers to use dangerous workarounds to run their preferred APKs outside the Play Store on Android. Furthermore, it will expose each APK developer's identity to data leaks, facilitate identity theft, and endanger everyone's privacy not to mention that it restricts the freedom of expression of developers.
  author: "Samuel"
  lang: "en"
- content: |
    Android's open-source roots NEED to be worth fighting for.
    
    When Google released Android under the Apache License in 2007, it was a revolutionary move which allowed manufacturers, developers, and tinkerers worldwide to build on top of it freely.
    
    That openness is literally WHY Android became the dominant mobile OS, powering over 70% of the world's smartphones today.
    
    The ability to side-load APKs (install apps outside the Play Store) has been a cornerstone of that openness.
    
    It's what allows:
    
    • Independent developers to distribute apps without paying Google's 30% cut.
    
    • Users in regions where the Play Store is restricted to still access software.
    
    • Open-source app stores like F-Droid to thrive.
    
    • Researchers and security professionals to test and audit applications.
    
    • Enthusiast communities to keep older devices alive with custom ROMs which ALSO REDUCES GLOBAL E-WASTE.
    
    Compare this to iOS, where Apple has historically locked down side-loading entirely and ask yourself this important question, do we want Android to go down that same path?
    
    Restricting APK usage doesn't make users safer it just consolidates Google's control over what software you're allowed to run on hardware YOU purchased & own.
    
    The history of computing shows us that open platforms drive innovation, closed ones drive profits for gatekeepers.
    
    Android was built on the iconic Linux platform, a global community project.
    
    Let's not let that legacy be quietly dismantled in the name of "security". Android was built to be OPEN and its name says it all, ANDROID OPEN SOURCE PROJECT.
