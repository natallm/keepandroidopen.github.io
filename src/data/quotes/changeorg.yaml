  author: "mehedi"
  lang: "en"
- content: |
    I'm a developer considering deploying to Android as a platform. The option to not require Google's involvement is a highly enticing aspect, and I could see playtesting Android games by means of "hey, you're my friend, can you play this on your Android device and see if it works well?" with a signed APK becoming an absolute nightmare to deal with in the event of rapid updates caused by constant back-and-forth discussions if this goes through.
    
    Not only is this bad for the consumer on a nightmarish level, it could very well destroy the development environment of the platform, the main reason people develop for it so much more than iOS, as well. Google should be ashamed of even considering this for more than a few minutes and doing anything more than laughing the idea off the moment it was brought up, even less attempting to go through with it.
    
    I can't imagine your investors will be happy when everybody stops developing for your platform and you have far less people using it as well, either. Maybe think about the long term here. Y'know, instead of all the short term thinking kinds of mistakes that lead to things like Stadia going wrong.
    
    Don't let Android become your next Stadia, Google. Stadia failed not because of the concept, but because of tons of poorly thought out decisions that seemed good for the short-term that were horrible for any longevity, trying to focus too much on existing big heavy hitters being sold on the platform instead of trying to make a proper case for what it could uniquely bring to the table for example. It isn't out of the dang question this could make Android's upcoming versions into your next Stadia-tier failure.
