  author: "Michael"
  lang: "en"
- content: |
    As a user, I will always opt to sideload apps whenever possible. Whether I need a photo editor, keyboard app, audio equalizer app, or any other kinds of apps, I consistently seek open-sourced sideloading options before I even consider using the Google Play Store. Whenever I need any mobile app that isn't social, I prioritize finding an open-sourced app solution. With Google's dominance in the global mobile OS market, it's clear they will attempt to restrict any freedoms of their OS that they can get their hands on if they're not stopped.
    
    The importance of maintaining the freedom to sideload apps has never been more critical. Legislative initiatives like the App Store Accountability Act, which pushes users into surrendering personal private details to proprietary third-party solutions for identity verification, underscore why sideloading is a crucial defense line. If Google is allowed to proceed with implementing these restrictions, users will likely get funneled into using its proprietary app store, forced to share personal information like age and biometric data that links back to them for targeted ads and surveillance. Google's push for limiting sideloading is a textbook case of anti-competitiveness as well.
    
    The danger of this change can be summed up in an analogy: if some people occasionally get food poisoning from non-vetted sources, should we altogether limit food access to vendors that are deemed as, 'approved' or 'verified' by a multibillion-dollar, anti-consumer corporation? If this decision doesn't get shot down, there is a risk of being forced to give up personal privacy, autonomy, and choice.
