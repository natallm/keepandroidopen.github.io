- content: |
    To quote Louis Rossmann: "A phone is essentially a computer, and you should have the autonomy to install whatever programs you want in your computer." (or something like that)
    
    Still, we can't deny that this is Google being petty for a multitude of reasons *cough* YouTube ADS *cough* and hopping aboard the "hand over your [government issued ID]" train in their own way. And apparently, they're going after our hardware with this one, since they just realized they can't prevent users from fiddling with software server-side.
    
    Again, there are plenty of privacy-invading and data-harvesting apps on the Play Store itself, but the data also goes to Google, so they're buddy-buddy on that. Anyway, you probably already know the rest of the script at this point.
    
    Now, onto my personal experience, I love the fact that I can install so many quality and useful open source apps made by developers who, (I'm probably underestimating here) sometimes, made those apps out of a personal need. Third party GApps front-ends, more tools than I can count, NewPipe forks, gallery apps that won't harvest data in the background — all of those, open source, with no trackers and no free data for Google, which is another reason why they're doing this.
