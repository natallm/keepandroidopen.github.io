    As a big android user I love the option to try out apps that people make that dont want to use google play. Or the ability to sideload an app if its not "officially" supported but can run fine. The open nature of it is what makes things great and taking that away will push away people.
  author: "T"
  lang: "en"
- content: |
    I use Graphine OS btw
  author: "Clinton"
  lang: "pt"
- content: |
    Quando entro na Google Play Store, vejo que está cheia de aplicativos proprietários de baixa qualidade e sem respeito à privacidade dos usuários. Enquanto isso, uma quantidade significativa de aplicativos opensource leves e confiáveis fica despriorizada nas buscas, precisam fazer cortes funcionais (ex: Nextcloud) ou sequer conseguem se colocar nessa loja. Eu dependo diariamente da instalação de APKs para que meu telefone funcione com mais eficiência e segurança.
  author: "Paulo"
  lang: "pt"
- content: |
    Keep Android like it started, open and free for anyone!
  author: "Edgar"
  lang: "en"
- content: |
    O sistema Android não pode ser fechado, isso é uma luta a favor do software livre e da privacidade de qualquer um
  author: "Pedro"
  lang: "pt"
- content: |
    This does not protect anybody. All it does is restrict an OS that was supposed to be open. This was one of the main benefits of Android over iOS, and now it's being removed. This also kills the open source ecosystem, since alternative app stores cannot function if all developers are required to pay Google and pay a fee. Ordinary users are already protected from malware with Google Play Protect, and app sideloading disabled by default. This does not help anyone. Even calling it sideloading is misleading, since we own the device NOT Google. On a computer, this is called installing software. It shouldn't be different on a phone. This will also allow government censorship of apps that protect privacy. Overall a terrible idea.
  author: "Daniel"
  lang: "en"
- content: |
    You're forcing us to create an alternative. We live in an age of increasingly powerful AI, we will not let you control everything.
  author: "Anthony"
  lang: "en"
- content: |
    Isso afetara pessoas de todo o mundo, sou americano e brasileiro, e estou aqui para ajudar cobtra isso. Liberdade para o android e seus usuarios.
  author: "Jolin"
  lang: "pt"
- content: |
    Its my phone im doing as i please with it
  author: "Brayden"
  lang: "en"
- content: |
    I didn't think I could dislike Google any less than I do already for their anti freedom posture, but, yeah they've fallen even further. Google is the enemy of freedom no matter where you live.
  author: "Daniel"
  lang: "en"
- content: |
    I care about digital freedom because the digital world should have the same freedoms as the real world.
  author: "Anabel"
  lang: "en"
- content: |
    Android desde siempre fue una plataforma libre no dejemos que nos quiten esto
  author: "Hot"
  lang: "es"
- content: |
    The openness of Android is the *only* reason many of us care. We understand Google is trying desperately to make as much money as possible, but locking down the developer ecosystem will result in the exact opposite effect. Short term thinking for short term gain.
  author: "Avery"
  lang: "en"
- content: |
    I honestly don't understand why this even has to be petitioned for in the first place. It should be self-evident that it should be entirely up to the user what software should be installed on their own device.
  author: "Patrick"
  lang: "en"
- content: |
    En août 2025, Google a annoncé qu’à partir de septembre 2026, tout développeur Android devra s’enregistrer auprès de Google (frais, identité, conditions, clés de signature, liste d’applications) pour pouvoir créer des apps.
    
    Selon le texte, cela met fin à l’ouverture d’Android :
    
    > les utilisateurs perdraient la liberté d’installer librement des logiciels.
    
    > les développeurs ne pourraient plus partager leurs applications sans l’accord de Google.
    
    > Les États verraient leur souveraineté numérique affaiblie au profit de Google.
    
    > Puisque Android équipe environ 85 % des smartphones dans le monde, Google deviendrait le seul arbitre de ce qui est autorisé ou non sur la plateforme.
  author: "Robin"
  lang: "fr"
- content: |
    The reason I don't like the IPhone ecosystem is because of how restricted it is, inwas able to support games or authors who don't publish on Google playstore due to what country they live
  author: "Hairon"
  lang: "en"
- content: |
    If I want to be restricted in where I get my apps from, which ones to install and my phone to look each year the same, I buy a device with an apple on it (never did).
    
    It should be your choice which apps you want to install and where to obtain them from - not the device vendors or OS manufacturers. Keep android open!
  author: "Andreas"
  lang: "en"
- content: |
    Al implementarse esta medida, se estaría impidiendo por completo la instalación de aplicaciones que ya no cuentan con soporte oficial y han sido eliminadas de la Google Play Store por esta misma razón logrando que muchas de estas queden en el olvido para aquellos apasionados a la nostalgia que aún recuerdan los tiempos de Flappy Bird.
  author: "Kiara Isabel"
  lang: "es"
- content: |
    I'm tired of the world becoming largely more authoritarian and censorial in general. Forcing developers to tie their personal identification, pay a fee to Google, and requiring one to be a part of a poorly curated program of developers makes absolutely no sense at all. It is clear this is an attempt to further monopolize the app market by Google in order to extract more profits, while also making it easier to surveil and censor owners of Android devices. As an open source developer, and privacy enthusiast, these points allow such communities to not even flourish, but to simply exist. This locking down of the operating system, while providing no meaningful alternatives WILL kill such communities. I make a point to use as many open source applications on my phone as possible, because so many applications on the Play Store are primarily data collection mechanisms with the app's advertised use being secondary.
    
    This sucks.
  author: "Shaun"
  lang: "en"
- content: |
    I'm not even an Android app developer, but I've always wanted to be. Now, I'm not sure that I do.
    
    Making this change will mean that all apps will funnel through Google Play, which gives Google exclusive control and a censorship chokehold on the entire Android ecosystem. I shouldn't have to explain why that would not be good.
    
    The whole thing that made Android different from iOS is that it was OPEN. Now Google's just throwing that out of the window. At this point, I might just switch to iOS because Android has lost all of its character.
  author: "Ethan"
  lang: "en"
- content: |
    If google does go through with this I will do everything in my power to convince anyone with an android or google service to stop using it.
  author: "James"
  lang: "en"
- content: |
    The whole reason I love android is due to openness and freedom, Google taking this away makes me mad because that's a staple point for Android gone. As a regular user, I use the F-Droid store, as well as finding apps directly on GitHub.
  author: "Micheal"
  lang: "en"
- content: |
    What software I choose to create or install on my computing devices, no matter whether they fit in a pocket, is my choice alone. Google, Microsoft, Apple, et al. have zero business trying to arbitrate how I use the hardware that I own.
    
    Android is quickly becoming the very thing it swore to destroy--an opaque, locked-down, walled garden where the very concept of ownership is drawn into question--and I am already taking steps to distance myself from it should the worst come to pass.
  author: "James"
  lang: "en"
- content: |
    My main reason for not using Apple devices is the 'mommy' factor. Now Google is going to be my mommy too. It's my device. If I accept the risks involved in how I use it, that's my choice - NOT GOOGLE'S!
  author: "Ed"
  lang: "en"
- content: |
    Preferisco Android perché è una sistema aperto e mi permette di utilizzare applicazioni sviluppate da migliaia di straordinari sviluppatori. Molte app che utilizzo per il mio lavoro, per il controllo del cellulare, per la gestione della produttività, per l'intrattenimento sono open source e installare tramite f-droid. Chiudere il sistema Android contraddice l'etica dell'azienda e limita gli utenti che credono nell'open source e nella pluralità dei servizi.
  author: "Gerardo"
  lang: "it"
- content: |
    If android truly blocks what are some of my favorite apps from developers I trust, I will no longer be using "smart" phones without root. It'll be graphine or flip phones, I promise you.
  author: "R"
  lang: "en"
- content: |
    Keep android open!
  author: "Giuseppe"
  lang: "en"
- content: |
    This is despicable behavior on Googles part. I own my device, therefore I get to decide what I want to install to it. Period. End of story. Some corporate suite halfway across the country shouldn't be allowed to decide what I can install on my device. We need to stand up to this kind of abuse of power.
  author: "Devin"
  lang: "en"
- content: |
    If android isn't open source then it's straight up just a worse iOS
    
    literally the only reason we use it is the fact that it's open source 💀
  author: "Natalia"
  lang: "en"
- content: |
    O bom dos Androids era a liberdade, e até isso vão tirar agora, se for assim o jeito é usar PC
  author: "EDSON"
  lang: "pt"
- content: |
    Google has shown a lack of respect for user privacy their entire existence. You own your device, you spent hundreds of dollars/Euros for it. It was not a loan by Google, it is yours, and you should control what you use it for.
    
    People who want to use only Google verified apps are free to do so without having to infringe on the rights of the people knowledgeable enough to make the decision to use apps from outside Google's Play store.
    
    Google and others have long criticized Apple for this exact thing, to the point that they're in a lawsuit for it. For Google to try this shows a complete lack of respect for the customer, a lack of integrity, and complete and utter hypocrisy.
    
    If I want to make a personal app to control a toy I made and programmed, why should I have to give Google my personal information, jump through extra hoops, give them my code, and PAY them for the privilege of doing my own work? It's ridiculous. It's pure corporate greed.
    
    More than that, it's an attempt from Google to control your device. Yet another avenue for censorship, surveillance, and the road towards a world without any freedom, all under the guise of "safety."
    
    This is not just an attack on you and your device. This is an attack on your freedom as an individual and your right to your privacy and choice. This shouldn't just be a petition, this needs to be nonnegotiable.
  author: "Paul"
  lang: "en"
- content: |
    Love android because its open source, you're literally killing your base and the reason why people love android. Close it down and we will all find a better solution
  author: "Courtney"
  lang: "en"
- content: |
    I wanna install anything I want
  author: "Macintosh"
  lang: "it"
- content: |
    This is absolute NUTS. I have some small apps I made that simply allow me to copy text to and from the clipboard to a central server I run, and I have programs on other OS's that can access it in a similar way. It's possibly THE most useful program I ever wrote in my life as I use it nearly every day. The idea that I have to pay to do the google dance just to run my own damn code is insane. Being able to run whatever software we like and access the file system is the whole point of android. Without that, we might as all just pay apple tax.
  author: "Jonathan"
  lang: "en"
- content: |
    I didn't sideload an app on my phone. I installed software on my handheld computer (phone). I own my device, not Google.
    
    This overreach of only being able to install Apple, Google, or Microsoft apps and nothing else is likely to spread to our personal computers if it is not stopped now with our phones.
    
    Google Play already protects from malware on the phone no matter where an app was installed from. This is NOT about security and lowering risk.
  author: "Amber"
  lang: "en"
- content: |
    Android was created as an open platform. That openness made custom ROMs, alternative app stores, and independent FOSS projects possible. Limiting third-party APK installation reduces user choice and hurts independent developers. Security matters, but it should not remove legitimate options. Keeping Android open protects innovation and freedom of choice.
  author: "Kevyn"
  lang: "en"
- content: |
    One of the only reasons I use Android today is because of the openness of the operating system. Without it there is no reason why I would pick an Android phone over an iPhone. Most of the apps I use are not found on the playstore because I like to tinker a lot. I also like to make small applications for myself, my co-workers, and friends. Requiring a fee would completely shut down my ability to create niche apps that I already wouldn't be profiting on.
  author: "LANDON"
  lang: "en"
- content: |
    I've been an android user since I got my first smartphone a galaxy 3, I've been extremely happy with the amount of peronality I can add to my phone and I've stuck with the android platform because of it. This move towards locking away the freedom to create apps without the oversight of google is a disturbing and should be stopped. Google, please stop this, be the better company, don't become Apple. Be the voice of freedom.
  author: "Sean"
  lang: "en"
- content: |
    A significant amount of the apps I use are small hobbyist open-source apps who would not want to go through the verification process just to have their apps be able to be easily installed, and this would effectively kill almost all of them
  author: "Trevor"
  lang: "en"
- content: |
    this discourage even people that want to start at programming
  author: "Elton"
  lang: "en"
- content: |
    I use android because it is an open platform. If this goes through, developers will stop making apps so I might as well move to apple.
  author: "John"
  lang: "en"
- content: |
    Why are all these companies trying to push me to Linux? Do they not like money?
  author: "Niel"
  lang: "en"
- content: |
    The ability to download apps directly from developers is one of the main differentials of Android from IOS. Limiting this will severely impact the market share of Android by removing basically any reason anyone would want to use Android over IOS.
  author: "gabriel"
  lang: "en"
- content: |
    To move forward with the developer verification process is both anticompetitive and counter intuitive. Google stands to lose it's only incentive to attract users and developers. To build from a foundation of open source/free software to this is simple greed. Without such foundations Android wouldn't exist today, nor would modern technology. This process will simply hurt consumers, developers, and Google as a company. It will bring forth a new competitor who cares about digital freedom and open source software. Please reconsider. Don't be evil.
  author: "Davy"
  lang: "en"
- content: |
    dejen de decidir a escondidas pisotear los derechos de la gente
  author: "wilberto"
  lang: "es"
- content: |
    Android is and has been the operating system that gives everyone the freedom to install any apps they want. The action of adding in a developer verification is simply redundant, anyone who goes out of the Google Play store to sideload knows its risks and why they are doing it. It is the only mobile operating system that allows us to do so, we won't let Google stop us.
  author: "Yuquan"
  lang: "en"
- content: |
    Android became popular because it offered
    
    freedom and customization. Reducing APK
    
    access risks moving away from those
    
    values and limiting innovation within the
    
    ecosystem.
    
    We are asking Google to protect user
    
    choice, maintain transparency, and
    
    preserve the openness that defines
    
    Android.
  author: "Assif"
  lang: "en"
- content: |
    My whole reason to use Android is because it's open. At this point, you're just making a shittier version of IOS by locking down Android...
  author: "Zakaria"
  lang: "en"
- content: |
    fuck you google
  flag: "contains profanity"
  author: "B"
  lang: "en"
- content: |
    Intelectual property is a disgrace! If what Google is trying to do is normalized it will eventually reach other OSes and it could kill game preservation via emulation. Not only that, they are also trying to normalize putting ridiculous restrictions to the freedom of the developers which could eventually kill open-source or at least make it unimaginably worst!
  author: "Guilherme"
  lang: "en"
- content: |
    The differentiating factor with Android was always freedom. Apple had a locked down market and their own thing over there, meanwhile Android was open. I don't want to give up my tech sovereignty so a corrupt multinational conglomerate can harvest my data and shove more useless bloatware onto hardware I own, all while forcing mass surveillance.
  author: "Michael"
  lang: "en"
- content: |
    If this goes in effect there's literally no reason for me to stay on android. Would likely either go graphene but that feels up in the air for long term support so I guess that leaves apple. And I already hate walled gardens. Especially when the play store is basically just a malware repository. I'm so tired of corps eroding our freedoms. Why must everything be enshitified this day an age.
  author: "Coleman"
  lang: "en"
- content: |
    I use Android phones rather than iphones because it allows for more user end control, including the ability to use/install open-source apk.
    
    If the choice is made to restrict this functionality, my next phone will not be an android.
  author: "Rebecca"
  lang: "en"
- content: |
    It would be a catastrophic degradation for quality of human life if portable computing were to become locked behind the domineering control of platform companies such as Google. It must be stopped.
  author: "Edward"
  lang: "en"
- content: |
    fuck off Google
  flag: "contains profanity"
  author: "aldiyar"
  lang: "en"
- content: |
    Android has been the bastion for users who did not want to accept companies deciding what we do with our devices, it is imperative that users are granted the freedom of choice to install any software they wish, and to develop software to innovate and solve issues that Google or its partners decide is not worth their time.
  author: "Hassan"
  lang: "en"
- content: |
    Android siempre fue la cara libertaria frente a la cara opresiva de iOS y ahora quieren traicionar el sentido original restringiendo a nuestros desarrolladores que no quieren doblegarse ante una empresa tercera
  author: "Jose"
  lang: "es"
- content: |
    Android since it start has its premisse of being a free place that you can do what you want, but with this change it is not possible anymore. This is restricting user freedom and censoring what can and cannot be displayed at android.
  author: "Kaio"
  lang: "en"
- content: |
    Google wants developers to pay them a fee even though it has nothing to do with them. Also I own my phone I get to decide what's on it not Google. I'm also cancelling all Google subscriptions because I don't want to support this company anymore.
  author: "alex"
  lang: "en"
- content: |
    I personally knew Android because of it's open nature. Seeing this made me heartbroken. I am all about rooting so sideloading is a crucial part in some rooting operations I do on my device. Now I can't have any more cool mods on my device anymore. Thanks Google.
  author: "chau"
  lang: "en"
- content: |
    the declaration of independance prolly said something about this...
  author: "john"
  lang: "en"
- content: |
    By what standard?
  author: "Alex"
  lang: "en"
- content: |
    Government ID verification inches us even closer to a dystopian survallience future without open rights, without freedom of choice, and with orwellian control over our lives. Fight back against this and talk to your family and friends.
  author: "dev"
  lang: "en"
- content: |
    I download many applications outside the Play Store because it doesn’t offer the variety I’m looking for. Instead, it constantly pushes advertised apps in front of me, which makes it feel like I’m being guided toward what benefits the platform, not what I actually want to explore.
    
    Restricting this freedom feels less about protecting users and more about protecting the platform’s own interests - its revenue and its control over what people can access. It’s like forcing me into a cage, but making it legal - where my ability to choose and explore freely is no longer truly my own.
  author: "Dawn Alexis"
  lang: "en"
- content: |
    This is ridiculous the fact that google is causing this will effect everybody it's gonna make it way harder for developers to post there apps to specific users.
  author: "Daisuke"
  lang: "en"
- content: |
    Personal freedom and technology literacy are two things that allowed me to become so interested in technology in the first place around 4 years ago, and neither of those things are possible without the ability to realize what your phone is doing when installing an app, as well as the ability to look at the code of an open-source app to see how it works. It is allegedly about security, but that is a very insignificant byproduct compared to the real reason you were compelled to introduce this change that applies retroactively, server-side, and to everyone with no manual override, and you have abandoned all pretense of even saying "we're just checking for malware in more places". You aren't even lying to us anymore! You already scan all apps for malware and force all users to go through a series of checkboxes to be able to install apps from alternate sources, which is more than enough guardrails for the hypothetical person you want to protect, who is so smart to not just download but install an APK, but so dumb they install malware and don't realize. For what? So 99% of people will notice nothing different about their device while 1% of people will lose everything that they care about? No, it's not about that. You know that you are turning a perfectly guarded town into a police state. There might be less unpunished crime by the citizens, but that comes at the cost of more state-sanctioned crime from power-tripping assholes wanting to do the king's bidding. But we are waking up to this fact. And even besides these dictatorial changes made due to unregulated business practices, these people in power wanting you to censor their opponents will soon be kicked out, and you will face accountability for these actions you have taken to support the worst of the worst when you had the power to do the opposite. Reverse this proposition, and we'll turn the crosshairs to someone else for now. Actively fight against the enshitification of technology itself, either by example or encouragement, and we will welcome you, because our side is correct and improves the human condition, so it will win.
  author: "Cameron"
  lang: "en"
- content: |
    Android has always stood for user choice. The freedom to install apps from outside an official store is a core part of what made the platform different and appealing in the first place. Removing options like sideloading moves Android away from its original philosophy.
    
    I develop apps for personal use, and I have no interest in becoming an “approved developer” just to run my own software. Not everyone has the time or desire to navigate additional gatekeeping just to maintain control over their own devices.
    
    Limiting these freedoms sets a concerning precedent. It shifts the platform toward tighter control, reduced openness, and potential monopolization. Android began as an open operating system — moving away from that foundation risks turning it into a closed ecosystem that mirrors the very model it once differentiated itself from.
    
    Restricting user choice under the banner of “protection” doesn’t benefit everyone. Many users value autonomy, flexibility, and control over their own hardware. Removing those options feels less like protection and more like limitation.
  author: "Dennis"
  lang: "en"
- content: |
    This is censorship at its core. Stop trying to destroy the open internet under the guise of safety.
  author: "Dominic"
  lang: "en"
- content: |
    Welp if APK files limited then there is no need for us to use android from now on.
  author: "Emir"
  lang: "en"
- content: |
    Hey Google.
    
    You are a silent cancer. You've engulfed everything in your path for decades: true innovation, billions of unsuspecting people's data, healthy competition, and choice. You've been sued, repeatedly fined, and ordered to break up your monopoly (you haven't), yet you keep metastasizing. I could cite historical, philosophical, religious, even SciFi metaphors of what you are, but "plague" is sufficient.
    
    For the love of humanity, if in fact there's anyone left at Plague HQ who still identifies as human, keep your metastatic tentacles off the Android Developer Platform. You've done enough harm already.
    
    Signed,
    
    The last cancer-free organ you have yet to destroy
  author: "Andromeda"
  lang: "en"
- content: |
    Android having the ability to sideload apps is a core part of the eco system it's like if you couldn't install a .exe on windows.
    
    The core thing some of us went to android for is openness but if they take that away we will leave as fast as we arrived.
  author: "Teddy"
  lang: "en"
- content: |
    One of the core principals of Android has been consumer choice. Especially in the current day, it's more important than ever that the consumer can choose where to get their software from. As a developer myself, I do not want to and WILL NOT sign up for the developer verification program, as Google has no right to tell me what I can do with my device. I do not trust any company to keep me safe, and especially not when they're overreaching into the personal lives and choices of the everyday user.
    
    Even from a consumer quality of life perspective, this change is hugely detrimental. Google Play is infested with ads, bad faith apps, sponsorships, and so much more I do not want to see. Alternative storefronts give users the choice to avoid clunky, nasty pieces of software and choose what workflow is best for them.
    
    I beg, please reconsider this choice and keep consumer's rights intact.
  author: "Alexander"
  lang: "en"
- content: |
    I use Android because it's free than OS so what will be the difference between iOS and Android if it's not for "site loading".i am simply user not a developer I like to be able to take a software and install it with my device.Don't be evil but that's not true anymore but remember for where you coming from if you forget this your roots you have no future.
  author: "Krasimir"
  lang: "en"
- content: |
    The push toward a mandatory, centralized developer verification program for Android represents a significant departure from the open-source values that originally defined the platform. By requiring independent developers to pay fees, surrender private signing keys, and provide government identification just to share an app—even outside the Play Store—these policies create a massive barrier to entry that threatens to stifle innovation and privacy. This shift doesn't just add friction; it risks dismantling alternative ecosystems like F-Droid and Aurora Store, which have long provided a vital refuge for those seeking software free from big-tech oversight. If we allow the door to close on sideloading and force every developer behind a paywall, we are effectively trading a diverse, free ecosystem for a "walled garden" that prioritizes corporate control over user agency and digital rights. It is essential that the community stands together to keep Android an open platform where developers can create and users can choose without needing a centralized permission slip.
  author: "Andrew"
  lang: "en"
- content: |
    I use Android because of it's ease of use. If this goes through, I will be installing a completely different OS. This is Microsoft forcing us to download Windows 11 all over again.
  author: "Aden"
  lang: "en"
- content: |
    Queremos Android libre y sin censura. Bajar aplicaciones de otras fuentes debe ser un derecho digital.
  author: "Sergio"
  lang: "es"
- content: |
    I should be allowed to make my own decisions about what I want to install on my device, smartphones nowadays are basically pocket computers and the ability to install apps from any source is by far the biggest reason I chose Android over iOS. Only being able to install apps from verified developers also gives power to Google to censor apps they don't like.
  author: "Ryan"
  lang: "en"
- content: |
    Android has always been defined as the more open platform. What gets people to move away from Apple is to get away from the closed ecosystem from having direct control over their own devices. This runs contrary to Androids original mission statement and what the platform stands for. This is not what I want for my device nor my family wishes for this either.
  author: "Logan"
  lang: "en"
- content: |
    Do not allow this tyranny! Refuse this overeach and help promote free software and your right to be able use your device the way YOU see fit.
  author: "Nichita"
  lang: "en"
- content: |
    Google isn't trying to protect us from malware with these policies; it's simply trying to control the platform it owns to profit from its platform and the data it collects.
  author: "Tiburcio"
  lang: "en"
- content: |
    I was really shocked when I heard that such thing is happening. I mean, isn't the point of Android itself to be fully open, especially compared to competitors as iOS? What's so wrong with a person developing apps as their passion/hobby? I don't think it is necessary to have to upload a government ID to a corporation just to make your app be able to be usable. It also impacts me, because I use very many open source apps as alternatives, which fit my usage a lot better, and I like to support those projects, and one more point, many people switching from iOS to Android are looking for the freedom that is sideloading apps without any hurdles. This has to change, or chaos would ensue around the Android world, and especially FOSS communities.
  author: "Arsen"
  lang: "en"
- content: |
