  author: "Huang"
  lang: "en"
- content: |
    Everything about this software/app lock out is beyond wrong. So is age verification. It is all beyond dystopian. George Orwell is spinning in his grave.
    
    My wife works in a major hospital and that hospital is already in a major panic because they have internal apps that can not be put out to apps stores for major security reasons. They have no idea what they are going to do when these apps stop working and can not be installed, used or updated because of these dystopian lockouts (i.e. blocking non app stores' apps from being installed; not to mention the major security risks of age verification).
    
    The app monitors many vital operations and medical equipment across three major medical facilities in the same hospital network; among branch facilities. It alerts staff and is used for many areas of communications in the hospital network. If this app can no longer be integrated into the hospital's operations network, the entirety of the hospital's facilities shuts down.
    
    I'm sure that if the hospital at which my wife works uses internal apps, then there are many other medical facilities that do also.
    
    A neighbor that I check on daily uses an app for necessary medical reasons. This app is not and will never be in any app store. Her doctors and the company that makes the device for thousands of people are in a panic. They can't just put this control/monitoring app out there. They would have to redesign the device's entire system and it could take several years. Plus, there are the major security risks.
    
    A friend has advanced diabetes and has a monitoring device stuck in his arm. The monitoring/alert app comes from the device manufacturer and not any app store.
    
    I also use medical apps that are not in any app store. I am also diabetic (not as badly as my friend) and disabled.
    
    There are several other people in my area that depend on medical apps that are not in any app store and are ONLY provided through a medical facility or medical device manufacturer.
    
    These companies do not put these apps out to these app stores for anyone to get their hands on for security reasons. If someone malicious got their hands on these medical device control apps, tampered with it, and re-uploaded it for patients to then obtain, thousands of patients could die.
    
    What am I and all these people that depend on proprietary and device specific medical apps across the country going to do when our apps/devices can't be installed or updated and just stop working?
    
    These dystopian app lock outs and the risks of age verification will put millions of peoples lives on the line and will have biblical level consequences.
    
    This all needs to stop immediately!
