  author: "José Bruno"
  lang: "pt"
- content: |
    Prezada equipe do Google,
    
    Venho, por meio desta mensagem, manifestar minha preocupação — compartilhada por milhares de usuários e desenvolvedores da comunidade Android — em relação às novas diretrizes e restrições que estão sendo implementadas na plataforma a partir de 2025.
    
    As mudanças anunciadas, como:
    
    A exigência de no mínimo 32 GB de armazenamento interno para dispositivos Android, com 75% reservado para arquivos críticos;
    
    O bloqueio da instalação de aplicativos não verificados (sideloading) fora da Play Store, mesmo quando obtidos de fontes legítimas;
    
    representam um retrocesso na filosofia aberta e acessível que sempre caracterizou o Android. Essas medidas afetam diretamente usuários com dispositivos mais simples, limitam a liberdade de escolha e dificultam o trabalho de desenvolvedores independentes que não utilizam a Play Store como canal principal de distribuição.
    
    Entendemos que a segurança dos usuários é uma prioridade, mas acreditamos que há formas mais equilibradas de alcançar esse objetivo sem comprometer a diversidade e a acessibilidade da plataforma. A exigência de verificação de identidade dos desenvolvedores, por exemplo, poderia ser aplicada de forma mais flexível, sem impedir a instalação de APKs legítimos por parte dos usuários.
    
    Solicitamos, portanto, que o Google:
    
    Reavalie a exigência de 32 GB como mínimo obrigatório, considerando alternativas para dispositivos de entrada.
    
    Mantenha a possibilidade de instalação de aplicativos via APK, com medidas de segurança que não bloqueiem o uso legítimo.
    
    Estabeleça canais de diálogo com a comunidade para ouvir sugestões e preocupações antes de implementar mudanças tão impactantes.
    
    O Android é uma plataforma global, diversa e construída com a colaboração de milhões de pessoas. Pedimos que o Google preserve esses valores e promova um ambiente mais inclusivo, transparente e respeitoso com seus usuários.
    
    Atenciosamente, [Maiko tavares dos Santos]
