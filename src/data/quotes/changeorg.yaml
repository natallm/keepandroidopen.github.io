- content: |
    Google’s decision to end sideloading isn’t about user safety, it’s about control. By banning the ability to install apps outside the Play Store, Google isn’t protecting us it’s protecting its profits.
    
    Sideloading is what keeps Android open. It’s what allows small, independent developers to create and share apps without paying Google’s gatekeeping fees or begging for corporate approval. It’s what lets users, creators, and innovators build their own digital spaces, free from monopolized ecosystems.
    
    Ending sideloading means the end of true user choice. It hands Google even more power over what software we can access, what tools we can use, and ultimately what voices can reach us. This move strengthens surveillance capitalism, deepens corporate monopolies, and pushes us closer to a future where our devices — and our data — belong to corporations, not people.
    
    This is about more than Android. It’s about who controls our technology, our privacy, and our freedom online. We cannot allow one of the wealthiest corporations in history to dictate how billions interact with their own devices under the guise of “security.”
    
    Sign this petition to demand that Google stop its plan to remove sideloading in 2026. Defend open-source values, user rights, and digital democracy. The internet should serve people, not profit.
    
    Together, we can stand up for an open Android and a free digital future for everyone.
