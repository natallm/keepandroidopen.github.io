  author: "Dilan Giovanny"
  lang: "en"
- content: |
    One of the reasons why many people including myself chose Android over iOS is its openness. Android used to treat people like it should - users, who know what they are doing if they decided to enable sideloading (AKA "install unknown apps") or go into developer settings.
    
    If the new restrictions will get put in place, Android will lose this benefit, and while some people will not even notice the difference, others will switch to iOS, a custom ROM, or might start a development effort on an entirely new mobile operating system. Google will end up losing a decent chunk of its userbase.
    
    In addition, if we look at iOS again, they were putting all of tgose "safeguards" (aka restrictions) for a long time, and people were jailbraking their iPhones. Now think about it, if the new restrictions were to be put on "sideloadong", some developers will stop publishing on Google Play, and those users who were using those no longer available apps (especially the inexperienced ones) will start looking for ways to "fix" the problem. This will give rise to shady repair services (especially in developing countries), who will promice to get those apps back onto the users phone (mainly via ADB, as that method will continue to work), but will also end up putting some malware (such as crypto miners) on user devices at the same time. So, with that in mind, would this "developer verification" change really make Android more secure?
