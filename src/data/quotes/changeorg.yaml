    Not everybody wants to be forced into paying a fee to Google, agreeing to their Terms and Conditions, providing a government ID, upload evidence of the developer’s private signing key, or listing all current and future application identifiers. When purchasing an Android, installers like F-Droid served to help with having a widely used open computing platform where you could run whatever software you choose on it rather than having a large tech company like Google control what apps and store fronts you can install from. By making this new change world wide to Android, we're ceding the rights of citizens and their own digital sovereignty to a company with a track record of complying with the extrajudicial demands of authoritarian regimes to remove perfectly legal apps that they happen to dislike.
    
    Google actively has been paying other companies like Apple, Microsoft, Mozilla Corporation, and Opera to keep their search engine as the default option either pre-installed or after manual installation. Additionally, we’ve seen Google completely deprecate support for Manifest V2 extensions to intentionally block the use of powerful free open-source tools like uBlock Origin to consolidate control over the browser ecosystem and protect its advertising revenue over privacy and security. Google claims it’s their “job” to do the right thing by “caring” about our customers well-being despite having a track record of being abysmal with both their web browser and account settings. Even down to the way your Google account is setup and the kind of sensitive information required just to make one.
    
    To forcefully reject such a drastic and unethical change, I’d highly recommend everyone to use F-Droid and install apps which are either completely unavailable in the Google Play Store or ones that utilize free open-source software with an emphasis on privacy and security. Most of which you’ll find are very useful apps that do everyday tasks without added bloat and even valuable ones which aren’t Google’s proprietary solution. We as humans have every right to use whatever software and hardware is most desired along with retaining a very high standard for both privacy and security respecting applications, tools, and resources.
