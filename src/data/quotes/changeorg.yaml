- content: |
    I am genuinely angry about what Google is trying to do by limiting APK usage.
    
    This is not some tiny background tweak. This cuts straight into the reason many of us chose Android in the first place. Android meant freedom. It meant I could install what I wanted. It meant developers could share their work without kneeling before a single approval system. It meant that when I bought my phone, it was actually mine.
    
    We keep hearing that this is about “security.” And yes, security matters. Nobody wants malware. But there is a real difference between protecting users and controlling them. Give people warnings. Give them tools. Educate them. Do not take away their ability to choose. I am an adult, fully willing and capable of deciding what I install on my own device.
    
    When APK usage is restricted, everything narrows. Developers get pushed into one official channel. One review process. One company deciding what is acceptable and what is not. That kind of centralized control should make all of us uncomfortable. It changes the balance of power, and it does it under the soft language of safety and convenience.
    
    This is about ownership. If I cannot freely install apps, do I truly own my device? Or am I just using it within boundaries that can shift whenever it best suits a corporation?
    
    I hardly think it is extreme to say that when I pay for hardware, I should have complete control over what runs on it. That is not radical. That is basic digital autonomy. And I am not okay with watching that autonomy slowly disappear without saying something.
