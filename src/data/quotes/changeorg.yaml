  author: "Santiago"
  lang: "en"
- content: |
    I use android since I was aware of what is tech, nearly since android started as an OS, customizing every aspect of my phone I was capable to, breaking things, some of the things that make android being the sweet spot between being in complete freedom (what can be dangerous) and a kindergarten for cellphone users. In later years still using some good indie apps that the developers can't afford to put on google play, going back in app versions through public apk repos like apkmirror when something went wrong with the current version of an app, and more recently being a software developer.
    
    Today this is nothing but one more barrier to do native mobile apps (adding to resource intensive development tools, excessive boilerplate, steep learning curve, hardware and OS fragmentation, play store current policies, and many more) turning testing and feedback into a headache. I as a developer see a potential loss of talent that could enrich the ecosystem, a place where only startups and companies will survive (driven by capitalism) except for a minority of truly dedicated developers.
    
    I'm not a native English speaker however today I wanted my voice to be heard, doing it so in their language despite the misspelling I could make. I have hope for open source (especially indie); we mustn't forget that many of today's software foundations, including Android, originate from it. I hope they allow, and above all, facilitate the preservation of open source through the small innovations of more casual developers who improve the ecosystem day by day.
  author: "Alexis"
  lang: "en"
- content: |
    My property. My rules.
  author: "Steven"
  lang: "en"
- content: |
    Me duele saber esto de parte Google, justo estoy pasando por mis mejores momentos creando proyectos de fans para fans y eso incluye videojuegos para móvil que no están en la play store, una persona que también que aparte de crear y ayudar como apps como de anime y así, también soy consumidor de esto, para jugar, ver, y disfrutar, tengo por fin un móvil o teléfono que sus componentes me permiten disfrutar de esta experiencia de una manera increíble, y como dije anteriormente, estoy empezando junto con otras personas a crear proyectos, puede ser de lo que sea, juegos, apps, etc. Fans para fans, y ver qué Google no a dado ni un paso atras, me entristece, mandar todo el proceso a la basura, esto como creador y dejar de consumir y apreciar todo lo que podemos tener mediante apks, porque esto es una comunidad que nos une y podemos disfrutar, y que no los lleguen a quitar, simplemente para mí ya no hay una diferencia entre un Android o !phone.
    
    Hay que unirnos e intentar que Google como Android, no tome esta decisión que nos afectará a todos los que hemos consumido esto... aquí durante años
