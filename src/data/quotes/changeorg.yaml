    Android siempre se destacó por ser el sistema abierto, el que te daba verdadera libertad en tu bolsillo.
    
    Por eso lo elegí: porque podía instalar lo que quisiera, de donde quisiera. Aplicaciones de terceros, versiones modificadas, herramientas que no pasan por el filtro de Google... todo eso era parte del encanto.
    
    Mi reproductor de música favorito vino de F-Droid. Mi brújula también. Y cuando quise tener la cámara con el modo astrofotografía de los Pixel en mi teléfono que no es un Pixel, instalé una versión modificada y funcionó perfecto.
    
    ¿Alguien me explica cómo podría haber logrado eso sin sideloading y sin apps de fuentes alternativas? Imposible. Exactamente por eso millones elegimos Android en vez de iOS.
    
    Si Google sigue por este camino de cerrar todo, de exigir verificación obligatoria para desarrolladores y limitar lo que podemos instalar en nuestros propios dispositivos, Android va a perder lo que lo hacía especial. Va a convertirse en un iOS barato con íconos verdes, y punto.
    
    La personalización profunda, la posibilidad de innovar sin permiso, la libertad de decidir qué corre en mi teléfono... eso no es negociable.
    
    Es lo que nos diferencia. Es lo que nos enamoró de Android.
    
    Google, por favor: recapaciten. No nos quiten el alma de Android.
    
    Dejen que siga siendo el sistema que respeta al usuario, que premia la creatividad y que no nos trata como si no supiéramos lo que instalamos.
    
    ¡Que vuelva la libertad! ¡Que vuelva la innovación sin cadenas!
    
