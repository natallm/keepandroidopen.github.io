  lang: "en"
- content: |
    The biggest edge Android has had is choice, control, and openness, which is sorely lacking in competitors like with Apple's operating systems. This is the exact opposite of what consumers, developers, and contributors to AOSP want. This is a gross overstep.
  author: "Jordan"
  lang: "en"
- content: |
    We should not be forced into using Google products. Our society doesn't function without choice and competition
  author: "erik"
  lang: "en"
- content: |
    If I purchase a device, such as a smartphone, and I am not under a contract, I should be able to alter it how I want. It is MY device. There are certain features I want to disable, certain ways I want my phone to operate. With a "walled garden" such as an Apple device, I cannot do that! That is the reason I have used Android since my first Android phone, Dell Streak 5. If Google locks things down, I'll just switch to APPLE. What's the point of keeping Android?
  author: "Rusty"
  lang: "en"
- content: |
    As a regular user of APKs, I think this system is so much important for us, bc we need this. GOOGLE DON'T BAN APK
  author: "Alison"
  lang: "en"
- content: |
    what does google think'll happen when they remove this aspect of android. this is the only distinguishable feature between ios and android
  author: "Mail-main"
  lang: "en"
- content: |
    Android no es apple no nos controlen n
    
    O no pueden obligarnos a seguir está regla estúpida las apk las instalamos porque es android y nadie lo puede cambiar
  author: "gerardo"
  lang: "es"
- content: |
    #NoMoreCorruption
  author: "Russell"
  lang: "en"
- content: |
    Google, don't make me get the spray bottle.
  author: "Skipps"
  lang: "en"
- content: |
    We cannot allow Google to further restrict android, to become a sort of increasingly dystopian corporate restrictive service, that we are paying more over the years, to recieve less features from.
  author: "Bo"
  lang: "en"
- content: |
    then why get an android at this point?
  author: "Kyarie"
  lang: "en"
- content: |
    Please don't limit the choice of those users who are either more technically inclined or simply need to use an app that isn't available on a store or signed by a registered developer. This is the kind of thing that really makes me sad. The flexibility of Android is gradually getting chipped away. First you take steps to make it incredibly difficult to have a usable experience on a rooted device via Play Integrity Services, and now you're going to take away our choice to sideload on devices that are supposedly "secure" as well? This is so anti-consumer and so against the spirit of freedom that Android afforded for those who didn't want to be locked in that I just can't find any way to justify it. How can you?
  author: "Dustin"
  lang: "en"
- content: |
    Having the ability to own your phone and use it as you wish is the ONLY reason I have used Android over Iphone for years
  author: "Matthew"
  lang: "en"
- content: |
    Silly choice. A large chunk of Android users will definitely switch to Apple with changes like this.
  author: "Kai"
  lang: "en"
- content: |
    Might as well be an iPhone at this point. The whole point of Android was customization, and this kills that. Do better Google.
  author: "William"
  lang: "en"
- content: |
    I use Android because of the freedom to customize and use my phone the way I want. I don't need Google telling me how to use my phone.
  author: "Deja"
  lang: "en"
- content: |
    Google should not be able to say what apps we can and can’t download. I use my android to download indie games that are not on the Google Play Store, so this will hurt a lot of indie devs that have their games downloadable as APK’s
  author: "Owen"
  lang: "en"
- content: |
    Take that away and you've destroyed Android. Google's trustworthiness is depths of hell low, and now you want even more control. Disgusting. The last bastion for Android was it's open freedoms compared to Apple, explicitly the ability to install apps without the store without verification. Allowing me to build and install my own creations. You must envision everyone in the entire world as some consumer archetype that just has feeding tubes of corporate sludge go into the consumers digestive tract. You can't imagine anyone innovating for fun not profit, making art and exploring science without corporate approvals. Your world is disgusting and I hate it.
  author: "Aiden"
  lang: "en"
- content: |
    Isso não é segurança, é limitação da liberdade do usuário
  author: "Nícolas"
  lang: "pt"
- content: |
    I have been an android user ever since I got my first smartphone over a decade ago. The only reason I still rock an android phone is the ability to customize my phone to my liking and being able to install whatever I want on the machine that I purchased with my money. Taking away the only feature that separates android from iOS is a terrible decision. This will definitely make a good chunk of your fanbase move over to iOS, including myself.
  author: "Luis"
  lang: "en"
- content: |
    I switched to Android to escape Apple's aggressively anti-consumer walled garden. My S20 Ultra (that I paid over $1600 for, after tax) is finally starting to show it's age, but now I have no incentive to get another android device for my next smartphone if you follow through with these changes. I've been a vocal supporter of Android for years, but if you don't scrap this change, I will boycott Alphabet products altogether and do my best to ensure as many others as possible are well-informed on why they should do the same.
  author: "Jacob"
  lang: "en"
- content: |
    Let me sideload my Android apps.
  author: "Stephan"
  lang: "en"
- content: |
    They are literally going against the reason people even buy Android phones in the first place
  author: "Lightis"
  lang: "en"
- content: |
    User: I do!
    
    Developer: I do!
    
    Google: I don't!
    
    They have no real business doing this - maybe if there was an alternative, but there isn't! This is the continuation of the meltdown they've been having about adblockers.
  author: "Nona"
  lang: "en"
- content: |
    Google, allow us to actually own our devices!
  author: "cornelius"
  lang: "en"
- content: |
    Eu quero continuar tendo liberdade na hora de usar o Android.
  author: "Eduarda"
  lang: "pt"
- content: |
    É simplesmente ridículo essa atitude do Google. Jamais compactuarei e discordo até a morte da adoção dessa postura.
    
    Torço de verdade por um recuo IMEDIATO.
  author: "Heitor"
  lang: "pt"
- content: |
    I paid for this device and I can do whatever I want with it
  author: "Marcus"
  lang: "en"
- content: |
    The whole reason I have used Android over iOS is because of the increased freedom to control the device I OWN. My phone is mine and I should be able to use it as I see fit. Companies like Google need to be forced to stop this anti comsumer behavior.
  author: "Mark"
  lang: "en"
- content: |
    This whole security benefit is BS
  author: "Jordan"
  lang: "en"
- content: |
    APKs have been very useful to me for getting games I would otherwise have to get overseas with my dad earlier. It allows many more other applications to be downloaded on to my phone too, which would allow me to bypass the need to get the admin code to my computer every time I want to get something. What is this bs that Google is doing?
  author: "Ja"
  lang: "en"
- content: |
    From a U.S. point of view it leaves us with only 2 wall gardens (Apple iOS and Google Android) as choices for smartphone operating systems with no other serious competition. I do not think this is a good thing for consumers.
  author: "Mark"
  lang: "en"
- content: |
    I use Android over iOS specifically for the ability to install the applications I want in the way I want. If I can't do that, I might as well not use an Android phone.
  author: "Jeremy"
  lang: "en"
- content: |
    Not allowing users to install the applications of their choosing on their own device and forcing developers to verify themselves with Google, even if they exclusively want to make their applications available on alterntive app stores is outrageous and completely unacceptable.
  author: "Brandon"
  lang: "en"
- content: |
    I bought this device. Keep your ransomware/malware away from MY device, Google.
  author: "Zach"
  lang: "en"
- content: |
    A better way to improve Android security is for Google to require all their own code and the code of all Play Store apps to be fully free as in freedom to make security research easier. Ideally, all Google code would also be bootstrappable and reproducible.
    
    Without 100% free software all the time, we can only assume there ore backdoors and malicious code in Google products and Play Store apps.
  author: "Seth"
  lang: "en"
- content: |
    I see why this could be a potential issue if this does happen. Hopefully it doesn't go through and it stays the same.
  author: "Gavin"
  lang: "en"
- content: |
    Me recuso, me recuso a comprar aparelhos e não ter liberdade sobre eles, vamos vencer essa, eu me recuso, nos calamos por tempo demais, não somos obrigados a viver dessa forma! Não podemos aceitar isso, não dessa vez!
  author: "Hermionny Vitória"
  lang: "pt"
- content: |
    Dear Google.
    
    You have paid games. Players are trying to get the modded apk. You slap them with an "unsafe" warning. Not all modded apks can be unsafe, some are. If you want free robux, steal some.
    
    Sincerely, Yaoi Ulshade
  author: "Yaoi"
  lang: "en"
- content: |
    FOSS shall not die and we the users shall be free to install what ever software we want
  author: "Erik"
  lang: "en"
- content: |
    I've said this before on a similar petition, but I sideload apps all the time, and it's a very important feature to me because I can download older versions of apps that I know function better with ease. Just like everybody else is saying, we use Android instead of iOS because we enjoy having this freedom. It won't benefit us: only Google is going to benefit.
  author: "Daniel"
  lang: "en"
- content: |
    Hey Google, remember what you said? "Be together, not the same."
  author: "Christopher"
  lang: "en"
- content: |
    Thie is absolutely ridiculous. Nothing but censorship and control everywhere these past several months. They'll all burn for it.
  author: "Jeffrey"
  lang: "en"
- content: |
    This is an absolutely ridiculous move on their part. Nothing but censorship and control these past several months. They'll all burn for it.
  author: "Jeffrey"
  lang: "en"
- content: |
    Why would anyone use an Android period outside of being able to install applications not “approved” by some walled-garden.
    
    Side loading is a dumb term
  author: "Stephen"
  lang: "en"
- content: |
    Google, this accomplish two things:
    
    1/ This will limit privacy respecting apps to those of us who run degoogled OSs.
    
    2/ More people will flash degoogled OSs onto their phones. Do you really want less data coming in to monetize? Your call.
  author: "Scott"
  lang: "en"
- content: |
    Leave our phones alone. Dont turn Android into Apple
  author: "leavemyphonealone"
  lang: "en"
- content: |
    This is an insane power play that is attempting to force more money into Google's pockets for developer licenses. There are a lot of legitimate uses for sideloading apps that are legal. Certain emulators cannot be on the Play Store, which are 100% legal. Some apps don't release on the Play Store because of region requirements that don't allow it, so APK's are the only option. Plus, there are a lot of firms that likely develop in-house security apps, that don't and CAN'T be published to the Play Store for security reasons, so this will also lock out those companies from their own security systems and applications. Also, sometimes installing a previous version of an app is needed when the latest version is broken. Also, if I want to develop my own app, now I have to have a developer license to even test it? This is absolutely anti-consumer at its finest, and Google will lose a lot of business from this power play. The sad part is that they will be likely facing a lawsuit from many companies that will be affected by this, because this is a huge change that will affect a huge majority of Android users.
  author: "Nathan"
  lang: "en"
- content: |
    We need liberty, the end of the APKs is a extremely bad decision to be honest.
  author: "Anonymous"
  lang: "en"
- content: |
    This is the entire point of many people using Android in the first place, you take this away and something new will come along and replace you.
  author: "Jacob"
  lang: "en"
- content: |
    I've used side loading a number of times in the past to load 3rd party developed apps. Not supporting this will make me seriously reconsider other phones and OS
  author: "Richard"
  lang: "en"
- content: |
    It is called installing on devices that I own. I don't need to be hand held under the guise of safety
  author: "Paul"
  lang: "en"
- content: |
    Stop making anti-consumer decisions, the consistent downward trend of freedom from Android is distressing and ultimately it will bite back.
    
    I will be petitioning my congressional representation as well, Google is only uniting everyone against them.
  author: "Josh"
  lang: "en"
- content: |
    Google shouldn't be able to restrict something that made us purchase the phones in the first place!
  author: "Yousef"
  lang: "en"
- content: |
    Google you suck ass. the whole point of Android is freedom. you're going to destroy so much and anger so many people if you do this 3 do it on pixel n ChromeOS or whatever but leave everything else alone you're ruining something beautiful
  author: "liam"
  lang: "en"
- content: |
    This will eliminate a large number of users from the Android platform, most will leave because they are being restricted, and the others like myself will leave purely on principle. Teaching people to use technology in a smarter way will always be better than restrictions, and all of this will just be the beginning of censorship and control on a global scale, as is already happening with other Google applications.
  author: "Bradley"
  lang: "en"
- content: |
    Google can't just restrict our Freedom of Choice! Android is OPEN-SOURCE!! Can't Google even get their policies correct!? Also, what about the Developers and their information!? Wouldn't that be up for grabs if hackers managed to forcibly leak that sensitive information onto the whole web!? Google needs to be smart and NOT force this policy on all of us! We all need to rise up and downright revolt against such heinous and immoral acts of these companies in order to avoid a full on Dystopian Reality that numerous books and certain alternate scenarios feared! Fight this policy that Google is forcing on everyone!
  author: "Raymond"
  lang: "en"
- content: |
    This change has nothing to do with security, it wants to remove the power of choice from the user and screw up many developer by forcing them to use the Play Store. Android is all about freedom and will always be.
  author: "Yuri"
  lang: "en"
- content: |
    As an evil, evil man, I despise google because they are worse. Thus, I of then times look at this website and sign all the petitions against google. Amen brother man
  author: "David"
  lang: "en"
- content: |
    Android has always been about freedom. I've always loved side loading an app made by a line developer to complete a niche task/feature. My music player and compass app were side loaded from F Droid and I think it's super cool to be able to install custom versions of stock phone apps. I've side loaded a modded version of my camera app that brought Google Pixel's photosphere to my phone. How else would I have been able to do this without side loading?? There's no reason Android has to go this direction, it may just as well be called mock iOS if all the reasons I chose Android are taken away. May customization, freedom of how I use my phone, and innovation reign once again in the heart of Google's Android! PLEASE 🙏
  flag: "spam (duplicate content)"
  author: "Daniel"
  lang: "en"
- content: |
    Removing the only reason to use Android...
  author: "John"
  lang: "en"
- content: |
    O Android e o único sistema operacional de celulares que tenha o mínimo de liberdade, e tirar essa liberdade, vai matar o que o Android era
  author: "Diego"
  lang: "pt"
- content: |
    make android good again
  author: "Samuel"
  lang: "en"
- content: |
    Having a device where you control what does or does not go on it is our right to have. We bought this device and we should have the freedom to do what we want with the device, regardless of the manufacturer or operating system it is on. Allowing this change to happen is just one more step towards a controlled ecosystem; by Google, for Google and this is exactly what they want.
  author: "Clayton"
  lang: "en"
- content: |
    Save privacy and security
  author: "Pepe"
  lang: "en"
- content: |
    Changes like this severely limit fledgeling development. While you promise easy ways to register for free, any barrier can be enough to stop someone from making their first app. Additionally, anonymous publishing should be available for applications that may go against the will of those in power. This change limits freedom as well as killing the developer community.
  author: "Jack"
  lang: "en"
- content: |
    #NoMoreCensorship
  author: "Russell"
  lang: "en"
- content: |
    Removing the ability to side-load apps is an egregious deviation from what made Android better. Android should remain free and open, the experience should not be lobotomized into what ends up being just a "cheaper iPhone".
  author: "Luke"
  lang: "en"
- content: |
    My phone, my apps
    
    Let me do what I want or else an iPhone will be my phone
  author: "Aaron"
  lang: "en"
- content: |
    I have been using Android since Eclair, after using Windows Mobile 6 and iOS. I have been seriously considering iOS again lately, and this would absolutely convince me to jump ship.
  author: "Jon"
  lang: "en"
- content: |
    This petition is important because as an open source developer and long-time Android enthusiast, the freedom of installing software on a device I own is mandatory. Android is fun and customizable, let's ensure that both developers and users can continue to enjoy their devices without restrictions.
  author: "Benjamin"
  lang: "en"
- content: |
    If this doesn't get changed then I'm switching to Apple.
  author: "Julia"
  lang: "en"
- content: |
    Android must remain a free platform. Google isn't doing this for security reasons. They want to control us, but we can't let that happen.
  author: "Luciano"
  lang: "en"
- content: |
    This change would defeat the core purpose at the heart of what the Android platform is. Remember when Google used to use the slogan "Don't be Evil"? Well this is about as evil as it gets.
  author: "Justin"
  lang: "en"
- content: |
    Android's philosophy was based on openness. Google wants to take your freedom. They disguise it as security updates, but in reality, they want to rake even more profits and take control of your personal freedom.
  author: "Tyler"
  lang: "en"
- content: |
    As a user STOP! What made me choose Android over iOS is the openness of it. By doing this you are killing what make android great, the fact that everyone can make an app and load it on his phone. You don't have iOS fan base. We will go elsewhere.
  author: "marie-france"
  lang: "en"
- content: |
    this change would remove the main reason i even purchase these phones, stop it google
  author: "andrew"
  lang: "en"
- content: |
    Your going to lose customers to apple to make a quick buck. A lot of android users are android users because you can use the phone how you please. Stop being dumb.
  author: "Christopher"
  lang: "en"
- content: |
    Jesus christ google you want to drive away your entire customer base? You realize that the only reason we don't buy iphones is because they don't give us this freedom that Android does. I know you think no one can touch your multi billion dollar empire but know that you have that data because of us. The customers. NO ONE ASKED FOR THIS, NO ONE WANTS THIS. First you "detected root" then you "implemented safety net" then you implemented "play integrity and certification" just pushing and pushing and pushing developers to bow down to you. And now this? No. You aren't staying on top forever. Think very carefully if this is the road you want to tread because we will all leave. And it won't be just Android. Alternative search engines exist. Alternative emails exist. Alternative cloud storage exists. We don't have to bow down to Google. If you do this, it's over.
  author: "Genalio"
  lang: "en"
- content: |
    Ive always been an android user and refused apple products. Ive loved being able to root and openly develop and play with my device. Its shown my how to write software and understand how a computer works. I understand the push for security but this takes away the very nature of Android. There are other ways to verify security if it becomes that necessary.
  author: "Nicholas"
  lang: "en"
- content: |
    This is a tragedy, it won't stop bad intentions, it will only put our data at risk, and many apps will become lost media.
  author: "Jessé"
  lang: "en"
- content: |
    first off i bought this phone i should have the right to put what ever program i want on it, I'm already upset so many things are locked behind root access
    
    my wife is a programmer and she fiddles with android programs. this would mean she can't do this anymore. it makes it a lot harder for indie android programmers to get started
  author: "Joshua"
  lang: "en"
- content: |
    I use sideloading very often, especially for Linux terminal emulation, and I can't do nearly as much in that vein without it.
  author: "Sylvia"
  lang: "en"
- content: |
    Android sem liberdade se torna ios
  author: "Nicolas"
  lang: "pt"
- content: |
    Android used to be all about giving its users freedom over the walled garden approach of iOS. If Google will be following the same path of Apple, they will be losing a major competitive advantage among pro users.
  author: "Freddy"
  lang: "en"
- content: |
    I wanted to switch to android because I liked the ability to still have acess to older apps and software when it no longer works. I currently have an Iphone and can no longer use older versions due to the age of my phone. Hearing this news will definitely lead me to proabably buy an Iphone over android. I will no longer have the right to download cool apps like emulators or download apps that no longer work properly on the version of the phone and software I have. I believe Google needs to reverse it decision on banning sideloading. It is a free ecosystem and users understand the risks if they do it. It is unfair for all android phones to be affected because most phones use Android and I belive this monopoly on technology needs to stop.
  author: "Kalista"
  lang: "en"
- content: |
    As a regular user and a small developer, I find this measure deeply concerning. When I choose to buy an Android phone, it is with the expectation of having control over how I use it, not to face restrictions or censorship.
    
    Tools like Knox and Play Integrity are already frustrating enough, and now it seems that even downloading applications from F-Droid or other nice Stores should be checked ?!
    
    This undermines both user freedom and the open spirit that originally defined Android.
    
    We have ( well we have to take it back) the right to create, modify, and use apps—and to communicate online—without being forced to give up anonymity. It is up to users to educate themselves about potential risks, not for GAFAM to decide on our behalf.
  author: "naknak"
  lang: "en"
- content: |
    I am not a developer, I am just a user, and I think it is very important to say that this does not just affect developers. There is nothing good about locking down an open ecosystem. There is no good reason for Google mandating ID Verification aside from pushing their dominance over Android. This is disgusting, given that Android has always been seen as the free haven away from Apple's walled garden. Now the only way to achieve freedom is by using a fork of Android, which will become harder and harder as Google inevitably enforces locked bootloaders. Seeing Android turn into a Google flavored IOS is just a huge punch in the gut, and really puts into perspective what can be lost under greedy leadership.
  author: "Zakery"
  lang: "en"
- content: |
    Eu sou desenvolvedor de aplicativos, muitas das vezes eu faço aplicativo que só eu vá usar e sem intenção de compartilhar
    
    Eu acho extremamente ridículo ter que entregar meus documentos pra uma besteira ridícula dessa
    
    É claramente um método de rastreio e invasão de privacidade
  author: "Jessé"
  lang: "pt"
- content: |
    It wasn’t enough to allow malicious apps on the Playstore, now they want to remove the one thing that makes someone want to use Android? And I haven’t even commented yet on the fact that they prevent users from exploring their own files freely (date, obb), and applications with security flaws that cannot be uninstalled. the situation does not seem to be good... But there is still hope
  author: "Adonis"
  lang: "en"
- content: |
    This is a thinly veiled attempt by Alphabet towards an easier monopoly on apps and the more restrictive economy that Apple has on its own software economy. This uncompetitive and restrictive behavior is directly harmful to both consumers and developers, not in the least to mention freedom and privacy overall as well.
  author: "Emily"
  lang: "en"
- content: |
    They literally block sideloading with this and always using "security" as an excuse, they never will accept all dev, and also who give they the right to get ID of dev.
    
    Put in you place, you are a company in a democratic country, we give you power
    
    The solution for this is stop using google services, give they a prove of power, they depend of us because we give them money, stop using google service, and fight against this injustice
    
    Google is evil, and right now they are shown they craws
  author: "Juan"
  lang: "en"
- content: |
    This change has pushed me into rooting and using a custom ROM making my phone more "unsafe" to the eyes of Google and banking apps, Monopolizing the app market isn't an act of consumer protection under the guise of "security" it's just an attempt at maximizing profits and It being a stepping stone in censoship besides think of all the internal use apk's that companies use on their devices be It for management, interaction with company equipment, etc had to now get verified by a 3rd party like Google when the ones using that app is only company employees
  author: "Alex"
  lang: "en"
- content: |
    Spread this everywhere, we can't afford to be lazy. Also, for my fellow Aussies!
    
    You can fight against the Online Censorship Act here! https://t.co/ZqH6nemOJb and https://freespeechunion.au/esafety/ and https://endesafety.au/ please take some time to check these out!
  author: "Sara"
  lang: "en"
- content: |
    The iOS user experience is invariably more polished and seamless than any Android device. In the tablet market especially, Android can't hold a candle to iOS when it comes to usable. For the entirety of Android's existence, the freedom to use our devices the way we want, rather than being beholden to the whims of a manufacturer, has been THE reason to use Android. Not a reason, not the most important or compelling reason, THE ONE AND ONLY REASON. To remove or hamper the ability to sideload apps is to remove Android's only reason to exist. Remember, no matter how many of our rights and abilities you remove with regard to how customers use their devices, there's one right you cannot touch: our right to purchase an objectively easier to use iOS device.
  author: "Pranam"
  lang: "en"
- content: |
    O Google precisa gerenciar melhor as suas consciências, não haverá menores condições para usar algo que é gratuito para uso ilimitado daquilo que em tese, não poderíamos pagar em algo EXORBITANTE para possuir, pois nem muitos brasileiros recebem um salário mínimo e se sacrificam pelos bairros em busca de sobreviver, o Google não PODERÁ FAZER isto, pois isso vai gerar um machucado tão profundo em quem não teve nada haver com isto? E outra! EXISTEM MUITOS MÉTODOS PARA PENSAR um método infinitamente melhor, que não jogasse ninguém de boa índole, para um porão escuro e trancado... Mods existem, Hacks existem para UM BEM MELHOR DE QUEM QUER JUSTIÇA FINANCEIRA, para não pagar um valor EXORBITANTE e sem ESCRÚPULO para quem está pobre, e apenas queria ter um premium, e repito, os mods apk passam por uma verificação de vírus antes de serem enviados, pelos modders... Não tenho como defender muita coisa, pois por mim, o Google passou de todos os limites! Eu já sofri e continuo sofrendo com essa mesma pobreza que fica me judiando, no XBOX One, não tenho dinheiro o suficiente pois estou mudando de bairro, e com baixíssimo valor econômico, pois o dinheiro se evapora rapidamente com os custos de casa, comida, feira, minha pensão alimentícia, produtos que compramos em certas ocasiões em um camelô, pois minha mãe está se sacrificando por ela e por mim para colocar dinheiro na minha casa, indo ajudar na limpeza em casas, de algumas amigas de época e próximos da minha casa... POR QUE USAREI minha sabedoria para comprar algo, e depois não chorar pelo leite derramado...
  author: "Joao"
  lang: "pt"
- content: |
    This is an authoritarian play by Google to regulate their customers (aka a huge percentage of the public) not by national law but by their own personal whims on what's "best" for their corporation and shareholders. It undermines a customer's right to modify their products how they want, and instills power to themselves to govern essentially all software that gets developed for non-iOS phones, which is highly unethical and anti-consumer. If this gets implemented I will be selling my phone and switching to a non-android product.
  author: "Nick"
  lang: "en"
- content: |
    Let's be real, this isn't about security, it's about forcing people to use Google playstore, and trying to get peoples info just like what Youtube is doing right now.
  author: "Draven"
  lang: "en"
- content: |
    Unnaceptable betrayal of platform standards
  author: "Lukas"
  lang: "en"
- content: |
    This decision breaks the promise of Android. By forcing verification, Google puts barriers to entry, and more importantly, introduces conflicts of interests in the app installation process. There must be an option to opt out of this. Every open source app would need to establish a legal entity to be installed on Android. Developers would be blocked for circumventing limitations that eat into Google's revenue but which aren't inherently illegal or against the ToS (i.e. personal archiving of YouTube videos). This could spell not only the end of Android but also personal computing under our own control.
  author: "Kevin"
  lang: "en"
- content: |
    Google, this would absolutely destroy android. Seriously, one of the only reasons people get Androids over iPhones (aside from them being cheaper) is that they can sideboard apps from the factory. Limiting that would be a huge blow to the Android market.
  author: "Christopher"
  lang: "en"
- content: |
    My business uses and older app distributed via apk. It is no longer maintainable but works perfectly fine. It will be a huge hassle rebuilding the app just to comply with this new rule to be certified.
  author: "Aaron"
  lang: "en"
- content: |
    This is the sole reason that people choose Android over iOS and removing it removes another layer of customization that Android was known for.
  author: "Isaac"
  lang: "en"
- content: |
    That cannot be allowed, it even attacks the freedom of all users who use Android, for years that has always been the case, therefore, making that change, It would result in a catastrophic situation for many users, including Google itself, with many losses in every sense.
  author: "Javier"
  lang: "en"
- content: |
    Remember when google was cool?
  author: "Andrew"
  lang: "en"
- content: |
    Literally one of the only things Android has going for it compared to iOS. You want this gone, fine -- then what advantage do you possibly imagine Android would have over iPhones? Do you really think people are going to continue to buy crap Pixels with Tensor chips at the same price as an iPhone? Android has ALWAYS been about uplifting device ownership. You get rid of APK side loading, you kill the damn OS once and for all.
  author: "Jeremy"
  lang: "en"
- content: |
    Side loading is one of the biggest reasons I used an Android device. I’ll be using an IPhone for the foreseeable future.
  author: "Joey"
  lang: "en"
- content: |
    This is absurd. To remove one of the main things that drew people to android over iPhone is laughably moronic. Especially when some of the best apps recommend by people come from outside the play store. Pull it together!
  author: "Logan"
  lang: "en"
- content: |
    There is no point to using android if apks are restricted. If I wanted a phone to tell me what i can and can't do, I would get an apple, because at least I get better security and UI there. The android operating system is being stripped of everything that gives you control over your own device. If apks were restricted, I would completely degoogle my life. Big brother is watching you.
  author: "Ben"
  lang: "en"
- content: |
    Assinem isso!!
  author: "Pedro"
  lang: "pt"
- content: |
    I should be able to use any app I want on my phone
  author: "Alejandro"
  lang: "en"
- content: |
    As a young developer, you need to stop! What you re doing will prevent anyone below the age of 18 from developing apps for their own purpose and installing on their device, which they payed for, imagine giving a toy to a kid, then putting it into a box that they can't open, that is what you are doing right now.
  author: "Alex"
  lang: "en"
- content: |
    Unacceptable. This goes completely against the Spirit of the Android OS. Sideloading is a big reason Android is what is it today. Apps that were sideloaded became essential and were later integrated into the Android OS. Anyone smart enough to sideload is smart enough to educate themselves and be aware of any risks involved. I help people who's phones were hijacked by almost malware-like Launchers. Google still hasn't banned those Launchers from Google Play but somehow sideloaded apps are bad? Spare me the big brother crap. This is crackdown on Revanced and similar apps. This is also in coordination with government to crackdown on "undesirable" apps such as those that bypass censorship.
  author: "Pavel"
  lang: "en"
- content: |
    Android giving users choice has been the staple point of android OS.
    
    Removing choices like sideloading apps is not the move.
    
    I develop apps for myself, I do not want to be "an approved developer" I don't have time nor care for that.
    
    This action also is the beginning of censorship, and monopolization of android OS. Android started as an open operating system, you have simply turned it into a reskinned Apple OS. Your choice to go anti-consumer is going to hurt. You are not "protecting" anyone
  author: "Seth"
  lang: "en"
- content: |
    Google get out of MY phone!
  author: "Mauro"
  lang: "en"
- content: |
    Eliminating side loading will remove the main competitive edge that Android has over iOS, remove the open nature that users enjoy and prevent certain use cases.
  author: "Chris"
  lang: "en"
- content: |
    This is a blatant attack on freedom, and I cannot just stand by and watch it come to pass. If we allow the likes of Google to take such steps, they'll clear a whole staircase.
  author: "Emir"
  lang: "en"
- content: |
    I'm not even a dev and I don't agree with this
  author: "John"
  lang: "en"
- content: |
    als Entwickler schreibe ich kleine Apps fpr Android und empfehle allen Android als freies System im Gegensatz zu Apple. Diese Argumentation wird zunehmend schwerer, je mehr Google versucht, die Nutzer zu gängeln (vendor lockin).
  author: "Harald"
  lang: "de"
- content: |
    Please no. This is what makes Android special. But if you do, then fine - it will finally open an opportunity for a 2nd player to enter the market.
  author: "Sam"
  lang: "en"
- content: |
    Enough is enough google! I am already swapping back over to iOS for more than a few reasons other than oh i dont know, YOUR OWN PHONES CATCHING FIRE ON MY BEDSIDE TABLE! As a developer, This makes it really hard to want to make an app cross-compatible with your OS! First you flatten the bugdroid, then you make unsafe phones, now this?! Sorry, but even I, a hardcore android fan am taking Apple's stance on this.
  author: "Shibe"
  lang: "en"
- content: |
    As an open-source developer and enthusiast, Google requiring ID Verification is not only unethical, but unsafe, anti-competitor, monopolistic, and is one of the major reasons why people like me switched to using MicroG instead of GApps.
  author: "Garry"
  lang: "en"
- content: |
    I choose to use android for the freedom. If
    
    thry implement this in such a way that
    
    hinders that, I will no longer have a reason to
    
    pick android over iPhone. Guess I will see how this plays out.
  author: "James"
  lang: "en"
- content: |
    keeping it brief. There are MANY apps that people depend on for day to day life and this is going to impact that on a drastic scale.
  author: "Bryan"
  lang: "en"
- content: |
    Android being "open" is what draws a lot of people to it from the others. This effectively makes it more closed.
  author: "Glenn"
  lang: "en"
- content: |
    Someone alert the attorney's on the ongoing case with Epic Games that Google found a way to try and skirt court orders. I'm sure the judge will be extremely pleased to have been ignored, as they make this change and claim it's somehow not the opposite of what they were told to do.
  author: "Nicholas"
  lang: "en"
- content: |
    As a developer, stop! This is the only reason I used Android and didn't have to jailbreak and root it. Making this change under the guise of security amounts to manipulation, lying, deceiving your customers, and taking away their rights to use their device in their way. Mark my words, rooting will become popular again and I will personally be at the forefront of actively working against you and your goals. I cannot agree with such blatant bad faith arguments and poor reasoning. You assume most people aren't developers and too stupid to see through this. You want more money by any means necessary no matter how angry people get. Android was supposed to be an open ecosystem and now you're actively anti-consumer. It's disgusting.
  flag: "spam (duplicate content)"
  author: "Nicholas"
  lang: "en"
- content: |
    Ajudando a causa c:
  author: "salame"
  lang: "pt"
- content: |
    I buy android to be able to customize my phone as I please. If you do this you lose a loyal customer of over 20 years.
  author: "Jamell"
  lang: "en"
- content: |
    I support Signature verification for security, but centralised verification is harmful for open Android ecosystem.
  author: "Wenyi"
  lang: "en"
- content: |
    The whole reason Android is popular is because it's open source. By locking away sideloading and forcing developers to verify themselves, what difference is there between this and iOS, which is starting to allow sideloading of apps?
  author: "Ruben"
  lang: "en"
- content: |
    Washington DC sits between Virginia and Maryland (Virgin Mary Land??) in a nation colonized by protestants who outlawed Jesuits. Georgetown U. a Jesuit school was the first federally chartered university in the USA and DC mirrors Vatican City. They eliminated Abraham Lincoln and many others. You think they'll let you sideload apps on their technology? Wishful
  flag: "conspiracy theory"
  author: "Bob"
  lang: "en"
- content: |
    Removing side-loading is anti-user. I'm all for increasing security, and having various strange steps helps with that. You could even have a 1 minute subtitled video that has to play before you can confirm for the first time on a device that you want to side-load apps. But this change shows a lack of interest in users that inspires developers to not care about the Android ecosystem. If Google intends to significantly decrease the scope of Android, that signals that the maintenance costs are too high for Google, and thus, the company intends to let it rot and eventually die, much like many other Google things
  author: "James"
  lang: "en"
- content: |
    This "security" feature will stop independent non-commercial projects. We don't want to be locked in commercial CRAP
  author: "David"
  lang: "en"
- content: |
    Esta decisiones ataca directamente a la libertad que hacía lo que era android. Por favor, no lo hagan.
  author: "Jonathan"
  lang: "es"
- content: |
    This is a huge advantage over ios, you can't take this away 😢
  author: "Abhinav"
  lang: "en"
- content: |
    There are Chinese individuals abroad who sideload Chinese app stores and Chinese apps on their non-Chinese Android phones to use those services. Chinese developers are very unlikely to verify with Google. This is a racist update from Google which will inadvertently single out Chinese individuals as well.
  author: "Sunny"
  lang: "en"