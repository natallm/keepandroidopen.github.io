  author: "Finn"
  lang: "en"
- content: |
    PETIÇÃO: NÃO ACABEM COM A LIBERDADE DO ANDROID
    
    Para: Google / YouTube / Comunidade Android
    
    Nós, usuários de Android em todo o mundo, queremos expressar nossa preocupação com possíveis mudanças que possam limitar a liberdade e a abertura do sistema Android.
    
    O Android sempre foi um sistema operacional baseado em liberdade, inovação e escolha. Ele permitiu que milhões de pessoas personalizassem seus dispositivos, instalassem aplicativos livremente e explorassem tecnologias abertas.
    
    A força do Android sempre foi:
    
    • liberdade para instalar aplicativos fora da loja oficial
    
    • liberdade para desenvolvedores independentes criarem soluções
    
    • liberdade para usuários escolherem como usar seus próprios dispositivos
    
    Se essas liberdades forem removidas ou limitadas, o Android perderá aquilo que o tornou o sistema mais popular do mundo.
    
    Pedimos que o Google e as empresas envolvidas:
    
    1. Não bloqueiem a instalação de aplicativos independentes
    
    2. Não limitem a liberdade de desenvolvedores fora da Play Store
    
    3. Mantenham o Android como uma plataforma aberta
    
    4. Respeitem o direito dos usuários de controlar seus próprios dispositivos
    
    A inovação nasce da liberdade.
    
    O Android só se tornou gigante porque era aberto.
    
    Não acabem com isso.
    
    Assinado: klaus valentine
