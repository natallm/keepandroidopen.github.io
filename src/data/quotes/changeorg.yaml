  lang: "es"
- content: |
    Como usuario habitual y pequeño desarrollador, esta medida me preocupa profundamente. Cuando compro un teléfono Android, lo hago con la expectativa de tener control sobre cómo lo uso, no de enfrentarme a restricciones ni censura. Herramientas como Knox y Play Integrity ya son bastante frustrantes, ¡y ahora parece que incluso descargar aplicaciones de F-Droid u otras tiendas de aplicaciones debería revisarse! Esto socava tanto la libertad del usuario como el espíritu abierto que definió originalmente a Android. Tenemos (bueno, tenemos que recuperarlo) el derecho a crear, modificar y usar aplicaciones, y a comunicarnos en línea, sin que se nos obligue a renunciar al anonimato. Es responsabilidad de los usuarios informarse sobre los posibles riesgos, no de GAFAM decidir por nosotros.
  flag: "spam (duplicate content)"
  author: "Goku"
  lang: "es"
- content: |
    Developer verification can improve security, but requiring centralized registration for all apps on certified devices risks creating new barriers to competition and innovation. Security shouldn’t come at the cost of openness and choice.
  author: "Caleb"
  lang: "en"
- content: |
    Android should be a free platform, thats why it exists, taking this away is creating a monopoly that Apple has created and has also gotten in trouble for in the EU for consumer rights
  author: "William"
  lang: "en"
- content: |
    I shouldn't have to build my own services and self host everything if I want freedom and privacy but it's getting to that point.
  author: "Colt"
  lang: "en"
- content: |
    A company like Google should not be allowed should not be allowed to do something like this. As a regular user I find what they are trying to do deeply concerning. When I choose to buy an Android phone, it's with the expectation of having control over how I use it, not to face restrictions or censorship, this is not even going over the massive privacy risks and data theft, this is an open source operating system and freedom should be key, I do not like how all of these companies and governments are trying to push age verification for everything, and I would hope for the decency of being given privacy
  author: "Ronnie"
  lang: "en"
- content: |
    Google is pushing for literally the antithesis of what android alaways promised to be and actually was. This is extremely concerning, it involves and affects ALL people, not just devs. If Google don't back down and the lock down actually happens, who knows how much would it take for them to also start deciding which apps you're ALLOWED to install on YOUR phone. This is the beginning of the path to total user control. WE HAVE TO ACT NOW.
  author: "Raymundo Iván"
  lang: "en"
- content: |
    I know this sounds crazy, but I just want to be able to use the device I paid for the way that I want to.
  author: "Thomas"
  lang: "en"
- content: |
    If I can't install FOSS apps then I will switch to Apple and delete my google account.
  author: "Eli"
  lang: "en"
- content: |
    I switched to android specifically because I felt like it was truly a device I OWNED. I used Apple in the past but hated the amount of features that were gate kept.
    
    Having the ability to download open source apps on my android device has reshaped the way I use my phone and has made my workflows significantly better.
    
    This new change will not only completely destroy the open source ecosystem I've become accustomed to, but will actively turn away myself, and Android's main user base.
    
    What's the point of ruining your reputation and the only real reason to own an android device?
  author: "Steven"
  lang: "en"
- content: |
    Esto no puede ser posible, hay que parar con ese limite
  author: "Jorge Dias"
  lang: "es"
- content: |
    Android's freedom of choice is what made me switch from apple. I find that limiting that those freedoms such as sideloading an obnoxious spit in the face of all who use and enjoy this operating system. If I wanted an anti consumer product id buy from apple.
  author: "Link"
  lang: "en"
- content: |
    google, it is not your job to parent any user on what they wish to do with the items they purchase. No one wants your control and no one asked.
  author: "Kyi"
  lang: "en"
- content: |
    I'll be switching to iPhone if they pass the verification requirements, what's the point of using a locked down os if a better one is around the corner.
  author: "Edwin"
  lang: "en"
- content: |
    Android is about freedom, not control this change will ruin android forever
  author: "Eli"
  lang: "en"
- content: |
    Soy usuario de Android e ingeniero de Ciberseguridad hoy en día a pesar de todo entiendo que sea difícil consientizar al usuario común pero hacer de Google una fortaleza impenetrable va en contra totalmente de lo que prometió ser Android en el mercado desde hace tantos años, un sistema libre donde cualquiera podría desarrollar sus aplicaciones y soluciones sin los cobros excesivos para el desarrollador como lo hace el sistema de la manzana
  author: "Jonathan"
  lang: "es"
- content: |
    I have found great use of android APKs. Because of them I can run comunity devoulped apps like Winalator, a Wine wraper for android, allows me to play windows games on my phone.
    
    Theres also PhoneVR, a free and open source app allowing me and many others to rededicate old phones into capable VR headsets, for free!
    
    I also get to play old games like Asphalt 8 retry, a mod that fixes alot of the pay-to-win gripes of Asphalt 8's current form.
    
    Same goes for Bad Piggies reborn, a free comunity mod adding loads of content and improvments to the origonal game!
    
    Not to mention open source app stores like FDroid.
    
    By locking down android, your losing support from people like me.
    
    Do you really want to kill the reason android is great? Just for a few dollars more?
    
    Are you going to just dismiss the people that made you great?
    
    We're not just numbers on a spread sheet you know, we're people too.
    
    We don't need protected by governments and companys. All that does is remove freedom, dehummanize people, and make people who cant think for themselfs.
    
    Whats next? Burning books? In the direction we're heading, we're not far from becoming the socity in Ferenheight 451.
  author: "George"
  lang: "en"
- content: |
    I bought the whole phone, i'll use the whole phone, whatever way I want. Openness of Android is the only reason I choose android, if I wanted a "Locked Down" phone, i'll just go with Apple at that point.
    
    Make these censorship at least optional to block, LET ME DECIDE, but dont force it onto blocking of APK installs all together FOR EVERYONE, let the user decide for themselves. I don't want Google to decide what I can or cannot do with the phone I BOUGHT. If I bought a phone, with the expectation and the capacity of doing X,Y,Z with it, don't take away the Z AFTER I BOUGHT IT. I'll just refuse to update my phone if it get's pushed that way.
    
    There's more malware on the ADS you promote, rather than anywhere else, im sure.
  author: "Bryan"
  lang: "en"
- content: |
    Google is a giant monopoly that never should have grown to the size it has in the first place. We wouldn’t be here if they were stopped a long time ago when they should have been.
  author: "Tom"
  lang: "en"
- content: |
    Como desenvolvedor, principalmente de pais emergente (Brasil), é inadmissível que uma empresa inescrupulosa e, conivente com a escalada autoritária do mundo passe uma palhaçada dessas. Tive histórias incríveis, meu TCC de formação foi baseado em um sistema android, meu primeiro estágio foi desenvolvendo para esse OS. Ver a Google querendo pagar de Apple e, ainda por cima, usar meus dados pra sabe lá o que é revoltante.
  author: "Gabriel"
  lang: "pt"
- content: |
    Eu quero usar meu celular do jeito que desejar, não de acordo com o que o Google deixar. Pare de mascarar a morte da privacidade e liberdade como "segurança".
  author: "Pedro"
  lang: "pt"
- content: |
    Con intereses que las empresas no hagan de nuestra información lo que quieran..
  author: "Javier"
  lang: "es"
- content: |
    Las apps echas por la comunidad son las que mantienen vivo a android , quieren hacer todo lo opuesto como compañia y hacer un sistema limitado, esto sólo nos va a orillar a mudarnos a Linux donde hay libre expresión como creador cosa que parece que android ya no está del lado de la comunidad
  author: "Víctor"
  lang: "es"
- content: |
    Alto alas limitaciones nuestro celular nuestra elección de como usarlo y en quien confiar , apk libres
