  author: "Geoff"
  lang: "en"
- content: |
    I am the founder of Yale Privacy Lab, where we have investigated privacy and security issues in Android apps since 2017. I can say without hesitation that this change makes Android users less safe.
    
    Android is based upon free and open source software (FOSS) and that has always been defined by user choice. Blocking the capability to install apps directly from trusted sources outside Google Play is not a small tweak. It removes a core freedom. We should not need permission to run software on devices we own.
    
    Framing this change as protection does not reflect the reality of the Android ecosystem. Google Play has long allowed unsafe apps, invasive tracker SDKs, and supply chain threats that slip through automated review. Independent audits have consistently revealed these issues inside of Google Play, even *after* Google claims to have scrubbed. For example, the X-mode SDK persisted long after it was banned in the USA by the FTC enforcement action, and was still present in many Google Play apps until Google was called out by my own investigation. Initially, Google responded by saying I was wrong but then acknowledged their error in press. Long after that, other tracker SDKs associated with X-mode and the wider ad-tech surveillance economy have persisted.
    
    In many cases, the safer and more privacy-conscious option is to use F-Droid to install apps. F-Droid is just one organization that is much more serious than Google about checking the safety of their catalog of apps. Sometimes, the safest option is installing APKs directly from trusted developers. These methods can avoid ad trackers, surveillance code, and unwanted data sharing. To cut off these options is to put many activists, journalists, whistleblowers, and ordinary users at risk.
