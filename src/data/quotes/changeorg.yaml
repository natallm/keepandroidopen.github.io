  author: "Johnny"
  lang: "pt"
- content: |
    As a lifelong Android user and now a beginner developer, I say this is nothing more than an attempt to turn Android into an iPhone 2. You're not protecting anyone, and this seems more like the beginning of an Android monopoly. An open-source system shouldn't have this kind of restriction/censorship, much less force developers to identify themselves and pay fees for beta apps. It shouldn't have a single store. This decision to act against consumers and developers will have very serious negative consequences. After all, when I choose to buy an Android, I choose it for the freedom it gives me and the variety of stores and places where I can download programs that aren't on the Play Store, whether games or development programs. Nobody chooses an Android for its features, much less for the Google system. We choose it because we want the freedom to do what we want with what we buy with our money, taking full responsibility for what we download. Because if I wanted a centralized store with no freedom whatsoever, I would buy an iPhone.
  author: "Sophya"
  lang: "en"
- content: |
    Não apoio, vão tirar uma dás características mais usadas do Android, além de que nem todo mundo tem uma qualidade de vida descente para disfrutar dos apps pagos.
  author: "Javier Alexander"
  lang: "pt"
- content: |
    Limiting the installation of APK files (sideloading) is bad because it turns Android, known for its openness, into a "walled garden" similar to Apple's.
    
    This restriction strips users of their freedom, treating them as if they cannot make decisions about their own devices.
    
    Furthermore, it stifles competition and innovation. Alternative app stores, like F-Droid (focused on open-source), and developers testing their apps are directly harmed. This forces everyone to depend exclusively on the Google Play Store, giving Google total control over the market and what you can or cannot install, often under the guise of "security."
    
    In the end, it's a trade-off of Android's fundamental freedom for centralized corporate control.
  author: "Lucas de arruda"
  lang: "en"
- content: |
    Google quer empurrar todo mundo pra usar só a Play Store, mas limitar o uso de APKs é tirar o direito do usuário de escolher o que instala no próprio aparelho. Segurança é importante, mas controle total não é solução.
