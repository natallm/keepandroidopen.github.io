  author: "Goku"
  lang: "es"
- content: |
    Como usuario habitual y pequeño desarrollador, esta medida me preocupa profundamente. Cuando compro un teléfono Android, lo hago con la expectativa de tener control sobre cómo lo uso, no de enfrentarme a restricciones ni censura. Herramientas como Knox y Play Integrity ya son bastante frustrantes, ¡y ahora parece que incluso descargar aplicaciones de F-Droid u otras tiendas de aplicaciones debería revisarse! Esto socava tanto la libertad del usuario como el espíritu abierto que definió originalmente a Android. Tenemos (bueno, tenemos que recuperarlo) el derecho a crear, modificar y usar aplicaciones, y a comunicarnos en línea, sin que se nos obligue a renunciar al anonimato. Es responsabilidad de los usuarios informarse sobre los posibles riesgos, no de GAFAM decidir por nosotros.
