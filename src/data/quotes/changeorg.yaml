    Smartphones serve as the primary drivers enabling both our personal and professional lives, online and offline. Big tech’s desire to rob the people’s agency and ownership over such vital technology through needless restrictions and invasive surveillance for an extra dime clearly shows their lack of integrity and respect for the consumer. Removing the freedom of choice from Android means creating a landscape where all mobile technology will never truly serve their users as all tools should.
    
    Coming from someone who has used both Android and iOS devices, I have learned how indispensable the freedom provided by Android really is, even for an average user. Google’s willingness to restrict their users, destroying Android’s greatest strength and its legacy is extremely disappointing. I do not want to live in a world where all technology becomes a series of “walled gardens” as Apple has notoriously made their own phones.
    
