  author: "Eric"
  lang: "en"
- content: |
    As someone who's used Android since Android 5.0 & 4.4.4, I think being able to download and install 3rd party applications is important for EVERYONE who uses any Android device. Sideloading is a key reason why Android is beloved by most of its users and a key advantage for most power users of many different devices which gives it a major edge over Apple's iOS platform which has many of these restrictions. The difference between Android and iOS for as long as both of them have existed is that Android has been designed since the beginning as an Open-Source operating system that was ALWAYS designed to be tinkered with by the user without needing to be beholden to the whims of the big company that owns it.
    
    TL;DR, Android is an open-source OS that is better than iOS because it doesn't restrict user freedoms, even if that freedom isn't always needed by every Android user.
    
    Keep Android Open! (save Android X86 too maybe as well!)
