    I made the choice to use top tier devices that run Android OS because it gives me the freedom to customize my device to my wants, likes, and needs. This is a HUGE deciding factor for any items I, and many others, choose to purchase. "Can I make it mine?"
    
    As the de facto IT team-of-one where I work (A small all natural deodorant manufacturer that is currently the quickest growing and is becoming one of top rated brands in the US), people ask me about everything tech. I unequivocally recommended Android devices to the everyday "not-hacking-my-devices" person, and even to those that are techno-wizards. The ability to embrace the freedoms of style, function, usability, and privacy are indispensable in tech.
    
    The reasons being: You are not locked into an ecosystem that extorts money from its users and developers, while limiting the functions available to you. You can customize the system to your needs or wants. Less so now that before, but it's still doable and reasonably fun for most. Yet, MOST IMPORTANTLY, it gives you the freedom of creativity and discovery! These devices have the potential to do so much; and as users we have the potential to create so many amazing things! Maybe just for ones own amusement, just to see what they can make, or to discover new skills and challenges. Within that though, there is the potential to create something that changes people's lives, be it just entertainment or something far more significant.
    
